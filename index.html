function setupImageDropzone(dropEl, fileInputEl, onImage) {
  dropEl.addEventListener('click', (e) => {
    if (e.target.closest('.image-preview-actions')) return;
    fileInputEl.click();
  });
  fileInputEl.addEventListener('change', (e) => {
    const file = e.target.files?.[0];
    if (file) handleImageFile(file, onImage);
    fileInputEl.value = '';
  });
  dropEl.addEventListener('dragover', (e) => { e.preventDefault(); dropEl.classList.add('drag-over'); });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
  dropEl.addEventListener('drop', (e) => {
    e.preventDefault();
    dropEl.classList.remove('drag-over');
    const file = e.dataTransfer.files?.[0];
    if (file && file.type.startsWith('image/')) handleImageFile(file, onImage);
  });
}
function handleImageFile(file, callback) {
  if (!file.type.startsWith('image/')) { showToast('只支持图片文件', 'error'); return; }
  compressImage(file)
    .then(dataUrl => uploadPhotoToStorage(dataUrl, 'style'))
    .then(url => callback(url));
}
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1000;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// === Supabase Storage 照片上传 ===
// 把 base64 dataUrl 上传到 Storage bucket "cycle-photos",返回 public URL。
// 数据库 cycle_photos.photo_data 列继续用,但**值改为 URL 而非 base64**。
// 老 base64 数据继续工作(<img src="base64"> 也合法),只是新上传走 storage。
// 需配套:Supabase Dashboard 创建 public bucket "cycle-photos"(见 MIGRATIONS.md Migration 4)
const STORAGE_BUCKET = 'cycle-photos';
function dataUrlToBlob(dataUrl) {
  const [meta, b64] = dataUrl.split(',');
  const mime = meta.match(/data:([^;]+)/)?.[1] || 'image/jpeg';
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}
async function uploadPhotoToStorage(dataUrl, prefix = 'photo') {
  // 如果输入已经是 URL(不是 dataUrl),直接返回 — 防重复上传
  if (!dataUrl || !dataUrl.startsWith('data:')) return dataUrl;
  try {
    const blob = dataUrlToBlob(dataUrl);
    const ext = (blob.type.split('/')[1] || 'jpg').replace('jpeg', 'jpg');
    const fileName = `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${ext}`;
    const { data, error } = await _supabase.storage
      .from(STORAGE_BUCKET)
      .upload(fileName, blob, { contentType: blob.type, cacheControl: '31536000', upsert: false });
    if (error) {
      console.warn('[uploadPhotoToStorage] 上传失败,回退用 base64', error);
      return dataUrl;  // 失败时退回 base64,保证功能不断
    }
    const { data: pub } = _supabase.storage.from(STORAGE_BUCKET).getPublicUrl(data.path);
    return pub.publicUrl;
  } catch (e) {
    console.warn('[uploadPhotoToStorage] 异常,回退 base64', e);
    return dataUrl;
  }
}

/*
========================================================================
 苹果风自定义日期选择器
========================================================================
 用法：把任何 input[type="date"] 替换掉它的展示行为
 焦点时弹出一个浮层日历，选中后写回 input.value
*/

let _activeDatePicker = null;

function openDatePicker(inputEl) {
  if (_activeDatePicker) closeDatePicker();
  const rect = inputEl.getBoundingClientRect();
  const initial = inputEl.value || todayStr();
  const [iy, im, id] = initial.split('-').map(Number);

  const picker = document.createElement('div');
  picker.className = 'date-picker-popup';
  picker.dataset.year = iy;
  picker.dataset.month = im - 1;  // 0-11
  picker.style.position = 'fixed';
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.style.left = rect.left + 'px';
  picker.style.zIndex = '500';

  document.body.appendChild(picker);
  _activeDatePicker = { popup: picker, input: inputEl, selected: initial };

  renderDatePicker();

  // 点击外部关闭
  setTimeout(() => {
    document.addEventListener('mousedown', _datePickerOutsideClick);
  }, 0);
}

function _datePickerOutsideClick(e) {
  if (!_activeDatePicker) return;
  if (e.target.closest('.date-picker-popup')) return;
  if (e.target === _activeDatePicker.input) return;
  closeDatePicker();
}

function closeDatePicker() {
  if (!_activeDatePicker) return;
  document.removeEventListener('mousedown', _datePickerOutsideClick);
  _activeDatePicker.popup.remove();
  _activeDatePicker = null;
}

function renderDatePicker() {
  if (!_activeDatePicker) return;
  const popup = _activeDatePicker.popup;
  const year = parseInt(popup.dataset.year);
  const month = parseInt(popup.dataset.month);

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();
  const startCol = startWeekday === 0 ? 6 : startWeekday - 1;

  const today = todayStr();
  const selected = _activeDatePicker.selected;

  let cellsHtml = '';
  // 上月填充
  const prevMonthDays = new Date(year, month, 0).getDate();
  for (let i = 0; i < startCol; i++) {
    const d = prevMonthDays - startCol + 1 + i;
    cellsHtml += `<div class="dp-cell dp-cell-other">${d}</div>`;
  }
  // 本月
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    let cls = 'dp-cell';
    if (dateKey === today) cls += ' dp-cell-today';
    if (dateKey === selected) cls += ' dp-cell-selected';
    cellsHtml += `<div role="button" tabindex="0" class="${cls}" onclick="datePickerSelect('${dateKey}')">${d}</div>`;
  }
  // 下月填充到 6 行
  const totalCells = startCol + daysInMonth;
  const totalRows = Math.ceil(totalCells / 7);
  const remaining = totalRows * 7 - totalCells;
  for (let i = 1; i <= remaining; i++) {
    cellsHtml += `<div class="dp-cell dp-cell-other">${i}</div>`;
  }

  popup.innerHTML = `
    <div class="dp-header">
      <button class="dp-nav-btn" onclick="datePickerNav(-1)">‹</button>
      <div class="dp-title">${year} 年 ${month + 1} 月</div>
      <button class="dp-nav-btn" onclick="datePickerNav(1)">›</button>
    </div>
    <div class="dp-weekdays">
      <div>一</div><div>二</div><div>三</div>
      <div>四</div><div>五</div><div>六</div><div>日</div>
    </div>
    <div class="dp-grid">${cellsHtml}</div>
    <div class="dp-footer">
      <button class="dp-clear-btn" onclick="datePickerClear()">清除</button>
      <button class="dp-today-btn" onclick="datePickerToday()">今天</button>
    </div>
  `;
}

function datePickerNav(delta) {
  if (!_activeDatePicker) return;
  const popup = _activeDatePicker.popup;
  let year = parseInt(popup.dataset.year);
  let month = parseInt(popup.dataset.month);
  month += delta;
  if (month < 0) { month = 11; year--; }
  if (month > 11) { month = 0; year++; }
  popup.dataset.year = year;
  popup.dataset.month = month;
  renderDatePicker();
}

function datePickerSelect(dateKey) {
  if (!_activeDatePicker) return;
  _activeDatePicker.input.value = dateKey;
  // 触发 input 的 change 事件
  _activeDatePicker.input.dispatchEvent(new Event('change', { bubbles: true }));
  closeDatePicker();
}

function datePickerToday() {
  datePickerSelect(todayStr());
}

function datePickerClear() {
  if (!_activeDatePicker) return;
  _activeDatePicker.input.value = '';
  _activeDatePicker.input.dispatchEvent(new Event('change', { bubbles: true }));
  closeDatePicker();
}

// 拦截所有 date input 的 click，弹出自定义日历
function setupCustomDatePickers() {
  // 监听所有 input[type=date] 的点击，弹出自定义日历
  // 用 mousedown 阻止浏览器原生日历
  document.addEventListener('mousedown', (e) => {
    const target = e.target;
    if (target.tagName === 'INPUT' && target.type === 'date') {
      e.preventDefault();
      e.stopPropagation();
      // 如果点的是已经在打开自定义日历的 input，则关闭
      if (_activeDatePicker && _activeDatePicker.input === target) {
        closeDatePicker();
        return;
      }
      // 否则打开自定义日历
      target.blur();
      setTimeout(() => openDatePicker(target), 0);
    }
  }, true);

  // 也阻止 focus 触发原生日历
  document.addEventListener('focus', (e) => {
    const target = e.target;
    if (target.tagName === 'INPUT' && target.type === 'date') {
      // 阻止焦点（避免触发原生日历）
      target.blur();
    }
  }, true);

  // 阻止 keydown（Enter 等）也触发原生
  document.addEventListener('keydown', (e) => {
    const target = e.target;
    if (target.tagName === 'INPUT' && target.type === 'date') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!_activeDatePicker || _activeDatePicker.input !== target) {
          openDatePicker(target);
        }
      }
    }
  }, true);
}


function setupPasteHandler() {
  document.addEventListener('paste', (e) => {
    const newOpen = document.getElementById('newStyleBackdrop').classList.contains('open');
    const editOpen = document.getElementById('imageBackdrop').classList.contains('open');
    if (!newOpen && !editOpen) return;
    const items = e.clipboardData?.items || [];
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) {
          e.preventDefault();
          if (newOpen) {
            handleImageFile(file, (dataUrl) => {
              state.pendingImageData = dataUrl;
              showImagePreview('newImageDrop', 'newImageInner', dataUrl, 'clearNewImage');
            });
          } else if (editOpen) {
            handleImageFile(file, (dataUrl) => {
              state.pendingEditImage = dataUrl;
              showImagePreview('editImageDrop', 'editImageInner', dataUrl, 'clearEditImage');
            });
          }
          return;
        }
      }
    }
  });
}

document.addEventListener('keydown', e => {

  const isInputFocused = document.activeElement && (
    document.activeElement.tagName === 'INPUT' ||
    document.activeElement.tagName === 'TEXTAREA' ||

  );

  if (e.key === 'Escape') {
    // 优先关闭图片查看器（如果开着）

    if (viewerOpen) {

    if (isInputFocused) document.activeElement.blur();
    return;
  }

  if (isInputFocused) return;

  // / 聚焦搜索框
  if (e.key === '/') {
    const searchInput = document.getElementById('search');
    if (searchInput && searchInput.style.display !== 'none' && document.getElementById('controlsBar').style.display !== 'none') {
      e.preventDefault();
      searchInput.focus();
    }
    return;
  }

  // ? 显示快捷键帮助
  if (e.key === '?') {
    e.preventDefault();
    showKeyboardHelp();
    return;
  }

  // 如果有任何模态弹窗打开，不处理列表导航
  const anyModalOpen = document.querySelector('.modal-backdrop.open') ||
                       document.querySelector('.drawer.open');
  if (anyModalOpen) {
    // 抽屉打开时支持 Enter 触发主操作
    if (e.key === 'Enter' && document.querySelector('.drawer.open')) {
      const primaryBtn = document.querySelector('.drawer .drawer-actions button.primary');
      if (primaryBtn) {
        e.preventDefault();
        primaryBtn.click();
      }
    }
    return;
  }

  // 列表键盘导航（仅在有列表时）
  const styles = state._currentListStyles;
  if (!styles || styles.length === 0) return;

  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    state.keyboardSelectedIdx = Math.min(styles.length - 1, state.keyboardSelectedIdx + 1);
    updateKeyboardSelection();
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    state.keyboardSelectedIdx = Math.max(0, state.keyboardSelectedIdx - 1);
    updateKeyboardSelection();
  } else if (e.key === 'Enter' && state.keyboardSelectedIdx >= 0) {
    e.preventDefault();
    const s = styles[state.keyboardSelectedIdx];
    if (s) openDrawer(s.id);
  } else if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    if (!canEditStyleInfo()) { showToast('当前账号无权新建款式', 'warn'); return; }
    openNewStyleModal();
  }
});

function updateKeyboardSelection() {
  document.querySelectorAll('.style-row').forEach(row => row.classList.remove('keyboard-selected'));
  const selected = document.querySelector(`.style-row[data-idx="${state.keyboardSelectedIdx}"]`);
  if (selected) {

    selected.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

}

// 确认批量完成
async function confirmBatchComplete(actionType) {
  const selectedIds = Object.keys(state.batchSelected || {});
  if (selectedIds.length === 0) return;
  
  let processedCount = 0;
  
  try {
    switch (actionType) {
      case 'pattern':
        const patternDate = document.getElementById('batchPatternDate').value;
        if (!patternDate) { showToast('请选择打版完成日期', 'warn'); return; }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          const cycle = s.cycles?.[s.cycles.length - 1];
          if (cycle && !cycle.receivedDate) {
            cycle.patternMakerDone = true;
            cycle.patternMakerDoneDate = toIsoWithNowTime(patternDate);
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
        
      case 'fabric':
        const fabricDate = document.getElementById('batchFabricDate').value;
        if (!fabricDate) { showToast('请选择面料备齐日期', 'warn'); return; }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          const cycle = s.cycles?.[s.cycles.length - 1];
          if (cycle && !cycle.receivedDate && cycle.patternMakerDone) {
            cycle.fabricSourcedDate = toIsoWithNowTime(fabricDate);
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
        
      case 'workshop':
        const receiveDate = document.getElementById('batchReceiveDate').value;
        if (!receiveDate) {
          showToast('请选择收样日期', 'warn');
          return;
        }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          // 找到最后一个 cycle，且有 patternMakerDone 或 openDate，没有 receivedDate
          const cycle = s.cycles?.[s.cycles.length - 1];
          if (cycle && !cycle.receivedDate) {
            cycle.receivedDate = toIsoWithNowTime(receiveDate);
            // 清除版师打完标记
            if (cycle.patternMakerDone) {
              cycle.patternMakerDone = false;
              cycle.patternMakerDoneDate = null;
            }
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
        
      case 'shipping':
        const sentDate = document.getElementById('batchSentDate').value;
        const trackingNumber = document.getElementById('batchTrackingNumber').value;
        if (!sentDate) {
          showToast('请选择寄出日期', 'warn');
          return;
        }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          // 找到最后一个 cycle，有 receivedDate，没有 sentDate
          const cycle = s.cycles?.[s.cycles.length - 1];
          if (cycle && cycle.receivedDate && !cycle.sentDate) {
            cycle.sentDate = toIsoWithNowTime(sentDate);
            if (trackingNumber) cycle.shipTrackingNo = trackingNumber;
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
        
      case 'feedback':
        const feedbackDate = document.getElementById('batchFeedbackDate').value;
        const feedbackType = document.querySelector('input[name="batchFeedbackType"]:checked').value;
        if (!feedbackDate) {
          showToast('请选择反馈日期', 'warn');
          return;
        }
        if (feedbackType === 'individual') {
          showToast('逐个录入功能暂不支持，请单独处理', 'warn');
          return;
        }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          // 找到最后一个 cycle，有 sentDate，没有 feedbackDate，且不是 PROD
          const cycle = s.cycles?.[s.cycles.length - 1];
          if (cycle && cycle.sentDate && !cycle.feedbackDate && cycle.type !== 'PROD') {
            cycle.feedbackDate = toIsoWithNowTime(feedbackDate);
            if (feedbackType === 'approve') {
              cycle.feedbackOutcome = FEEDBACK_OUTCOMES.APPROVED;
              cycle.feedbackNote = '批量通过';
            } else if (feedbackType === 'revise') {
              cycle.feedbackOutcome = FEEDBACK_OUTCOMES.REVISE;
              cycle.feedbackNote = '批量需修改';
            }
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
        
      case 'fit':
        const fitDate = document.getElementById('batchFitDate').value;
        const fitComment = document.getElementById('batchFitComment').value;
        if (!fitDate) {
          showToast('请选择 fit 日期', 'warn');
          return;
        }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          const po = s.pos?.[0]; // 简化处理，只处理第一个 PO
          if (po && !po.fitComment) {
            po.fitComment = fitComment || '已收到 fit';
            po.fitDate = fitDate;
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
        
      case 'prod':
        const arriveDate = document.getElementById('batchArriveDate').value;
        if (!arriveDate) {
          showToast('请选择到仓日期', 'warn');
          return;
        }
        for (const id of selectedIds) {
          const s = state.styles.find(x => x.id === id);
          if (!s) continue;
          if (s.pos && s.pos.length > 0) {
            s.pos.forEach(po => {
              if (!po.arrivedDate) {
                po.arrivedDate = arriveDate;
              }
            });
            await saveOneStyle(s.id);
            processedCount++;
          }
        }
        break;
    }
    
    // 清空选择
    state.batchSelected = {};
    
    // 关闭模态框
    closeUpdateModal();
    
    // 批量寄出后：跳到「反馈」或「图审」tab，跟单后续动作直接接上
    if (actionType === 'shipping') {
      // 看选中的款里 PHOTO 多还是实物多
      let photoCount = 0, normalCount = 0;
      for (const id of selectedIds) {
        const s = state.styles.find(x => x.id === id);
        const lastCycle = s?.cycles?.[s.cycles.length - 1];
        if (lastCycle?.type === 'PHOTO') photoCount++;
        else normalCount++;
      }
      const targetSub = (photoCount > normalCount) ? 'photo' : 'feedback';
      if (typeof switchTodaySub === 'function') {
        switchTodaySub(targetSub);
      } else {
        state.todaySub = targetSub;
        renderTodayTab();
      }
    } else {
      // 其他批量动作：刷新当前 tab 即可
      renderTodayTab();
    }
    
    showToast(`已完成 ${processedCount} 个款的批量操作`, 'ok');
    
  } catch (e) {
    console.error('批量完成失败', e);
    showToast('批量操作失败：' + e.message, 'error');
  }
}

// 导出备份
function exportBackup() {
  try {
    const backup = {
      version: '1.0',
      timestamp: new Date().toISOString(),
      data: {
        styles: state.styles,
        // 可以添加其他需要备份的数据
      }
    };
    
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
    a.href = url;
    a.download = `光采服装备份_${timestamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(`备份文件已导出（${state.styles.length} 款）`, 'ok');
  } catch (e) {
    console.error('导出备份失败', e);
    showToast('导出失败，请重试', 'error');
  }
}

    title: '恢复备份',
    message: '恢复备份会覆盖当前所有数据。建议先导出当前数据作为备份。\n\n确定要继续吗?',
    confirmText: '继续恢复',
    danger: true
  });
  if (!ok) {
    event.target.value = '';
    return;
  }
  
  try {
    const text = await file.text();
    const backup = JSON.parse(text);
    
    if (!backup.version || !backup.data || !backup.data.styles) {
      throw new Error('备份文件格式不正确');
    }
    
    // 恢复数据到本地
    state.styles = backup.data.styles;
    
    // 保存到本地缓存
    saveToLocalCache(state.styles);
    
    // 保存到 Supabase
    showToast('正在恢复数据到云端...', 'ok');
    
    // 批量保存到 Supabase
    for (const style of state.styles) {
      await saveStyleToSupabase(style);
    }
    
    // 重新渲染
    render();
    closeUpdateModal();
    
    showToast(`成功恢复 ${state.styles.length} 款！`, 'ok');
  } catch (e) {
    console.error('导入备份失败', e);
    showToast('导入失败：' + e.message, 'error');
  } finally {
    event.target.value = '';
  }
}

</script>
</body>
</html>
