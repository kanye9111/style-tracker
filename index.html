  installGlobalA11y();
}

// 一次性 migration:所有反单 PROD cycle 补 patternMakerDone(反单不经版师)
// 幂等:跑多次无副作用 — 已经有 patternMakerDone 的 cycle 直接 skip
async function migrateRepeatSkipPattern() {
  const touched = [];
  state.styles.forEach(s => {
    if (!s.pos || s.pos.length === 0) return;
    const allRepeat = s.pos.every(p => p.orderType === 'repeat');
    if (!allRepeat) return;
    if (!s.cycles || s.cycles.length === 0) return;
    s.cycles.forEach(c => {
      if (c.type !== 'PROD') return;
      if (c.patternMakerDone) return;  // 已 OK
      c.patternMakerDone = true;
      c.patternMakerDoneDate = c.openDate || toIsoWithNowTime(todayStr());
      if (!touched.includes(s)) touched.push(s);
    });
  });
  if (touched.length === 0) return;
  console.log(`[migration] 反单跳过版师: 修复 ${touched.length} 个款`);
  // 持久化到 Supabase
  for (const s of touched) {
    try { await saveStyleToSupabase(s); } catch (e) { console.warn('migration save fail', s.id, e); }
  }
  if (typeof showToast === 'function') showToast(`✓ 反单流程优化:${touched.length} 个反单款跳过版师`, 'ok');
}

// === 全局 a11y 增强 ===
// div[role="button"] 在 Enter/Space 上触发 click(键盘用户和屏幕阅读器需要)
// Esc 全局关闭 modal(按最上层优先级关)
function installGlobalA11y() {
  if (window._a11yInstalled) return;
  window._a11yInstalled = true;

  // Focus 管理 — 按 modal 打开顺序栈式保存上一焦点,关闭还原
  const MODAL_IDS = ['drawerBackdrop', 'updateBackdrop', 'newStyleBackdrop', 'imageBackdrop', 'imageViewerBackdrop'];
  const _focusStack = [];
  const _wasOpen = {};
  function _focusablesIn(root) {
    if (!root) return [];
    return Array.from(root.querySelectorAll(
      'a[href], button:not([disabled]), input:not([disabled]):not([type=hidden]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])'
    )).filter(el => el.offsetParent !== null);
  }
  function _topMostOpenModal() {
    // 倒序优先(后开的在最上层)
    for (let i = MODAL_IDS.length - 1; i >= 0; i--) {
      const el = document.getElementById(MODAL_IDS[i]);
      if (el && el.classList.contains('open')) return el;
    }
    const kb = document.getElementById('kbHelpOverlay');
    if (kb) return kb;
    return null;
  }
  function _handleModalToggle(id) {
    const el = document.getElementById(id);
    if (!el) return;
    const isOpen = el.classList.contains('open');
    const prev = _wasOpen[id] || false;
    if (isOpen && !prev) {
      const a = document.activeElement;
      _focusStack.push((a && a !== document.body) ? a : null);
      setTimeout(() => {
        if (!el.classList.contains('open')) return;
        const fs = _focusablesIn(el);
        if (fs.length > 0) {
          try { fs[0].focus(); } catch (e) {}
        }
      }, 60);
    } else if (!isOpen && prev) {
      const back = _focusStack.pop();
      if (back && document.body.contains(back)) {
        try { back.focus(); } catch (e) {}
      }
    }
    _wasOpen[id] = isOpen;
  }
  MODAL_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    _wasOpen[id] = el.classList.contains('open');
    new MutationObserver(() => _handleModalToggle(id))
      .observe(el, { attributes: true, attributeFilter: ['class'] });
  });

  document.addEventListener('keydown', (e) => {
    const t = e.target;
    // div[role="button"] 的键盘激活
    if (t && t.getAttribute && t.getAttribute('role') === 'button'
        && (e.key === 'Enter' || e.key === ' ')
        && t.tagName !== 'BUTTON' && t.tagName !== 'A' && t.tagName !== 'INPUT'
        && t.tagName !== 'TEXTAREA' && t.tagName !== 'SELECT') {
      e.preventDefault();
      t.click();
      return;
    }
    // Tab 在 modal 内循环(focus trap)
    if (e.key === 'Tab') {
      const modal = _topMostOpenModal();
      if (modal) {
        const fs = _focusablesIn(modal);
        if (fs.length === 0) { e.preventDefault(); return; }
        const first = fs[0], last = fs[fs.length - 1];
        const insideModal = modal.contains(document.activeElement);
        if (!insideModal) { e.preventDefault(); first.focus(); return; }
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault(); last.focus(); return;
        }
        if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault(); first.focus(); return;
        }
      }
    }
    // Esc 关 modal(最上层优先)
    if (e.key === 'Escape') {
      const isOpen = (id) => document.getElementById(id)?.classList.contains('open');
      if (isOpen('imageViewerBackdrop')) { closeImageViewer(); return; }
      if (isOpen('updateBackdrop')) { closeUpdateModal(); return; }
      if (isOpen('newStyleBackdrop')) { closeNewStyleModal(); return; }
      if (isOpen('imageBackdrop')) { typeof closeImageModal === 'function' && closeImageModal(); return; }
      if (isOpen('drawerBackdrop')) { closeDrawer(); return; }
    }
  });
}
// @deprecated 改用 saveOneStyle(styleId)
// 这个函数会把整个 state.styles 全量 upsert,N 个款就发 N 次请求。
// 修单个款用 saveOneStyle(id);批量操作请在循环里调 saveOneStyle(id)。
// 保留旧行为作安全网 — 万一漏了一个调用点,数据不会丢。
function saveState() {
  console.warn('[saveState] 已废弃,请改用 saveOneStyle(styleId) — 调用栈:', new Error().stack);
  state.styles.forEach(s => saveStyleToSupabase(s));
}
// 保存单个 style 的快捷方法（推荐在修改单个 style 后调用）
function saveOneStyle(styleId) {
  const s = state.styles.find(x => x.id === styleId);
  if (s) saveStyleToSupabase(s);
}
function uid(prefix) {
  // 优先用 crypto.randomUUID(碰撞概率可忽略);旧浏览器回退 Math.random
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return (prefix || 'id') + '_' + crypto.randomUUID().split('-')[0];
  }
  return (prefix || 'id') + '_' + Math.random().toString(36).slice(2, 10);
}
function daysBetween(a, b) {
  if (!a || !b) return null;
  // 取字符串前 10 字符(YYYY-MM-DD)用本地时区 0 点解析。
  // 兼容两种存储:纯日期 'YYYY-MM-DD' / ISO 带时间 'YYYY-MM-DDTHH:mm:ss+08:00'。
  // 同日比较返回 0(而非 -1)— 因为两端都对齐到本地午夜。
  const parse = (x) => {
    if (typeof x === 'string' && /^\d{4}-\d{2}-\d{2}/.test(x)) {
      const [y, m, d] = x.slice(0, 10).split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    if (x instanceof Date) {
      return new Date(x.getFullYear(), x.getMonth(), x.getDate());
    }
    return new Date(x);
  };
  return Math.floor((parse(b) - parse(a)) / (1000 * 60 * 60 * 24));
}
function todayStr() {
  // 用本地时区,不是 UTC。中国用户在 UTC+8 早 8 点前用 toISOString() 会算成昨天。
  const d = new Date();
  return d.getFullYear() + '-' +
         String(d.getMonth() + 1).padStart(2, '0') + '-' +
         String(d.getDate()).padStart(2, '0');
}
function daysSince(d) { return d ? daysBetween(d, todayStr()) : null; }
function daysUntil(d) { return d ? daysBetween(todayStr(), d) : null; }
function urgencyByDays(days, ty, tr) {
  if (days < ty) return 'ok';
  if (days < tr) return 'warn';
  return 'danger';
}

function seedData() {
  state.styles = [];
}

const CYCLE_TYPES = {

  PROD:   { label: '船版',   nodeLabels: ['开版', '收到船版', '寄出客户', '船版批准'], feedbackLabel: '船版批准' }
};

  PO_AWAIT_FIT:  'PO_AWAIT_FIT',  // 下了 PO,fit comment 还没给
  PO_REVISE:     'PO_REVISE',     // 下 PO + 要重做板
  PO_PHOTO:      'PO_PHOTO',      // 下 PO + 要拍照板
  PO_PROD:       'PO_PROD',       // 下 PO + 直接安排大货
  APPROVED:      'APPROVED',      // PHOTO 批准 / PROD 批准
  REMAKE_PHOTO:  'REMAKE_PHOTO',  // 拍照版重做
  REMAKE_SAMPLE: 'REMAKE_SAMPLE', // 样要重做
  REMAKE:        'REMAKE',        // PROD 重做
  REVISE:        'REVISE',        // 批量"需修改"

const CLIENT_GROUP_ORDER = [

function normalizeClientGroup(s) {

// 客户清单(加新客户改这里就够 — 过滤 chip / 各 select 全部从此渲染)

// 反单业务规则配置(按客户)— 加新客户在这里加规则,不要在分支里写死字符串
// confirmSample = true:反单确认色样品需要寄客户审批后才能进大货(PLT 流程)
// confirmSample = false:反单确认色样品只寄到公司,跟单点 ✓ approve 直接进大货(BOOHOO 流程)

const REPEAT_ORDER_RULES = {

  PLT:    { confirmSample: true,  label: 'PLT'    },
};
function getRepeatRule(client) {

}
function renderClientFilterChips() {

// 反单统一流程(BOOHOO / PLT / 所有客户一样):
// 1. 跟单录入 PO → 微信 at 采购
// 2. 采购买面料 (AWAIT_FABRIC)
// 3. 版房做一件确认色 (AWAIT_DELIVERY)
// 4. 跟单收到 → 寄客户 → 等反馈 → 大货
// 跳过版师 (纸样工厂已有,不需要重打)
function buildRepeatCycle(client, openDate) {
  // openDate 不能在未来,否则后续天数/紧迫度计算全错。
  const today = todayStr();
  if (openDate && openDate > today) openDate = today;
  const openIso = toIsoWithNowTime(openDate);
  return {
    id: uid('c'), type: 'PROD', openDate: openIso,
    patternMakerDone: true,
    patternMakerDoneDate: openIso
  };
}

// 该催谁
function whoToFollowUp(node, cycleType) {
  if (node === 'PATTERN_MAKING') return '板房 / 板师';
  if (node === 'AWAIT_FABRIC') return '采购（备面料）';
  if (node === 'AWAIT_DELIVERY') return '板房（送样回来）';
  if (node === 'AWAIT_SEND') return '自己处理（提醒寄出）';
  if (node === 'AWAIT_FB') {
    if (cycleType === 'PHOTO') return '客户买手（图审）';
    if (cycleType === 'PROD') return '客户 QC（船版审批）';
    return '客户买手';
  }
  if (node === 'AWAIT_FIT') return '客户买手（fit comment）';
  if (node === 'GRADING') return '版师（放码）';
  return null;
}

function getStyleStatus(style) {
  if (style.archived) {
    return {
      stage: 'ARCHIVED', stageLabel: '未采用',
      currentNode: 'ARCHIVED', currentNodeLabel: '未采用',
      days: null, level: 'archived',
      awaitingClient: false, isActive: false, isArchived: true
    };
  }

  if (style.awaitingFit) {
    const days = daysSince(style.awaitingFit.since);
    return {
      stage: 'AWAIT_FIT', stageLabel: '已下 PO·等回复',
      currentNode: 'AWAIT_FIT', currentNodeLabel: '已下 PO·等回复',
      startDate: style.awaitingFit.since,
      days, level: urgencyByDays(days, 3, 5),
      awaitingClient: true, isActive: true, isArchived: false
    };
  }

  // 自动恢复 awaitingFit:如果最后一个有 outcome 的 cycle 选了 PO_AWAIT_FIT,且后面没新 cycle,
  // 即使 s.awaitingFit 字段同步丢了(数据迁移/写入失败/老数据),也把状态判定为 AWAIT_FIT,
  // 避免 fallback 到 PATTERN_MAKING 跑到版师 sub-tab。
  if (style.cycles && style.cycles.length > 0 && !style.archived) {
    for (let i = style.cycles.length - 1; i >= 0; i--) {
      const c = style.cycles[i];
      if (c.feedbackOutcome) {
        if (c.feedbackOutcome === FEEDBACK_OUTCOMES.PO_AWAIT_FIT && i === style.cycles.length - 1) {
          // 这是最后一个 cycle 且选了 PO_AWAIT_FIT — 还没收到 fit
          const since = c.feedbackDate;
          const days = since ? daysSince(since) : 0;
          return {
            stage: 'AWAIT_FIT', stageLabel: '已下 PO·等回复',
            currentNode: 'AWAIT_FIT', currentNodeLabel: '已下 PO·等回复',
            startDate: since,
            days, level: urgencyByDays(days, 3, 5),
            awaitingClient: true, isActive: true, isArchived: false
          };
        }
        break;  // 找到最近的 outcome,不再往前找
      }
    }
  }

  // 客户 approve 后等版师放码（夹在 DEV/REVISE/PHOTO 完结 和 PROD 开始之间）
  if (style.awaitingGrading) {
    const days = daysSince(style.awaitingGrading.since);
    return {
      stage: 'GRADING', stageLabel: '等版师放码',
      currentNode: 'GRADING', currentNodeLabel: '等版师放码',
      startDate: style.awaitingGrading.since,
      days, level: urgencyByDays(days, 2, 4),
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: 'GRADING'
    };
  }

  // 自动恢复：从后往前找最近一个"有 outcome 的 cycle"作为决议点。
  // 如果它是 approve-to-prod 触发(PO_PROD / PHOTO+APPROVED),且它之后没有 PROD cycle 接续,
  // 就认为还在等放码 — 兼容数据丢了 awaitingGrading 字段、或末尾被误加空 cycle 的情况。
  if (style.cycles && style.cycles.length > 0 && !style.archived) {
    let approveCycle = null;
    let approveIdx = -1;
    for (let i = style.cycles.length - 1; i >= 0; i--) {
      if (style.cycles[i].feedbackOutcome) {
        approveCycle = style.cycles[i];
        approveIdx = i;
        break;
      }
    }
    if (approveCycle) {
      const isApproveTrigger = approveCycle.feedbackOutcome === FEEDBACK_OUTCOMES.PO_PROD
        || (approveCycle.feedbackOutcome === FEEDBACK_OUTCOMES.APPROVED && approveCycle.type === 'PHOTO');
      // 决议点必须不是 PROD 自身(PROD APPROVED 走下面的大货流程)
      // 决议点后面也不能有 PROD cycle(已开 PROD 就不该回 GRADING)
      const hasProdAfter = style.cycles.slice(approveIdx + 1).some(c => c.type === 'PROD');
      if (isApproveTrigger && approveCycle.type !== 'PROD' && !hasProdAfter) {
        const since = approveCycle.feedbackDate;
        const days = since ? daysSince(since) : 0;
        return {
          stage: 'GRADING', stageLabel: '等版师放码',
          currentNode: 'GRADING', currentNodeLabel: '等版师放码',
          startDate: since,
          days, level: urgencyByDays(days, 2, 4),
          awaitingClient: false, isActive: true, isArchived: false,
          cycleType: 'GRADING'
        };
      }
    }
  }

  if (!style.cycles || style.cycles.length === 0) {
    return { stage: 'DEV', stageLabel: '开发版', currentNode: 'UNKNOWN', currentNodeLabel: '—', days: 0, level: 'ok', isActive: true, isArchived: false };
  }
  const lastCycle = style.cycles[style.cycles.length - 1];

  if (lastCycle.type === 'PROD' && lastCycle.feedbackOutcome === FEEDBACK_OUTCOMES.APPROVED) {
    // 大货收到状态判断:
    // - 老数据(只有 date,没 batches):兼容,显示已到仓
    // - 新数据 fullyReceived = true:真正完结
    // - 新数据 batches 有值但 fullyReceived = false:部分到仓,仍在跟进
    if (style.prodReceived && style.prodReceived.date) {
      const pr = style.prodReceived;
      const hasBatches = pr.batches && pr.batches.length > 0;
      const isFully = pr.fullyReceived === true;
      // 老数据 OR 用户手动确认收齐 → DONE
      if (!hasBatches || isFully) {
        return {
          stage: 'DONE', stageLabel: '大货已到仓',
          currentNode: 'DONE', currentNodeLabel: '大货已到仓 ✓',
          startDate: pr.date,
          days: null, level: 'done',
          awaitingClient: false, isActive: false, isArchived: false
        };
      }
      // 部分到仓 — 还在等剩余批次,继续显示在大货组里
      const totalRecv = pr.batches.reduce((sum, b) => sum + (Number(b.received) || 0), 0);
      const totalQty = (style.pos || []).reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
      const efDate = getPOInfo(style).exFactory;
      let days = null;
      let level = 'warn';
      if (efDate) {
        days = daysBetween(todayStr(), efDate);
        if (days !== null) {
          if (days <= 0) level = 'danger';
          else if (days <= 7) level = 'danger';
          else if (days <= 14) level = 'warn';
        }
      }
      const qtyText = totalQty > 0 ? ` ${totalRecv}/${totalQty} 件` : ` ${totalRecv} 件`;
      return {
        stage: 'PROD_SHIPPING', stageLabel: '部分到仓',
        currentNode: 'PROD_SHIPPING', currentNodeLabel: '部分到仓' + qtyText,
        startDate: pr.date,
        days, level,
        awaitingClient: false, isActive: true, isArchived: false,
        cycleType: 'PROD', cycleId: lastCycle.id,
        exFactory: efDate,
        partialReceived: true
      };
    }
    // 船版已批但大货还没到 → 等大货
    const approvedDate = lastCycle.feedbackDate;
    const po = getPOInfo(style);
    const efDate = po.exFactory;
    let days = null;
    let level = 'ok';
    if (efDate) {
      days = daysBetween(todayStr(), efDate); // 距离货期还有几天
      if (days !== null) {
        if (days <= 0) level = 'danger';        // 已过货期！
        else if (days <= 7) level = 'danger';   // ≤7天 紧急
        else if (days <= 14) level = 'warn';    // ≤14天 该跟进
      }
    } else {
      // 没有货期，按批准后天数算
      const sinceApproved = daysSince(approvedDate);
      level = urgencyByDays(sinceApproved, 7, 14);
      days = sinceApproved;
    }
    return {
      stage: 'PROD_SHIPPING', stageLabel: '等大货',
      currentNode: 'PROD_SHIPPING', currentNodeLabel: '等大货完成',
      startDate: approvedDate,
      days, level,
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: 'PROD', cycleId: lastCycle.id,
      exFactory: efDate
    };
  }

  const meta = CYCLE_TYPES[lastCycle.type];
  const stageLabel = meta.label;

  if (!lastCycle.receivedDate) {
    const days = daysSince(lastCycle.openDate);
    const pmDone = !!lastCycle.patternMakerDone;
    const fabricDone = !!lastCycle.fabricSourcedDate;
    
    if (!pmDone) {
      // 版师打版中
      return {
        stage: lastCycle.type, stageLabel,
        currentNode: 'PATTERN_MAKING',
        currentNodeLabel: '版师打版中',
        startDate: lastCycle.openDate,
        days, level: urgencyByDays(days, 3, 5),
        awaitingClient: false, isActive: true, isArchived: false,
        cycleType: lastCycle.type, cycleId: lastCycle.id,
        patternMakerDone: false
      };
    }
    
    if (!fabricDone) {
      // 版师已打完，等面料备齐
      const fabDays = daysSince(lastCycle.patternMakerDoneDate || lastCycle.openDate);
      return {
        stage: lastCycle.type, stageLabel,
        currentNode: 'AWAIT_FABRIC',
        currentNodeLabel: '等待面料备齐',
        startDate: lastCycle.patternMakerDoneDate || lastCycle.openDate,
        days: fabDays, level: urgencyByDays(fabDays, 3, 6),
        awaitingClient: false, isActive: true, isArchived: false,
        cycleType: lastCycle.type, cycleId: lastCycle.id,
        patternMakerDone: true
      };
    }
    
    // 面料已到，等版房送样
    const delDays = daysSince(lastCycle.fabricSourcedDate);
    return {
      stage: lastCycle.type, stageLabel,
      currentNode: 'AWAIT_DELIVERY',
      currentNodeLabel: '等版房送样',
      startDate: lastCycle.fabricSourcedDate,
      days: delDays, level: urgencyByDays(delDays, 3, 5),
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: lastCycle.type, cycleId: lastCycle.id,
      patternMakerDone: true
    };
  }
  if (!lastCycle.sentDate) {
    const days = daysSince(lastCycle.receivedDate);
    return {
      stage: lastCycle.type, stageLabel,
      currentNode: 'AWAIT_SEND',
      currentNodeLabel: lastCycle.type === 'PHOTO' ? '待拍照发出' : '待寄出',
      startDate: lastCycle.receivedDate,
      days, level: urgencyByDays(days, 3, 99),
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: lastCycle.type, cycleId: lastCycle.id
    };
  }
  if (!lastCycle.feedbackDate) {
    const days = daysSince(lastCycle.sentDate);
    const isReview = lastCycle.type === 'PHOTO';
    const level = isReview ? urgencyByDays(days, 1, 3) : urgencyByDays(days, 3, 5);
    const refArrival = lastCycle.shipActualArrival || lastCycle.shipEstimatedArrival;
    const packageArrived = refArrival && daysBetween(refArrival, todayStr()) >= 0;
    return {
      stage: lastCycle.type, stageLabel,
      currentNode: 'AWAIT_FB',
      currentNodeLabel: isReview ? '等图审' : (lastCycle.type === 'PROD' ? '等船版批准' : '等客户评语'),
      startDate: lastCycle.sentDate,
      days, level,
      awaitingClient: true, isActive: true, isArchived: false,
      cycleType: lastCycle.type, cycleId: lastCycle.id,
      packageArrived, refArrival,
      shipTrackingNo: lastCycle.shipTrackingNo || null
    };
  }
  return {
    stage: lastCycle.type, stageLabel,
    currentNode: 'CYCLE_DONE_PENDING_NEXT',
    currentNodeLabel: '待开新一轮',
    startDate: lastCycle.feedbackDate,
    days: daysSince(lastCycle.feedbackDate), level: 'ok',
    awaitingClient: false, isActive: true, isArchived: false,
    cycleType: lastCycle.type
  };
}

function hasPO(style) { return style.pos && style.pos.length > 0; }

/* ============================================================
   样板返修 (rework) 工具函数
   返修是 cycle.revisions[] 上的子记录：
   { id, reason, returnTo: 'workshop'|'pattern', sentBackAt, receivedAgainAt, note }
   - sentBackAt 有、receivedAgainAt 为 null → 当前正在返修
   - 两者都有 → 历史记录
   ============================================================ */
function getActiveRevision(cycle) {
  if (!cycle || !cycle.revisions || !cycle.revisions.length) return null;
  // 取最新一条且未收回的
  for (let i = cycle.revisions.length - 1; i >= 0; i--) {
    const r = cycle.revisions[i];
    if (r.sentBackAt && !r.receivedAgainAt) return r;
  }
  return null;
}
function isCycleInRework(cycle) {
  return getActiveRevision(cycle) !== null;
}
function getReworkCount(cycle) {
  if (!cycle || !cycle.revisions) return 0;
  return cycle.revisions.length;
}
// 计算返修已天数（基于 sentBackAt）
function getReworkDays(rev) {
  if (!rev || !rev.sentBackAt) return 0;
  const dStr = (typeof rev.sentBackAt === 'string') ? rev.sentBackAt : new Date(rev.sentBackAt).toISOString().slice(0,10);
  return daysSince(dStr) || 0;
}
// "退给谁"的中文标签
function getReworkReturnLabel(returnTo) {
  if (returnTo === 'pattern') return '版师';
  return '版房';  // default workshop
}

// 取代表性 PO 信息（多 PO 时取最早 ex-factory 那个）
function getPOInfo(style) {
  if (!hasPO(style)) return { hasPO: false };
  const pos = style.pos;
  // 多 PO 时取最早 ex-factory 的那个作为代表
  let best = pos[0];
  for (const p of pos) {
    if (p.exFactory && (!best.exFactory || new Date(p.exFactory) < new Date(best.exFactory))) {
      best = p;
    }
  }
  return {
    hasPO: true,
    poNumber: best.poNumber,
    color: best.color,
    quantity: best.quantity,
    exFactory: best.exFactory,
    clientStyleNo: best.clientStyleNo,
    poDate: best.addedAt
  };
}

// 货期预警（基于 ex-factory 倒推）
function getExFactoryAlert(style, status) {
  if (!hasPO(style)) return null;
  // 取最近的 ex-factory（多 PO 时取最早的，最紧迫）
  const earliestEF = style.pos.reduce((min, p) => {
    if (!p.exFactory) return min;
    if (!min) return p.exFactory;
    return new Date(p.exFactory) < new Date(min) ? p.exFactory : min;
  }, null);
  if (!earliestEF) return null;

  const daysToEF = daysUntil(earliestEF);
  if (status.stage === 'DONE') {
    if (daysToEF < 0) return { level: 'danger', message: `已过货期 ${-daysToEF} 天 · 大货未出` };
    if (daysToEF < 7) return { level: 'danger', message: `${daysToEF} 天内出货 · 大货倒计时` };
    return { level: 'ok', message: `${daysToEF} 天到货期` };
  }
  const prodCycle = style.cycles.find(c => c.type === 'PROD');
  const hasProdSent = prodCycle && prodCycle.sentDate;
  const hasProdApproved = prodCycle && prodCycle.feedbackOutcome === FEEDBACK_OUTCOMES.APPROVED;

  if (daysToEF < 0) return { level: 'danger', message: `已过货期 ${-daysToEF} 天` };
  if (!hasProdSent && daysToEF < 14) return { level: 'danger', message: `${daysToEF} 天到货期 · 船版还没寄` };
  if (!hasProdApproved && daysToEF < 28) return { level: 'warn', message: `${daysToEF} 天到货期 · 船版未批准` };
  return { level: 'ok', message: `${daysToEF} 天到货期` };
}

function getStageProgress(style) {
  const status = getStyleStatus(style);
  const stages = [
    { key: 'DEV', label: '开发版' },
    { key: 'REVISE', label: '修改循环' },
    { key: 'PROD', label: '船版' },
    { key: 'BULK', label: '大货' }
  ];

  if (status.stage === 'ARCHIVED') {
    return [
      { key: 'DEV', label: '开发版', state: 'done' },
      { key: 'REVISE', label: '未采用', state: 'archived' },
      { key: 'PROD', label: '船版', state: 'future' },
      { key: 'BULK', label: '大货', state: 'future' }
    ];
  }

  let currentIdx;
  if (status.stage === 'DEV' || status.stage === 'AWAIT_FIT') currentIdx = 0;
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') currentIdx = 1;
  else if (status.stage === 'PROD') currentIdx = 2;
  else if (status.stage === 'PROD_SHIPPING') currentIdx = 3;  // 等大货：大货阶段亮起
  else if (status.stage === 'DONE') currentIdx = 3;
  else currentIdx = 0;

  return stages.map((s, idx) => {
    let st;
    if (status.stage === 'DONE') st = idx === 3 ? 'current' : 'done';
    else if (idx < currentIdx) st = 'done';
    else if (idx === currentIdx) st = 'current';
    else st = 'future';
    return { ...s, state: st };
  });
}

function getEarliestOpenDate(style) {
  if (!style.cycles || style.cycles.length === 0) return null;
  let earliest = null;
  // 先只看真实（非虚拟）的 cycle
  style.cycles.forEach(c => {
    if (c.isVirtual) return;
    if (!c.openDate) return;
    if (!earliest || new Date(c.openDate) < new Date(earliest)) {
      earliest = c.openDate;
    }
  });
  // 如果没有真实 cycle（全是虚拟），兜底用任何 openDate
  if (!earliest) {
    style.cycles.forEach(c => {
      if (!c.openDate) return;
      if (!earliest || new Date(c.openDate) < new Date(earliest)) {
        earliest = c.openDate;
      }
    });
  }
  return earliest;
}

function formatDaysText(days) {
  if (days === null || days === undefined) return null;
  if (days === 0) return '今天';
  return `已 ${days} 天`;
}
// 安全拼接天数，null 时不加 · 
function withDays(label, days) {
  const t = formatDaysText(days);
  return t ? `${label} · ${t}` : label;
}
function formatDate(d) {
  // 兼容老数据(YYYY-MM-DD) 和新 ISO 时间戳(YYYY-MM-DDTHH:MM:SS+TZ)
  // 列表 / 卡片用,只显示月.日
  if (!d) return '';
  return d.slice(5, 10).replace('-', '.');
}
// 完整日期显示(年.月.日),不带时分。给"最初开版" / "起始日期"这类整体日期信息用。
// 兼容 ISO timestamp(取前 10 位)和老 YYYY-MM-DD 字符串。
function formatDateOnlyHuman(d) {
  if (!d) return '';
  return d.slice(0, 10).replace(/-/g, '.');
}
function formatDateTime(d) {
  // 抽屉日志 / 时间线节点用,显示 月-日 HH:MM(本地时区)
  // 老数据(只有 YYYY-MM-DD)显示为 月-日(无时分)
  if (!d) return '';
  if (d.length <= 10) return d.slice(5).replace('-', '.');
  // ISO 时间戳:取本地时区的月日时分
  try {
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return d.slice(5, 10).replace('-', '.');
    const m = String(dt.getMonth() + 1).padStart(2, '0');
    const day = String(dt.getDate()).padStart(2, '0');
    const hh = String(dt.getHours()).padStart(2, '0');
    const mm = String(dt.getMinutes()).padStart(2, '0');
    return `${m}.${day} ${hh}:${mm}`;
  } catch { return d.slice(5, 10).replace('-', '.'); }
}
// 用户填了日期 YYYY-MM-DD,系统补上当前 HH:MM:SS,返回本地时区 ISO timestamp
function toIsoWithNowTime(dateStr) {
  if (!dateStr) return null;
  if (dateStr.length > 10) return dateStr;  // 已经是 ISO,不改
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  // 时区偏移(分钟)
  const tzOffset = -now.getTimezoneOffset();
  const tzSign = tzOffset >= 0 ? '+' : '-';
  const tzHH = String(Math.floor(Math.abs(tzOffset) / 60)).padStart(2, '0');
  const tzMM = String(Math.abs(tzOffset) % 60).padStart(2, '0');
  return `${dateStr}T${hh}:${mm}:${ss}${tzSign}${tzHH}:${tzMM}`;
}
// 用户改了日期,但要保留原 ISO 的时分(没有"重新发生"语义)
function updateIsoDate(oldIso, newDateStr) {
  if (!newDateStr) return null;
  if (!oldIso || oldIso.length <= 10) {
    // 老数据没时分,补当前时分
    return toIsoWithNowTime(newDateStr);
  }
  // 替换日期部分,保留 T 之后的时分秒和时区
  return newDateStr + oldIso.slice(10);
}
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
// 兼容 TEXT 列(stringified JSON)和 JSONB 列(原生 object)两种情况
// SQL Migration 4 把 awaiting_fit / awaiting_grading / prod_received 改 JSONB 后,
// dbStyleToLocal 读到的就是 object 而非 string,此函数兼容两者
function parseMaybeJson(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v !== 'string') return v;  // 已经是 object(JSONB)
  try { return JSON.parse(v); } catch { return null; }
}
// 用于把字符串安全嵌入到 inline onclick="fn('${...}')" 这种 HTML 属性中的 JS 字符串字面量。
// 单纯 escapeHtml 不够 — HTML 属性解析器会先把 &#39; 解码回 ',从而打断 JS 字符串边界。
// 顺序:先 JS 转义(\\ ' " 换行 等),再 HTML 转义。
function escapeJsAttr(s) {
  if (s === null || s === undefined) return '';
  return escapeHtml(
    String(s)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/"/g, '\\"')
      .replace(/\n/g, '\\n')
      .replace(/\r/g, '\\r')
      .replace(/[\u2028\u2029]/g, c => '\\u' + c.charCodeAt(0).toString(16))
  );
}

/*
========================================================================
 今日跟进清单
========================================================================
 列出所有需要今天处理的款，按优先级排序：
 - 红色（卡住的）
 - 黄色（该跟进的）
 - 货期紧急（< 14 天 + 船版没寄）
*/
function getTodayList(activeStyles) {
  const items = [];
  const today = todayStr();
  activeStyles.forEach(s => {
    const status = getStyleStatus(s);
    if (status.isArchived || status.stage === 'DONE') return;

    const efAlert = getExFactoryAlert(s, status);
    const isUrgent = status.level === 'danger' || status.level === 'warn';
    const isExUrgent = efAlert && efAlert.level !== 'ok';
    const hasPoOrder = hasPO(s);
    const isAwaitFit = status.currentNode === 'AWAIT_FIT';
    // 大货阶段必须有 PO（删 PO 后 cycle 还在但已不该出现在大货 tab）
    const isProdShipping = status.stage === 'PROD_SHIPPING' && hasPoOrder;
    const isPatternMaking = status.currentNode === 'PATTERN_MAKING';
    const isAwaitDelivery = status.currentNode === 'AWAIT_DELIVERY';
    const isAwaitFabric = status.currentNode === 'AWAIT_FABRIC';  // 等待面料备齐
    const isAwaitSend = status.currentNode === 'AWAIT_SEND' || status.currentNode === 'AWAIT_RECEIVE';
    const isAwaitFb = status.currentNode === 'AWAIT_FB';  // 已寄出·等客户反馈
    const isGrading = status.currentNode === 'GRADING';
    // 有PO的款（REVISE/PHOTO/PROD/GRADING）强制进入今日跟进 + 显示在已下 PO 分组
    const isPoActive = hasPoOrder && status.isActive && (
      status.cycleType === 'REVISE' || status.cycleType === 'PHOTO' || status.cycleType === 'PROD' || status.cycleType === 'GRADING'
    );
    // 各阶段节点不论天数都强制进入今日跟进
    if (!isUrgent && !isExUrgent && !isPoActive && !isAwaitFit && !isProdShipping && !isPatternMaking && !isAwaitDelivery && !isAwaitFabric && !isAwaitSend && !isAwaitFb && !isGrading) return;

    const who = whoToFollowUp(status.currentNode, status.cycleType);
    let actionHint = '';
    
    // 大货跟进阶段
    if (status.currentNode === 'PROD_SHIPPING') {
      if (status.exFactory) {
        const daysLeft = daysBetween(today, status.exFactory);
        if (daysLeft !== null && daysLeft <= 0) actionHint = '⚠️ 已过货期！催工厂';
        else if (daysLeft !== null && daysLeft <= 7) actionHint = `距交货仅 ${daysLeft} 天`;
        else if (daysLeft !== null) actionHint = `距交货 ${daysLeft} 天`;
        else actionHint = '等大货完成';
      } else {
        actionHint = '等大货完成';
      }
    } 
    // 版师打版中
    else if (status.currentNode === 'PATTERN_MAKING') {
      if (isPoActive) actionHint = '催版师打版（已下 PO）';
      else actionHint = '催版师出样板';
    }
    // 等面料备齐
    else if (status.currentNode === 'AWAIT_FABRIC') {
      if (isPoActive) actionHint = '催采购备面料（已下 PO）';
      else actionHint = '催采购备面料';
    }
    // 版已打好，等版房送样
    else if (status.currentNode === 'AWAIT_DELIVERY') {
      if (isPoActive) actionHint = '催版房送样（已下 PO）';
      else actionHint = '催版房送样';
    }
    // 样板已到，待寄出客户
    else if (status.currentNode === 'AWAIT_SEND') {
      if (isPoActive) actionHint = '赶紧寄出（已下 PO）';
      else actionHint = '该寄样了';
    }
    // 已寄出，等客户反馈
    else if (status.currentNode === 'AWAIT_FB') {
      if (status.cycleType === 'PHOTO') {
        // 拍照版 - 等图审
        actionHint = isPoActive ? '催图审（已下 PO）' : '催图审';
      } else if (status.cycleType === 'PROD') {
        // 船版 - 一定有PO
        actionHint = '催船版批准';
      } else {
        // 开发版/修改版 - 等客户评语
        actionHint = isPoActive ? '催客户评语（已下 PO）' : '催客户回评语';
      }
    }
    // 等 fit comment（一定是已下 PO的款）
    else if (status.currentNode === 'AWAIT_FIT') {
      actionHint = '催 fit comment';
    }

    let priority = 99;
    // 有PO + 有货期的最优先
    if (isProdShipping && status.level === 'danger') priority = -2;
    else if (isProdShipping) priority = -1;
    else if (isPoActive && efAlert?.level === 'danger') priority = 0;
    else if (isPoActive) priority = 1;
    else if (efAlert?.level === 'danger') priority = 2;
    else if (status.level === 'danger') priority = 3;
    else if (efAlert?.level === 'warn') priority = 4;
    else if (status.level === 'warn') priority = 5;
    else if (isAwaitFit) priority = 6;

    // 检测是否处于"已收样后返修中"的临时状态
    // （只对最后一个 cycle 起作用，且只在 AWAIT_SEND 节点之后才支持返修）
    const lastCycle = s.cycles && s.cycles[s.cycles.length - 1];
    const activeRevision = lastCycle ? getActiveRevision(lastCycle) : null;
    const isInRework = !!activeRevision && isAwaitSend;

    items.push({
      style: s, status, efAlert, who, actionHint, priority,
      isAwaitFit, hasPoOrder: isPoActive, isProdShipping,
      isInRework, activeRevision
    });
  });
  items.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return (b.status.days || 0) - (a.status.days || 0);
  });
  return items;
}

// 卡片 badge 按职位差异化:决定当前角色是否显示某个 badge
// keys: group / sampleType / grading / ship / size / factory / ef
const TODAY_CARD_BADGES_BY_ROLE = {
  admin:      'all',
  followup:   'all',
  pattern:    new Set(['size', 'sampleType']),
  fabric:     new Set(['factory', 'group', 'ef']),  // 兼版房,加 ef 显示货期
  workshop:   new Set(['factory', 'ef']),
  prod:       new Set(['factory', 'ef']),
  production: new Set(['size', 'sampleType', 'factory']),  // legacy
};
function cardBadgeAllowed(key) {
  const role = (typeof window.getCurrentRole === 'function' && window.getCurrentRole()) || 'admin';
  const cfg = TODAY_CARD_BADGES_BY_ROLE[role] || TODAY_CARD_BADGES_BY_ROLE.admin;
  if (cfg === 'all') return true;
  return cfg.has(key);

// ─── 抽屉 / 完整日志 / 编辑权限 helper(各角色用) ───
// fail-closed:取不到 role 就返回 null,下游所有 can* helper 默认 deny
function _currentRole() {
  return (typeof window.getCurrentRole === 'function' && window.getCurrentRole()) || null;
}

// 抽屉里"区域"对当前角色是否可见
//   poList          — PO 列表卡片
//   repeatBanner    — 反单提示 banner
function drawerSectionAllowed(section) {
  const role = _currentRole();
  if (!role) return false;
  // 反单 banner:采购才是执行人(被微信 at 备面料 + 跟工厂);版房做"一件确认色";
  // 所以 4 个非 admin/followup 角色都加 repeatBanner
  const cfg = {
    pattern:  new Set(['poList', 'repeatBanner']),
    fabric:   new Set(['poList', 'repeatBanner']),
    workshop: new Set(['poList', 'repeatBanner']),
    prod:     new Set(['poList', 'repeatBanner']),
    followup: 'all',
    admin:    'all',
  };
  const v = cfg[role];
  if (v === undefined) return false;
  return v === 'all' || v.has(section);
}

// 当前角色能否编辑 PO(加 PO / 改 PO / 双击编辑 / 登记延期)

// 当前角色能否归档/取消归档

// 当前角色能否编辑款式基础信息(SKU / 客户 / 工厂 / owner / 图片 / 备注)

// 完整日志的某字段(cycle 内 field 名)对当前角色是否可编辑
function logFieldEditable(field) {

// 款式是否全部 PO 都是反单(用于版师/版房 sub-tab 过滤,因为反单跳过这两个角色)
function isAllRepeatStyle(s) {
  return s && s.pos && s.pos.length > 0 && s.pos.every(p => p.orderType === 'repeat');
}

// 按 sub-tab 统计待办数(逻辑跟 renderTodayTab 内一致,仅用于徽章计数)
function getTodayCountsBySubTab(items) {
  const patternItems = items.filter(it => (it.status.currentNode === 'PATTERN_MAKING' || it.status.currentNode === 'GRADING') && !it.isAwaitFit && !isAllRepeatStyle(it.style));
  const fabricItems = items.filter(it => it.status.currentNode === 'AWAIT_FABRIC' && !it.isAwaitFit);
  const workshopItems = items.filter(it => {
    if (it.isAwaitFit) return false;
    if (isAllRepeatStyle(it.style)) return false;
    if (it.status.currentNode === 'AWAIT_DELIVERY') return true;
    if (it.isInRework) return true;
    return false;
  });
  const shippingItems = items.filter(it => {
    if (it.isInRework) return false;
    if (it.status.cycleType === 'PHOTO') return false;
    return (it.status.currentNode === 'AWAIT_SEND' || it.status.currentNode === 'AWAIT_RECEIVE') && !it.isAwaitFit;
  });
  const photoItems = items.filter(it => {
    if (it.isAwaitFit) return false;
    if (it.status.cycleType !== 'PHOTO') return false;
    const node = it.status.currentNode;
    return node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE' || node === 'AWAIT_FB';
  });
  const feedbackItems = items.filter(it => {
    const node = it.status.currentNode;
    if (it.status.cycleType === 'PHOTO') return false;
    return node === 'AWAIT_FB' && !it.isAwaitFit;
  });
  const fitItems = items.filter(it => it.isAwaitFit);
  const prodItems = items.filter(it => {
    if (it.style.archived) return false;
    if (it.status.stage === 'DONE') return false;
    return it.hasPoOrder || it.isProdShipping;
  });
  return {
    pattern: patternItems.length,
    fabric: fabricItems.length,
    workshop: workshopItems.length,
    followup: shippingItems.length + photoItems.length + feedbackItems.length + fitItems.length,
    prod: prodItems.length,
  };
}

// 当前角色的"今日跟进"徽章应该显示的数(按 todaySubs 加总)
function getTodayCountForRole(items) {
  const role = _currentRole();
  const perms = (typeof ROLE_PERMS === 'object' && ROLE_PERMS[role]) || null;
  if (!perms || perms.todaySubs === 'all') return items.length;
  if (!Array.isArray(perms.todaySubs)) return items.length;
  const counts = getTodayCountsBySubTab(items);
  return perms.todaySubs.reduce((sum, sub) => sum + (counts[sub] || 0), 0);
}

// 一条报警是否对当前角色可见(按角色看自己阶段卡住的款)
function alertVisibleToRole(style, status) {
  const role = _currentRole();
  if (role === 'admin' || role === 'followup') return true;
  const node = status.currentNode;
  if (role === 'pattern')  return node === 'PATTERN_MAKING' || node === 'GRADING';
  if (role === 'fabric')   return node === 'AWAIT_FABRIC';  // 只看自己阶段卡的
  if (role === 'workshop') return node === 'AWAIT_DELIVERY';  // legacy
  if (role === 'prod') {
    // 生产只关心他能操作的节点 — PROD cycle 中 或 大货阶段
    return status.cycleType === 'PROD' || node === 'PROD_SHIPPING' || status.stage === 'PROD_SHIPPING';
  }
  return true;
}

// 当前角色在指定节点(currentNode)是否有"主动作"权限
// 不在权限范围的节点,抽屉里的快捷动作按钮会清空(角色只看不操作)
function canDoActionForNode(currentNode) {
  const role = _currentRole();
  if (!role) return false;
  // 业务流:
  // - 版师 → 打版 / 放码(PATTERN_MAKING / GRADING)
  // - 采购 → 备面料(AWAIT_FABRIC);可看版房 sub-tab 监督但不操作动作
  // - 版房(legacy):做样板 → 物理寄到公司,系统无动作;legacy 留旧权限
  // - 跟单 → 收到样板 / 寄出客户 / 收反馈 等所有动作
  // - 生产 → 大货到货(PROD_SHIPPING)
  const cfg = {
    pattern:  new Set(['GRADING', 'PATTERN_MAKING']),
    fabric:   new Set(['AWAIT_FABRIC']),  // 只备料,收样板/寄客户都是跟单
    workshop: new Set(['AWAIT_DELIVERY']),  // legacy:保留留账号恢复时用,寄客户已移除
    prod:     new Set(['PROD_SHIPPING']),
    followup: 'all',
    admin:    'all',
  };
  const v = cfg[role];
  if (v === undefined) return false;
  return v === 'all' || v.has(currentNode);
}

function renderTodayTab() {
  document.getElementById('controlsBar').style.display = 'none';
  document.getElementById('newStyleBtn').style.display = 'none';
  const main = document.getElementById('main');

  const activeStyles = state.styles.filter(s => !s.archived);
  const items = getTodayList(activeStyles);

  if (items.length === 0) {
    main.innerHTML = `
      <div class="today-empty">
        <span class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </span>
        <h3>今天可以喘口气</h3>
        <p>所有跟进的款式都在正常进度内，没有需要紧急处理的事项。</p>
      </div>
    `;
    return;
  }

  // 按职责分组（4个独立组）
  // 反单跳过版师/版房(纸样工厂已有,工厂照旧做一件确认色,采购备料即可)
  // 1. 版师待办 — 排除全反单款
  const patternItems = items.filter(it => (it.status.currentNode === 'PATTERN_MAKING' || it.status.currentNode === 'GRADING') && !it.isAwaitFit && !isAllRepeatStyle(it.style));

  // 2. 面料待办：等面料备齐(反单也要采购备面料,保留)
  const fabricItems = items.filter(it => it.status.currentNode === 'AWAIT_FABRIC' && !it.isAwaitFit);

  // 3. 版房待办：等版房送样 + 返修中(排除全反单款)
  const workshopItems = items.filter(it => {
    if (it.isAwaitFit) return false;
    if (isAllRepeatStyle(it.style)) return false;
    if (it.status.currentNode === 'AWAIT_DELIVERY') return true;
    if (it.isInRework) return true;  // 返修中也归到版房组
    return false;
  });

  // 3. 待寄出：待寄出客户（排除返修中、排除拍照版 — 拍照版不寄实物只发图审）
  const shippingItems = items.filter(it => {
    const node = it.status.currentNode;
    if (it.isInRework) return false;  // 返修中虽然 node 仍是 AWAIT_SEND，但视觉上要从寄样组挪走
    if (it.status.cycleType === 'PHOTO') return false;  // 拍照版不寄实物，归图审 tab
    return (node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE') && !it.isAwaitFit;
  });

  // 📸 图审：拍照版的待发图 + 等图审（独立 tab — 区别于实物寄样/等评语）
  const photoItems = items.filter(it => {
    if (it.isAwaitFit) return false;
    if (it.status.cycleType !== 'PHOTO') return false;
    const node = it.status.currentNode;
    return node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE' || node === 'AWAIT_FB';
  });

  // 4. 等客户反馈：等客户反馈（排除拍照版 — 拍照版的等图审归图审 tab）
  const feedbackItems = items.filter(it => {
    const node = it.status.currentNode;
    if (it.status.cycleType === 'PHOTO') return false;  // 拍照版的等图审归图审 tab
    return node === 'AWAIT_FB' && !it.isAwaitFit;
  });

  // 等fit comment：单独一组
  const fitItems = items.filter(it => it.isAwaitFit);

  // 「📋 已下 PO/大货」组：装所有已下 PO 且未到仓的款，无论它在流程哪一步。
  // 这一组与版师/面料/版房/寄样/反馈/fit 组是「双重显示」关系——
  // 版师组是从职能视角看（"我要打的版"），这里是从订单视角看（"已下 PO 的款，EF 倒计时"）。
  // 大货发货中（PROD_SHIPPING）也属于这里。
  const prodItems = items.filter(it => {
    if (it.style.archived) return false;
    // 已经到仓的不算（走 DONE，不在今日跟进里）
    if (it.status.stage === 'DONE') return false;
    // 已下 PO 的款全部装进来
    return it.hasPoOrder || it.isProdShipping;
  });

  // 其他未分类（理论上现在会几乎为空，因为已下 PO 的款全进 prodItems 了）
  const otherItems = items.filter(it =>
    !patternItems.includes(it) && !fabricItems.includes(it) && !workshopItems.includes(it) &&
    !shippingItems.includes(it) && !feedbackItems.includes(it) &&
    !fitItems.includes(it) && !prodItems.includes(it)
  );

  const renderCard = (it) => {
    const s = it.style;
    const isDanger = it.efAlert?.level === 'danger' || it.status.level === 'danger';
    const cls = isDanger ? 'danger' : 'warn';
    // 只在 danger 时显示，warn 不加，让符号真正传达"紧急"
    const z = isDanger ? '' : '';
    const thumb = s.imageUrl
      ? `<img class="thumb-mini thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeJsAttr(s.imageUrl)}')" onerror="this.outerHTML='<div class=&quot;thumb-mini-placeholder&quot;>NO IMG</div>'">`
      : `<div class="thumb-mini-placeholder">NO IMG</div>`;
    
    // 简化状态文字
    let mainText;
    const days = it.status.days || 0;
    const daysText = days > 0 ? ` · 已 ${days} 天` : '';
    const node = it.status.currentNode;

    // 返修中状态优先显示（覆盖其他文本）
    if (it.isInRework) {
      const reworkDays = getReworkDays(it.activeRevision);
      const rwDaysText = reworkDays > 0 ? ` · 已 ${reworkDays} 天` : '';
      const returnLbl = getReworkReturnLabel(it.activeRevision.returnTo);
      mainText = `🔧 返修中（${returnLbl}）${rwDaysText}`;
    } else if (it.efAlert?.level === 'danger') {
      // 货期紧急的情况
      mainText = it.efAlert.message;
    } else if (it.isProdShipping) {
      // 大货发货中
      const efDays = it.efAlert?.daysLeft;
      if (efDays !== null && efDays <= 0) {
        mainText = `⚠️ 已逾期 ${-efDays} 天`;
      } else if (efDays !== null && efDays <= 7) {
        mainText = `${z}距货期 ${efDays} 天`;
      } else if (efDays !== null) {
        mainText = `距货期 ${efDays} 天`;
      } else {
        mainText = '等大货完成';
      }
    } else if (it.isAwaitFit) {
      mainText = `${z}等 fit${daysText}`;
    } else if (node === 'GRADING') {
      mainText = `${z}等放码${daysText}`;
    } else if (node === 'PATTERN_MAKING') {
      mainText = `${z}打版中${daysText}`;
    } else if (node === 'AWAIT_FABRIC') {
      mainText = `${z}等面料${daysText}`;
    } else if (node === 'AWAIT_DELIVERY') {
      mainText = `${z}等送样${daysText}`;
    } else if (node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE') {
      mainText = it.status.cycleType === 'PHOTO' ? `${z}待发图审${daysText}` : `${z}待寄出${daysText}`;
    } else if (node === 'AWAIT_FB') {
      const cycleType = it.status.cycleType;
      if (cycleType === 'PHOTO') {
        mainText = `${z}等图审${daysText}`;
      } else if (cycleType === 'PROD') {
        mainText = `${z}等船版批准${daysText}`;
      } else {
        mainText = `${z}等反馈${daysText}`;
      }
    } else {
      mainText = it.actionHint || '处理中';
    }
    
    const checked = state.batchSelected && state.batchSelected[s.id] ? 'checked' : '';
    const batchCls = state.batchSelected && state.batchSelected[s.id] ? 'batch-selected' : '';
    const _ob = getOrderTypeBadge(s);
    const _orderTypeHtml = _ob ? `<span class="order-type-pill ${_ob.cls}">${escapeHtml(_ob.label)}</span>` : '';
    const hasName = s.name && s.name !== '(无款名)';
    
    // 单卡快捷动作：根据当前节点给一个最常用的"下一步"按钮
    // 按 canDoActionForNode 过滤 — 不是这个节点的执行人,不显示快捷按钮(各干各的)
    let quickAction = '';
    const lastCycle = (s.cycles || [])[s.cycles?.length - 1];
    if (!s.archived && canDoActionForNode(node)) {
      // GRADING 状态:不依赖 cycle,直接用 markGradingDone
      if (node === 'GRADING') {
        quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); markGradingDone('${s.id}')" title="放码完成 · 进入工厂打船版">✓ 放完码</button>`;
      } else if (lastCycle) {
        if (it.isInRework) {
          quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); markReworkReceived('${s.id}', '${lastCycle.id}', '${it.activeRevision.id}')" title="返修件已收回">✓ 收回</button>`;
        } else if (node === 'PATTERN_MAKING') {
          quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); markPatternMakerDone('${s.id}', '${lastCycle.id}')" title="标记版师已打完">✓ 打完</button>`;
        } else if (node === 'AWAIT_FABRIC') {
          quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); markFabricSourced('${s.id}', '${lastCycle.id}')" title="登记面料已备齐">✓ 面料到</button>`;
        } else if (node === 'AWAIT_DELIVERY') {
          quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); openCycleStepModal('${s.id}', '${lastCycle.id}', 'received')" title="登记收到样板">✓ 收到</button>`;
        } else if (node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE') {
          quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); openCycleStepModal('${s.id}', '${lastCycle.id}', 'sent')" title="登记已寄出">✓ 已寄</button>`;
        } else if (node === 'AWAIT_FB') {
          quickAction = `<button class="today-quick-btn" onclick="event.stopPropagation(); openFeedbackModal('${s.id}', '${lastCycle.id}')" title="登记反馈">✓ 反馈</button>`;
        }
      }
    }
    
    // === 三行式结构（v2）===
    // Row 1（徽章栏）: client + sample type + dev size + EF（已下 PO）
    // Row 2（标识栏）: SKU + PO号（已下 PO才显示）
    // Row 3（状态栏）: 主状态文（含已 N 天）
    const _po = it.hasPoOrder ? getPOInfo(s) : null;
    const _poRowHtml = (_po && _po.poNumber)
      ? `<span class="today-card-po">PO ${escapeHtml(_po.poNumber)}</span>`
      : '';
    const _efHtml = (() => {
      if (!it.hasPoOrder || !_po || !_po.exFactory) return '';
      const left = daysBetween(todayStr(), _po.exFactory);
      if (left === null) return '';
      let efCls = 'ef-ok';
      let prefix = '';
      if (left < 0) { efCls = 'ef-overdue'; prefix = '已过 '; }
      else if (left <= 7) efCls = 'ef-danger';
      else if (left <= 14) efCls = 'ef-warn';
      const txt = left < 0 ? `${prefix}${-left} 天` : `还剩 ${left} 天`;
      return `<span class="today-card-ef ${efCls}" title="出厂日期 ${_po.exFactory}">EF ${txt}</span>`;
    })();
    // 开版码数徽章（GRADING 状态不显示，因为是全码）
    const _devSizeHtml = (s.devSize && node !== 'GRADING')
      ? `<span class="dev-size-badge" title="开版码数">${escapeHtml(s.devSize)} 码</span>`
      : '';
    // GRADING 状态的特殊徽章
    const _gradingBadgeHtml = (node === 'GRADING')
      ? `<span class="grading-badge" title="等版师放码">放码</span>`
      : '';
    // 运输方式徽章（基于主 PO 的 shipMethod）
    const _shipMethodHtml = (() => {
      if (!_po || !_po.poNumber) return '';
      // _po 是 getPOInfo 返回的，但它没有 shipMethod —— 直接从 s.pos 里找最早 EF 的那个
      const mainPO = (s.pos || []).find(p => p.poNumber === _po.poNumber);
      if (!mainPO || !mainPO.shipMethod) return '';
      if (mainPO.shipMethod === 'air') return `<span class="ship-method-badge ship-air" title="空运">✈️ 空运</span>`;
      if (mainPO.shipMethod === 'sea') return `<span class="ship-method-badge ship-sea" title="海运">🚢 海运</span>`;
      return '';
    })();

    return `
      <div class="today-card today-card-v2 ${cls} ${batchCls}${it.isInRework ? ' is-rework' : ''}${node === 'GRADING' ? ' is-grading' : ''}" data-style-id="${s.id}" data-search-text="${escapeHtml((s.sku + ' ' + (s.name || '') + ' ' + (s.pos || []).map(p => p.poNumber || '').join(' ')).toLowerCase())}" onclick="handleRowClick(event, '${s.id}')">
        <input type="checkbox" class="batch-checkbox today-batch-checkbox" ${checked} onclick="toggleBatchSelection('${s.id}', this.checked); event.stopPropagation();" title="批量选择">
        ${thumb}
        <div class="today-card-body">
          <div class="today-card-row1">
            <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
            ${cardBadgeAllowed('group') ? renderClientGroupBadge(s) : ''}
            ${cardBadgeAllowed('sampleType') ? renderSampleTypeBadge(s) : ''}
            ${cardBadgeAllowed('grading') ? _gradingBadgeHtml : ''}
            ${cardBadgeAllowed('ship') ? _shipMethodHtml : ''}
            ${cardBadgeAllowed('size') ? _devSizeHtml : ''}
            ${cardBadgeAllowed('factory') ? renderFactoryBadge(s) : ''}
            ${cardBadgeAllowed('ef') ? _efHtml : ''}
          </div>
          <div class="today-card-row2">
            <span class="today-card-sku">${escapeHtml(s.sku)}</span>
            ${_poRowHtml}
          </div>
          <div class="today-card-row3">
            <span class="today-card-action-main ${cls}">${escapeHtml(mainText)}</span>
          </div>
        </div>
      </div>
    `;
  };

  // 更新子菜单数量
  // followup = 寄样 + 图审 + 反馈 + 等回复(原 fit) 合并(都是跟单要处理的事)
  const followupCount = shippingItems.length + photoItems.length + feedbackItems.length + fitItems.length;
  const _sc = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n; };
  _sc('sub-count-all', items.length);
  _sc('sub-count-pattern', patternItems.length);
  _sc('sub-count-fabric', fabricItems.length);
  _sc('sub-count-workshop', workshopItems.length);
  _sc('sub-count-followup', followupCount);
  _sc('sub-count-prod', prodItems.length);

  // 确保子菜单显示
  updateTodaySubNav();

  // 减少今日 tab 的顶部留白（给 body 加标记，CSS 里有适配）
  document.body.classList.add('today-tab-active');

  // 顶部搜索栏（始终显示，方便跟单在大量款式中筛选）
  const searchQ = state.todaySearchQuery || '';
  let html = '<div class="today-page">';
  html += `
    <div class="today-search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="todaySearchInput" placeholder="搜款号 / 款名 / PO 号…" value="${escapeHtml(searchQ)}" autocomplete="off">
      <span class="today-search-result-info" id="todaySearchInfo"></span>
      <button class="today-search-clear" id="todaySearchClear" onclick="clearTodaySearch()" title="清除搜索" style="${searchQ ? '' : 'display:none;'}">×</button>
    </div>
  `;

  // 管理者 + 跟单专属:全角色卡住总览(点击切到对应 sub-tab)
  // 跟单是 super-role 负责协调,需要看到各角色卡了多少
  const _role = (typeof window.getCurrentRole === 'function' && window.getCurrentRole()) || '';
  const _showOverview = (_role === 'admin' || _role === 'followup');
  if (_showOverview) {
    const _overviewChip = (sub, label, n) => {
      const activeCls = state.todaySub === sub ? 'active' : '';
      const zeroCls = n === 0 ? 'zero' : '';
      return `<button class="admin-overview-chip ${activeCls} ${zeroCls}" onclick="switchTodaySub('${sub}')"><span class="role">${label}</span><span class="num">${n}</span></button>`;
    };
    html += `
      <div class="admin-overview-bar" aria-label="全角色卡住总览">
        <span class="lbl">卡住</span>
        ${_overviewChip('pattern', '版师', patternItems.length)}
        ${_overviewChip('fabric', '采购', fabricItems.length)}
        ${_overviewChip('workshop', '版房', workshopItems.length)}
        ${_overviewChip('followup', '跟单', followupCount)}
        ${_overviewChip('prod', '生产', prodItems.length)}
      </div>
    `;
  }

  const todayCollapsibleSection = (key, badgeCls, title, sub, items, renderFn) => {
    if (items.length === 0) return '';
    const collapsed = state.collapsedSections[key];
    
    return `
      <div class="today-section ${badgeCls === 'fit' ? 'section-fit' : ''} ${collapsed ? 'collapsed' : ''}" data-section-key="${key}">
        <h2 class="collapsible-header" onclick="toggleSection('${key}')">
          <span class="section-chevron">▼</span>
          <span>${title}</span>
          <span class="count-badge ${badgeCls}">${items.length} 款</span>
        </h2>
        <div class="section-sub">${escapeHtml(sub)}</div>
        <div class="today-cards section-content">
          ${items.map(renderFn).join('')}
        </div>
      </div>
    `;
  };

  // 同上，但内部根据"是否已下 PO"分为两个子组渲染
  // 只有版师/面料/版房三组用得上（生产前阶段，区分优先级）
  const todaySectionWithPoSplit = (key, badgeCls, title, sub, items, renderFn) => {
    if (items.length === 0) return '';
    const collapsed = state.collapsedSections[key];

    // 已下 PO 的款（紧急，客户在等）
    const poItems = items.filter(it => it.hasPoOrder);
    // 未下PO 的款（新开发样，优先级低）
    const devItems = items.filter(it => !it.hasPoOrder);

    // 子分组渲染
    let body = '';
    if (poItems.length > 0) {
      body += `
        <div class="subgroup-divider">
          <span class="label po-active">已下 PO <span class="count">${poItems.length}</span></span>
          <span class="hint">优先处理 · 客户在等</span>
          <span class="line"></span>
        </div>
        <div class="today-cards today-cards-po">${poItems.map(renderFn).join('')}</div>
      `;
    }
    if (devItems.length > 0) {
      body += `
        <div class="subgroup-divider">
          <span class="label dev-only">开发中 <span class="count">${devItems.length}</span></span>
          <span class="hint">未下 PO · 常规优先级</span>
          <span class="line"></span>
        </div>
        <div class="today-cards today-cards-dev">${devItems.map(renderFn).join('')}</div>
      `;
    }
    // 兜底（虽然不该走到，但稳）
    if (!body) {
      body = `<div class="today-cards">${items.map(renderFn).join('')}</div>`;
    }

    return `
      <div class="today-section ${collapsed ? 'collapsed' : ''}" data-section-key="${key}">
        <h2 class="collapsible-header" onclick="toggleSection('${key}')">
          <span class="section-chevron">▼</span>
          <span>${title}</span>
          <span class="count-badge ${badgeCls}">${items.length} 款</span>
        </h2>
        <div class="section-sub">${escapeHtml(sub)}</div>
        <div class="section-content">${body}</div>
      </div>
    `;
  };

  const sub = state.todaySub || 'pattern';
  if (sub === 'pattern') {
    html += todaySectionWithPoSplit('today_pattern', 'danger', '版师', '版师打版中 — 等版师出样板', patternItems, renderCard);
  }
  if (sub === 'fabric') {
    html += todaySectionWithPoSplit('today_fabric', 'warn', '面料', '等待面料备齐 — 催采购发料往版房', fabricItems, renderCard);
  }
  if (sub === 'workshop') {
    const reworkCount = workshopItems.filter(it => it.isInRework).length;
    const subText = reworkCount > 0
      ? `等版房送样 + ${reworkCount} 个返修中 — 面料已到，催版房制作并寄回`
      : '等版房送样 — 面料已到，催版房制作并寄回';
    html += todaySectionWithPoSplit('today_workshop', 'warn', '版房', subText, workshopItems, renderCard);
  }
  if (sub === 'followup') {
    // 跟单大 tab:合并寄样 + 图审 + 反馈 + 已下 PO·等回复(原 fit)4 个 section
    // 顶部加 clientGroup 筛选 chips,点击后过滤这 4 个 items
    const cgFilter = state.followupClientGroupFilter || 'all';
    const matchCg = (it) => cgFilter === 'all' || normalizeClientGroup(it.style) === cgFilter;
    const fShip = shippingItems.filter(matchCg);
    const fPhoto = photoItems.filter(matchCg);
    const fFeedback = feedbackItems.filter(matchCg);
    const fFit = fitItems.filter(matchCg);

    // 计数(用未过滤的原始数组,这样 chip 上显示的是"如果切到这个组有多少款")
    const allFollowup = [...shippingItems, ...photoItems, ...feedbackItems, ...fitItems];
    const cgCount = (key) => key === 'all'
      ? allFollowup.length
      : allFollowup.filter(it => normalizeClientGroup(it.style) === key).length;

    // 渲染 chip 行(全部 + 5 个 group)
    const chipBtn = (key, label) => {
      const n = cgCount(key);
      if (key !== 'all' && n === 0) return '';  // 空的 group 不显示 chip,减少视觉噪音
      const active = cgFilter === key ? 'active' : '';
      return `<button type="button" class="filter-btn ${active}" data-cg="${key}" onclick="switchFollowupClientGroupFilter('${key.replace(/'/g, "\\'")}')" aria-pressed="${cgFilter === key}">${escapeHtml(label)} <span class="cg-chip-count">${n}</span></button>`;
    };
    let chipsHtml = `<div class="cg-chips-row" role="group" aria-label="客户组筛选"><div class="filter-group">`;
    chipsHtml += chipBtn('all', '全部');
    CLIENT_GROUP_ORDER.forEach(g => { chipsHtml += chipBtn(g.key, g.shortLabel === '其他' ? '未分组' : g.label); });
    chipsHtml += `</div></div>`;
    html += chipsHtml;

    // 4 个 section 用 PoSplit(已下 PO 子组置顶 + 开发中子组在下),跟版师/采购/版房 tab 视觉一致
    html += todaySectionWithPoSplit('today_shipping', 'warn', '待寄出', '待寄给客户 · 跟单负责寄出', fShip, renderCard);
    html += todaySectionWithPoSplit('today_photo', 'warn', '等图审', '拍照版 · 跟单拍照发图给客户 / 等客户图审', fPhoto, renderCard);
    html += todaySectionWithPoSplit('today_feedback', 'warn', '等反馈', '等客户给评语 · 跟单负责催买手', fFeedback, renderCard);
    html += todaySectionWithPoSplit('today_fit', 'fit', '已下 PO · 等回复', '已下 PO,等客户决议下一步(重做 / 拍照 / 直接大货)', fFit, renderCard);
  }
  if (sub === 'prod') {
    // 「📋 已下 PO/大货」组：按"在哪个节点"分组，每组里按 EF 升序排序
    // 节点分组（顺序从最紧急到最不紧急）:
    //   1. 大货发货中（已批，等大货到仓）— 最关心的"快出货了吗"
    //   2. 等船版批准（已寄船版给客户，催客户）
    //   3. 待寄船版（船版已收，待寄出）
    //   4. 等船版打版/收样/送样（版师/版房在做船版）
    //   5. 等 fit comment（已下 PO，等买手反馈）
    //   6. 等开发版/修改版评语（等客户回复）
    //   7. 修改版打版/收样/送样/寄出 等
    //   8. 其他

    // 按 EF 升序排序的辅助函数（没 EF 的排最后）
    const sortByEF = (a, b) => {
      const efA = getPOInfo(a.style).exFactory;
      const efB = getPOInfo(b.style).exFactory;
      if (!efA && !efB) return 0;
      if (!efA) return 1;
      if (!efB) return -1;
      return efA.localeCompare(efB);
    };

    // 把 prodItems 按节点分到桶里
    const buckets = {
      shipping_prod:    { items: [], title: '等大货到仓',     sub: '船版已批,等工厂出货',          badgeCls: 'danger' },
      await_prod_appr:  { items: [], title: '等船版批准',     sub: '已寄船版给客户 — 催客户审批',    badgeCls: 'danger' },
      send_prod:        { items: [], title: '待寄船版',       sub: '船版已收,赶紧寄给客户',         badgeCls: 'warn' },
      make_prod:        { items: [], title: '船版打版/收样',  sub: '正在做船版(开版/收样/等送样)', badgeCls: 'warn' },
      await_fit:        { items: [], title: '已下 PO · 等回复', sub: '已下 PO,等客户决议下一步(重做/拍照/直接大货)', badgeCls: 'fit' },
      await_revise_fb:  { items: [], title: '等修改版评语',   sub: '修改版已寄,等客户回复',         badgeCls: 'warn' },
      revise_inflight:  { items: [], title: '修改版进行中',   sub: '修改版打版/收样/寄出阶段',      badgeCls: 'warn' },
      misc:             { items: [], title: '其他',           sub: '已下 PO 但未归类的款',          badgeCls: 'warn' },
    };

    prodItems.forEach(it => {
      const node = it.status.currentNode;
      const ct = it.status.cycleType;
      // 大货发货中
      if (it.isProdShipping || node === 'PROD_SHIPPING') { buckets.shipping_prod.items.push(it); return; }
      // 船版周期 (PROD)
      if (ct === 'PROD') {
        if (node === 'AWAIT_FB') { buckets.await_prod_appr.items.push(it); return; }
        if (node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE') { buckets.send_prod.items.push(it); return; }
        // 船版的打版/面料/送样
        buckets.make_prod.items.push(it); return;
      }
      // 等 fit
      if (it.isAwaitFit || node === 'AWAIT_FIT') { buckets.await_fit.items.push(it); return; }
      // 等修改版评语
      if (node === 'AWAIT_FB') { buckets.await_revise_fb.items.push(it); return; }
      // 修改版进行中（打版/收样/寄出）
      if (ct === 'REVISE' || ct === 'DEV') {
        if (node === 'PATTERN_MAKING' || node === 'AWAIT_FABRIC' || node === 'AWAIT_DELIVERY' ||
            node === 'AWAIT_SEND' || node === 'AWAIT_RECEIVE') {
          buckets.revise_inflight.items.push(it); return;
        }
      }
      // 兜底
      buckets.misc.items.push(it);
    });

    // 渲染每个非空桶（按定义顺序，组内按 EF 排序）
    const order = ['shipping_prod', 'await_prod_appr', 'send_prod', 'make_prod',
                   'await_fit', 'await_revise_fb', 'revise_inflight', 'misc'];
    let prodHtml = '';
    order.forEach(key => {
      const b = buckets[key];
      if (b.items.length === 0) return;
      b.items.sort(sortByEF);
      prodHtml += todayCollapsibleSection('today_prod_' + key, b.badgeCls, b.title, b.sub, b.items, renderCard);
    });
    html += prodHtml;
  }

  // 当前分组无内容时显示空状态
  // followup 是合并 tab(寄出/图审/反馈/已下 PO·等回复 4 个 section),只要任一有数据就不算空
  let subItems = [];
  if (sub === 'pattern') subItems = patternItems;
  else if (sub === 'fabric') subItems = fabricItems;
  else if (sub === 'workshop') subItems = workshopItems;
  else if (sub === 'followup') subItems = [...shippingItems, ...photoItems, ...feedbackItems, ...fitItems];
  else if (sub === 'prod') subItems = prodItems;
  
  if (subItems.length === 0) {
    html += `<div class="today-empty"><span class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg></span><h3>这个分组没有待办</h3><p>当前没有需要处理的事项。</p></div>`;
  }

  html += '</div>';
  main.innerHTML = html;

  // 绑定搜索框事件 + 应用初始搜索
  setTimeout(() => {
    const inp = document.getElementById('todaySearchInput');
    if (inp) {
      inp.addEventListener('input', (e) => {
        applyTodaySearch(e.target.value);
      });
      // 应用之前保存的搜索
      if (searchQ) applyTodaySearch(searchQ);
    }
  }, 0);
}

// 应用搜索过滤·DOM 级别（不重渲染，保持输入框焦点）
function applyTodaySearch(query) {
  const q = (query || '').trim().toLowerCase();
  state.todaySearchQuery = q;

  const cards = document.querySelectorAll('.today-page .today-card');
  let visible = 0, total = cards.length;
  cards.forEach(card => {
    const text = card.dataset.searchText || '';
    const match = !q || text.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) visible++;
  });

  // 更新搜索栏状态
  const info = document.getElementById('todaySearchInfo');
  const clearBtn = document.getElementById('todaySearchClear');
  if (info) info.textContent = q ? `${visible} / ${total}` : '';
  if (clearBtn) clearBtn.style.display = q ? '' : 'none';

  // 更新各 section 的项数
  document.querySelectorAll('.today-section').forEach(sec => {
    const countBadge = sec.querySelector('.count-badge');
    if (!countBadge) return;
    const cardsInSec = sec.querySelectorAll('.today-card');
    const totalInSec = cardsInSec.length;
    const visibleInSec = Array.from(cardsInSec).filter(c => c.style.display !== 'none').length;
    if (q) {
      countBadge.textContent = `${visibleInSec} / ${totalInSec} 项`;
    } else {
      countBadge.textContent = `${totalInSec} 项`;
    }
  });

  // 当前 sub-tab 全部不匹配时，显示提示
  const oldEmpty = document.getElementById('todaySearchEmpty');
  if (oldEmpty) oldEmpty.remove();
  if (q && visible === 0 && total > 0) {
    const div = document.createElement('div');
    div.id = 'todaySearchEmpty';
    div.className = 'today-search-empty';
    div.textContent = `🔍 没找到包含「${q}」的款式`;
    const page = document.querySelector('.today-page');
    if (page) page.appendChild(div);
  }
}

// 清除搜索
function clearTodaySearch() {
  state.todaySearchQuery = '';
  const inp = document.getElementById('todaySearchInput');
  if (inp) { inp.value = ''; inp.focus(); }
  applyTodaySearch('');
}

/*
========================================================================
 渲染：列表 / 看板 / 大货跟进
========================================================================
*/

// 历史档案:获取一个款的"结束日期"(已完成用最后 feedbackDate,已归档用 archivedDate)
function getArchiveEndDate(s, type) {
  if (type === 'done') {
    for (let i = s.cycles.length - 1; i >= 0; i--) {
      if (s.cycles[i].feedbackDate) return s.cycles[i].feedbackDate;
    }
    return null;
  }
  return s.archivedDate || null;
}

// 历史档案:按时间分组(5 桶)
function groupArchiveByTime(styles, type) {
  const now = new Date();
  const thisYear = now.getFullYear();
  const thisMonthKey = `${thisYear}-${String(now.getMonth() + 1).padStart(2, '0')}`;
  const lastMonthD = new Date(thisYear, now.getMonth() - 1, 1);
  const lastMonthKey = `${lastMonthD.getFullYear()}-${String(lastMonthD.getMonth() + 1).padStart(2, '0')}`;

  const groups = {
    '本月': [],
    '上月': [],
    '今年早些': [],
    '去年': [],
    '更早': []
  };
  styles.forEach(s => {
    const endDate = getArchiveEndDate(s, type);
    if (!endDate) { groups['更早'].push(s); return; }
    const yearMonth = endDate.slice(0, 7);
    const year = parseInt(endDate.slice(0, 4));
    if (yearMonth === thisMonthKey) groups['本月'].push(s);
    else if (yearMonth === lastMonthKey) groups['上月'].push(s);
    else if (year === thisYear) groups['今年早些'].push(s);
    else if (year === thisYear - 1) groups['去年'].push(s);
    else groups['更早'].push(s);
  });
  return groups;
}

// 切换历史档案子 tab
function setArchiveSubTab(tab) {
  state.archiveSubTab = tab;
  render();
}

function renderArchiveTab() {
  document.getElementById('controlsBar').style.display = 'flex';
  document.getElementById('newStyleBtn').style.display = 'none';
  const showPoToggle = document.getElementById('showPoToggle');
  if (showPoToggle) showPoToggle.style.display = 'none';
  const moreFiltersBtn = document.getElementById('moreFiltersBtn');
  if (moreFiltersBtn) moreFiltersBtn.style.display = 'none';
  const viewToggle = document.getElementById('viewToggle');
  if (viewToggle) viewToggle.style.display = 'none';
  const addPoBtn = document.getElementById('addPoBtnTop');
  if (addPoBtn) addPoBtn.style.display = 'none';

  // —— 历史范围:已完成(未归档但 stage===DONE)+ 未采用(已归档) ——
  let allArchived = state.styles.filter(s => {
    if (s.archived) return true;
    const status = getStyleStatus(s);
    return status.stage === 'DONE';
  });

  // —— 客户筛选 + 搜索(沿用现有过滤逻辑) ——
  if (state.filterClient !== 'all') {
    allArchived = allArchived.filter(s => s.client === state.filterClient);
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    allArchived = allArchived.filter(s => {
      const matchesBasic = s.sku.toLowerCase().includes(q) || (s.name || '').toLowerCase().includes(q);
      const matchesPO = (s.pos || []).some(p => (p.poNumber || '').toLowerCase().includes(q));
      return matchesBasic || matchesPO;
    });
  }

  const completedStyles = allArchived.filter(s => !s.archived);
  const archivedStyles = allArchived.filter(s => s.archived);

  // 排序:按 endDate 倒序
  completedStyles.sort((a, b) => (getArchiveEndDate(b, 'done') || '').localeCompare(getArchiveEndDate(a, 'done') || ''));
  archivedStyles.sort((a, b) => (b.archivedDate || '').localeCompare(a.archivedDate || ''));

  // —— 顶部统计(不受筛选影响,反映全局历史) ——
  const allCompletedAll = state.styles.filter(s => !s.archived && getStyleStatus(s).stage === 'DONE');
  const allArchivedAll = state.styles.filter(s => s.archived);
  const now = new Date();
  const thisMonthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

  const thisMonthDone = allCompletedAll.filter(s => {
    const d = getArchiveEndDate(s, 'done');
    return d && d.slice(0, 7) === thisMonthKey;
  });
  const thisMonthArchivedCnt = allArchivedAll.filter(s => s.archivedDate && s.archivedDate.slice(0, 7) === thisMonthKey).length;

  let durations = [];
  thisMonthDone.forEach(s => {
    const earliest = getEarliestOpenDate(s);
    const endD = getArchiveEndDate(s, 'done');
    if (earliest && endD) {
      const d = daysBetween(earliest, endD);
      if (d !== null && d >= 0) durations.push(d);
    }
  });
  const avgDuration = durations.length > 0
    ? Math.round(durations.reduce((a, b) => a + b, 0) / durations.length)
    : null;

  const totalCount = allCompletedAll.length + allArchivedAll.length;

  // —— 选择当前 sub-tab 的数据 ——
  if (!state.archiveSubTab) state.archiveSubTab = 'done';
  const subTab = state.archiveSubTab;
  const activeList = subTab === 'done' ? completedStyles : archivedStyles;
  const activeType = subTab === 'done' ? 'done' : 'archived';

  // —— 按时间分组渲染 ——
  const groups = groupArchiveByTime(activeList, activeType);

  // 单组渲染
  const renderTimeGroupV2 = (label, list) => {
    if (list.length === 0) return '';
    // 组内统计
    const ds = list.map(s => {
      const earliest = getEarliestOpenDate(s);
      const endD = getArchiveEndDate(s, activeType);
      if (!earliest || !endD) return null;
      return daysBetween(earliest, endD);
    }).filter(d => d !== null && d >= 0);
    const avg = ds.length > 0 ? Math.round(ds.reduce((a, b) => a + b, 0) / ds.length) : null;
    const min = ds.length > 0 ? Math.min(...ds) : null;
    const max = ds.length > 0 ? Math.max(...ds) : null;
    const avgText = avg !== null
      ? `平均耗时 ${avg} 天${ds.length > 1 ? ` · 最快 ${min} 天 · 最慢 ${max} 天` : ''}`
      : '';

    // 标签上加年月
    let displayLabel = label;
    if (label === '本月') displayLabel = `本月 · ${now.getFullYear()}.${now.getMonth() + 1}`;
    else if (label === '上月') {
      const lm = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      displayLabel = `上月 · ${lm.getFullYear()}.${lm.getMonth() + 1}`;
    } else if (label === '今年早些') displayLabel = `今年早些 · ${now.getFullYear()}`;
    else if (label === '去年') displayLabel = `去年 · ${now.getFullYear() - 1}`;

    return `
      <div class="archive-time-group">
        <div class="archive-time-group-header">
          <span class="label">${escapeHtml(displayLabel)}</span>
          <span class="count">${list.length} 款</span>
          ${avgText ? `<span class="avg">${escapeHtml(avgText)}</span>` : ''}
        </div>
        <div class="archive-list-v2">
          <div class="archive-list-header-v2">
            <div></div>
            <div>款式</div>
            <div>客户</div>
            <div>PO · 数量</div>
            <div>${activeType === 'done' ? '工厂 · 类型' : '归档原因'}</div>
            <div>${activeType === 'done' ? '完成日期 · 耗时' : '归档日期 · 耗时'}</div>
            <div></div>
          </div>
          ${list.map(s => renderArchiveRow(s, activeType)).join('')}
        </div>
      </div>
    `;
  };

  const renderedGroups = ['本月', '上月', '今年早些', '去年', '更早']
    .map(l => renderTimeGroupV2(l, groups[l]))
    .filter(s => s)
    .join('');

  // —— 整页 ——
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="archive-page-v2">
      <div class="archive-summary-bar">
        <div class="archive-summary-item">
          <span class="lbl">本月完成</span>
          <span class="val">${thisMonthDone.length}</span>
          <span class="val-sub">单</span>
        </div>
        <div class="archive-summary-item">
          <span class="lbl">平均耗时</span>
          <span class="val">${avgDuration !== null ? avgDuration : '—'}</span>
          <span class="val-sub">${avgDuration !== null ? '天 (开版→完成)' : '本月暂无数据'}</span>
        </div>
        <div class="archive-summary-item">
          <span class="lbl">本月未采用</span>
          <span class="val">${thisMonthArchivedCnt}</span>
          <span class="val-sub">归档</span>
        </div>
        <div class="archive-summary-item">
          <span class="lbl">历史总计</span>
          <span class="val">${totalCount}</span>
          <span class="val-sub">单</span>
        </div>
      </div>

      <div class="archive-sub-nav">
        <button class="archive-sub-nav-btn ${subTab === 'done' ? 'active' : ''}" onclick="setArchiveSubTab('done')">
          已完成订单 <span class="count">${completedStyles.length}</span>
        </button>
        <button class="archive-sub-nav-btn ${subTab === 'archived' ? 'active' : ''}" onclick="setArchiveSubTab('archived')">
          未采用 <span class="count">${archivedStyles.length}</span>
        </button>
      </div>

      ${activeList.length === 0
        ? `<div class="archive-empty-v2"><h3>${activeType === 'done' ? '暂无已完成订单' : '暂无未采用款式'}</h3><p>${state.search || state.filterClient !== 'all' ? '当前筛选下没有匹配的款。' : ''}</p></div>`
        : renderedGroups
      }
    </div>
  `;
}

function renderArchiveRow(s, type) {
  const imgSrc = s.imageUrl || '';
  const thumb = imgSrc
    ? `<img class="thumb thumb-zoomable" src="${escapeHtml(imgSrc)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeJsAttr(imgSrc)}')" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  const earliest = getEarliestOpenDate(s);
  const endDate = getArchiveEndDate(s, type);
  let duration = null;
  if (earliest && endDate) {
    const d = daysBetween(earliest, endDate);
    if (d !== null && d >= 0) duration = d;
  }
  let durationCls = '';
  if (duration !== null) {
    if (duration < 30) durationCls = 'fast';
    else if (duration > 60) durationCls = 'long';
  }

  const po = getPOInfo(s);

  // 数量·颜色 文本
  let qtyText = '';
  if (s.pos && s.pos.length > 0) {
    const totalQty = s.pos.reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
    const colors = [...new Set(s.pos.map(p => p.color).filter(Boolean))];
    if (totalQty > 0) {
      const colorPart = colors.length === 1 ? colors[0]
        : colors.length > 1 ? `${colors.length} 色`
        : '';
      qtyText = `${totalQty} 件${colorPart ? ' · ' + colorPart : ''}`;
    }
  }

  // 工厂·类型 / 归档原因
  let cellFactoryHtml;
  if (type === 'done') {
    const factoryMap = { HUBEI: '湖北', JIANGXI: '江西' };
    const factoryText = factoryMap[s.factory] || s.factory || '—';
    const orderTypeText = po.orderType === 'new' ? '新单' : po.orderType === 'repeat' ? '反单' : '';
    cellFactoryHtml = `
      <span class="factory-line">${escapeHtml(factoryText)}</span>
      ${orderTypeText ? `<span class="order-type-line">${orderTypeText}</span>` : ''}
    `;
  } else {
    const reasonMap = {
      'customer_cancel': ['客户取消', 'customer-cancel'],
      'production_failed': ['工厂无法生产', 'failed'],
      'price_no_deal': ['价格未谈成', 'price'],
      'deleted': ['未采用', 'other'],
      'other': ['其他', 'other']
    };
    const r = reasonMap[s.archiveReason] || ['未采用', 'other'];
    const noteShort = s.archiveNote
      ? (s.archiveNote.length > 14 ? s.archiveNote.slice(0, 14) + '…' : s.archiveNote)
      : '';
    cellFactoryHtml = `
      <span class="reason-chip-v2 reason-${r[1]}">${escapeHtml(r[0])}</span>
      ${noteShort ? `<span class="archive-note-mini" title="${escapeHtml(s.archiveNote)}">${escapeHtml(noteShort)}</span>` : ''}
    `;
  }

  // 操作按钮:已完成订单是终态,无操作;未采用可恢复(跟单+admin)/永久删除(只 admin)
  let actions;
  if (type === 'done') {
    actions = '';
  } else {
    const restoreBtn = canArchiveStyle() ? `<button class="btn-icon-v2" onclick="event.stopPropagation(); restoreArchivedStyle('${s.id}')" title="恢复到开发追踪">↶</button>` : '';
    const deleteBtn = canDeleteStyle() ? `<button class="btn-icon-v2 danger" onclick="event.stopPropagation(); permanentlyDeleteStyle('${s.id}')" title="永久删除">×</button>` : '';
    actions = restoreBtn + deleteBtn;
  }

  // 批量选中状态(仅未采用支持批量)
  const allowBatch = (type === 'archived');
  const checked = allowBatch && state.batchSelected && state.batchSelected[s.id] ? 'checked' : '';
  const batchCls = allowBatch && state.batchSelected && state.batchSelected[s.id] ? 'batch-selected' : '';
  const ckbox = allowBatch
    ? `<input type="checkbox" class="batch-checkbox row-batch-checkbox" ${checked} onclick="toggleBatchSelection('${s.id}', this.checked); event.stopPropagation();" title="批量选择">`
    : '';

  const endLabel = endDate ? `${escapeHtml(formatDate(endDate))} ${type === 'done' ? '完成' : '归档'}` : '—';

  return `
    <div role="button" tabindex="0" class="archive-row-v2 ${type === 'archived' ? 'archive-row-archived' : 'archive-row-done'} ${batchCls}" data-style-id="${s.id}" data-archive-type="${type}" style="position:relative;" onclick="handleArchiveRowClick(event, '${s.id}', '${type}')">
      ${ckbox}
      ${thumb}
      <div class="cell-style">
        <span class="archive-sku">${escapeHtml(s.sku || '—')}</span>
        <span class="archive-name">${escapeHtml(s.name && s.name !== '(无款名)' ? s.name : '—')}</span>
      </div>
      <div class="cell-client">
        <span class="client-badge client-${(s.client || '').toLowerCase()}">${escapeHtml(s.client || '')}</span>
      </div>
      <div class="cell-po">
        <span class="po-num-v2">${po.poNumber ? escapeHtml(po.poNumber) : '—'}</span>
        ${qtyText
          ? `<span class="po-qty-v2">${escapeHtml(qtyText)}</span>`
          : `<span class="po-qty-v2" style="color:var(--ink-mute);font-style:italic;">未下 PO</span>`
        }
      </div>
      <div class="cell-factory">
        ${cellFactoryHtml}
      </div>
      <div class="cell-time">
        <span class="end-date-v2">${endLabel}</span>
        ${duration !== null ? `<span class="duration-v2 ${durationCls}">耗时 ${duration} 天</span>` : ''}
      </div>
      <div class="cell-actions-v2">${actions}</div>
    </div>
  `;
}

// 恢复"未采用"款式 → 回到开发追踪
async function restoreArchivedStyle(styleId) {
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const ok = await showDialog({
    title: '恢复到开发追踪',
    message: `将"${s.sku}"从历史档案恢复到开发追踪。后续可继续跟进。`,
    confirmText: '恢复'
  });
  if (!ok) return;

  s.archived = false;
  delete s.archivedDate;
  delete s.archiveReason;
  delete s.archiveNote;
  // 也清掉最后一个周期的 ARCHIVED 反馈（如果有）
  if (s.cycles && s.cycles.length > 0) {
    const lastCycle = s.cycles[s.cycles.length - 1];
    if (lastCycle.feedbackOutcome === FEEDBACK_OUTCOMES.ARCHIVED) {
      delete lastCycle.feedbackDate;
      delete lastCycle.feedbackOutcome;
    }
  }
  saveOneStyle(s.id);
  render();
  showToast(`已恢复 ${s.sku}`, 'ok');
}

// 永久删除款式（不可恢复）
async function permanentlyDeleteStyle(styleId) {
  if (!await showDialog({
    title: "永久删除",
    message: "确认要永久删除这款吗？删除后无法恢复！",
    confirmText: "永久删除",
    danger: true
  })) return;

  try {
    // 走抽象层删除（含所有关联数据）
    await db.deleteStyle(styleId);

    // 从本地删除
    state.styles = state.styles.filter(x => x.id !== styleId);
    saveToLocalCache(state.styles);
    render();
    showToast("已永久删除", "ok");
  } catch(e) {
    console.error("删除失败", e);
    showToast("删除失败: " + e.message, "warn");
  }
}

// 批量永久删除
async function batchPermanentDelete() {
  const ids = Object.keys(state.batchSelected || {}).filter(k => state.batchSelected[k]);
  if (ids.length === 0) {
    showToast('没有选中的款式', 'warn');
    return;
  }

  if (!await showDialog({
    title: '批量永久删除',
    message: `确认要永久删除选中的 ${ids.length} 款吗？删除后无法恢复！`,
    confirmText: '永久删除',
    danger: true
  })) return;

  // 从本地删除
  state.styles = state.styles.filter(s => !ids.includes(s.id));
  saveToLocalCache(state.styles);

  // 从云端删除（走抽象层，含所有关联数据）
  for (const id of ids) {
    await db.deleteStyle(id);
  }

  clearBatchSelection();
  render();
  showToast(`已永久删除 ${ids.length} 款`, 'ok');
}

        '跟单员': s.owner || '',
        'PO号': '',
        '大货款号': '',
        '条形号': '',
        '颜色': '',

        'Ex-Factory': '',
