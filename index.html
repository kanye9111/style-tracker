// ============================================================
// 异常报警面板
// ============================================================
function getAlertItems() {
  // 收集所有"异常"款（卡死、过期、超期）
  const items = { overdue: [], danger: [], warn: [] };
  const now = Date.now();
  state.styles.forEach(s => {
    if (s.archived) return;
    // 静音中的款式不报警
    if (s.alertMutedUntil && now < s.alertMutedUntil) return;
    // 今日已处理的不再报警
    const today = todayStr();
    const handled = state.handledToday[today] || [];
    if (handled.includes(s.id)) return;
    const status = getStyleStatus(s);
    if (status.stage === 'DONE' || status.stage === 'ARCHIVED') return;

    // 板房卡 ≥ 3 天 OR 等 fit ≥ 5 天 = warn
    // 板房卡 ≥ 5 天 OR 等 fit ≥ 7 天 = danger
    const days = status.days || 0;
    let level = null;
    if (status.stage === 'DEV' || status.stage === 'REVISE' || status.stage === 'PHOTO') {
      // 板房中
      if (days >= 5) level = 'danger';
      else if (days >= 3) level = 'warn';
    } else if (status.stage === 'AWAIT_FIT') {
      if (days >= 7) level = 'danger';
      else if (days >= 5) level = 'warn';
    }
    if (status.packageArrived) { level = level || 'warn'; status._pkgAlert = true; }

    // PO 过货期？(看 ex-factory)
    let efOverdue = false;
    if (s.pos && s.pos.length > 0) {
      const minEF = s.pos.map(p => p.exFactory).filter(Boolean).sort()[0];
      if (minEF) {
        const d = daysUntil(minEF);
        if (d !== null && d < 0) efOverdue = true;
      }
    }

    if (efOverdue) items.overdue.push({ style: s, status, days });
    else if (level === 'danger') items.danger.push({ style: s, status, days });
    else if (level === 'warn') items.warn.push({ style: s, status, days });
  });
  return items;
}

function updateAlertBell() {
  const items = getAlertItems();
  const total = items.overdue.length + items.danger.length + items.warn.length;
  const bell = document.getElementById('alertBell');
  const badge = document.getElementById('alertBellBadge');
  if (!bell) return;
  if (total > 0) {
    bell.classList.add('has-alerts');
    if (badge) {
      badge.style.display = 'flex';
      badge.textContent = total > 99 ? '99+' : total;
    }
  } else {
    bell.classList.remove('has-alerts');
    if (badge) badge.style.display = 'none';
  }
  return items;
}

function toggleAlertPanel(e) {
  if (e) e.stopPropagation();
  const panel = document.getElementById('alertPanel');
  if (!panel) return;
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    setTimeout(() => panel.style.display = 'none', 240);
    return;
  }
  // 打开 + 渲染
  renderAlertPanel();
  panel.style.display = 'flex';
  requestAnimationFrame(() => panel.classList.add('open'));

  // 点外面关
  const offHandler = (ev) => {
    if (!panel.contains(ev.target) && ev.target.id !== 'alertBell' && !ev.target.closest('#alertBell')) {
      panel.classList.remove('open');
      setTimeout(() => panel.style.display = 'none', 240);
      document.removeEventListener('click', offHandler);
    }
  };
  setTimeout(() => document.addEventListener('click', offHandler), 0);
}

function renderAlertPanel() {
  const items = getAlertItems();
  const total = items.overdue.length + items.danger.length + items.warn.length;
  const sub = document.getElementById('alertPanelSub');
  const body = document.getElementById('alertPanelBody');
  if (!body) return;

  const today = todayStr();
  const handledCount = (state.handledToday[today] || []).length;
  const mutedCount = state.styles.filter(s => s.alertMutedUntil && Date.now() < s.alertMutedUntil).length;
  const extra = [];
  if (handledCount > 0) extra.push(`${handledCount} 已处理`);
  if (mutedCount > 0) extra.push(`${mutedCount} 静音中`);
  if (sub) sub.textContent = total > 0 ? `${total} 项异常` + (extra.length ? ` · ${extra.join(' · ')}` : '') : (extra.length ? extra.join(' · ') : '一切正常');

  if (total === 0) {
    body.innerHTML = `
      <div class="alert-panel-empty">
        <span class="icon">🌿</span>
        <div>暂无异常</div>
        <div style="font-family: var(--font-mono); font-size: 10.5px; margin-top: 6px; opacity: 0.7;">所有款式都在正常推进中</div>
      </div>
    `;
    return;
  }

  let html = '';
  if (items.overdue.length > 0) {
    html += renderAlertSection('overdue', '已过货期', items.overdue);
  }
  if (items.danger.length > 0) {
    html += renderAlertSection('danger', '卡死的款 (≥ 5 天)', items.danger);
  }
  if (items.warn.length > 0) {
    html += renderAlertSection('warn', '需关注 (≥ 3 天)', items.warn);
  }
  body.innerHTML = html;
}

function renderAlertSection(level, title, list) {
  const rows = list.map(item => {
    const s = item.style;
    const thumb = s.imageUrl
      ? `<img class="alert-row-thumb" src="${escapeHtml(s.imageUrl)}" alt="">`
      : `<div class="alert-row-thumb alert-row-thumb-empty">—</div>`;
    let levelCls = '';
    if (level === 'overdue' || level === 'danger') levelCls = 'danger';
    else if (level === 'warn') levelCls = 'warn';
    return `
      <div class="alert-row">
        <div class="alert-row-clickable" onclick="closeAlertPanel(); openDrawer('${s.id}')">
          ${thumb}
          <div class="alert-row-info">
            <div class="alert-row-title">
              <span>${escapeHtml(s.sku)}</span>
              <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
            </div>
            <div class="alert-row-status ${levelCls}">${escapeHtml(item.status.currentNodeLabel)} · 已 ${item.days} 天${item.status._pkgAlert ? '<span class="pkg-arrived-badge">📦 快递已到达</span>' : ''}</div>
          </div>
        </div>
        <button class="alert-row-done" onclick="handleToday('${s.id}'); event.stopPropagation();" title="已处理 · 今天不再提醒">✓</button>
        <button class="alert-row-mute" onclick="muteAlert('${s.id}'); event.stopPropagation();" title="静音 24 小时">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" x2="17" y1="9" y2="15"/><line x1="17" x2="23" y1="9" y2="15"/>
          </svg>
        </button>
      </div>
    `;
  }).join('');
  return `
    <div class="alert-section ${level}">
      <div class="alert-section-header">
        <span class="alert-section-dot"></span>
        <span class="alert-section-title">${escapeHtml(title)}</span>
        <span class="alert-section-count">${list.length}</span>
      </div>
      ${rows}
    </div>
  `;
}



// 静音单个款式 24 小时
function handleToday(styleId) {
  const today = todayStr();
  if (!state.handledToday[today]) state.handledToday[today] = [];
  const idx = state.handledToday[today].indexOf(styleId);
  if (idx >= 0) {
    state.handledToday[today].splice(idx, 1);  // 撤销
    showToast('已撤销 · 重新显示', 'info');
  } else {
    state.handledToday[today].push(styleId);
    showToast('已标记处理 · 今天不再提醒', 'ok');
  }
  saveState();
  renderAlertPanel();
}
function muteAlert(styleId) {
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  s.alertMutedUntil = Date.now() + 24 * 60 * 60 * 1000;
  saveState();
  showToast('已静音 24 小时', 'ok');
  // 刷新铃铛 + 面板
  renderAlertPanel();
  if (typeof updateAlertBell === 'function') updateAlertBell();
}

// 批量静音所有报警 24 小时（方便一键消除）
function muteAllAlerts() {
  const items = getAlertItems();
  const all = [...items.overdue, ...items.danger, ...items.warn];
  if (all.length === 0) return;
  const muteUntil = Date.now() + 24 * 60 * 60 * 1000;
  all.forEach(item => {
    item.style.alertMutedUntil = muteUntil;
  });
  saveState();
  showToast(`已静音 ${all.length} 项异常 24 小时`, 'ok');
  renderAlertPanel();
  if (typeof updateAlertBell === 'function') updateAlertBell();
}

function closeAlertPanel() {
  const panel = document.getElementById('alertPanel');
  if (!panel) return;
  panel.classList.remove('open');
  setTimeout(() => panel.style.display = 'none', 240);
}

// 每次 render 完更新铃铛徽章 (延迟到 DOM ready 后包装)
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(function() {
    if (typeof window.render === 'function' && !window.render._wrapped) {
      const origRender = window.render;
      window.render = function() {
        origRender.apply(this, arguments);
        if (typeof updateAlertBell === 'function') updateAlertBell();
        if (typeof updateBatchBar === 'function') updateBatchBar();
      };
      window.render._wrapped = true;
      // 立即跑一次
      if (typeof updateAlertBell === 'function') updateAlertBell();
    }
  }, 100);
});

// 工具函数：今天 + N 天的 ISO 日期
function todayPlus(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

// Toast / Dialog 组件 (替换原生 alert/confirm)
// ============================================================
(function() {
  // 创建一次 Toast 容器
  let toastStack = null;
  function ensureToastStack() {
    if (!toastStack) {
      toastStack = document.createElement('div');
      toastStack.className = 'toast-stack';
      document.body.appendChild(toastStack);
    }
    return toastStack;
  }

  // 苹果风 Toast
  window.showToast = function(message, type) {
    type = type || 'info';
    const stack = ensureToastStack();
    const toast = document.createElement('div');
    toast.className = 'toast toast-' + type;
    const iconMap = { info: 'i', warn: '!', error: '×', ok: '✓' };
    toast.innerHTML = '<span class="toast-icon">' + (iconMap[type] || 'i') +
                      '</span><span class="toast-msg"></span>';
    toast.querySelector('.toast-msg').textContent = message;
    stack.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('toast-out');
      setTimeout(() => toast.remove(), 300);
    }, type === 'error' ? 3500 : 2500);
  };

  // 苹果风 Dialog (Promise-based confirm)
  window.showDialog = function(opts) {
    return new Promise(resolve => {
      const backdrop = document.createElement('div');
      backdrop.className = 'app-dialog-backdrop';
      const danger = opts.danger;
      const confirmBtnCls = danger ? 'btn-danger' : 'btn-confirm';
      backdrop.innerHTML = `
        <div class="app-dialog" role="dialog" aria-modal="true">
          ${opts.title ? `<h3 class="app-dialog-title"></h3>` : ''}
          <p class="app-dialog-message"></p>
          <div class="app-dialog-actions">
            ${opts.cancelText !== null ? `<button class="app-dialog-btn btn-cancel" data-act="cancel"></button>` : ''}
            <button class="app-dialog-btn ${confirmBtnCls}" data-act="ok"></button>
          </div>
        </div>
      `;
      if (opts.title) backdrop.querySelector('.app-dialog-title').textContent = opts.title;
      backdrop.querySelector('.app-dialog-message').textContent = opts.message || '';
      const cancelBtn = backdrop.querySelector('[data-act="cancel"]');
      if (cancelBtn) cancelBtn.textContent = opts.cancelText || '取消';
      backdrop.querySelector('[data-act="ok"]').textContent = opts.confirmText || '确认';

      document.body.appendChild(backdrop);
      requestAnimationFrame(() => backdrop.classList.add('open'));

      function cleanup(result) {
        backdrop.classList.remove('open');
        setTimeout(() => backdrop.remove(), 240);
        resolve(result);
      }
      if (cancelBtn) cancelBtn.onclick = () => cleanup(false);
      backdrop.querySelector('[data-act="ok"]').onclick = () => cleanup(true);
      backdrop.onclick = (e) => { if (e.target === backdrop) cleanup(false); };

      // 键盘 ESC 关闭
      const escHandler = (e) => {
        if (e.key === 'Escape') { document.removeEventListener('keydown', escHandler); cleanup(false); }
        if (e.key === 'Enter')  { document.removeEventListener('keydown', escHandler); cleanup(true); }
      };
      document.addEventListener('keydown', escHandler);
    });
  };

  // 让旧的 alert / confirm 自动走新组件（最简兼容层 — 保险）
  // 不覆盖 window.alert/confirm 防止破坏浏览器调试
})();

async function loadState() {
  const ok = await loadFromSupabase();
  if (!ok || state.styles.length === 0) {
    // 云端加载失败或空数据时，尝试从 localStorage 迁移
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        state.styles = JSON.parse(raw);
        showToast('从本地加载数据，正在同步到云端…', 'warn');
        // 把本地数据同步上去
        for (const s of state.styles) {
          await saveStyleToSupabase(s);
        }
        showToast('本地数据已同步到云端！', 'ok');
      }
    } catch(e) { console.warn(e); }
  }
  if (state.styles.length === 0) seedData();
  subscribeRealtime();
}
function saveState() {
  // saveState 现在是异步的，直接调用不等待（保持原有调用方式不变）
  const changedStyles = state.styles;
  changedStyles.forEach(s => {
    saveStyleToSupabase(s);
  });
}
// 保存单个 style 的快捷方法（推荐在修改单个 style 后调用）
function saveOneStyle(styleId) {

  if (s) saveStyleToSupabase(s);
}
function uid(prefix) { return (prefix || 'id') + '_' + Math.random().toString(36).slice(2, 10); }
function daysBetween(a, b) {
  if (!a || !b) return null;
  const d1 = new Date(a), d2 = new Date(b);
  return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
}
function todayStr() { return new Date().toISOString().slice(0, 10); }
function daysSince(d) { return d ? daysBetween(d, todayStr()) : null; }
function daysUntil(d) { return d ? daysBetween(todayStr(), d) : null; }
function urgencyByDays(days, ty, tr) {
  if (days < ty) return 'ok';
  if (days < tr) return 'warn';
  return 'danger';
}

function seedData() {
  state.styles = [];
}

const CYCLE_TYPES = {
  DEV:    { label: '开发版', nodeLabels: ['开版', '收到样板', '寄出客户', '客户评语'], feedbackLabel: '客户评语' },
  REVISE: { label: '修改版', nodeLabels: ['开版', '收到样板', '寄出客户', '客户评语'], feedbackLabel: '客户评语' },
  PHOTO:  { label: '拍照版', nodeLabels: ['开版', '收到拍照版', '拍照发图审', '图审反馈'], feedbackLabel: '图审反馈' },
  PROD:   { label: '船版',   nodeLabels: ['开版', '收到船版', '寄出客户', '船版批准'], feedbackLabel: '船版批准' }
};

// 该催谁
function whoToFollowUp(node, cycleType) {
  if (node === 'PATTERN_MAKING') return '板房 / 板师';
  if (node === 'AWAIT_SEND') return '自己处理（提醒寄出）';
  if (node === 'AWAIT_FB') {
    if (cycleType === 'PHOTO') return '客户买手（图审）';
    if (cycleType === 'PROD') return '客户 QC（船版审批）';
    return '客户买手';
  }
  if (node === 'AWAIT_FIT') return '客户买手（fit comment）';
  return null;
}

function getStyleStatus(style) {
  if (style.archived) {
    return {
      stage: 'ARCHIVED', stageLabel: '未采用',
      currentNode: 'ARCHIVED', currentNodeLabel: '未采用',
      days: null, level: 'archived',
      awaitingClient: false, isActive: false, isArchived: true
    };
  }

  if (style.awaitingFit) {
    const days = daysSince(style.awaitingFit.since);
    return {
      stage: 'AWAIT_FIT', stageLabel: '等 fit comment',
      currentNode: 'AWAIT_FIT', currentNodeLabel: '等 fit comment',
      startDate: style.awaitingFit.since,
      days, level: urgencyByDays(days, 3, 5),
      awaitingClient: true, isActive: true, isArchived: false
    };
  }

  if (!style.cycles || style.cycles.length === 0) {
    return { stage: 'DEV', stageLabel: '开发版', currentNode: 'UNKNOWN', currentNodeLabel: '—', days: 0, level: 'ok', isActive: true, isArchived: false };
  }
  const lastCycle = style.cycles[style.cycles.length - 1];

  if (lastCycle.type === 'PROD' && lastCycle.feedbackOutcome === 'APPROVED') {
    // 大货已到仓 → 真正完成
    if (style.prodReceived && style.prodReceived.date) {
      return {
        stage: 'DONE', stageLabel: '大货已到仓',
        currentNode: 'DONE', currentNodeLabel: '大货已到仓 ✓',
        startDate: style.prodReceived.date,
        days: null, level: 'done',
        awaitingClient: false, isActive: false, isArchived: false
      };
    }
    // 船版已批但大货还没到 → 等大货
    const approvedDate = lastCycle.feedbackDate;
    const po = getPOInfo(style);
    const efDate = po.exFactory;
    let days = null;
    let level = 'ok';
    if (efDate) {
      days = daysBetween(todayStr(), efDate); // 距离货期还有几天
      if (days !== null) {
        if (days <= 0) level = 'danger';        // 已过货期！
        else if (days <= 7) level = 'danger';   // ≤7天 紧急
        else if (days <= 14) level = 'warn';    // ≤14天 该跟进
      }
    } else {
      // 没有货期，按批准后天数算
      const sinceApproved = daysSince(approvedDate);
      level = urgencyByDays(sinceApproved, 7, 14);
      days = sinceApproved;
    }
    return {
      stage: 'PROD_SHIPPING', stageLabel: '等大货',
      currentNode: 'PROD_SHIPPING', currentNodeLabel: '等大货完成',
      startDate: approvedDate,
      days, level,
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: 'PROD', cycleId: lastCycle.id,
      exFactory: efDate
    };
  }

  const meta = CYCLE_TYPES[lastCycle.type];
  const stageLabel = meta.label;

  if (!lastCycle.receivedDate) {
    const days = daysSince(lastCycle.openDate);
    return {
      stage: lastCycle.type, stageLabel,
      currentNode: 'PATTERN_MAKING', currentNodeLabel: '等收到样板',
      startDate: lastCycle.openDate,
      days, level: urgencyByDays(days, 3, 5),
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: lastCycle.type, cycleId: lastCycle.id
    };
  }
  if (!lastCycle.sentDate) {
    const days = daysSince(lastCycle.receivedDate);
    return {
      stage: lastCycle.type, stageLabel,
      currentNode: 'AWAIT_SEND',
      currentNodeLabel: lastCycle.type === 'PHOTO' ? '待拍照发出' : '待寄出',
      startDate: lastCycle.receivedDate,
      days, level: urgencyByDays(days, 3, 99),
      awaitingClient: false, isActive: true, isArchived: false,
      cycleType: lastCycle.type, cycleId: lastCycle.id
    };
  }
  if (!lastCycle.feedbackDate) {
    const days = daysSince(lastCycle.sentDate);
    const isReview = lastCycle.type === 'PHOTO';
    const level = isReview ? urgencyByDays(days, 1, 3) : urgencyByDays(days, 3, 5);
    const refArrival = lastCycle.shipActualArrival || lastCycle.shipEstimatedArrival;
    const packageArrived = refArrival && daysBetween(refArrival, todayStr()) >= 0;
    return {
      stage: lastCycle.type, stageLabel,
      currentNode: 'AWAIT_FB',
      currentNodeLabel: isReview ? '等图审' : (lastCycle.type === 'PROD' ? '等船版批准' : '等客户评语'),
      startDate: lastCycle.sentDate,
      days, level,
      awaitingClient: true, isActive: true, isArchived: false,
      cycleType: lastCycle.type, cycleId: lastCycle.id,
      packageArrived, refArrival,
      shipTrackingNo: lastCycle.shipTrackingNo || null
    };
  }
  return {
    stage: lastCycle.type, stageLabel,
    currentNode: 'CYCLE_DONE_PENDING_NEXT',
    currentNodeLabel: '待开新一轮',
    startDate: lastCycle.feedbackDate,
    days: daysSince(lastCycle.feedbackDate), level: 'ok',
    awaitingClient: false, isActive: true, isArchived: false,
    cycleType: lastCycle.type
  };
}

function hasPO(style) { return style.pos && style.pos.length > 0; }

// 取代表性 PO 信息（多 PO 时取最早 ex-factory 那个）
function getPOInfo(style) {
  if (!hasPO(style)) return { hasPO: false };
  const pos = style.pos;
  // 多 PO 时取最早 ex-factory 的那个作为代表
  let best = pos[0];
  for (const p of pos) {
    if (p.exFactory && (!best.exFactory || new Date(p.exFactory) < new Date(best.exFactory))) {
      best = p;
    }
  }
  return {
    hasPO: true,
    poNumber: best.poNumber,
    color: best.color,
    quantity: best.quantity,
    exFactory: best.exFactory,
    clientStyleNo: best.clientStyleNo,
    poDate: best.addedAt
  };
}

// 货期预警（基于 ex-factory 倒推）
function getExFactoryAlert(style, status) {
  if (!hasPO(style)) return null;
  // 取最近的 ex-factory（多 PO 时取最早的，最紧迫）
  const earliestEF = style.pos.reduce((min, p) => {
    if (!p.exFactory) return min;
    if (!min) return p.exFactory;
    return new Date(p.exFactory) < new Date(min) ? p.exFactory : min;
  }, null);
  if (!earliestEF) return null;

  const daysToEF = daysUntil(earliestEF);
  if (status.stage === 'DONE') {
    if (daysToEF < 0) return { level: 'danger', message: `已过货期 ${-daysToEF} 天 · 大货未出` };
    if (daysToEF < 7) return { level: 'danger', message: `${daysToEF} 天内出货 · 大货倒计时` };
    return { level: 'ok', message: `${daysToEF} 天到货期` };
  }
  const prodCycle = style.cycles.find(c => c.type === 'PROD');
  const hasProdSent = prodCycle && prodCycle.sentDate;
  const hasProdApproved = prodCycle && prodCycle.feedbackOutcome === 'APPROVED';

  if (daysToEF < 0) return { level: 'danger', message: `已过货期 ${-daysToEF} 天` };
  if (!hasProdSent && daysToEF < 14) return { level: 'danger', message: `${daysToEF} 天到货期 · 船版还没寄` };
  if (!hasProdApproved && daysToEF < 28) return { level: 'warn', message: `${daysToEF} 天到货期 · 船版未批准` };
  return { level: 'ok', message: `${daysToEF} 天到货期` };
}

function getStageProgress(style) {
  const status = getStyleStatus(style);
  const stages = [
    { key: 'DEV', label: '开发版' },
    { key: 'REVISE', label: '修改循环' },
    { key: 'PROD', label: '船版' },
    { key: 'BULK', label: '大货' }
  ];

  if (status.stage === 'ARCHIVED') {
    return [
      { key: 'DEV', label: '开发版', state: 'done' },
      { key: 'REVISE', label: '未采用', state: 'archived' },
      { key: 'PROD', label: '船版', state: 'future' },
      { key: 'BULK', label: '大货', state: 'future' }
    ];
  }

  let currentIdx;
  if (status.stage === 'DEV' || status.stage === 'AWAIT_FIT') currentIdx = 0;
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') currentIdx = 1;
  else if (status.stage === 'PROD') currentIdx = 2;
  else if (status.stage === 'DONE') currentIdx = 3;
  else currentIdx = 0;

  return stages.map((s, idx) => {
    let st;
    if (status.stage === 'DONE') st = idx === 3 ? 'current' : 'done';
    else if (idx < currentIdx) st = 'done';
    else if (idx === currentIdx) st = 'current';
    else st = 'future';
    return { ...s, state: st };
  });
}

function buildFullFlow(style) {
  const nodes = [];
  if (!style.cycles || style.cycles.length === 0) return nodes;
  const status = getStyleStatus(style);
  const lastCycleIdx = style.cycles.length - 1;

  style.cycles.forEach((cycle, idx) => {
    const meta = CYCLE_TYPES[cycle.type];
    const isLastCycle = idx === lastCycleIdx;

    nodes.push({
      label: cycle.type === 'DEV' ? '开版' : `${meta.label} 开版`,
      date: cycle.openDate, status: 'done', cycleType: cycle.type
    });

    if (cycle.receivedDate) {
      nodes.push({
        label: cycle.type === 'PHOTO' ? '收到拍照版' : '收到样板',
        date: cycle.receivedDate, status: 'done', cycleType: cycle.type,
        photos: cycle.receivedPhotos || []
      });
    } else if (isLastCycle && !style.archived) {
      nodes.push({
        label: cycle.type === 'PHOTO' ? '等收到拍照版' : '等收到样板',
        date: null, status: 'current', cycleType: cycle.type,
        level: status.level, daysText: formatDaysText(status.days),
        startDate: cycle.openDate
      });
    }

    if (cycle.sentDate) {
      nodes.push({
        label: cycle.type === 'PHOTO' ? '拍照发图审' : '寄出客户',
        date: cycle.sentDate, status: 'done', cycleType: cycle.type,
        tracking: cycle.shipTrackingNo || null,
        estArrival: cycle.shipEstimatedArrival || null,
        actualArrival: cycle.shipActualArrival || null,
        cycleId: cycle.id
      });
    } else if (isLastCycle && cycle.receivedDate && !style.archived) {
      nodes.push({
        label: cycle.type === 'PHOTO' ? '待拍照发出' : '待寄出',
        date: null, status: 'current', cycleType: cycle.type,
        level: status.level, daysText: formatDaysText(status.days),
        startDate: cycle.receivedDate
      });
    }

    if (cycle.feedbackDate) {
      let fbLabel;
      const o = cycle.feedbackOutcome;
      if (o === 'ARCHIVED') fbLabel = '未采用';
      else if (o === 'APPROVED') fbLabel = cycle.type === 'PROD' ? '船版已批 ✓' : '图审通过 ✓';
      else if (o === 'PO_AWAIT_FIT') fbLabel = '下PO · fit待定';
      else if (o === 'PO_REVISE') fbLabel = '下PO · 重做';
      else if (o === 'PO_PHOTO') fbLabel = '下PO · 做拍照版';
      else if (o === 'PO_PROD') fbLabel = '下PO · 直接船版';
      else if (o === 'REMAKE_PHOTO') fbLabel = '重做拍照版';
      else if (o === 'REMAKE_SAMPLE') fbLabel = '打回重做样衣';
      else if (o === 'REMAKE') fbLabel = '船版需重做';
      else fbLabel = '已反馈';

      const isFinal = isLastCycle && (
        o === 'ARCHIVED' || (cycle.type === 'PROD' && o === 'APPROVED')
      );
      nodes.push({
        label: fbLabel, date: cycle.feedbackDate,
        status: isFinal ? 'current' : 'done',
        level: isFinal ? (o === 'ARCHIVED' ? 'archived' : 'final-approved') : null,
        cycleType: cycle.type
      });
    } else if (isLastCycle && cycle.sentDate && !style.archived) {
      nodes.push({
        label: cycle.type === 'PHOTO' ? '等图审' : (cycle.type === 'PROD' ? '等船版批准' : '等客户评语'),
        date: null, status: 'current', cycleType: cycle.type,
        level: status.level, daysText: formatDaysText(status.days),
        startDate: cycle.sentDate
      });
    }
  });

  if (style.awaitingFit && !style.archived) {
    nodes.push({
      label: '等 fit comment', date: null, status: 'current',
      cycleType: 'AWAIT_FIT', level: status.level,
      daysText: formatDaysText(status.days),
      startDate: style.awaitingFit.since
    });
  }

  return nodes;
}


function getEarliestOpenDate(style) {
  if (!style.cycles || style.cycles.length === 0) return null;
  let earliest = null;
  style.cycles.forEach(c => {
    if (!c.openDate) return;
    if (!earliest || new Date(c.openDate) < new Date(earliest)) {
      earliest = c.openDate;
    }
  });
  return earliest;
}

function formatDaysText(days) {
  if (days === null || days === undefined) return null;
  if (days === 0) return '今天';
  return `已 ${days} 天`;
}
function formatDate(d) { if (!d) return ''; return d.slice(5).replace('-', '.'); }
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

/*
========================================================================
 今日跟进清单
========================================================================
 列出所有需要今天处理的款，按优先级排序：
 - 红色（卡住的）
 - 黄色（该跟进的）
 - 货期紧急（< 14 天 + 船版没寄）
*/
function getTodayList(activeStyles) {
  const items = [];
  const today = todayStr();
  activeStyles.forEach(s => {
    const status = getStyleStatus(s);
    if (status.isArchived || status.stage === 'DONE') return;
    // 跳过被 snooze 的款（snoozedUntil > today 表示还在 snooze 期内）
    if (s.snoozedUntil && s.snoozedUntil >= today) return;

    const efAlert = getExFactoryAlert(s, status);
    const isUrgent = status.level === 'danger' || status.level === 'warn';
    const isExUrgent = efAlert && efAlert.level !== 'ok';
    const hasPoOrder = hasPO(s);
    const isAwaitFit = status.currentNode === 'AWAIT_FIT';
    const isProdShipping = status.stage === 'PROD_SHIPPING';
    // 有PO的款（REVISE/PHOTO/PROD）强制进入今日跟进
    const isPoActive = hasPoOrder && status.isActive && (
      status.cycleType === 'REVISE' || status.cycleType === 'PHOTO' || status.cycleType === 'PROD'
    );
    // 等fit、等大货也强制进入
    if (!isUrgent && !isExUrgent && !isPoActive && !isAwaitFit && !isProdShipping) return;

    const who = whoToFollowUp(status.currentNode, status.cycleType);
    let actionHint = '';
    if (status.currentNode === 'PROD_SHIPPING') {
      if (status.exFactory) {
        const daysLeft = daysBetween(today, status.exFactory);
        if (daysLeft !== null && daysLeft <= 0) actionHint = '⚠️ 已过货期！催工厂';
        else if (daysLeft !== null && daysLeft <= 7) actionHint = `⚡ 距交货仅 ${daysLeft} 天`;
        else if (daysLeft !== null) actionHint = `距交货 ${daysLeft} 天`;
        else actionHint = '等大货完成';
      } else {
        actionHint = '等大货完成';
      }
    } else if (status.currentNode === 'PATTERN_MAKING') {
      if (isPoActive) actionHint = '⚡ 催板房（已下PO）';
      else actionHint = '催板房';
    }
    else if (status.currentNode === 'AWAIT_SEND') {
      if (isPoActive) actionHint = '⚡ 赶紧寄出（已下PO）';
      else actionHint = '该寄了';
    }
    else if (status.currentNode === 'AWAIT_FB') {
      if (status.cycleType === 'PHOTO') actionHint = isPoActive ? '⚡ 催图审（已下PO）' : '催图审';
      else if (status.cycleType === 'PROD') actionHint = '催船版批准';
      else actionHint = '催客户回评语';
    } else if (status.currentNode === 'AWAIT_FIT') actionHint = '催 fit comment';

    let priority = 99;
    // 有PO + 有货期的最优先
    if (isProdShipping && status.level === 'danger') priority = -2;
    else if (isProdShipping) priority = -1;
    else if (isPoActive && efAlert?.level === 'danger') priority = 0;
    else if (isPoActive) priority = 1;
    else if (efAlert?.level === 'danger') priority = 2;
    else if (status.level === 'danger') priority = 3;
    else if (efAlert?.level === 'warn') priority = 4;
    else if (status.level === 'warn') priority = 5;
    else if (isAwaitFit) priority = 6;

    items.push({
      style: s, status, efAlert, who, actionHint, priority,
      isAwaitFit, hasPoOrder: isPoActive, isProdShipping
    });
  });
  items.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    return (b.status.days || 0) - (a.status.days || 0);
  });
  return items;
}

function renderTodayTab() {
  document.getElementById('controlsBar').style.display = 'none';
  document.getElementById('newStyleBtn').style.display = 'none';
  const main = document.getElementById('main');

  const activeStyles = state.styles.filter(s => !s.archived);
  const items = getTodayList(activeStyles);

  if (items.length === 0) {
    main.innerHTML = `
      <div class="today-empty">
        <span class="icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"/>
          </svg>
        </span>
        <h3>今天可以喘口气</h3>
        <p>所有跟进的款式都在正常进度内，没有需要紧急处理的事项。</p>
      </div>
    `;
    return;
  }

  // 按职责分组
  // 版师待办：板房在做的（等收样板、修改、重做）
  const patternItems = items.filter(it => {
    const node = it.status.currentNode;
    return node === 'PATTERN_MAKING' && !it.isAwaitFit;
  });

  // 跟单待办：等寄出、等客户反馈、催comment、等fit
  const merchandiserItems = items.filter(it => {
    const node = it.status.currentNode;
    return !it.isAwaitFit && !patternItems.includes(it) &&
      (node === 'AWAIT_SEND' || node === 'AWAIT_FB' || node === 'AWAIT_RECEIVE');
  });

  // 等fit comment：单独一组
  const fitItems = items.filter(it => it.isAwaitFit);

  // 大货跟进：船版相关 + PROD_SHIPPING + 货期紧急
  const prodItems = items.filter(it => {
    if (it.isAwaitFit || patternItems.includes(it) || merchandiserItems.includes(it)) return false;
    if (it.isProdShipping) return true;
    const ct = it.status.cycleType;
    return ct === 'PROD' || (it.efAlert && it.efAlert.level !== 'ok');
  });

  // 其他未分类
  const otherItems = items.filter(it =>
    !patternItems.includes(it) && !merchandiserItems.includes(it) &&
    !fitItems.includes(it) && !prodItems.includes(it)
  );

  const renderCard = (it) => {
    const s = it.style;
    const isDanger = it.efAlert?.level === 'danger' || it.status.level === 'danger';
    const cls = isDanger ? 'danger' : 'warn';
    const thumb = s.imageUrl
      ? `<img class="thumb-mini thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeHtml(s.imageUrl).replace(/'/g, "\\'")}')" onerror="this.outerHTML='<div class=&quot;thumb-mini-placeholder&quot;>NO IMG</div>'">`
      : `<div class="thumb-mini-placeholder">NO IMG</div>`;
    let mainText, detailText;
    if (it.efAlert?.level === 'danger') {
      mainText = it.efAlert.message;
      detailText = `${it.actionHint || '处理'} · ${it.who || ''}`;
    } else {
      mainText = it.actionHint;
      detailText = `${it.status.currentNodeLabel} · 已 ${it.status.days} 天 · ${it.who || ''}`;
    }
    const checked = state.batchSelected && state.batchSelected[s.id] ? 'checked' : '';
    const batchCls = state.batchSelected && state.batchSelected[s.id] ? 'batch-selected' : '';
    const _ob = getOrderTypeBadge(s);
    const _orderTypeHtml = _ob ? `<span class="order-type-pill ${_ob.cls}">${escapeHtml(_ob.label)}</span>` : '';
    return `
      <div class="today-card ${cls} ${batchCls}" data-style-id="${s.id}" onclick="handleRowClick(event, '${s.id}')">
        <input type="checkbox" class="batch-checkbox today-batch-checkbox" ${checked} onclick="toggleBatchSelection('${s.id}', this.checked); event.stopPropagation();" title="批量选择">
        ${thumb}
        <div class="today-card-body">
          <div class="today-card-head">
            <span class="today-card-sku">${escapeHtml(s.sku)}</span>
            <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
            ${_orderTypeHtml}
            <span class="today-card-name">${escapeHtml(s.name)}</span>
          </div>
          <div class="today-card-action">
            <span class="today-card-action-main ${cls}">${escapeHtml(mainText)}</span>
            <span class="today-card-action-detail">${escapeHtml(detailText)}</span>
          </div>
        </div>
      </div>
    `;
  };

  // 更新子菜单数量
  const _sc = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n; };
  _sc('sub-count-all', items.length);
  _sc('sub-count-pattern', patternItems.length);
  _sc('sub-count-merch', merchandiserItems.length);
  _sc('sub-count-fit', fitItems.length);
  _sc('sub-count-prod', prodItems.length + otherItems.length);

  // 确保子菜单显示
  updateTodaySubNav();

  let html = '<div class="today-page">';
  const todayCollapsibleSection = (key, badgeCls, title, sub, items, renderFn) => {
    if (items.length === 0) return '';
    const collapsed = state.collapsedSections[key];
    return `
      <div class="today-section ${badgeCls === 'fit' ? 'section-fit' : ''} ${collapsed ? 'collapsed' : ''}">
        <h2 class="collapsible-header" onclick="toggleSection('${key}')">
          <span class="section-chevron">▼</span>
          <span>${title}</span>
          <span class="count-badge ${badgeCls}">${items.length} 项</span>
        </h2>
        <div class="section-sub">${escapeHtml(sub)}</div>
        <div class="today-cards section-content">
          ${items.map(renderFn).join('')}
        </div>
      </div>
    `;
  };

  const sub = state.todaySub || 'all';
  if (sub === 'all' || sub === 'pattern') {
    html += todayCollapsibleSection('today_pattern', 'danger', '✂️ 版师待办', '板房在做的 — 催板房出样板', patternItems, renderCard);
  }
  if (sub === 'all' || sub === 'merch') {
    html += todayCollapsibleSection('today_merch', 'warn', '📋 跟单待办', '等寄出 / 等客户反馈 — 跟单负责推进', merchandiserItems, renderCard);
  }
  if (sub === 'all' || sub === 'fit') {
    html += todayCollapsibleSection('today_fit', 'fit', '💬 等 fit comment', '客户已下 PO 但还没给评语 — 给 buyer 发邮件确认', fitItems, renderCard);
  }
  if (sub === 'all' || sub === 'prod') {
    html += todayCollapsibleSection('today_prod', 'danger', '🏭 大货跟进', '船版已批 / 货期紧急 — 后端同事跟进出货', prodItems, renderCard);
    if (otherItems.length > 0) {
      html += todayCollapsibleSection('today_other', 'warn', '📌 其他待办', '其他需要关注的事项', otherItems, renderCard);
    }
  }

  // 如果筛选后没有内容
  if (sub !== 'all') {
    const subItems = sub === 'pattern' ? patternItems : sub === 'merch' ? merchandiserItems : sub === 'fit' ? fitItems : [...prodItems, ...otherItems];
    if (subItems.length === 0) {
      html += `<div class="today-empty"><span class="icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg></span><h3>这个分组没有待办</h3><p>当前没有需要处理的事项。</p></div>`;
    }
  }

  html += '</div>';
  main.innerHTML = html;
}

/*
========================================================================
 渲染：列表 / 看板 / 大货跟进
========================================================================
*/

function renderArchiveTab() {
  document.getElementById('controlsBar').style.display = 'flex';
  document.getElementById('newStyleBtn').style.display = 'none';
  const showPoToggle = document.getElementById('showPoToggle');
  if (showPoToggle) showPoToggle.style.display = 'none';
  const moreFiltersBtn = document.getElementById('moreFiltersBtn');
  if (moreFiltersBtn) moreFiltersBtn.style.display = 'none';
  // 历史 tab 不需要视图切换器（只有列表）
  const viewToggle = document.getElementById('viewToggle');
  if (viewToggle) viewToggle.style.display = 'none';
  // 也不需要加 PO 按钮
  const addPoBtn = document.getElementById('addPoBtnTop');
  if (addPoBtn) addPoBtn.style.display = 'none';

  // 已完成（船版批准）+ 未采用
  let allArchived = state.styles.filter(s => {
    if (s.archived) return true;
    const status = getStyleStatus(s);
    return status.stage === 'DONE';
  });

  // 应用客户筛选 + 搜索
  if (state.filterClient !== 'all') {
    allArchived = allArchived.filter(s => s.client === state.filterClient);
  }
  if (state.search) {
    const q = state.search.toLowerCase();
    allArchived = allArchived.filter(s => {
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q));
      return matchesBasic || matchesPO;
    });
  }

  const completedStyles = allArchived.filter(s => !s.archived);
  const archivedStyles = allArchived.filter(s => s.archived);

  // 按 ex-factory 或归档日期降序
  completedStyles.sort((a, b) => {
    const efA = getPOInfo(a).exFactory || '';
    const efB = getPOInfo(b).exFactory || '';
    return efB.localeCompare(efA);
  });
  archivedStyles.sort((a, b) => (b.archivedDate || '').localeCompare(a.archivedDate || ''));

  const main = document.getElementById('main');
  if (allArchived.length === 0) {
    main.innerHTML = `<div class="empty"><h3>历史档案为空</h3><p>已完成（船版批准）和未采用的款式都会出现在这里。</p></div>`;
    return;
  }

  // 按时间分组
  const groupByTime = (styles, type) => {
    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
    const lastMonthD = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lastMonth = `${lastMonthD.getFullYear()}-${String(lastMonthD.getMonth() + 1).padStart(2, '0')}`;

    const groups = { thisMonth: [], lastMonth: [], earlier: [] };
    styles.forEach(s => {
      // 完成日期：done 类型用最后一个 cycle 的 feedbackDate；archived 类型用 archivedDate
      let dateStr;
      if (type === 'done') {
        // 找最后一个有 feedbackDate 的 cycle
        for (let i = s.cycles.length - 1; i >= 0; i--) {
          if (s.cycles[i].feedbackDate) { dateStr = s.cycles[i].feedbackDate; break; }
        }
      } else {
        dateStr = s.archivedDate;
      }
      if (!dateStr) {
        groups.earlier.push(s);
        return;
      }
      const yearMonth = dateStr.slice(0, 7);  // "2026-04"
      if (yearMonth === thisMonth) groups.thisMonth.push(s);
      else if (yearMonth === lastMonth) groups.lastMonth.push(s);
      else groups.earlier.push(s);
    });
    return groups;
  };

  const renderTimeGroup = (label, list, type) => {
    if (list.length === 0) return '';
    return `
      <div class="time-group">
        <div class="time-group-header">
          <span class="time-group-label">${escapeHtml(label)}</span>
          <span class="time-group-count">${list.length}</span>
        </div>
        ${list.map(s => renderArchiveRow(s, type)).join('')}
      </div>
    `;
  };

  const archiveSection = (key, title, styles, type) => {
    if (styles.length === 0) return '';
    const collapsed = state.collapsedSections[key];
    const groups = groupByTime(styles, type);
    return `

            ${renderTimeGroup('更早', groups.earlier, type)}
          </div>
        </div>
      </div>
    `;
  };

  let html = '<div class="archive-page">';

  html += archiveSection('archive_unused', '未采用', archivedStyles, 'archived');
  html += '</div>';
  main.innerHTML = html;
}

function renderArchiveRow(s, type) {
  const thumb = s.imageUrl
    ? `<img class="thumb thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeHtml(s.imageUrl).replace(/'/g, "\\'")}')" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  // 计算总耗时（开版日期 → 完成/归档日期）
  const earliest = getEarliestOpenDate(s);
  let endDate = null;

    for (let i = s.cycles.length - 1; i >= 0; i--) {
      if (s.cycles[i].feedbackDate) { endDate = s.cycles[i].feedbackDate; break; }
    }
  } else {
    endDate = s.archivedDate;
  }
  let durationText = '';
  if (earliest && endDate) {
    const diff = daysBetween(earliest, endDate);
    if (diff !== null && diff >= 0) durationText = `耗时 ${diff} 天`;

      ? (reasonMap[s.archiveReason] || '未采用')

    // 如果原因就是"未采用"，不重复显示
    const showReason = (reasonText !== '未采用');
    info = `
      <div class="node-block">
        <div class="node-block-row1">
          <span class="stage-tag archived">未采用</span>
          ${showReason ? `<span class="node-name" style="color:var(--ink-soft);">${escapeHtml(reasonText)}</span>` : ''}
        </div>

          ${earliest ? `<span class="node-since">开发于 ${escapeHtml(formatDate(earliest))}</span>` : ''}
          ${s.archivedDate ? `<span class="node-since">· 归档于 ${escapeHtml(formatDate(s.archivedDate))}</span>` : ''}

      </div>

  }

  // 已批船版的不显示恢复按钮（恢复到哪？没语义），只对"未采用"显示
  const restoreBtn = (type === 'archived')
    ? `<button class="archive-restore-btn" onclick="event.stopPropagation(); restoreArchivedStyle('${s.id}')" title="恢复到开发追踪">
         <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-15-6.7L3 13"/>
         </svg>
         恢复
       </button>`
    : '';

  // 完全删除按钮（仅未采用类型）
  const deleteBtn = (type === 'archived')
    ? `<button class="archive-delete-btn" onclick="event.stopPropagation(); permanentlyDeleteStyle('${s.id}')" title="永久删除">

         </svg>

    : '';

  // 仅未采用类型才在批量模式下可选（已完成订单不能"恢复"）
  const allowBatch = (type === 'archived');
  const checked = allowBatch && state.batchSelected && state.batchSelected[s.id] ? 'checked' : '';
  const batchCls = allowBatch && state.batchSelected && state.batchSelected[s.id] ? 'batch-selected' : '';

// 恢复"未采用"款式 → 回到开发追踪
async function restoreArchivedStyle(styleId) {

// 永久删除款式（不可恢复）
async function permanentlyDeleteStyle(styleId) {
  if (!await showDialog({
    title: "永久删除",
    message: "确认要永久删除这个款式吗？删除后无法恢复！",
    confirmText: "永久删除",
    danger: true
  })) return;

  try {
    // 从 Supabase 先删关联数据
    await _supabase.from("cycle_photos").delete().in("cycle_id",
      (await _supabase.from("cycles").select("id").eq("style_id", styleId)).data?.map(c => c.id) || []);
    await _supabase.from("cycles").delete().eq("style_id", styleId);
    await _supabase.from("pos").delete().eq("style_id", styleId);
    await _supabase.from("styles").delete().eq("id", styleId);

    // 从本地删除
    state.styles = state.styles.filter(x => x.id !== styleId);
    saveToLocalCache(state.styles);
    render();
    showToast("已永久删除", "ok");
  } catch(e) {
    console.error("删除失败", e);
    showToast("删除失败: " + e.message, "warn");
  }
}

// 批量永久删除
async function batchPermanentDelete() {
  const ids = Object.keys(state.batchSelected || {}).filter(k => state.batchSelected[k]);
  if (ids.length === 0) {
    showToast('没有选中的款式', 'warn');
    return;
  }

  if (!await showDialog({
    title: '批量永久删除',
    message: `确认要永久删除选中的 ${ids.length} 个款式吗？删除后无法恢复！`,
    confirmText: '永久删除',
    danger: true
  })) return;

  // 从本地删除
  state.styles = state.styles.filter(s => !ids.includes(s.id));
  saveToLocalCache(state.styles);

  // 从 Supabase 删除
  for (const id of ids) {
    await _supabase.from('styles').delete().eq('id', id);
  }

  clearBatchSelection();
  render();
  showToast(`已永久删除 ${ids.length} 个款式`, 'ok');
}
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const ok = await showDialog({
    title: '恢复到开发追踪',
    message: `将"${s.sku}"从历史档案恢复到开发追踪。后续可继续跟进。`,
    confirmText: '恢复'
  });
  if (!ok) return;

  s.archived = false;
  delete s.archivedDate;
  delete s.archiveReason;
  delete s.archiveNote;
  // 也清掉最后一个周期的 ARCHIVED 反馈（如果有）
  if (s.cycles && s.cycles.length > 0) {
    const lastCycle = s.cycles[s.cycles.length - 1];
    if (lastCycle.feedbackOutcome === 'ARCHIVED') {
      delete lastCycle.feedbackDate;
      delete lastCycle.feedbackOutcome;
    }
  }
  saveState();
  render();
  showToast(`已恢复 ${s.sku}`, 'ok');
}

function updateTabCounts() {

  }).length;

function searchRelevance(s, q) {
  if (!q) return 0;
  const sku = s.sku.toLowerCase();
  const name = s.name.toLowerCase();
  if (sku === q) return 1000;       // 款号完全等于
  if (sku.startsWith(q)) return 500; // 款号开头
  if (sku.includes(q)) return 300;   // 款号包含
  if (name.toLowerCase().includes(q)) return 100;  // 款名包含
  const inPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q));
  if (inPO) return 50;
  return 0;
}

function filterStyles() {
  return state.styles.filter(s => {
    const status = getStyleStatus(s);
    // 已完成 / 未采用都进历史档案 tab，开发追踪里默认不显示
    if (status.stage === 'DONE' || status.isArchived) return false;

    if (state.filterPO === 'awaiting') {
      if (!status.awaitingClient) return false;
    } else if (state.filterPO === 'all') {
      if (!state.showPoInDev && hasPO(s)) return false;
    }
    if (state.filterUrgency === 'danger' && status.level !== 'danger') return false;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return false;
    if (state.filterDevDate) {
      const earliest = getEarliestOpenDate(s);
      if (earliest !== state.filterDevDate) return false;
    }
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q) || (p.clientStyleNo && p.clientStyleNo.toLowerCase().includes(q)) || (p.color && p.color.toLowerCase().includes(q)));
      if (!matchesBasic && !matchesPO) return false;
    }
    return true;
  }).sort((a, b) => {
    // 搜索时按相关度排序
    if (state.search) {
      const q = state.search.toLowerCase();
      const rA = searchRelevance(a, q);
      const rB = searchRelevance(b, q);
      if (rA !== rB) return rB - rA;
    }
    return sortStyles(a, b);
  });
}

// 通用排序：按 state.sortBy 决定
function sortStyles(a, b) {
  const sortBy = state.sortBy || 'createdAt_desc';
  if (sortBy === 'createdAt_desc') {
    // 时间倒序（最新在最上）
    return (b.createdAt || '').localeCompare(a.createdAt || '');
  }
  if (sortBy === 'createdAt_asc') {
    return (a.createdAt || '').localeCompare(b.createdAt || '');
  }
  if (sortBy === 'sku_asc') {
    return (a.sku || '').localeCompare(b.sku || '');
  }
  if (sortBy === 'sku_desc') {
    return (b.sku || '').localeCompare(a.sku || '');
  }
  if (sortBy === 'urgency') {
    const sa = getStyleStatus(a), sb = getStyleStatus(b);
    const rank = { danger: 0, warn: 1, ok: 2, done: 3, archived: 4 };
    if (rank[sa.level] !== rank[sb.level]) return rank[sa.level] - rank[sb.level];
    return (sb.days || 0) - (sa.days || 0);
  }
  return 0;
}

// 切换排序

// 列头点击循环切换排序
function cycleSortBy(field) {
  const cur = state.sortBy || 'createdAt_desc';
  if (field === 'sku') {
    if (cur === 'sku_asc') state.sortBy = 'sku_desc';
    else state.sortBy = 'sku_asc';
  } else if (field === 'time') {
    if (cur === 'createdAt_desc') state.sortBy = 'createdAt_asc';
    else if (cur === 'createdAt_asc') state.sortBy = 'urgency';
    else state.sortBy = 'createdAt_desc';
  }
  render();
}

function setSortBy(key) {
  state.sortBy = key;
  render();
}

function filterStylesForBoard() {
  return state.styles.filter(s => {
    if (s.archived) return false;
    const status = getStyleStatus(s);
    if (status.stage === 'DONE') return false;
    if (!state.showPoInDev && hasPO(s)) return false;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q) || (p.clientStyleNo && p.clientStyleNo.toLowerCase().includes(q)) || (p.color && p.color.toLowerCase().includes(q)));
      if (!matchesBasic && !matchesPO) return false;
    }
    return true;
  });
}

function renderStageBar(style) {

function getStagePillClass(stage) {
  if (stage === 'DEV') return 'pill-dev';
  if (stage === 'AWAIT_FIT') return 'pill-await-fit';
  if (stage === 'REVISE' || stage === 'PHOTO') return 'pill-revise';
  if (stage === 'PROD') return 'pill-prod';
  if (stage === 'DONE') return 'pill-done';

// 平铺/网格视图：开发追踪按阶段分组（每组里平铺卡片），其他场景不分组
function renderGrid(styles) {
  state._currentListStyles = styles;
  const isDevTab = state.topTab === 'dev';

  // 不是开发追踪 tab，直接平铺不分组
  if (!isDevTab) {
    return `<div class="style-grid">${styles.map((s, idx) => renderGridCard(s, idx)).join('')}</div>`;
  }

  // 开发追踪：按阶段分组，每组里平铺
  const groups = {
    DEV: { label: '开发版', items: [] },
    AWAIT_FIT: { label: '等 fit comment', items: [] },
    REVISE: { label: '修改循环', items: [] },
    PROD: { label: '船版', items: [] }
  };
  styles.forEach(s => {
    const status = getStyleStatus(s);
    if (status.stage === 'DEV') groups.DEV.items.push(s);
    else if (status.stage === 'REVISE' || status.stage === 'PHOTO') groups.REVISE.items.push(s);
    else if (status.stage === 'AWAIT_FIT') groups.AWAIT_FIT.items.push(s);
    else if (status.stage === 'PROD') groups.PROD.items.push(s);
  });

  const stageColorCls = {
    DEV: 'dev', REVISE: 'revise', AWAIT_FIT: 'await-fit', PROD: 'prod'
  };

  // 每组内排序（沿用 sortStyles 全局排序）
  Object.values(groups).forEach(g => {
    g.items.sort(sortStyles);
  });

  let idx = 0;
  let html = '<div class="grid-wrapper">';

  ['DEV', 'AWAIT_FIT', 'REVISE', 'PROD'].forEach(stageKey => {
    const g = groups[stageKey];
    if (g.items.length === 0) return;

    const sectionKey = `dev_grid_${stageKey}`;
    const collapsed = state.collapsedSections[sectionKey];

    html += `
      <div class="grid-stage-section ${collapsed ? 'collapsed' : ''}">
        <div class="grid-stage-header collapsible-header" onclick="toggleSection('${sectionKey}')">
          <span class="section-chevron">▼</span>
          <span class="stage-tag ${stageColorCls[stageKey]}">${escapeHtml(g.label)}</span>
          <span class="grid-stage-count">${g.items.length} 个款</span>
        </div>
        <div class="section-content">
          <div class="style-grid">
            ${g.items.map(s => { const i = idx++; return renderGridCard(s, i); }).join('')}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  return html;
}

function renderGridCard(s, idx) {

    : `<div class="grid-card-img-placeholder">NO IMG</div>`;

  let nodeNameCls = '';
  if (status.level === 'danger') nodeNameCls = 'danger';
  else if (status.level === 'warn') nodeNameCls = 'warn';

  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageTagCls = 'revise';

  else if (status.stage === 'DONE') stageTagCls = 'done';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '已完成';
  else nodeText = `${status.currentNodeLabel} · 已 ${status.days} 天`;

  const checked = state.batchSelected && state.batchSelected[s.id] ? 'checked' : '';
  const batchCls = state.batchSelected && state.batchSelected[s.id] ? 'batch-selected' : '';

function renderListByStage(styles) {
  // 按阶段分组
  const groups = {
    DEV: { label: '开发版', items: [] },
    REVISE: { label: '修改循环', items: [] },  // REVISE + PHOTO
    AWAIT_FIT: { label: '等 fit comment', items: [] },
    PROD: { label: '船版', items: [] }
  };

  styles.forEach(s => {
    const status = getStyleStatus(s);
    if (status.stage === 'DEV') groups.DEV.items.push(s);
    else if (status.stage === 'REVISE' || status.stage === 'PHOTO') groups.REVISE.items.push(s);
    else if (status.stage === 'AWAIT_FIT') groups.AWAIT_FIT.items.push(s);
    else if (status.stage === 'PROD') groups.PROD.items.push(s);
  });

  const stageColorCls = {
    DEV: 'stage-bg-dev',
    REVISE: 'stage-bg-revise',
    AWAIT_FIT: 'stage-bg-await-fit',
    PROD: 'stage-bg-prod'
  };

  // 对每组排序
  Object.values(groups).forEach(g => {
    g.items.sort((a, b) => {
      const sa = getStyleStatus(a), sb = getStyleStatus(b);
      const rank = { danger: 0, warn: 1, ok: 2, done: 3, archived: 4 };
      if (rank[sa.level] !== rank[sb.level]) return rank[sa.level] - rank[sb.level];
      return (sb.days || 0) - (sa.days || 0);
    });
  });

  let idx = 0;
  let html = '<div class="dev-list-grouped">';

  ['DEV', 'AWAIT_FIT', 'REVISE', 'PROD'].forEach(stageKey => {
    const g = groups[stageKey];
    if (g.items.length === 0) return;

    const sectionKey = `dev_${stageKey}`;
    const collapsed = state.collapsedSections[sectionKey];

    html += `
      <div class="dev-stage-section ${collapsed ? 'collapsed' : ''}">
        <div class="dev-stage-header collapsible-header" onclick="toggleSection('${sectionKey}')">
          <span class="section-chevron">▼</span>
          <span class="stage-tag ${stageColorCls[stageKey].replace('stage-bg-', '')}">${escapeHtml(g.label)}</span>
          <span class="dev-stage-count">${g.items.length} 个款</span>
        </div>
        <div class="section-content">
          <div class="style-list">
            <div class="list-header simplified">
              <div></div>
              <div class="sortable ${state.sortBy && state.sortBy.startsWith('sku') ? 'active' : ''}" onclick="event.stopPropagation(); cycleSortBy('sku')">款号 <span class="sort-arrow">${state.sortBy === 'sku_asc' ? '↑' : state.sortBy === 'sku_desc' ? '↓' : '⇅'}</span></div>
              <div>客户</div>
              <div>款名</div>
              <div class="sortable ${state.sortBy && (state.sortBy.startsWith('createdAt') || state.sortBy === 'urgency') ? 'active' : ''}" onclick="event.stopPropagation(); cycleSortBy('time')">当前进度 <span class="sort-arrow">${state.sortBy === 'createdAt_desc' ? '↓ 最新' : state.sortBy === 'createdAt_asc' ? '↑ 最早' : state.sortBy === 'urgency' ? '紧迫' : '⇅'}</span></div>
              <div></div>
            </div>
            ${g.items.map(s => {
              const rowIdx = idx++;
              return renderSingleStyleRow(s, rowIdx);
            }).join('')}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  return html;
}

function renderSingleStyleRow(s, idx) {
  const status = getStyleStatus(s);
  const urgentClass = status.level === 'danger' ? 'urgent-danger' : status.level === 'warn' ? 'urgent-warn' : '';
  const recentClass = isRecentlyUpdated(s) ? 'recently-updated' : '';
  const selectedClass = state.keyboardSelectedIdx === idx ? 'keyboard-selected' : '';
  const thumb = s.imageUrl
    ? `<img class="thumb thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeHtml(s.imageUrl).replace(/'/g, "\\'")}')" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  let nodeNameCls = '';
  if (status.level === 'danger') nodeNameCls = 'danger';
  else if (status.level === 'warn') nodeNameCls = 'warn';
  else if (status.stage === 'DONE') nodeNameCls = 'done';

  let stageTagCls = 'dev';
  if (status.stage === 'AWAIT_FIT') stageTagCls = 'await-fit';
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageTagCls = 'revise';
  else if (status.stage === 'PROD' || status.stage === 'PROD_SHIPPING') stageTagCls = 'prod';
  else if (status.stage === 'DONE') stageTagCls = 'done';
  else if (status.stage === 'ARCHIVED') stageTagCls = 'archived';

  let timeInfo = '';
  if (status.isArchived) {
    timeInfo = `<span class="node-since">未采用</span>`;
  } else if (status.stage === 'DONE') {
    timeInfo = `<span class="node-since done">已完成</span>`;
  } else if (status.startDate) {
    timeInfo = `<span class="node-since ${status.level === 'danger' ? 'danger' : status.level === 'warn' ? 'warn' : ''}">${escapeHtml(formatDate(status.startDate))} · 已 ${status.days} 天</span>`;
  }

  const checked = state.batchSelected && state.batchSelected[s.id] ? 'checked' : '';
  const batchCls = state.batchSelected && state.batchSelected[s.id] ? 'batch-selected' : '';
  const orderBadge = getOrderTypeBadge(s);
  const urgentBadge = getStyleUrgentBadge(s);
  const orderTypeHtml = orderBadge ? `<span class="order-type-pill ${orderBadge.cls}">${escapeHtml(orderBadge.label)}</span>` : '';
  const specialNoteHtml = renderSpecialNoteTag(s);
  return `
    <div class="style-row simplified stage-bg-${stageTagCls} ${urgentClass} ${recentClass} ${selectedClass} ${batchCls}" data-idx="${idx}" data-style-id="${s.id}" onclick="handleRowClick(event, '${s.id}')">
      <input type="checkbox" class="batch-checkbox row-batch-checkbox" ${checked} onclick="toggleBatchSelection('${s.id}', this.checked); event.stopPropagation();" title="批量选择">
      ${thumb}
      <div class="sku">${escapeHtml(s.sku)}${orderTypeHtml}</div>

      <div>

      <div class="node-block">
        <div class="node-block-row1">
          <span class="stage-tag ${stageTagCls}">${escapeHtml(status.stageLabel)}</span>
          <span class="node-name ${nodeNameCls}">${escapeHtml(status.currentNodeLabel)}</span>
        </div>
        <div class="node-block-row2">${timeInfo}</div>
      </div>
      <div class="arrow">›</div>
    </div>
  `;
}

// 判断款式是否最近被更新过（24 小时内）
function isRecentlyUpdated(s) {
  // 找最近一个事件日期（cycle 的任何字段或 awaitingFit）
  let latestDate = null;
  s.cycles?.forEach(c => {
    [c.openDate, c.receivedDate, c.sentDate, c.feedbackDate].forEach(d => {
      if (d && (!latestDate || d > latestDate)) latestDate = d;
    });
  });
  if (s.awaitingFit?.since && (!latestDate || s.awaitingFit.since > latestDate)) {
    latestDate = s.awaitingFit.since;
  }
  if (!latestDate) return false;
  const days = daysSince(latestDate);
  return days !== null && days <= 1;  // 今天或昨天更新过
}
