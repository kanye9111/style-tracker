/*
========================================================================
 大货跟进（按 PO 展开 + 紧迫度分组）
========================================================================
*/
function renderProductionTab() {
  document.getElementById('controlsBar').style.display = 'flex';
  const _vt = document.getElementById('viewToggle'); if (_vt) _vt.style.display = '';
  document.getElementById('newStyleBtn').style.display = 'none';

  // 看板视图走专门的函数
  if (state.view === 'board') {
    renderProductionBoard();
    return;
  }
  // 平铺：方块网格视图
  if (state.view === 'grid') {
    renderProductionGrid();
    return;
  }

  // 一个款多 PO 时展开成多行
  const rows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      if (!matchesBasic && !matchesPO) return;
    }
    s.pos.forEach(po => {
      // EX 日期筛选
      if (state.filterEFDate && po.exFactory !== state.filterEFDate) return;
      rows.push({ style: s, po });
    });
  });

  const main = document.getElementById('main');
  if (rows.length === 0) {
    if (state.filterEFDate) {
      const d = new Date(state.filterEFDate);
      const md = `${d.getMonth() + 1}/${d.getDate()}`;
      main.innerHTML = `<div class="empty"><h3>${md} 没有 PO</h3><p>没有 ex-factory 日期为 ${escapeHtml(state.filterEFDate)} 的 PO。点击 EX 日期旁的 × 清除筛选。</p></div>`;
    } else {
      main.innerHTML = `<div class="empty"><h3>暂无下了 PO 的款式</h3><p>客户回复时勾选"下了 PO"并填写 ex-factory 日期，款式会自动出现在这里。</p></div>`;
    }
    return;
  }

  // 拆成 3 大组：已过货期 / 按日期归组的进行中 / 已批船版
  const overdueRows = [];
  const activeRows = [];
  const doneRows = [];

  rows.forEach(r => {
    const status = getStyleStatus(r.style);
    if (status.stage === 'DONE') {
      doneRows.push(r);
      return;
    }
    const daysToEF = daysUntil(r.po.exFactory);
    if (daysToEF !== null && daysToEF < 0) overdueRows.push(r);
    else activeRows.push(r);
  });

  // activeRows 按 ex-factory 日期归组
  const dateGroups = {};
  activeRows.forEach(r => {
    const ef = r.po.exFactory || '__no_date__';
    if (!dateGroups[ef]) dateGroups[ef] = [];
    dateGroups[ef].push(r);
  });
  const sortedDates = Object.keys(dateGroups).sort();

  const sortByEF = (a, b) => new Date(a.po.exFactory) - new Date(b.po.exFactory);
  overdueRows.sort(sortByEF);
  doneRows.sort(sortByEF);

  // 中文星期
  const weekdayCN = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

  const renderDateGroup = (date, groupRows) => {
    const daysToEF = daysUntil(date);
    let dateLabel, dateCls;
    if (date === '__no_date__') {
      dateLabel = '未填写货期';
      dateCls = 'no-date';
    } else {
      const d = new Date(date);
      const wd = weekdayCN[d.getDay()];
      const md = `${d.getMonth() + 1}/${d.getDate()}`;
      let countdown;
      if (daysToEF === 0) countdown = '今天';
      else if (daysToEF === 1) countdown = '明天';
      else if (daysToEF > 0) countdown = `还剩 ${daysToEF} 天`;
      dateLabel = `${md} ${wd} · ${countdown}`;
      // 颜色
      if (daysToEF < 14) dateCls = 'date-danger';
      else if (daysToEF < 28) dateCls = 'date-warn';
      else dateCls = 'date-ok';
    }
    const sectionKey = `proddate_${date}`;
    const collapsed = state.collapsedSections[sectionKey];
    return `
      <div class="production-group date-group ${dateCls} ${collapsed ? 'collapsed' : ''}" data-group-date="${escapeHtml(date)}">
        <div class="production-group-header date-group-header collapsible-header" onclick="toggleSection('${sectionKey}')">
          <span class="section-chevron">▼</span>
          <span class="date-main">${escapeHtml(dateLabel)}</span>
          <span class="count">${groupRows.length} 个 PO</span>
          <button class="group-batch-btn" onclick="event.stopPropagation(); toggleGroupBatch('${escapeHtml(date)}')" title="批量操作此日期">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            批量
          </button>
        </div>
        <div class="production-list section-content">
          <div class="production-list-header with-node">
            <div></div>
            <div>款号</div>
            <div>客户</div>
            <div>款名</div>
            <div>PO · 颜色</div>
            <div>货期</div>
            <div>样板进度</div>
            <div></div>
          </div>
          ${groupRows.map(r => renderProductionRow(r.style, r.po)).join('')}
        </div>
      </div>
    `;
  };

  let html = '';

  if (overdueRows.length > 0) {
    const overdueCol = state.collapsedSections['prod_overdue'];
    html += `
      <div class="production-group date-group date-overdue ${overdueCol ? 'collapsed' : ''}">
        <div class="production-group-header date-group-header collapsible-header" onclick="toggleSection('prod_overdue')">
          <span class="section-chevron">▼</span>
          <span class="date-main">🔴 已过货期 · 立刻处理</span>
          <span class="count">${overdueRows.length} 个 PO</span>
        </div>
        <div class="production-list section-content">
          <div class="production-list-header with-node">
            <div></div>
            <div>款号</div>
            <div>客户</div>
            <div>款名</div>
            <div>PO · 颜色</div>
            <div>货期</div>
            <div>样板进度</div>
            <div></div>
          </div>
          ${overdueRows.map(r => renderProductionRow(r.style, r.po)).join('')}
        </div>
      </div>
    `;
  }

  sortedDates.forEach(date => {
    html += renderDateGroup(date, dateGroups[date]);
  });

  if (doneRows.length > 0) {
    const doneCol = state.collapsedSections['prod_done'];
    html += `
      <div class="production-group date-group date-done ${doneCol ? 'collapsed' : ''}">
        <div class="production-group-header date-group-header collapsible-header" onclick="toggleSection('prod_done')">
          <span class="section-chevron">▼</span>
          <span class="date-main">✅ 已批船版 · 等大货完成</span>
          <span class="count">${doneRows.length} 个 PO</span>
        </div>
        <div class="production-list section-content">
          <div class="production-list-header with-node">
            <div></div>
            <div>款号</div>
            <div>客户</div>
            <div>款名</div>
            <div>PO · 颜色</div>
            <div>货期</div>
            <div>样板进度</div>
            <div></div>
          </div>
          ${doneRows.map(r => renderProductionRow(r.style, r.po)).join('')}
        </div>
      </div>
    `;
  }

  main.innerHTML = html;
}



// ============================================================
// 大货跟进 - 平铺方块视图（按日期网格 + 文件夹弹窗）
// ============================================================
function renderProductionGrid() {
  const main = document.getElementById('main');

  // 收集所有 PO 行
  const rows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      if (!matchesBasic && !matchesPO) return;
    }
    s.pos.forEach(po => {
      if (state.filterEFDate && po.exFactory !== state.filterEFDate) return;
      rows.push({ style: s, po });
    });
  });

  if (rows.length === 0) {
    main.innerHTML = '<div class="empty"><h3>暂无下了 PO 的款式</h3><p>右上角点 + 加 PO 来添加</p></div>';
    return;
  }

  // 按日期分组
  const dateGroups = {};
  rows.forEach(r => {
    const ef = r.po.exFactory || '__no_date__';
    if (!dateGroups[ef]) dateGroups[ef] = [];
    dateGroups[ef].push(r);
  });

  // 排序：未填写货期放最后；其他按日期升序
  const sortedDates = Object.keys(dateGroups).sort((a, b) => {
    if (a === '__no_date__') return 1;
    if (b === '__no_date__') return -1;
    return a.localeCompare(b);
  });

  const weekdayCN = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

  // 先把每个日期对应的 tile HTML 生成好
  const tileHTML = {};
  sortedDates.forEach(date => {
    const groupRows = dateGroups[date];
    const daysToEF = daysUntil(date);
    let dateLabel, countdown, urgClass;

    if (date === '__no_date__') {
      dateLabel = '未填写货期'; countdown = ''; urgClass = 'urg-none';
    } else {
      const d = new Date(date);
      dateLabel = weekdayCN[d.getDay()];
      var dayNum = d.getDate();
      var monthNum = d.getMonth() + 1;
      if (daysToEF < 0) {
        const od = -daysToEF; countdown = `已过 ${od} 天`;
        if (od >= 8) urgClass = 'urg-overdue urg-overdue-severe';
        else if (od >= 4) urgClass = 'urg-overdue urg-overdue-heavy';
        else urgClass = 'urg-overdue urg-overdue-mild';
      } else if (daysToEF === 0) { countdown = '今天'; urgClass = 'urg-today'; }
      else if (daysToEF === 1) { countdown = '明天'; urgClass = 'urg-danger'; }
      else if (daysToEF < 14) { countdown = `还剩 ${daysToEF} 天`; urgClass = 'urg-danger'; }
      else if (daysToEF < 28) { countdown = `还剩 ${daysToEF} 天`; urgClass = 'urg-warn'; }
      else { countdown = `还剩 ${daysToEF} 天`; urgClass = 'urg-ok'; }
    }
    const allDone = groupRows.every(r => getStyleStatus(r.style).stage === 'DONE');
    if (allDone) urgClass = 'urg-done';

    const isNoDate = (date === '__no_date__');
    const headerText = isNoDate ? '— · —' : `${monthNum} 月`;
    const bigNumber = isNoDate ? '?' : String(dayNum);
    const weekday = isNoDate ? '未填货期' : dateLabel;

    tileHTML[date] = `
      <div class="prod-tile cal-tile ${urgClass}" data-date="${escapeHtml(date)}" tabindex="0" onclick="openProdDateFolder('${escapeHtml(date)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openProdDateFolder('${escapeHtml(date)}')}">
        <div class="cal-tile-header"><span class="cal-tile-month">${escapeHtml(headerText)}</span>${countdown ? `<span class="cal-tile-countdown">${escapeHtml(countdown)}</span>` : ''}</div>
        <div class="cal-tile-day">${escapeHtml(bigNumber)}</div>
        <div class="cal-tile-weekday">${escapeHtml(weekday)}</div>
        <div class="cal-tile-footer"><span class="cal-tile-po-count"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>${groupRows.length} 个 PO</span></div>
      </div>`;
  });

  // 按月分组
  const monthGroups = {}; // { '2026-05': [date, date, ...], '__no_date__': [...] }
  sortedDates.forEach(date => {
    if (date === '__no_date__') { monthGroups['__no_date__'] = monthGroups['__no_date__'] || []; monthGroups['__no_date__'].push(date); return; }
    const ym = date.slice(0, 7); monthGroups[ym] = monthGroups[ym] || []; monthGroups[ym].push(date);
  });
  const sortedMonths = Object.keys(monthGroups).sort((a, b) => {
    if (a === '__no_date__') return 1; if (b === '__no_date__') return -1;
    return a.localeCompare(b);
  });

  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  let html = '';
  sortedMonths.forEach(ym => {
    const dates = monthGroups[ym];
    const totalPO = dates.reduce((sum, d) => sum + dateGroups[d].length, 0);
    const isThisMonth = (ym === thisMonth);
    const ymLabel = ym === '__no_date__' ? '未填写货期' : `${ym.slice(0,4)}年${parseInt(ym.slice(5))}月`;

    html += `<div class="prod-month-panel ${isThisMonth ? 'open' : ''}">`;
    html += `<div class="prod-month-header" onclick="this.parentElement.classList.toggle('open')">`;
    html += `<span class="prod-month-label">📅 ${escapeHtml(ymLabel)}</span>`;
    html += `<span class="prod-month-count">${totalPO} 个 PO</span>`;
    html += `<span class="prod-month-chevron">▼</span>`;
    html += `</div>`;
    html += `<div class="prod-month-body"><div class="prod-grid-wrapper">`;
    dates.forEach(d => { html += tileHTML[d]; });
    html += `</div></div></div>`;
  });

  main.innerHTML = html;
}

// 打开"日期文件夹"弹窗（图 2 那种）
function openProdDateFolder(date) {
  // 记住当前打开的日期（用于从抽屉返回时恢复）
  state.lastFolderDate = date;

  // 重新收集这一天的 PO（保持和当前筛选一致）
  const rows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      if (!matchesBasic && !matchesPO) return;
    }
    s.pos.forEach(po => {
      const ef = po.exFactory || '__no_date__';
      if (ef !== date) return;
      rows.push({ style: s, po });
    });
  });

  if (rows.length === 0) return;

  const weekdayCN = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  let dateLabel, countdown, dotClass;
  if (date === '__no_date__') {
    dateLabel = '未填写货期';
    countdown = '';
    dotClass = 'dot-none';
  } else {
    const d = new Date(date);
    const wd = weekdayCN[d.getDay()];
    const md = `${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    dateLabel = `${md}  ${wd}`;
    const daysToEF = daysUntil(date);
    if (daysToEF < 0) { countdown = `已过 ${-daysToEF} 天`; dotClass = 'dot-danger'; }
    else if (daysToEF === 0) { countdown = '今天'; dotClass = 'dot-today'; }
    else if (daysToEF === 1) { countdown = '明天'; dotClass = 'dot-danger'; }
    else if (daysToEF < 14) { countdown = `还剩 ${daysToEF} 天`; dotClass = 'dot-danger'; }
    else if (daysToEF < 28) { countdown = `还剩 ${daysToEF} 天`; dotClass = 'dot-warn'; }
    else { countdown = `还剩 ${daysToEF} 天`; dotClass = 'dot-ok'; }
  }

  // 创建弹窗
  let backdrop = document.getElementById('prodFolderBackdrop');
  if (backdrop) backdrop.remove();
  backdrop = document.createElement('div');
  backdrop.id = 'prodFolderBackdrop';
  backdrop.className = 'prod-folder-backdrop';
  backdrop.innerHTML = `
    <div class="prod-folder prod-folder-wide" role="dialog" aria-modal="true">
      <div class="prod-folder-header">
        <div class="prod-folder-title-row">
          <h2 class="prod-folder-date">${escapeHtml(dateLabel)}</h2>
          <button class="prod-folder-close" onclick="closeProdDateFolder()" aria-label="关闭">×</button>
        </div>
        <div class="prod-folder-meta">
          ${countdown ? `<span class="prod-folder-dot ${dotClass}"></span><span class="prod-folder-countdown">${escapeHtml(countdown)}</span><span class="prod-folder-sep">·</span>` : ''}
          <span class="prod-folder-count">${rows.length} 个 PO</span>
        </div>
      </div>
      <div class="prod-folder-grid custom-scroll">
        ${rows.map(r => renderProdFolderCard(r.style, r.po)).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add('open'));

  // 点背景关闭
  backdrop.onclick = (e) => {
    if (e.target === backdrop) closeProdDateFolder();
  };

  // ESC 关闭
  const escHandler = (e) => {
    if (e.key === 'Escape') {
      document.removeEventListener('keydown', escHandler);
      closeProdDateFolder();
    }
  };
  document.addEventListener('keydown', escHandler);
}

function closeProdDateFolder(keepMemory) {
  const backdrop = document.getElementById('prodFolderBackdrop');
  if (!backdrop) return;
  backdrop.classList.remove('open');
  setTimeout(() => backdrop.remove(), 280);
  // 默认清空"打开记忆"，但 keepMemory=true 时保留（用于打开抽屉前临时关闭）
  if (!keepMemory) state.lastFolderDate = null;
}

// 文件夹弹窗里每个 PO 的卡片（横向网格版，4 个一排）
function renderProdFolderCard(s, po) {
  const status = getStyleStatus(s);
  const thumb = s.imageUrl
    ? `<img class="prod-folder-card-thumb" src="${escapeHtml(s.imageUrl)}" alt="">`
    : `<div class="prod-folder-card-thumb prod-folder-card-thumb-empty">NO</div>`;

  let nodeCls = '';
  if (status.level === 'danger') nodeCls = 'danger';
  else if (status.level === 'warn') nodeCls = 'warn';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '船版已批';
  else nodeText = `${status.currentNodeLabel} · ${status.days} 天`;

  // PO 选中态（独立于款式选中）
  const poSel = state.poBatchSelected && state.poBatchSelected[po.id] ? 'checked' : '';
  const poSelCls = state.poBatchSelected && state.poBatchSelected[po.id] ? 'po-selected' : '';

  return `
    <div class="prod-folder-card ${poSelCls}" tabindex="0" data-po-id="${po.id}" data-style-id="${s.id}" onclick="handleFolderCardClick(event, '${s.id}', '${po.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();this.click();}">
      <input type="checkbox" class="batch-checkbox folder-card-checkbox" ${poSel} onclick="togglePoBatchSelection('${po.id}', '${s.id}', this.checked); event.stopPropagation();" title="选择此 PO">
      ${thumb}
      <div class="prod-folder-card-info">
        <div class="prod-folder-card-line1">
          <span class="prod-folder-card-po">${escapeHtml(po.poNumber)}</span>
          ${po.orderType ? `<span class="order-type-pill ${po.orderType === 'repeat' ? 'badge-repeat' : 'badge-first'}">${po.orderType === 'repeat' ? '反单' : '首单'}</span>` : ''}
        </div>
        <div class="prod-folder-card-line2">
          <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
          <span class="prod-folder-card-color">${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity : ''}</span>
        </div>
        <div class="prod-folder-card-line3">${escapeHtml(s.sku)}</div>
        <div class="prod-folder-card-node ${nodeCls}">${escapeHtml(nodeText)}</div>
        ${s.specialNote ? `<div class="prod-folder-card-special">${renderSpecialNoteTag(s)}</div>` : ''}
      </div>
    </div>
  `;
}

// 点击文件夹卡片：批量模式下切换选中，否则打开抽屉
function handleFolderCardClick(e, styleId, poId) {
  if (document.body.classList.contains('batch-mode-locked')) {
    const cur = state.poBatchSelected && state.poBatchSelected[poId];
    togglePoBatchSelection(poId, styleId, !cur);
    return;
  }
  // 打开抽屉前临时关闭弹窗（保留打开记忆，关抽屉后会自动恢复）
  closeProdDateFolder(true);
  openDrawer(styleId);
}

function renderProductionBoard() {
  const main = document.getElementById('main');

  // 收集所有 PO 行（用于月历）
  const allRows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      if (!matchesBasic && !matchesPO) return;
    }
    s.pos.forEach(po => {
      allRows.push({ style: s, po });
    });
  });

  // 按日期建索引：{ 'YYYY-MM-DD': [rows...] }
  const byDate = {};
  allRows.forEach(r => {
    if (!r.po.exFactory) return;
    if (!byDate[r.po.exFactory]) byDate[r.po.exFactory] = [];
    byDate[r.po.exFactory].push(r);
  });

  // 计算月历参数
  const year = state.calendarYear;
  const month = state.calendarMonth;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();  // 0=周日 1=周一 ... 6=周六

  // 生成日期网格（首格从周日开始的网格）
  // 但中国习惯：周一为第一天，所以转换：周日=6
  const startCol = startWeekday === 0 ? 6 : startWeekday - 1;

  // 总共需要的行数
  const totalCells = startCol + daysInMonth;
  const totalRows = Math.ceil(totalCells / 7);

  const today = todayStr();
  const monthName = `${year} 年 ${month + 1} 月`;

  // 该月统计
  const monthPOs = Object.keys(byDate)
    .filter(d => d.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`))
    .reduce((acc, d) => acc + byDate[d].length, 0);
  const monthDays = Object.keys(byDate)
    .filter(d => d.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`)).length;

  // 计算本月忙日（≥3 个 PO 的天）
  const busyDays = [];
  Object.keys(byDate).forEach(dateKey => {
    if (!dateKey.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`)) return;
    const rows = byDate[dateKey];
    if (rows.length >= 3) {
      const daysToEF = daysUntil(dateKey);
      let urgCls = 'ok';
      if (daysToEF < 0) urgCls = 'overdue';
      else if (daysToEF < 14) urgCls = 'danger';
      else if (daysToEF < 28) urgCls = 'warn';
      busyDays.push({ dateKey, count: rows.length, daysToEF, urgCls, rows });
    }
  });
  busyDays.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
  const totalBusyPOs = busyDays.reduce((sum, d) => sum + d.count, 0);

  // 渲染右侧忙日列表
  const renderBusyDayItem = (item) => {
    const d = new Date(item.dateKey);
    const wd = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
    const md = `${d.getMonth() + 1}/${d.getDate()}`;
    let countdown;
    if (item.daysToEF < 0) countdown = `已过 ${-item.daysToEF} 天`;
    else if (item.daysToEF === 0) countdown = '今天';
    else if (item.daysToEF === 1) countdown = '明天';
    else countdown = `还剩 ${item.daysToEF} 天`;

    const isSelected = state.selectedCalendarDate === item.dateKey;

    return `
      <div class="busy-day-item urg-${item.urgCls} ${isSelected ? 'selected' : ''}" onclick="selectCalendarDate('${item.dateKey}')">
        <div class="busy-day-icon"></div>
        <div class="busy-day-info">
          <div class="busy-day-date">
            <span class="busy-day-md">${escapeHtml(md)}</span>
            <span class="busy-day-wd">${escapeHtml(wd)}</span>
          </div>
          <div class="busy-day-meta">
            <span class="busy-day-count">${item.count} 个 PO</span>
            <span class="busy-day-countdown">${escapeHtml(countdown)}</span>
          </div>
        </div>
      </div>
    `;
  };

  let html = `
    <div class="calendar-view">
      <div class="calendar-toolbar">
        <div class="calendar-nav">
          <button class="cal-nav-btn" onclick="prevMonth()" title="上个月">‹</button>
          <button class="cal-today-btn" onclick="goToday()">今天</button>
          <button class="cal-nav-btn" onclick="nextMonth()" title="下个月">›</button>
        </div>
        <h2 class="calendar-title">${escapeHtml(monthName)}</h2>
        <div class="calendar-stats">
          <span class="stat-item"><b>${monthDays}</b> 天有出货</span>
          <span class="stat-item"><b>${monthPOs}</b> 个 PO</span>
        </div>
      </div>

      <div class="calendar-layout">
        <div class="calendar-grid">
        <div class="cal-weekday">周一</div>
        <div class="cal-weekday">周二</div>
        <div class="cal-weekday">周三</div>
        <div class="cal-weekday">周四</div>
        <div class="cal-weekday">周五</div>
        <div class="cal-weekday">周六</div>
        <div class="cal-weekday">周日</div>
  `;

  // 生成日期格子
  for (let i = 0; i < totalRows * 7; i++) {
    const dayNum = i - startCol + 1;
    if (dayNum < 1 || dayNum > daysInMonth) {
      // 空格子
      html += '<div class="cal-cell cal-cell-empty"></div>';
      continue;
    }
    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
    const rows = byDate[dateKey] || [];
    const isToday = dateKey === today;
    const isPast = dateKey < today;
    const isSelected = state.selectedCalendarDate === dateKey;

    let cellCls = 'cal-cell';
    if (isToday) cellCls += ' cal-cell-today';
    if (isPast) cellCls += ' cal-cell-past';
    if (isSelected) cellCls += ' cal-cell-selected';
    if (rows.length > 0) cellCls += ' cal-cell-has-po';

    // 紧迫度（基于离今天天数）
    if (rows.length > 0) {
      const daysToEF = daysUntil(dateKey);
      if (daysToEF < 0) cellCls += ' cal-cell-overdue';
      else if (daysToEF < 14) cellCls += ' cal-cell-danger';
      else if (daysToEF < 28) cellCls += ' cal-cell-warn';
      else cellCls += ' cal-cell-ok';
    }

    // 显示该日的 PO 概览（最多 3 个）
    let poPreview = '';
    if (rows.length > 0) {
      const visibleRows = rows.slice(0, 3);
      poPreview = visibleRows.map(r => {
        const status = getStyleStatus(r.style);
        let stageColor = 'dev';
        if (status.stage === 'AWAIT_FIT') stageColor = 'await-fit';
        else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageColor = 'revise';
        else if (status.stage === 'PROD') stageColor = 'prod';
        else if (status.stage === 'DONE') stageColor = 'done';
        return `<div class="cal-po-chip stage-bg-${stageColor}">
          <span class="cal-po-num">${escapeHtml(r.po.poNumber)}</span>
          ${r.po.color ? `<span class="cal-po-color">${escapeHtml(r.po.color)}</span>` : ''}
        </div>`;
      }).join('');
      if (rows.length > 3) {
        poPreview += `<div class="cal-po-more">+ ${rows.length - 3} 个</div>`;
      }
    }

    html += `
      <div class="${cellCls}" onclick="selectCalendarDate('${dateKey}')">
        <div class="cal-cell-header">
          <span class="cal-day-num">${dayNum}</span>
          ${rows.length > 0 ? `<span class="cal-day-count">${rows.length}</span>` : ''}
        </div>
        ${poPreview ? `<div class="cal-po-list">${poPreview}</div>` : ''}
      </div>
    `;
  }

  html += '</div>';  // 关闭 calendar-grid

  // 右侧栏：选中日期时显示当天详情，否则显示忙日列表
  if (state.selectedCalendarDate && byDate[state.selectedCalendarDate]) {
    const rows = byDate[state.selectedCalendarDate];
    const d = new Date(state.selectedCalendarDate);
    const wd = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
    const md = `${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    const daysToEF = daysUntil(state.selectedCalendarDate);
    let countdownText;
    if (daysToEF === 0) countdownText = '今天';
    else if (daysToEF < 0) countdownText = `已过 ${-daysToEF} 天`;
    else countdownText = `还剩 ${daysToEF} 天`;

    html += `
      <aside class="busy-days-panel cal-detail-aside">
        <div class="cal-detail-aside-header">
          <div class="cal-detail-aside-date">
            <span class="cal-detail-md">${escapeHtml(md)}</span>
            <span class="cal-detail-wd">${escapeHtml(wd)}</span>
          </div>
          <button class="cal-detail-close" onclick="closeCalendarDate()" title="关闭">×</button>
        </div>
        <div class="cal-detail-aside-meta">${escapeHtml(countdownText)} · ${rows.length} 个 PO</div>
        <div class="cal-detail-aside-list">
          ${rows.map(r => renderCalendarDetailItem(r.style, r.po)).join('')}
        </div>
      </aside>
    `;
  } else {
    html += `
      <aside class="busy-days-panel">
        <div class="busy-days-header">
          <h3 class="busy-days-title">本月忙日</h3>
          <span class="busy-days-sub">≥ 3 个 PO 的日子</span>
        </div>
        <div class="busy-days-list">
          ${busyDays.length > 0
            ? busyDays.map(renderBusyDayItem).join('')
            : '<div class="busy-days-empty">本月没有特别忙的日子<br><span>所有日子 PO 都在 3 个以下</span></div>'
          }
        </div>
        <div class="busy-days-footer">
          <div class="footer-stat">
            <span class="footer-label">忙日总计</span>
            <span class="footer-value">${busyDays.length} 天</span>
          </div>
          <div class="footer-stat">
            <span class="footer-label">忙日 PO 数</span>
            <span class="footer-value">${totalBusyPOs}</span>
          </div>
        </div>
      </aside>
    `;
  }

  html += '</div>';  // 关闭 calendar-layout

  // 选中日期：详情已经显示在右侧栏里（替换忙日列表）

  // 已批船版（折叠）+ 已过货期警告（如果有）
  const overdueRows = allRows.filter(r => {
    if (!r.po.exFactory) return false;
    const status = getStyleStatus(r.style);
    if (status.stage === 'DONE') return false;
    return r.po.exFactory < today;
  });
  const doneRows = allRows.filter(r => getStyleStatus(r.style).stage === 'DONE');

  if (overdueRows.length > 0) {
    const overdueCol = state.collapsedSections['cal_overdue'];
    html += `
      <div class="special-section overdue ${overdueCol ? 'collapsed' : ''}" style="margin-top:24px;">
        <div class="month-header collapsible-header" onclick="toggleSection('cal_overdue')">
          <span class="section-chevron">▼</span>
          <div class="month-header-left">
            <div class="month-title">🔴 已过货期 · 立刻处理</div>
            <div class="month-meta">${overdueRows.length} 个 PO</div>
          </div>
        </div>
        <div class="month-content section-content">
          <div class="compact-po-table">
            ${overdueRows.map(r => renderCompactPORow(r.style, r.po)).join('')}
          </div>
        </div>
      </div>
    `;
  }

  if (doneRows.length > 0) {
    const doneCol = state.collapsedSections['cal_done'];
    html += `
      <div class="special-section done ${doneCol ? 'collapsed' : ''}" style="margin-top:14px;">
        <div class="month-header collapsible-header" onclick="toggleSection('cal_done')">
          <span class="section-chevron">▼</span>
          <div class="month-header-left">
            <div class="month-title">✅ 已批船版 · 等大货完成</div>
            <div class="month-meta">${doneRows.length} 个 PO</div>
          </div>
        </div>
        <div class="month-content section-content">
          <div class="compact-po-table">
            ${doneRows.map(r => renderCompactPORow(r.style, r.po)).join('')}
          </div>
        </div>
      </div>
    `;
  }

  html += '</div>';
  main.innerHTML = html;
}

// 月历导航
function prevMonth() {
  state.calendarMonth--;
  if (state.calendarMonth < 0) {
    state.calendarMonth = 11;
    state.calendarYear--;
  }
  state.selectedCalendarDate = null;
  render();
}

function nextMonth() {
  state.calendarMonth++;
  if (state.calendarMonth > 11) {
    state.calendarMonth = 0;
    state.calendarYear++;
  }
  state.selectedCalendarDate = null;
  render();
}

function goToday() {
  const now = new Date();
  state.calendarYear = now.getFullYear();
  state.calendarMonth = now.getMonth();
  state.selectedCalendarDate = null;
  render();
}

function selectCalendarDate(dateKey) {
  // 切换选中状态
  if (state.selectedCalendarDate === dateKey) {
    state.selectedCalendarDate = null;
  } else {
    state.selectedCalendarDate = dateKey;
  }
  render();
  // 滚动到详情面板
  setTimeout(() => {
    const panel = document.querySelector('.cal-detail-panel');
    if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function closeCalendarDate() {
  state.selectedCalendarDate = null;
  render();
}

function renderProductionBoardCard(s, po) {

  // 阶段着色
  let stageTagCls = 'dev';
  if (status.stage === 'AWAIT_FIT') stageTagCls = 'await-fit';
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageTagCls = 'revise';
  else if (status.stage === 'PROD' || status.stage === 'PROD_SHIPPING') stageTagCls = 'prod';
  else if (status.stage === 'DONE') stageTagCls = 'done';

  const thumb = s.imageUrl
    ? `<img class="thumb thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeHtml(s.imageUrl).replace(/'/g, "\\'")}')" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  let nodeInfoCls = '';
  if (status.level === 'danger') nodeInfoCls = 'danger';
  else if (status.level === 'warn') nodeInfoCls = 'warn';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '船版已批';
  else nodeText = `${status.currentNodeLabel} · ${formatDaysText(status.days)}`;

  const stageLabelText = status.stage === 'AWAIT_FIT' ? '等 fit'
                       : status.stage === 'REVISE' ? '修改版'
                       : status.stage === 'PHOTO' ? '拍照版'
                       : status.stage === 'PROD' ? '船版'
                       : status.stage === 'DEV' ? '开发版'
                       : status.stageLabel;

  return `
    <div class="prod-board-card stage-bg-${stageTagCls}" onclick="openDrawer('${s.id}')">
      <span class="prod-board-card-stage-pill stage-tag ${stageTagCls}">${escapeHtml(stageLabelText)}</span>
      <div class="prod-board-card-top">
        ${thumb}
        <div class="prod-board-card-info">
          <div class="prod-board-card-sku">${escapeHtml(s.sku)} · ${s.client}</div>
          <div class="prod-board-card-name">${escapeHtml(s.name)}</div>
        </div>
      </div>
      <div class="prod-board-card-po">
        <span>${escapeHtml(po.poNumber)}</span>
        <span class="po-color"> · ${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity + ' 件' : ''}</span>
      </div>
      <div class="prod-board-card-bottom">
        <span class="node-info ${nodeInfoCls}">${escapeHtml(nodeText)}</span>
      </div>
    </div>

function renderProductionRow(s, po) {
  const status = getStyleStatus(s);
  const daysToEF = daysUntil(po.exFactory);

  const prodCycle = s.cycles.find(c => c.type === 'PROD');
  const hasProdSent = prodCycle && prodCycle.sentDate;
  const hasProdApproved = prodCycle && prodCycle.feedbackOutcome === 'APPROVED';

  let alertLevel = 'ok';
  if (daysToEF < 0) alertLevel = 'danger';
  else if (!hasProdSent && daysToEF < 14) alertLevel = 'danger';
  else if (!hasProdApproved && daysToEF < 28) alertLevel = 'warn';

  const urgentClass = alertLevel === 'danger' ? 'urgent-danger' : alertLevel === 'warn' ? 'urgent-warn' : '';

  const thumb = s.imageUrl
    ? `<img class="thumb thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeHtml(s.imageUrl).replace(/'/g, "\\'")}')" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  let countdownCls, countdownText;
  if (daysToEF < 0) { countdownCls = 'urgent-overdue'; countdownText = `已过期 ${-daysToEF} 天`; }
  else if (daysToEF < 14) { countdownCls = 'urgent-danger'; countdownText = `还剩 ${daysToEF} 天`; }
  else if (daysToEF < 28) { countdownCls = 'urgent-warn'; countdownText = `还剩 ${daysToEF} 天`; }
  else { countdownCls = 'urgent-ok'; countdownText = `还剩 ${daysToEF} 天`; }

  let nodeNameCls = '';
  if (status.level === 'danger') nodeNameCls = 'danger';
  else if (status.level === 'warn') nodeNameCls = 'warn';

  let nodeDisplay;
  if (status.stage === 'DONE') {
    nodeDisplay = `<div class="node-name" style="color:var(--ok);">✓ 大货已到仓</div>`;
  } else if (status.stage === 'PROD_SHIPPING') {
    const dLeft = daysToEF;
    const efCls = dLeft <= 0 ? 'danger' : dLeft <= 7 ? 'danger' : dLeft <= 14 ? 'warn' : '';
    nodeDisplay = `<div class="node-name ${efCls}">船版已批 · 等大货</div>`;
  } else {
    const startInfo = status.startDate ? ` · 起 ${formatDate(status.startDate)}` : '';
    nodeDisplay = `
      <div class="node-name ${nodeNameCls}">${escapeHtml(status.currentNodeLabel)} · ${formatDaysText(status.days)}</div>
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--ink-mute);">${escapeHtml(status.stageLabel)}${startInfo}</div>
    `;
  }

  // 阶段着色 class
  let stageTagCls = 'dev';
  if (status.stage === 'AWAIT_FIT') stageTagCls = 'await-fit';
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageTagCls = 'revise';
  else if (status.stage === 'PROD' || status.stage === 'PROD_SHIPPING') stageTagCls = 'prod';
  else if (status.stage === 'DONE') stageTagCls = 'done';

  const poSel = state.poBatchSelected && state.poBatchSelected[po.id] ? 'checked' : '';
  const poSelCls = state.poBatchSelected && state.poBatchSelected[po.id] ? 'po-selected' : '';
  return `
    <div class="production-row with-node stage-bg-${stageTagCls} ${urgentClass} ${poSelCls}" data-po-id="${po.id}" data-style-id="${s.id}" onclick="handleProdRowClick(event, '${s.id}', '${po.id}')">
      <input type="checkbox" class="batch-checkbox prod-row-checkbox" ${poSel} onclick="togglePoBatchSelection('${po.id}', '${s.id}', this.checked); event.stopPropagation();" title="选择此 PO">
      ${thumb}
      <div class="sku">${escapeHtml(s.sku)}</div>
      <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
      <div>
        <div class="style-name">${escapeHtml(s.name)}</div>
        <div class="style-subinfo">${escapeHtml(s.owner || '')}</div>
      </div>
      <div class="po-cell">
        <div class="po-num">${escapeHtml(po.poNumber)}</div>
        ${po.clientStyleNo ? `<div class="client-style-no">客户款号：${escapeHtml(po.clientStyleNo)}</div>` : ''}
        <div class="po-qty">${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity + ' 件' : ''}</div>
      </div>
      <div class="exfactory-cell">
        <div class="exfactory-date">EX ${escapeHtml(formatDate(po.exFactory))}</div>
        <div class="exfactory-countdown ${countdownCls}">${countdownText}</div>
      </div>
      <div class="production-current-node">
        ${nodeDisplay}
      </div>
      <div class="arrow">›</div>
    </div>
  `;
}

/*
========================================================================
 详情抽屉
========================================================================
*/
function openDrawer(id) {
  state.selectedId = id;
  state._scrollY = window.scrollY;  // 记住滚动位置
  const s = state.styles.find(x => x.id === id);
  if (!s) return;
  const status = getStyleStatus(s);
  const lastCycle = s.cycles?.[s.cycles.length - 1];

  // 主操作按钮
  let actions = '';
  if (s.archived) {
    actions = `<button onclick="undoArchive('${s.id}')">取消归档</button>`;
  } else if (status.currentNode === 'PATTERN_MAKING') {
    actions = `<button class="primary" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'received')">登记 · 收到样板</button>`;
  } else if (status.currentNode === 'AWAIT_SEND') {
    const lbl = lastCycle.type === 'PHOTO' ? '拍照发图审' : '寄出客户';
    actions = `<button class="primary" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'sent')">登记 · ${lbl}</button>`;
  } else if (status.currentNode === 'AWAIT_FB') {
    if (lastCycle.type === 'PHOTO') actions = `<button class="primary" onclick="openFeedbackModal('${s.id}', '${lastCycle.id}')">登记 · 图审结果</button>`;
    else if (lastCycle.type === 'PROD') actions = `<button class="primary" onclick="openFeedbackModal('${s.id}', '${lastCycle.id}')">登记 · 船版审批</button>`;
    else actions = `<button class="primary" onclick="openFeedbackModal('${s.id}', '${lastCycle.id}')">登记 · 客户评语</button>`;
  } else if (status.currentNode === 'AWAIT_FIT') {
    actions = `<button class="primary" onclick="openFitReceivedModal('${s.id}')">登记 · 收到 fit comment</button>`;
  } else if (status.currentNode === 'PROD_SHIPPING') {
    actions = `<button class="primary" onclick="openProdReceivedModal('${s.id}')">📦 登记 · 大货已到仓</button>`;
  } else if (status.currentNode === 'DONE') {
    actions = `<span style="font-family:var(--font-mono);font-size:12px;color:var(--ok);padding:9px 14px;">✓ 大货已到仓 · 流程完结</span>`;
  }

  // "我已催过"按钮（仅在等客户/等板房时显示）
  if (status.awaitingClient || status.currentNode === 'PATTERN_MAKING') {
    actions += ` <button onclick="markFollowUp('${s.id}')">✎ 我已催过</button>`;
  }
  actions += ` <button class="danger" onclick="deleteStyle('${s.id}')">删除款式</button>`;

  // 该催谁提示
  const followUpWho = whoToFollowUp(status.currentNode, status.cycleType);
  let followUpHint = '';
  if (followUpWho && !s.archived && status.stage !== 'DONE') {
    followUpHint = `
      <div class="follow-up-hint lvl-${status.level}">
        <span class="lbl">该催谁</span>
        <span class="val">${escapeHtml(followUpWho)}</span>
      </div>
    `;
  }

  // Snooze 提示
  let snoozeHint = '';
  const today = todayStr();
  if (s.snoozedUntil && s.snoozedUntil >= today) {
    const daysLeft = daysBetween(today, s.snoozedUntil) + 1;
    snoozeHint = `
      <div class="snooze-hint">
        <span class="snooze-icon">💤</span>
        <span>已暂时从「今日跟进」隐藏，<b>${daysLeft} 天后</b>（${escapeHtml(s.snoozedUntil)}）自动重新出现</span>
        <button onclick="unsnooze('${s.id}')">立即恢复</button>
      </div>
    `;
  }

  // PO 列表卡片
  let poCard = '';
  if (hasPO(s)) {
    const earliestEF = s.pos.reduce((min, p) => {
      if (!p.exFactory) return min;
      if (!min) return p.exFactory;
      return new Date(p.exFactory) < new Date(min) ? p.exFactory : min;
    }, null);
    const daysToEF = daysUntil(earliestEF);
    let countdownColor = 'var(--ok)';
    if (daysToEF < 14 || daysToEF < 0) countdownColor = 'var(--danger)';
    else if (daysToEF < 28) countdownColor = 'var(--warn)';

    poCard = `
      <div class="po-card">
        <div class="po-card-header">
          <span class="lbl-section">PO 信息（${s.pos.length} 个颜色）</span>
          <button class="po-add-btn" onclick="openAddPOModal('${s.id}')">+ 加 PO</button>
        </div>
        <div class="po-list">
          ${s.pos.map(po => {
            const efDays = po.exFactory ? daysUntil(po.exFactory) : null;
            const isOverdue = (efDays !== null && efDays < 0);
            const overdueClass = isOverdue ? (
              -efDays >= 8 ? 'po-overdue-severe' :
              -efDays >= 4 ? 'po-overdue-heavy' : 'po-overdue-mild'
            ) : '';
            // 延期历史
            const hasDelayHistory = po.delayHistory && po.delayHistory.length > 0;
            return `
            <div class="po-item ${overdueClass}" ondblclick="openEditPOModal('${s.id}', '${po.id}')">
              <div class="po-item-main">
                <span class="po-item-num">${escapeHtml(po.poNumber)}</span>
                <span class="po-item-color">${escapeHtml(po.color || '—')}</span>
                ${po.quantity ? `<span class="po-item-qty">${po.quantity} 件</span>` : ''}
                ${po.orderType ? `<span class="order-type-badge order-type-${po.orderType}">${po.orderType === 'repeat' ? '反单' : '新单'}</span>` : ''}
              </div>
              ${po.clientStyleNo ? `<div class="po-item-client-no">客户款号：${escapeHtml(po.clientStyleNo)}</div>` : ''}
              <div class="po-item-ef-row">
                <div class="po-item-ef">
                  ${po.originalExFactory && po.originalExFactory !== po.exFactory
                    ? `<span class="po-original-ef">原 ${escapeHtml(po.originalExFactory)}</span> <span class="po-arrow">→</span> `
                    : ''}EX ${escapeHtml(po.exFactory || '—')}
                  ${isOverdue ? `<span class="po-overdue-tag">已过 ${-efDays} 天</span>` : ''}
                </div>
                ${isOverdue ? `<button class="po-extend-btn" onclick="event.stopPropagation(); openExtendDateDialog('${s.id}', '${po.id}')" title="登记延期">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 8v4l2 2"/><circle cx="12" cy="12" r="9"/>
                  </svg>
                  延期处理
                </button>` : ''}
              </div>
              ${hasDelayHistory ? `<div class="po-delay-history">
                ${po.delayHistory.map(d => `<div class="po-delay-entry">
                  <span class="delay-arrow">→</span>
                  ${escapeHtml(d.from)} → ${escapeHtml(d.to)}
                  <span class="delay-reason">· ${escapeHtml(d.reasonLabel || d.reason || '')}</span>
                  ${d.note ? `<span class="delay-note" title="${escapeHtml(d.note)}">· ${escapeHtml(d.note.length > 18 ? d.note.slice(0, 18) + '…' : d.note)}</span>` : ''}
                </div>`).join('')}
              </div>` : ''}
            </div>
          `;}).join('')}
        </div>
        <div class="po-card-footer">
          <span style="font-family:var(--font-mono);font-size:10px;color:var(--ink-mute);">最近货期</span>
          <span style="font-family:var(--font-mono);font-size:13px;font-weight:500;">
            EX ${escapeHtml(earliestEF)} <span style="color:${countdownColor};">· ${daysToEF < 0 ? '已过 ' + (-daysToEF) + ' 天' : '还剩 ' + daysToEF + ' 天'}</span>
          </span>
        </div>
      </div>
    `;
  }

  // 抽屉色条 class
  let drawerStageCls = 'dev';
  if (status.stage === 'AWAIT_FIT') drawerStageCls = 'await-fit';
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') drawerStageCls = 'revise';
  else if (status.stage === 'PROD') drawerStageCls = 'prod';

function renderBigFlow(style) {
  const nodes = buildFullFlow(style);
  if (nodes.length === 0) return '<div style="padding:20px;color:var(--ink-mute);">暂无流程数据</div>';
  let html = '<div class="big-flow">';
  nodes.forEach((n, i) => {
    let dotCls = 'big-flow-dot';
    let labelCls = 'big-flow-label-top';
    let dateCls = 'big-flow-date';
    if (n.status === 'done') { dotCls += ' done'; labelCls += ' done'; }
    if (n.status === 'current') {
      dotCls += ' current';
      labelCls += ' current';
      if (n.level === 'final-approved') dotCls += ' final-approved';
      else if (n.level === 'archived') dotCls += ' done';
      else if (n.level) {
        dotCls += ' current-' + n.level;
        dateCls += ' current-' + n.level;
      }
    }
    let dateStr = '';
    if (n.date) dateStr = formatDate(n.date);
    else if (n.daysText) dateStr = n.daysText;

    // 留底照片（支持多张横排缩略图，点击可翻看）
    const photos = n.photos || [];
    const photosJSON = photos.length > 0 ? JSON.stringify(photos).replace(/"/g, '&quot;') : '[]';
    const photoBadge = photos.length > 0
      ? `<div class="big-flow-photos-strip">${photos.map((src, pi) => `<button class="big-flow-photo" onclick="openImageViewer(${photosJSON}, ${pi}); event.stopPropagation();" title="照片${pi+1}/${photos.length}"><img src="${escapeHtml(src)}" alt="照片${pi+1}"></button>`).join('')}<span class="big-flow-photo-count">${photos.length}张</span></div>`
      : '';
    // 快递单号 + 预计到达 + FedEx + 签收
    const trackBadge = n.tracking
      ? `<div class="big-flow-tracking-wrap">
          <button class="big-flow-tracking" onclick="copyTrackingNo('${escapeHtml(n.tracking)}'); event.stopPropagation();" title="点击复制单号">✈ ${escapeHtml(n.tracking.length > 12 ? n.tracking.slice(0, 12) + '…' : n.tracking)}</button>
          <button class="big-flow-fedex-btn" onclick="openFedExTracking('${escapeHtml(n.tracking)}'); event.stopPropagation();" title="FedEx 查件">📦</button>
          ${n.actualArrival ? `<span class="big-flow-arrival delivered" title="已签收">✅ ${formatDate(n.actualArrival)}</span>`
            : n.estArrival ? `<span class="big-flow-arrival" title="预计${formatDate(n.estArrival)}到达·点击修改" onclick="quickEditArrival('${n.cycleId}', event); event.stopPropagation();">📅 ${formatDate(n.estArrival)}</span><button class="big-flow-sign-btn" onclick="markPackageDelivered('${n.cycleId}'); event.stopPropagation();" title="标记已签收">✓ 签收</button>` : ''}
        </div>`
      : '';
    html += `
      <div class="big-flow-node">
        <div class="${labelCls}">${escapeHtml(n.label)}</div>
        <div class="${dotCls}"></div>
        ${dateStr ? `<div class="${dateCls}">${dateStr}</div>` : ''}
        ${photoBadge}
        ${trackBadge}
      </div>
    `;
    if (i < nodes.length - 1) {
      const next = nodes[i + 1];
      const nextStatus = next.status;
      // 计算两节点间耗时
      let durLabel = '';
      if (n.date && next.date) {
        const dur = daysBetween(n.date, next.date);
        if (dur !== null && dur >= 0) durLabel = `${dur}天`;
      } else if (n.date && next.status === 'current' && next.startDate === n.date) {
        // 当前节点的开始日期就是上个节点的日期
        const dur = daysSince(n.date);
        if (dur !== null && dur >= 0) durLabel = `已${dur}天`;
      }
      let connCls = 'big-flow-connector';
      if (n.status === 'done' && nextStatus !== 'future') connCls += ' done';
      if (nextStatus === 'future') connCls += ' dashed';
      html += `<div class="${connCls}">${durLabel ? `<span class="connector-dur">${durLabel}</span>` : ''}</div>`;
    }
  });
  html += '</div>';
  return html;
}

// 阶段名称映射
function getCycleLabel(key) {
  const map = {
    'DEV': '开发版', 'REVISE': '修改版', 'PHOTO': '拍照版',
    'PROD': '大货版', 'FIT': 'FIT版'
  };
  // key 格式可能是 "DEV_0" 或 "REVISE_1"
  const type = key.split('_')[0];
  return map[type] || key;
}

// 把 base64 转成 Blob
function base64ToBlob(base64) {
  const parts = base64.split(';base64,');
  const type = parts[0].split(':')[1] || 'image/jpeg';
  const binary = atob(parts[1]);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type });
}

// 打包下载（用 JSZip）
async function downloadPhotosAsZip(urls, cycleKey) {
  if (urls.length === 0) { showToast('没有选中的照片', 'warn'); return; }

  const sku = getCurrentSku();
  const label = getCycleLabel(cycleKey);
  const folderName = `${sku}_${label}`;

  showToast(`正在打包 ${urls.length} 张图片…`, 'ok');

  // 动态加载 JSZip
  if (!window.JSZip) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const zip = new JSZip();
  const folder = zip.folder(folderName);

  urls.forEach((url, i) => {
    const ext = url.startsWith('data:image/png') ? 'png' : 'jpg';
    const filename = `${sku}_${label}_${String(i+1).padStart(2,'0')}.${ext}`;
    // 去掉 base64 头，只存数据部分
    const base64Data = url.split(';base64,')[1];
    if (base64Data) folder.file(filename, base64Data, { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${folderName}.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast(`✅ 已下载：${folderName}.zip`, 'ok');
}

async function downloadPhotos(urls, cycleKey) {
  if (urls.length === 0) { showToast('没有选中的照片', 'warn'); return; }
  await downloadPhotosAsZip(urls, cycleKey);

function renderEventLog(s) {
  const entries = [];
  s.cycles?.forEach((cycle) => {
    const meta = CYCLE_TYPES[cycle.type];
    if (cycle.openDate) {
      entries.push({ date: cycle.openDate, cycleId: cycle.id, field: 'openDate',
        eventName: `${meta.label} · 开版`, detail: '', cls: '' });
    }
    if (cycle.receivedDate) {
      entries.push({ date: cycle.receivedDate, cycleId: cycle.id, field: 'receivedDate',
        eventName: `${meta.label} · ${cycle.type === 'PHOTO' ? '收到拍照版' : '收到样板'}`, detail: '', cls: '' });
    }
    if (cycle.sentDate) {
      entries.push({ date: cycle.sentDate, cycleId: cycle.id, field: 'sentDate',
        eventName: `${meta.label} · ${cycle.type === 'PHOTO' ? '拍照发图审' : '寄出客户'}`, detail: '', cls: '' });
    }
    if (cycle.feedbackDate) {
      let detail = '', cls = '';
      const o = cycle.feedbackOutcome;
      if (o === 'ARCHIVED') { detail = '结果：未采用 / 不下 PO'; cls = 'outcome-archived'; }
      else if (o === 'PO_AWAIT_FIT') { detail = `结果：下PO · fit待定`; cls = 'outcome-po'; }
      else if (o === 'PO_REVISE') { detail = `结果：下PO · 重做样衣`; cls = 'outcome-po'; }
      else if (o === 'PO_PHOTO') { detail = `结果：下PO · 做拍照版`; cls = 'outcome-po'; }
      else if (o === 'PO_PROD') { detail = `结果：下PO · 直接做船版`; cls = 'outcome-approved'; }
      else if (o === 'APPROVED') { detail = '结果：通过 ✓'; cls = 'outcome-approved'; }
      else if (o === 'REMAKE_PHOTO') { detail = '结果：重做拍照版'; cls = 'outcome-photo'; }
      else if (o === 'REMAKE_SAMPLE') { detail = '结果：打回重做样衣'; cls = 'outcome-remake'; }
      else if (o === 'REMAKE') { detail = '结果：船版重做'; cls = 'outcome-remake'; }

      let fbDetail = detail;
      if (cycle.feedbackNote) fbDetail += ` · 评语：「${cycle.feedbackNote}」`;

      entries.push({ date: cycle.feedbackDate, cycleId: cycle.id, field: 'feedbackDate',
        eventName: `${meta.label} · ${meta.feedbackLabel}`, detail: fbDetail, cls });
    }
  });
  if (s.awaitingFit) {
    entries.push({ date: s.awaitingFit.since, cycleId: null, field: 'awaitingFit',
      eventName: '等 fit comment 中', detail: '', cls: 'outcome-po' });
  }

  const isLastIdx = entries.length - 1;
  return entries.map((e, idx) => {
    const isLast = idx === isLastIdx;
    return `
      <div class="log-entry ${e.cls} ${isLast ? 'active' : ''}">
        <div class="log-date">${e.date}</div>
        <div class="log-content" onclick="openEditLogModal('${s.id}', '${e.cycleId || ''}', '${e.field}')">
          <div class="event-name">${escapeHtml(e.eventName)}</div>
          ${e.detail ? `<div class="event-detail">${escapeHtml(e.detail)}</div>` : ''}
        </div>
        <div class="log-actions">
          <button class="log-action-btn log-action-edit" onclick="event.stopPropagation(); openEditLogModal('${s.id}', '${e.cycleId || ''}', '${e.field}')" title="编辑">✎</button>
          <button class="log-action-btn log-action-del" onclick="event.stopPropagation(); quickDeleteLog('${s.id}', '${e.cycleId || ''}', '${e.field}')" title="删除">✕</button>
        </div>
      </div>
    `;
  }).join('');
}

function renderNotesSection(s) {
  if (s._editingNotes) {
    return `

// 我已催过：自动追加时间戳到备注 + 临时从今日跟进隐藏 2 天
function markFollowUp(id) {
  const s = state.styles.find(x => x.id === id);
  const status = getStyleStatus(s);
  const who = whoToFollowUp(status.currentNode, status.cycleType) || '';
  const today = todayStr().slice(5).replace('-', '/');
  const newLine = `[${today}] 已催 ${who}`;
  s.notes = s.notes ? (s.notes + '\n' + newLine) : newLine;
  // 设置 snooze 到 2 天后（包含今天 + 后两天）
  const snoozeDate = new Date();
  snoozeDate.setDate(snoozeDate.getDate() + 2);
  s.snoozedUntil = snoozeDate.toISOString().slice(0, 10);
  saveState(); render(); openDrawer(id);
}

// 取消 snooze（在抽屉里手动取消）

  const s = state.styles.find(x => x.id === id);
  delete s.snoozedUntil;
  saveState(); render(); openDrawer(id);
}


let _viewerPhotos = [];
let _viewerIndex = 0;
function openImageViewer(photos, index) {
  if (typeof photos === 'string' && photos.trim().startsWith('[')) { try { photos = JSON.parse(photos); } catch(e) {} }
  if (typeof photos === 'string') { _viewerPhotos = [photos]; _viewerIndex = 0; }
  else if (Array.isArray(photos) && photos.length > 0) { _viewerPhotos = photos; _viewerIndex = index || 0; }
  else return;
  if (_viewerIndex < 0) _viewerIndex = 0;
  if (_viewerIndex >= _viewerPhotos.length) _viewerIndex = _viewerPhotos.length - 1;
  _renderViewerImage();
  document.getElementById('imageViewerBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function _renderViewerImage() {
  document.getElementById('imageViewerImg').src = _viewerPhotos[_viewerIndex];
  const m = _viewerPhotos.length > 1;
  document.getElementById('imageViewerPrev').classList.toggle('hidden', !m || _viewerIndex === 0);
  document.getElementById('imageViewerNext').classList.toggle('hidden', !m || _viewerIndex >= _viewerPhotos.length - 1);
  document.getElementById('imageViewerCounter').textContent = m ? `${_viewerIndex + 1} / ${_viewerPhotos.length}` : '';
}
function viewerNav(dir) {
  _viewerIndex += dir;
  if (_viewerIndex < 0) _viewerIndex = _viewerPhotos.length - 1;
  if (_viewerIndex >= _viewerPhotos.length) _viewerIndex = 0;
  _renderViewerImage();
}
function closeImageViewer() {
  document.getElementById('imageViewerBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  _viewerPhotos = []; _viewerIndex = 0;
}
document.addEventListener('keydown', (e) => {
  // Image viewer
  if (document.getElementById('imageViewerBackdrop').classList.contains('open')) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); viewerNav(-1); return; }
    if (e.key === 'ArrowRight') { e.preventDefault(); viewerNav(1); return; }
    if (e.key === 'Escape') { e.preventDefault(); closeImageViewer(); return; }
  }
  // Cmd/Ctrl+K → focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const searchInput = document.querySelector('.search input, #search');
    if (searchInput) searchInput.focus();
  }
  // Escape → close drawer or modal
  if (e.key === 'Escape') {
    const backdrop = document.getElementById('updateBackdrop');
    if (backdrop && backdrop.classList.contains('open')) { closeUpdateModal(); return; }
    const drawer = document.getElementById('drawer');
    if (drawer && drawer.classList.contains('open')) { closeDrawer(); return; }
    const alert = document.getElementById('alertPanel');
    if (alert && alert.classList.contains('open')) { closeAlertPanel(); return; }
  }
});

// 绑定 cycle 照片上传/粘贴/拖拽 — 支持批量多张
function bindCyclePhotoUploader(cycle) {
  const zone = document.getElementById('cyclePhotoZone');
  const fileInput = document.getElementById('cyclePhotoFile');
  if (!zone || !fileInput) return;
  if (cycle.receivedPhotos && cycle.receivedPhotos.length > 0) {
    state.pendingCyclePhotos = [...cycle.receivedPhotos];
  } else {
    state.pendingCyclePhotos = [];
  }
  const addFiles = (files) => {
    const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (imgs.length === 0) { showToast('只支持图片文件', 'error'); return; }
    let loaded = 0;
    imgs.forEach(file => {
      compressImage(file).then(dataUrl => {
        state.pendingCyclePhotos.push(dataUrl);
        loaded++;
        if (loaded === imgs.length) refreshCyclePhotoPreview();
      });
    });
  };
  const refreshCyclePhotoPreview = () => {
    const inner = document.getElementById('cyclePhotoInner');
    if (!inner) return;
    const photos = state.pendingCyclePhotos;
    if (photos.length === 0) {
      inner.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg><div class="cycle-photo-text">拍照后拖拽 / Ctrl+V 粘贴 / 点击上传<br><span style="font-size:10px;color:var(--ink-mute);">支持批量</span></div>`;
    } else {
      inner.innerHTML = photos.map((src, i) => `<div class="cycle-photo-thumb-wrap"><img class="cycle-photo-preview" src="${escapeHtml(src)}" alt="照片${i+1}"><button type="button" class="cycle-photo-clear" onclick="removeCyclePhoto(${i}); event.stopPropagation();">×</button></div>`).join('');
    }
  };
  zone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => { if (e.target.files.length > 0) addFiles(e.target.files); fileInput.value = ''; };
  fileInput.setAttribute('multiple', '');
  zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragging'); };
  zone.ondragleave = () => zone.classList.remove('dragging');
  zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('dragging'); if (e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files); };
  zone.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData.items).filter(i => i.type.startsWith('image/'));
    if (items.length > 0) addFiles(items.map(i => i.getAsFile()));
  });
}

async function saveFeedback() {
  const { styleId, cycleId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  const cycle = s.cycles.find(c => c.id === cycleId);
  const date = document.getElementById('u-date').value;
  if (!date) { showToast('请选择日期', 'warn'); return; }
  const outcome = document.querySelector('input[name="u-outcome"]:checked')?.value;
  if (!outcome) { showToast('请选择结论', 'warn'); return; }

  // 如果选了"未采用"（ARCHIVED），先让用户选归档原因
  let archiveResult = null;
  if (outcome === 'ARCHIVED') {
    archiveResult = await pickArchiveReasonDialog({
      title: '归档此款',
      message: `将"${s.sku}"归档到历史档案。请选择原因，方便日后回查。`
    });
    if (!archiveResult) return;  // 用户取消
  }

  cycle.feedbackDate = date;
  cycle.feedbackOutcome = outcome;
  const noteEl = document.getElementById('u-feedback-note');
  if (noteEl && noteEl.value.trim()) cycle.feedbackNote = noteEl.value.trim();

  // 处理 PO 录入（仅 DEV cycle 第一次反馈时）
  if (cycle.type === 'DEV' && outcome !== 'ARCHIVED' && (!s.pos || s.pos.length === 0)) {
    const rows = document.querySelectorAll('#po-rows-container .po-color-card');
    const newPos = [];
    rows.forEach(row => {
      const num = row.querySelector('.po-row-num').value.trim();
      const color = row.querySelector('.po-row-color').value.trim();
      const ef = row.querySelector('.po-row-ef').value;
      const qty = parseInt(row.querySelector('.po-row-qty').value) || null;
      const cliNo = row.querySelector('.po-row-client-no')?.value.trim() || '';
      if (num && ef) {
        const po = { id: uid('po'), poNumber: num, color, quantity: qty, exFactory: ef, addedAt: date };
        if (cliNo) po.clientStyleNo = cliNo;
        newPos.push(po);
      }
    });
    if (newPos.length === 0) { showToast('至少填写一个 PO（PO 号和 ex-factory 必填）', 'warn'); return; }
    s.pos = newPos;
  }

  if (outcome === 'ARCHIVED') {
    s.archived = true;
    s.archivedDate = date;
    if (archiveResult) {
      s.archiveReason = archiveResult.reason;
      if (archiveResult.note) s.archiveNote = archiveResult.note;
    }
  }
  else if (outcome === 'PO_AWAIT_FIT') { s.awaitingFit = { since: date }; }
  else if (outcome === 'PO_REVISE') { s.cycles.push({ id: uid('c'), type: 'REVISE', openDate: date }); }
  else if (outcome === 'PO_PHOTO') { s.cycles.push({ id: uid('c'), type: 'PHOTO', openDate: date }); }
  else if (outcome === 'PO_PROD') { s.cycles.push({ id: uid('c'), type: 'PROD', openDate: date }); }
  else if (outcome === 'APPROVED' && cycle.type === 'PHOTO') { s.cycles.push({ id: uid('c'), type: 'PROD', openDate: date }); }
  else if (outcome === 'REMAKE_PHOTO') { s.cycles.push({ id: uid('c'), type: 'PHOTO', openDate: date }); }
  else if (outcome === 'REMAKE_SAMPLE') { s.cycles.push({ id: uid('c'), type: 'REVISE', openDate: date }); }
  else if (outcome === 'REMAKE' && cycle.type === 'PROD') { s.cycles.push({ id: uid('c'), type: 'PROD', openDate: date }); }

  saveState(); closeUpdateModal(); render(); openDrawer(styleId);
}

    `;

    return;
  }

  const cycle = s.cycles.find(c => c.id === cycleId);
  if (!cycle) return;
  state.modalContext = { type: 'editLog', styleId, cycleId, field };
  const meta = CYCLE_TYPES[cycle.type];

  document.getElementById('updateTitle').textContent = `编辑 · ${meta.label} · ${fieldLabel}`;

  document.getElementById('updateBody').innerHTML = `

    <button class="cancel" onclick="closeUpdateModal()">取消</button>
    <button class="confirm" onclick="saveEditLog()">保存</button>

  // 如果是编辑收到样板，绑定照片上传
  if (field === 'receivedDate') {
    setTimeout(() => bindCyclePhotoUploader(cycle), 50);
  }
}

function saveEditLog() {
  const { styleId, cycleId, field } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  const cycle = s.cycles.find(c => c.id === cycleId);
  cycle[field] = document.getElementById('u-date').value;

  // 保存照片（收到样板编辑）
  if (field === 'receivedDate') {
    if (state.pendingCyclePhotos && state.pendingCyclePhotos.length > 0) {
      cycle.receivedPhotos = [...state.pendingCyclePhotos];
    } else if (state.pendingCyclePhotos && state.pendingCyclePhotos.length === 0) {
      delete cycle.receivedPhotos;
    }
    state.pendingCyclePhotos = [];
  }

  // 保存快递单号和预估到达（寄出客户编辑）
  if (field === 'sentDate' && cycle.type !== 'PHOTO') {
    const trackInput = document.getElementById('u-tracking');
    const arrivalInput = document.getElementById('u-arrival');
    if (trackInput) {
      const v = trackInput.value.trim();
      if (v) cycle.shipTrackingNo = v;
      else delete cycle.shipTrackingNo;
    }
    if (arrivalInput) {
      const v = arrivalInput.value;
      if (v) cycle.shipEstimatedArrival = v;
      else delete cycle.shipEstimatedArrival;
    }
  }

  // 保存评语（客户评语编辑）
  if (field === 'feedbackDate') {
    const noteEl = document.getElementById('u-feedback-note');
    if (noteEl) cycle.feedbackNote = noteEl.value.trim();
  }

  saveToLocalCache(state.styles);
  saveStyleToSupabase(s);
  closeUpdateModal(); render(); openDrawer(styleId);
}

async function deleteLogEntry() {
  const { styleId, cycleId, field } = state.modalContext;
  if (!await showDialog({title:"确认删除", message:"确认删除此条记录？后续状态推导会受影响。", confirmText:"删除", danger:true})) return;
  const s = state.styles.find(x => x.id === styleId);
  if (field === "awaitingFit") {
    s.awaitingFit = null;
  } else {
    const cycle = s.cycles.find(c => c.id === cycleId);
    if (cycle) {
      delete cycle[field];
      if (field === "feedbackDate") { delete cycle.feedbackOutcome; delete cycle.feedbackNote; }
      await _supabase.from("cycles").upsert(localCycleToDB(cycle, styleId));
    }
  }
  await saveStyleToSupabase(s);
  closeUpdateModal(); render(); openDrawer(styleId);
  showToast("已删除并同步", "ok");
}

function saveNewStyle() {
  const sku = document.getElementById('f-sku').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const description = document.getElementById('f-desc').value.trim();
  const client = document.getElementById('f-client').value;
  const owner = document.getElementById('f-owner').value;
  const openDate = document.getElementById('f-open-date').value || todayStr();
  if (!sku && !name) {
    showToast('款号和款名至少填一个', 'warn');
    return;
  }
  // 收集"一并添加"的 PO 行（折叠区展开 + 有内容的才算）
  const newPos = collectNewStylePoRows();
  // 如果用户展开了 PO 区但所有行都是空的，提示
  const section = document.getElementById('newStylePoSection');
  if (section && section.classList.contains('expanded')) {
    const rowEls = document.querySelectorAll('.new-style-po-row');
    if (rowEls.length > 0 && newPos === null) {
      // newPos === null 表示有行但 PO 号缺失（验证失败已经 toast 提示）
      return;
    }
  }

  // 检查是否有反单 PO
  const hasRepeatPo = newPos && newPos.some(p => p.orderType === 'repeat');
  // 如果至少一个 PO 是反单，跳过开版直接进入 PROD（等大货）
  // 同时，如果存在新单 PO 也存在反单 PO 的混合情况，按用户的意思以反单为主（也跳开版）
  let cycles;
  if (hasRepeatPo) {
    // 反单：直接跳到 PROD cycle，跟单员后续在抽屉里跟进大货进度
    cycles = [{ id: uid('c'), type: 'PROD', openDate }];
  } else {
    cycles = [{ id: uid('c'), type: 'DEV', openDate }];
  }

  const newId = uid('st');
  state.styles.unshift({
    id: newId,
    sku: sku || '未命名',
    name: name || '(无款名)',
    description: description || '',
    client: client || 'OTHER',
    owner: owner || '',
    imageUrl: state.pendingImageData || '',
    createdAt: new Date().toISOString(),
    cycles: cycles,
    pos: newPos || []
  });
  saveState();
  closeNewStyleModal();
  // 如果有 callback（来自加 PO 流程），调用它
  if (state.afterNewStyleCallback) {
    const cb = state.afterNewStyleCallback;
    state.afterNewStyleCallback = null;
    cb(newId);
  } else {
    render();
    if (hasRepeatPo) {
      showToast('反单已创建 · 跳过开版，直接进入大货阶段', 'ok');
    } else if (newPos && newPos.length > 0) {
      showToast(`已创建款式并添加 ${newPos.length} 个 PO`, 'ok');
    }
  }
}

// 收集所有 PO 行 → 验证 → 返回数组（验证失败返回 null + 提示）
function collectNewStylePoRows() {
  const rowEls = document.querySelectorAll('.new-style-po-row');
  if (rowEls.length === 0) return [];
  const pos = [];
  for (let i = 0; i < rowEls.length; i++) {
    const r = rowEls[i];
    const num = r.querySelector('.po-num').value.trim();
    const cliNo = r.querySelector('.po-client-no').value.trim();
    const color = r.querySelector('.po-color').value.trim();
    const qty = parseInt(r.querySelector('.po-qty').value) || null;
    const ef = r.querySelector('.po-ef').value;
    const orderType = r.querySelector('.po-order-type').value;

    // 整行都没填的，跳过（不当作错误，让用户加了行又不想填也无所谓）
    if (!num && !cliNo && !color && !qty && !ef && !orderType) continue;

    // 只要有任一字段填了，PO 号就必填
    if (!num) {
      showToast(`第 ${i + 1} 个 PO 缺少 PO 号`, 'warn');
      return null;
    }

    const po = {
      id: uid('po'),
      poNumber: num,
      color,
      quantity: qty,
      exFactory: ef,
      orderType,
      addedAt: todayStr()
    };
    if (cliNo) po.clientStyleNo = cliNo;
    pos.push(po);
  }
  return pos;
}



/*
========================================================================
 图片处理
========================================================================
*/
function setupImageDropzone(dropEl, fileInputEl, onImage) {
  dropEl.addEventListener('click', (e) => {
    if (e.target.closest('.image-preview-actions')) return;
    fileInputEl.click();
  });
  fileInputEl.addEventListener('change', (e) => {
    const file = e.target.files?.[0];
    if (file) handleImageFile(file, onImage);
    fileInputEl.value = '';
  });
  dropEl.addEventListener('dragover', (e) => { e.preventDefault(); dropEl.classList.add('drag-over'); });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag-over'));
  dropEl.addEventListener('drop', (e) => {
    e.preventDefault();
    dropEl.classList.remove('drag-over');
    const file = e.dataTransfer.files?.[0];
    if (file && file.type.startsWith('image/')) handleImageFile(file, onImage);
  });
}
function handleImageFile(file, callback) {
  if (!file.type.startsWith('image/')) { showToast('只支持图片文件', 'error'); return; }
  compressImage(file).then(dataUrl => callback(dataUrl));
}
function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const MAX = 1000;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/*
========================================================================
 苹果风自定义日期选择器
========================================================================
 用法：把任何 input[type="date"] 替换掉它的展示行为
 焦点时弹出一个浮层日历，选中后写回 input.value
*/

let _activeDatePicker = null;

function openDatePicker(inputEl) {
  if (_activeDatePicker) closeDatePicker();
  const rect = inputEl.getBoundingClientRect();
  const initial = inputEl.value || todayStr();
  const [iy, im, id] = initial.split('-').map(Number);

  const picker = document.createElement('div');
  picker.className = 'date-picker-popup';
  picker.dataset.year = iy;
  picker.dataset.month = im - 1;  // 0-11
  picker.style.position = 'fixed';
  picker.style.top = (rect.bottom + 6) + 'px';
  picker.style.left = rect.left + 'px';
  picker.style.zIndex = '500';

  document.body.appendChild(picker);
  _activeDatePicker = { popup: picker, input: inputEl, selected: initial };

  renderDatePicker();

  // 点击外部关闭
  setTimeout(() => {
    document.addEventListener('mousedown', _datePickerOutsideClick);
  }, 0);
}

function _datePickerOutsideClick(e) {
  if (!_activeDatePicker) return;
  if (e.target.closest('.date-picker-popup')) return;
  if (e.target === _activeDatePicker.input) return;
  closeDatePicker();
}

function closeDatePicker() {
  if (!_activeDatePicker) return;
  document.removeEventListener('mousedown', _datePickerOutsideClick);
  _activeDatePicker.popup.remove();
  _activeDatePicker = null;
}

function renderDatePicker() {
  if (!_activeDatePicker) return;
  const popup = _activeDatePicker.popup;
  const year = parseInt(popup.dataset.year);
  const month = parseInt(popup.dataset.month);

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();
  const startCol = startWeekday === 0 ? 6 : startWeekday - 1;

  const today = todayStr();
  const selected = _activeDatePicker.selected;

  let cellsHtml = '';
  // 上月填充
  const prevMonthDays = new Date(year, month, 0).getDate();
  for (let i = 0; i < startCol; i++) {
    const d = prevMonthDays - startCol + 1 + i;
    cellsHtml += `<div class="dp-cell dp-cell-other">${d}</div>`;
  }
  // 本月
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    let cls = 'dp-cell';
    if (dateKey === today) cls += ' dp-cell-today';
    if (dateKey === selected) cls += ' dp-cell-selected';
    cellsHtml += `<div class="${cls}" onclick="datePickerSelect('${dateKey}')">${d}</div>`;
  }
  // 下月填充到 6 行
  const totalCells = startCol + daysInMonth;
  const totalRows = Math.ceil(totalCells / 7);
  const remaining = totalRows * 7 - totalCells;
  for (let i = 1; i <= remaining; i++) {
    cellsHtml += `<div class="dp-cell dp-cell-other">${i}</div>`;
  }

  popup.innerHTML = `
    <div class="dp-header">
      <button class="dp-nav-btn" onclick="datePickerNav(-1)">‹</button>
      <div class="dp-title">${year} 年 ${month + 1} 月</div>
      <button class="dp-nav-btn" onclick="datePickerNav(1)">›</button>
    </div>
    <div class="dp-weekdays">
      <div>一</div><div>二</div><div>三</div>
      <div>四</div><div>五</div><div>六</div><div>日</div>
    </div>
    <div class="dp-grid">${cellsHtml}</div>
    <div class="dp-footer">
      <button class="dp-clear-btn" onclick="datePickerClear()">清除</button>
      <button class="dp-today-btn" onclick="datePickerToday()">今天</button>
    </div>
  `;
}

function datePickerNav(delta) {
  if (!_activeDatePicker) return;
  const popup = _activeDatePicker.popup;
  let year = parseInt(popup.dataset.year);
  let month = parseInt(popup.dataset.month);
  month += delta;
  if (month < 0) { month = 11; year--; }
  if (month > 11) { month = 0; year++; }
  popup.dataset.year = year;
  popup.dataset.month = month;
  renderDatePicker();
}

function datePickerSelect(dateKey) {
  if (!_activeDatePicker) return;
  _activeDatePicker.input.value = dateKey;
  // 触发 input 的 change 事件
  _activeDatePicker.input.dispatchEvent(new Event('change', { bubbles: true }));
  closeDatePicker();
}

function datePickerToday() {
  datePickerSelect(todayStr());
}

function datePickerClear() {
  if (!_activeDatePicker) return;
  _activeDatePicker.input.value = '';
  _activeDatePicker.input.dispatchEvent(new Event('change', { bubbles: true }));
  closeDatePicker();
}

// 拦截所有 date input 的 click，弹出自定义日历
function setupCustomDatePickers() {
  // 监听所有 input[type=date] 的点击，弹出自定义日历
  // 用 mousedown 阻止浏览器原生日历
  document.addEventListener('mousedown', (e) => {
    const target = e.target;
    if (target.tagName === 'INPUT' && target.type === 'date') {
      e.preventDefault();
      e.stopPropagation();
      // 如果点的是已经在打开自定义日历的 input，则关闭
      if (_activeDatePicker && _activeDatePicker.input === target) {
        closeDatePicker();
        return;
      }
      // 否则打开自定义日历
      target.blur();
      setTimeout(() => openDatePicker(target), 0);
    }
  }, true);

  // 也阻止 focus 触发原生日历
  document.addEventListener('focus', (e) => {
    const target = e.target;
    if (target.tagName === 'INPUT' && target.type === 'date') {
      // 阻止焦点（避免触发原生日历）
      target.blur();
    }
  }, true);

  // 阻止 keydown（Enter 等）也触发原生
  document.addEventListener('keydown', (e) => {
    const target = e.target;
    if (target.tagName === 'INPUT' && target.type === 'date') {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (!_activeDatePicker || _activeDatePicker.input !== target) {
          openDatePicker(target);
        }
      }
    }
  }, true);
}


function setupPasteHandler() {

    const items = e.clipboardData?.items || [];
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) {
          e.preventDefault();
          if (newOpen) {
            handleImageFile(file, (dataUrl) => {
              state.pendingImageData = dataUrl;

            });
          }
          return;
        }
      }
    }
  });
}

// 更新弹窗：点外部不关闭，防止误操作

document.addEventListener('keydown', e => {
  // 如果焦点在输入框 textarea 里，只处理 Esc
  const isInputFocused = document.activeElement && (
    document.activeElement.tagName === 'INPUT' ||
    document.activeElement.tagName === 'TEXTAREA' ||
    document.activeElement.tagName === 'SELECT'
  );

  if (e.key === 'Escape') {
    // 优先关闭图片查看器（如果开着）
    const viewerOpen = document.getElementById('imageViewerBackdrop').classList.contains('open');
    if (viewerOpen) {
      closeImageViewer();
      return;
    }
    closeDrawer(); closeNewStyleModal(); closeUpdateModal(); closeImageModal();
    if (isInputFocused) document.activeElement.blur();
    return;
  }

  if (isInputFocused) return;

  // / 聚焦搜索框
  if (e.key === '/') {
    const searchInput = document.getElementById('search');
    if (searchInput && searchInput.style.display !== 'none' && document.getElementById('controlsBar').style.display !== 'none') {
      e.preventDefault();
      searchInput.focus();
    }
    return;
  }

  // 如果有任何模态弹窗打开，不处理列表导航
  const anyModalOpen = document.querySelector('.modal-backdrop.open') ||
                       document.querySelector('.drawer.open');
  if (anyModalOpen) {
    // 抽屉打开时支持 Enter 触发主操作
    if (e.key === 'Enter' && document.querySelector('.drawer.open')) {
      const primaryBtn = document.querySelector('.drawer .drawer-actions button.primary');
      if (primaryBtn) {
        e.preventDefault();
        primaryBtn.click();
      }
    }
    return;
  }

  // 列表键盘导航（仅在有列表时）
  const styles = state._currentListStyles;
  if (!styles || styles.length === 0) return;

  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    state.keyboardSelectedIdx = Math.min(styles.length - 1, state.keyboardSelectedIdx + 1);
    updateKeyboardSelection();
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    state.keyboardSelectedIdx = Math.max(0, state.keyboardSelectedIdx - 1);
    updateKeyboardSelection();
  } else if (e.key === 'Enter' && state.keyboardSelectedIdx >= 0) {
    e.preventDefault();
    const s = styles[state.keyboardSelectedIdx];
    if (s) openDrawer(s.id);
  } else if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    openNewStyleModal();
  }
});

  if (selected) {
    selected.classList.add('keyboard-selected');
