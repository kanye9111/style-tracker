// 读取文件并添加到对应 cycle
function addPhotosToGalleryCycle(files, cycleType) {
  const s = state.styles.find(x => x.id === state.selectedId);
  if (!s) return;
  const cycle = s.cycles?.find(c => c.type === cycleType);
  if (!cycle) return;
  const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
  let loaded = 0;
  imgs.forEach(file => {
    compressImage(file)
      .then(dataUrl => uploadPhotoToStorage(dataUrl, 'cycle'))
      .then(url => {
        if (!cycle.receivedPhotos) cycle.receivedPhotos = [];
        cycle.receivedPhotos.push(url);

          saveOneStyle(s.id);
          openDrawer(s.id);
          showToast(`已上传 ${loaded} 张图片`, 'ok');
        }
      });
  });
}

function renderEventLog(s) {
  const entries = [];
  s.cycles?.forEach((cycle) => {
    const meta = CYCLE_TYPES[cycle.type];
    if (cycle.openDate) {
      entries.push({ date: cycle.openDate, cycleId: cycle.id, field: 'openDate',
        eventName: `${meta.label} · 开版`, detail: '', cls: '' });
    }
    if (cycle.patternMakerDone && cycle.patternMakerDoneDate) {
      entries.push({ date: cycle.patternMakerDoneDate, cycleId: cycle.id, field: 'patternMakerDoneDate',
        eventName: `✂️ ${meta.label} · 版师打完`, detail: '', cls: 'log-milestone log-milestone-pm' });
    }
    if (cycle.fabricSourcedDate) {
      entries.push({ date: cycle.fabricSourcedDate, cycleId: cycle.id, field: 'fabricSourcedDate',
        eventName: `🧵 ${meta.label} · 面料备齐`, detail: '', cls: 'log-milestone log-milestone-fb' });
    }
    if (cycle.receivedDate) {
      entries.push({ date: cycle.receivedDate, cycleId: cycle.id, field: 'receivedDate',
        eventName: `${meta.label} · ${cycle.type === 'PHOTO' ? '收到拍照版' : '收到样板'}`, detail: '', cls: '' });
    }
    if (cycle.sentDate) {
      entries.push({ date: cycle.sentDate, cycleId: cycle.id, field: 'sentDate',
        eventName: `${meta.label} · ${cycle.type === 'PHOTO' ? '拍照发图审' : '寄出客户'}`, detail: '', cls: '' });
    }
    if (cycle.feedbackDate) {
      let detail = '', cls = '';
      const o = cycle.feedbackOutcome;
      if (o === 'ARCHIVED') { detail = '结果：未采用 / 不下 PO'; cls = 'outcome-archived'; }
      else if (o === 'PO_AWAIT_FIT') { detail = `结果：下PO · fit待定`; cls = 'outcome-po'; }
      else if (o === 'PO_REVISE') { detail = `结果：下PO · 重做样衣`; cls = 'outcome-po'; }
      else if (o === 'PO_PHOTO') { detail = `结果：下PO · 做拍照版`; cls = 'outcome-po'; }
      else if (o === 'PO_PROD') { detail = `结果：approve · 可安排大货（版师放码）`; cls = 'outcome-approved'; }
      else if (o === 'APPROVED' && cycle.type === 'PHOTO') { detail = '结果：图审通过 · 可安排大货（版师放码）'; cls = 'outcome-approved'; }
      else if (o === 'APPROVED') { detail = '结果：通过 ✓'; cls = 'outcome-approved'; }
      else if (o === 'REMAKE_PHOTO') { detail = '结果：重做拍照版'; cls = 'outcome-photo'; }
      else if (o === 'REMAKE_SAMPLE') { detail = '结果：打回重做样衣'; cls = 'outcome-remake'; }
      else if (o === 'REMAKE') { detail = '结果：船版重做'; cls = 'outcome-remake'; }

      let fbDetail = detail;
      if (cycle.feedbackNote) fbDetail += ` · 评语：「${cycle.feedbackNote}」`;

      entries.push({ date: cycle.feedbackDate, cycleId: cycle.id, field: 'feedbackDate',
        eventName: `${meta.label} · ${meta.feedbackLabel}`, detail: fbDetail, cls });
    }
  });
  if (s.awaitingFit) {
    entries.push({ date: s.awaitingFit.since, cycleId: null, field: 'awaitingFit',
      eventName: '已下 PO·等回复 中', detail: '', cls: 'outcome-po' });
  }
  if (s.awaitingGrading) {
    entries.push({ date: s.awaitingGrading.since, cycleId: null, field: 'awaitingGrading',
      eventName: '等版师放码', detail: '客户已 approve · 等版师放码后工厂打船版', cls: 'outcome-approved' });
  }

  // 按日期排序，确保事件按时间顺序显示
  entries.sort((a, b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  });

  const isLastIdx = entries.length - 1;
  return entries.map((e, idx) => {
    const isLast = idx === isLastIdx;
    // 当前角色对此字段是否有编辑权限
    const editable = logFieldEditable(e.field);
    // 不可编辑时,log-content 不响应点击(单击/双击都不弹编辑窗)
    const contentClick = editable ? `onclick="openEditLogModal('${s.id}', '${e.cycleId || ''}', '${e.field}')"` : '';
    const contentRole = editable ? 'role="button" tabindex="0"' : '';
    return `
      <div class="log-entry ${e.cls} ${isLast ? 'active' : ''}">
        <div class="log-date">${formatDateTime(e.date)}</div>
        <div ${contentRole} class="log-content" ${contentClick}>
          <div class="event-name">${escapeHtml(e.eventName)}</div>
          ${e.detail ? `<div class="event-detail">${escapeHtml(e.detail)}</div>` : ''}
        </div>
        ${editable ? `<div class="log-actions">
          <button class="log-action-btn log-action-edit" onclick="event.stopPropagation(); openEditLogModal('${s.id}', '${e.cycleId || ''}', '${e.field}')" title="编辑">✎</button>
          <button class="log-action-btn log-action-del" onclick="event.stopPropagation(); quickDeleteLog('${s.id}', '${e.cycleId || ''}', '${e.field}')" title="删除">✕</button>
        </div>` : ''}
      </div>
    `;
  }).join('');
}

function saveRework() {
  const { styleId, cycleId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const cycle = s.cycles?.find(c => c.id === cycleId);
  if (!cycle) return;

  const returnTo = document.querySelector('input[name="rework-return-to"]:checked')?.value || 'workshop';
  const checked = Array.from(document.querySelectorAll('input[name="rework-reason"]:checked')).map(el => el.value);
  const note = document.getElementById('rework-note')?.value.trim() || '';

  if (checked.length === 0 && !note) {
    showToast('请至少选一个返修原因，或填写备注说明', 'warn');
    return;
  }

  if (!cycle.revisions) cycle.revisions = [];
  const rev = {
    id: uid('rev'),
    reason: checked.join('、') || '其他',
    returnTo,
    sentBackAt: todayStr(),
    receivedAgainAt: null,
    note
  };
  cycle.revisions.push(rev);

  closeUpdateModal();
  saveOneStyle(s.id);
  render();
  openDrawer(styleId);

  const returnLbl = getReworkReturnLabel(returnTo);
  showUndoToast(`🔧 已退回${returnLbl}返修 · ${rev.reason}`, () => {
    const s2 = state.styles.find(x => x.id === styleId);
    const c2 = s2?.cycles?.find(c => c.id === cycleId);
    if (c2 && c2.revisions) {
      // 撤销：移除刚加的这条返修记录
      c2.revisions = c2.revisions.filter(r => r.id !== rev.id);
      if (c2.revisions.length === 0) delete c2.revisions;
      saveOneStyle(styleId);
      render();
      openDrawer(styleId);
      showToast('已撤销·返修标记已取消', 'ok');
    }
  });
}

function markReworkReceived(styleId, cycleId, revisionId) {
  if (!canEditStyleInfo()) { showToast('当前账号无权登记返修收回', 'warn'); return; }
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const cycle = s.cycles?.find(c => c.id === cycleId);
  if (!cycle || !cycle.revisions) return;
  const rev = cycle.revisions.find(r => r.id === revisionId);
  if (!rev) {
    showToast('找不到这条返修记录', 'warn');
    return;
  }
  if (rev.receivedAgainAt) {
    showToast('这条返修已经收回过了', 'info');
    return;
  }

  const today = todayStr();
  rev.receivedAgainAt = today;

  saveOneStyle(s.id);
  render();
  openDrawer(styleId);

  showUndoToast(`✓ 返修件 ${today} 已收回 · 回到待寄出`, () => {
    const s2 = state.styles.find(x => x.id === styleId);
    const c2 = s2?.cycles?.find(c => c.id === cycleId);
    const r2 = c2?.revisions?.find(r => r.id === revisionId);
    if (r2) {
      r2.receivedAgainAt = null;
      saveOneStyle(styleId);
      render();
      openDrawer(styleId);
      showToast('已撤销·返修件回到返修中状态', 'ok');
    }
  });
}

// 取消返修标记 — 误发起返修或返修不再需要时调用
// 把当前 active 的返修记录从 cycle.revisions[] 里移除，款回到正常的"待寄出"状态
function cancelRework(styleId, cycleId, revisionId) {
  if (!canEditStyleInfo()) { showToast('当前账号无权取消返修', 'warn'); return; }
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const cycle = s.cycles?.find(c => c.id === cycleId);
  if (!cycle || !cycle.revisions) return;
  const idx = cycle.revisions.findIndex(r => r.id === revisionId);
  if (idx < 0) {
    showToast('找不到这条返修记录', 'warn');
    return;
  }
  const removed = cycle.revisions[idx];
  // 已收回的返修不应通过这个入口退（会破坏历史记录）
  if (removed.receivedAgainAt) {
    showToast('这条返修已经收回过了，不能再撤销', 'warn');
    return;
  }
  // 移除这条记录
  cycle.revisions.splice(idx, 1);
  if (cycle.revisions.length === 0) delete cycle.revisions;

  saveOneStyle(s.id);
  render();
  openDrawer(styleId);

  showUndoToast(`↶ 已取消返修标记 · 回到待寄出`, () => {
    const s2 = state.styles.find(x => x.id === styleId);
    const c2 = s2?.cycles?.find(c => c.id === cycleId);
    if (c2) {
      if (!c2.revisions) c2.revisions = [];
      // 把刚移除的记录放回原位
      c2.revisions.splice(idx, 0, removed);
      saveOneStyle(styleId);
      render();
      openDrawer(styleId);
      showToast('已撤销·返修标记已恢复', 'ok');
    }
  });
}

// === 放码完成 ===
// 版师在「等放码」状态下点「✓ 放完码」按钮调用
// 清掉 awaitingGrading 标记，push 一个新的 PROD cycle（工厂开始打船版）
function markGradingDone(styleId) {
  if (!canDoActionForNode('GRADING')) { showToast('当前账号无权登记放码完成', 'warn'); return; }
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  // 兼容两种情况：
  // 1) 显式有 awaitingGrading 字段（正常流程）
  // 2) 没字段但状态机算出来是 GRADING（自动恢复来的 — 旧数据/字段丢失）
  const status = getStyleStatus(s);
  if (!s.awaitingGrading && status.currentNode !== 'GRADING') return;
  const date = todayStr();
  const snapshot = s.awaitingGrading ? JSON.parse(JSON.stringify(s.awaitingGrading)) : null;
  delete s.awaitingGrading;
  // push 新的 PROD cycle，带 patternMakerDone=true（放码 = 版师工作已完成）
  // 这样状态机直接进入 AWAIT_FABRIC（等面料备齐 → 工厂打船版 → 等收船版 → 寄客户）
  // _fromGrading：标记此 cycle 是"放码完成后建的"，撤回时用来恢复 awaitingGrading
  const newCycle = {
    id: uid('c'),
    type: 'PROD',
    openDate: toIsoWithNowTime(date),
    patternMakerDone: true,
    patternMakerDoneDate: toIsoWithNowTime(date),
    _fromGrading: snapshot || { since: date }
  };
  s.cycles.push(newCycle);
  saveOneStyle(styleId);
  render();
  openDrawer(styleId);
  showUndoToast(`✓ 放码完成 · 进入等面料备齐`, () => {
    const s2 = state.styles.find(x => x.id === styleId);
    if (!s2) return;
    if (snapshot) s2.awaitingGrading = snapshot;
    s2.cycles = s2.cycles.filter(c => c.id !== newCycle.id);
    saveOneStyle(styleId);
    render();
    openDrawer(styleId);
    showToast('已撤销·回到等放码', 'ok');
  });
}

// 撤销系统：即时撤销 toast + 退回上一步按钮
// =============================================================

// 带撤销按钮的 toast（8秒内可撤销）
function showUndoToast(message, undoFn, durationMs) {
  durationMs = durationMs || 8000;
  // 找到 toast 栈
  let stack = document.querySelector('.toast-stack');
  if (!stack) {
    stack = document.createElement('div');
    stack.className = 'toast-stack';
    document.body.appendChild(stack);
  }
  const toast = document.createElement('div');
  toast.className = 'toast toast-ok';
  toast.innerHTML = `
    <span class="toast-icon">✓</span>
    <span class="toast-msg"></span>
    <button class="toast-undo-btn">↶ 撤销</button>
  `;
  toast.querySelector('.toast-msg').textContent = message;
  stack.appendChild(toast);

  let dismissed = false;
  const dismiss = () => {
    if (dismissed) return;
    dismissed = true;
    toast.classList.add('toast-out');
    setTimeout(() => toast.remove(), 300);
  };

  toast.querySelector('.toast-undo-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (dismissed) return;
    dismissed = true;
    toast.remove();
    try { undoFn(); } catch (err) { console.error('撤销失败', err); showToast('撤销失败', 'error'); }
  });

  setTimeout(dismiss, durationMs);
}

// 退回上一步：根据当前 cycle 的填充状态自动判断
async function revertOneStep(styleId, cycleId) {
  if (!canEditStyleInfo()) { showToast('当前账号无权退回上一步', 'warn'); return; }
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const cycle = s.cycles?.find(c => c.id === cycleId);
  if (!cycle) return;

  // 反馈节点不通过这个机制退（数据复杂）
  if (cycle.feedbackOutcome || cycle.feedbackDate) {
    showToast('反馈节点不能直接退回·请到时间线删除', 'warn');
    return;
  }

  const result = _revertOneStepCore(s, cycle);
  if (!result.ok) {
    showToast(result.reason || '已是最初阶段·没有可退回的步骤', 'warn');
    return;
  }

  await saveOneStyle(styleId);
  render();
  openDrawer(styleId);
  showToast('' + result.label, 'ok');
}

// 纯逻辑核心：原地修改 style/cycle，返回 { ok, label, reason }
// 不做 IO（不 save、不 render、不 toast），供批量撤回复用
function _revertOneStepCore(s, cycle) {
  if (cycle.feedbackOutcome || cycle.feedbackDate) {
    return { ok: false, reason: '反馈节点不能直接退回' };
  }
  if (cycle.sentDate) {
    cycle.sentDate = null;
    if (cycle.shipTrackingNo) delete cycle.shipTrackingNo;
    if (cycle.shipEstimatedArrival) delete cycle.shipEstimatedArrival;
    return { ok: true, label: '已退回到「待寄出」' };
  }
  if (cycle.receivedDate) {
    cycle.receivedDate = null;
    return { ok: true, label: '已退回到「等版房送样」' };
  }
  if (cycle.fabricSourcedDate) {
    cycle.fabricSourcedDate = null;
    return { ok: true, label: '已退回到「等面料备齐」' };
  }
  if (cycle._fromGrading && cycle.type === 'PROD' && cycle.patternMakerDone) {
    s.awaitingGrading = JSON.parse(JSON.stringify(cycle._fromGrading));
    s.cycles = s.cycles.filter(c => c.id !== cycle.id);
    return { ok: true, label: '已退回到「等版师放码」' };
  }
  if (cycle.patternMakerDone) {
    cycle.patternMakerDone = false;
    cycle.patternMakerDoneDate = null;
    return { ok: true, label: '已退回到「版师在做」' };
  }
  return { ok: false, reason: '已是最初阶段·没有可退回的步骤' };
}

// 批量撤回上一步：当前选中的款逐个退一步
async function batchRevertOneStep() {
  const selectedIds = Object.keys(state.batchSelected || {});
  if (selectedIds.length === 0) {
    showToast('请先选择款式', 'warn');
    return;
  }
  if (!await showDialog({
    title: '批量撤回上一步',
    message: `将对 ${selectedIds.length} 款各退回一步。继续？`,
    confirmText: '确认撤回',
    danger: true
  })) return;

  let okCount = 0;
  let failCount = 0;
  for (const id of selectedIds) {
    const s = state.styles.find(x => x.id === id);
    if (!s) { failCount++; continue; }
    const cycle = s.cycles?.[s.cycles.length - 1];
    if (!cycle) { failCount++; continue; }
    const r = _revertOneStepCore(s, cycle);
    if (r.ok) {
      await saveOneStyle(id);
      okCount++;
    } else {
      failCount++;
    }
  }

  state.batchSelected = {};
  if (typeof exitBatchMode === 'function') exitBatchMode();
  render();
  showToast(`已撤回 ${okCount} 个${failCount ? ` · ${failCount} 个跳过` : ''}`, 'ok');
}

async function confirmBatchFillFields() {
  // 兼容两种模式
  const isPoMode = Object.keys(state.batchSelected || {}).length === 0
                && state.poBatchSelected
                && Object.keys(state.poBatchSelected).length > 0;
  let selectedIds;
  let selectedPoIds = null;  // PO 模式时记录要改的 PO id 集合
  if (isPoMode) {
    selectedIds = [...new Set(Object.values(state.poBatchSelected))];
    selectedPoIds = new Set(Object.keys(state.poBatchSelected));
  } else {
    selectedIds = Object.keys(state.batchSelected || {});
  }
  if (selectedIds.length === 0) { closeUpdateModal(); return; }

  // 收集勾选了的字段及值
  const updates = {};
  document.querySelectorAll('.bf-row-toggle:checked').forEach(cb => {
    const field = cb.dataset.field;
    if (field === 'owner') updates.owner = document.getElementById('bf-owner').value;
    else if (field === 'clientGroup') updates.clientGroup = document.getElementById('bf-client-group').value;
    else if (field === 'devSize') updates.devSize = document.getElementById('bf-dev-size').value;
    else if (field === 'outsourced') {
      const r = document.querySelector('input[name="bf-outsourced"]:checked');
      updates.outsourced = r ? (r.value === 'true') : false;
    }
    else if (field === 'factory') updates.factory = document.getElementById('bf-factory').value;
    else if (field === 'orderType') {
      const r = document.querySelector('input[name="bf-order-type"]:checked');
      updates.orderType = r ? r.value : 'new';
    }
    else if (field === 'shipMethod') {
      const r = document.querySelector('input[name="bf-ship-method"]:checked');
      updates.shipMethod = r ? r.value : 'air';
    }
  });

  if (Object.keys(updates).length === 0) {
    showToast('请勾选至少一个字段', 'warn');
    return;
  }

  const styleFieldKeys = ['owner', 'clientGroup', 'devSize', 'outsourced'];
  const poFieldKeys = ['factory', 'orderType', 'shipMethod'];
  const styleFields = styleFieldKeys.filter(k => k in updates);
  const poFields = poFieldKeys.filter(k => k in updates);

  let styleChangedCount = 0;
  let poChangedCount = 0;
  for (const id of selectedIds) {
    const s = state.styles.find(x => x.id === id);
    if (!s) continue;
    let changed = false;
    styleFields.forEach(k => { s[k] = updates[k]; changed = true; });
    if (poFields.length > 0 && Array.isArray(s.pos) && s.pos.length > 0) {
      s.pos.forEach(po => {
        // PO 模式只改被选中的 PO；款式模式改这个款的所有 PO
        if (selectedPoIds && !selectedPoIds.has(po.id)) return;
        poFields.forEach(k => { po[k] = updates[k]; });
        poChangedCount++;
      });
    }
    if (changed) styleChangedCount++;
    await saveOneStyle(id);
  }

  state.batchSelected = {};
  state.poBatchSelected = {};
  if (typeof exitBatchMode === 'function') exitBatchMode();
  closeUpdateModal();
  render();
  const parts = [];

function openHaveSampleQuickModal() {
  // 列出所有还没收样、未归档的款式
  const candidates = state.styles.filter(s => {
    if (s.archived) return false;
    const status = getStyleStatus(s);
    // 还在收样前的节点
    return ['PATTERN_MAKING', 'AWAIT_FABRIC', 'AWAIT_DELIVERY'].includes(status.currentNode);
  });

  state.modalContext = { type: 'haveSampleQuick' };

  document.getElementById('updateTitle').textContent = '📦 我手上有样了 · 跟单专用';
  document.getElementById('updateBody').innerHTML = `
    <div style="padding: 4px 0;">
      <input type="text" class="have-sample-modal-search" id="haveSampleSearch"
             placeholder="搜款号 / 款名 / PO 号…" autocomplete="off">
      <div style="font-size:11px;color:var(--ink-mute);margin-bottom:8px;line-height:1.5;">
        点选款式后，会跳转到正常的「登记收到样板」窗口，<br>
        这一步会跳过版师/面料/版房节点，直接进入待寄出。
      </div>
      <div class="have-sample-results" id="haveSampleResults"></div>
    </div>
  `;
  document.getElementById('updateFooter').innerHTML = `
    <button class="cancel" onclick="closeUpdateModal()">关闭</button>
  `;
  document.getElementById('updateBackdrop').classList.add('open');

  // 渲染列表
  const renderList = (keyword) => {
    const k = (keyword || '').trim().toLowerCase();
    let list = candidates;
    if (k) {
      list = candidates.filter(s => {
        const sku = (s.sku || '').toLowerCase();
        const name = (s.name || '').toLowerCase();
        const poStr = (s.pos || []).map(p => (p.poNumber || '')).join(' ').toLowerCase();
        return sku.includes(k) || name.includes(k) || poStr.includes(k);
      });
    }
    const box = document.getElementById('haveSampleResults');
    if (!box) return;
    if (list.length === 0) {
      box.innerHTML = `<div class="have-sample-empty">${k ? '没找到匹配的款' : '当前没有等待收样的款'}</div>`;
      return;
    }
    box.innerHTML = list.slice(0, 50).map(s => {
      const status = getStyleStatus(s);
      const lastCycle = s.cycles?.[s.cycles.length - 1];
      const thumb = s.imageUrl
        ? `<img class="thumb" src="${escapeHtml(s.imageUrl)}" alt="" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;></div>'">`
        : `<div class="thumb-placeholder"></div>`;
      return `
        <div role="button" tabindex="0" class="have-sample-result-item" onclick="haveSamplePickStyle('${s.id}', '${lastCycle ? lastCycle.id : ''}')">
          ${thumb}
          <div class="info">
            <div class="sku">${escapeHtml(s.sku)}</div>
            <div class="meta">${escapeHtml(s.client)} · ${escapeHtml(s.name || '(无款名)')}</div>
          </div>
          <span class="stage-tag">${escapeHtml(status.currentNodeLabel || status.stageLabel || '')}</span>
        </div>
      `;
    }).join('');
  };

  renderList('');
  // 绑定搜索
  setTimeout(() => {
    const inp = document.getElementById('haveSampleSearch');
    if (inp) {
      inp.addEventListener('input', () => renderList(inp.value));
      inp.focus();
    }
  }, 50);
}

let _viewerPhotos = [];
let _viewerIndex = 0;
function openImageViewer(photos, index) {
  if (typeof photos === 'string' && photos.trim().startsWith('[')) { try { photos = JSON.parse(photos); } catch(e) {} }
  if (typeof photos === 'string') { _viewerPhotos = [photos]; _viewerIndex = 0; }
  else if (Array.isArray(photos) && photos.length > 0) { _viewerPhotos = photos; _viewerIndex = index || 0; }
  else return;
  if (_viewerIndex < 0) _viewerIndex = 0;
  if (_viewerIndex >= _viewerPhotos.length) _viewerIndex = _viewerPhotos.length - 1;
  _renderViewerImage();
  document.getElementById('imageViewerBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function _renderViewerImage() {
  document.getElementById('imageViewerImg').src = _viewerPhotos[_viewerIndex];
  const m = _viewerPhotos.length > 1;
  document.getElementById('imageViewerPrev').classList.toggle('hidden', !m || _viewerIndex === 0);
  document.getElementById('imageViewerNext').classList.toggle('hidden', !m || _viewerIndex >= _viewerPhotos.length - 1);
  document.getElementById('imageViewerCounter').textContent = m ? `${_viewerIndex + 1} / ${_viewerPhotos.length}` : '';
}
function viewerNav(dir) {
  _viewerIndex += dir;
  if (_viewerIndex < 0) _viewerIndex = _viewerPhotos.length - 1;
  if (_viewerIndex >= _viewerPhotos.length) _viewerIndex = 0;
  _renderViewerImage();
}
function closeImageViewer() {
  document.getElementById('imageViewerBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  _viewerPhotos = []; _viewerIndex = 0;
}
document.addEventListener('keydown', (e) => {
  // Image viewer
  if (document.getElementById('imageViewerBackdrop').classList.contains('open')) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); viewerNav(-1); return; }
    if (e.key === 'ArrowRight') { e.preventDefault(); viewerNav(1); return; }
    if (e.key === 'Escape') { e.preventDefault(); closeImageViewer(); return; }
  }
  // Cmd/Ctrl+K → focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    const searchInput = document.querySelector('.search input, #search');
    if (searchInput) searchInput.focus();
  }
  // Escape → close drawer or modal
  if (e.key === 'Escape') {
    const backdrop = document.getElementById('updateBackdrop');
    if (backdrop && backdrop.classList.contains('open')) { closeUpdateModal(); return; }
    const drawer = document.getElementById('drawer');
    if (drawer && drawer.classList.contains('open')) { closeDrawer(); return; }
    const alert = document.getElementById('alertPanel');
    if (alert && alert.classList.contains('open')) { closeAlertPanel(); return; }
  }
});

function saveNewPOWithoutStyle() {
  if (!canEditPO()) { showToast('当前账号无权创建 PO', 'warn'); return; }

  const client = document.getElementById('ap-client').value || 'OTHER';
  const orderType = document.getElementById('ap-order-type').value;
  const isRepeat = orderType === 'repeat';
  const newPO = {
    id: uid('p'),

    clientStyleNo: document.getElementById('ap-client-no').value.trim(),
    barcode,
    color: document.getElementById('ap-color').value.trim(),

  };

  // 起始类型(同新建款 modal):反单忽略,直接走反单流程
  const startStage = document.getElementById('ap-start-stage')?.value || 'DEV';
  const priorReviseCount = parseInt(document.getElementById('ap-prior-revise')?.value || '0', 10) || 0;
  const openDate = todayStr();
  const newCycles = isRepeat
    ? [buildRepeatCycle(client, openDate)]
    : buildCyclesForStartStage(startStage, openDate, priorReviseCount);

  // 自动创建款式
  const newId = uid('st');
  const autoSku = poNum;  // 用 PO 号作为默认款号
  state.styles.unshift({
    id: newId,

    owner: '',
    imageUrl: '',

    cycles: newCycles,
    pos: [newPO]

  closeUpdateModal();
  render();
  if (isRepeat) {
    showToast(`反单 ${autoSku} · 通知采购备面料`, 'ok');
  } else if (startStage !== 'DEV') {

function saveEditInfo() {
  const { styleId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const sku = document.getElementById('ei-sku').value.trim();
  const name = document.getElementById('ei-name').value.trim();
  const description = document.getElementById('ei-desc').value.trim();
  const client = document.getElementById('ei-client').value;
  const specialNote = document.getElementById('ei-special-note').value.trim();
  const owner = document.getElementById('ei-owner').value;
  const openDate = document.getElementById('ei-open-date').value;
  const sampleType = document.getElementById('ei-sample-type')?.value || '';
  // 新增字段
  const clientGroup = document.getElementById('ei-client-group')?.value || '';
  const buyerName = (document.getElementById('ei-buyer-name')?.value || '').trim();
  const factory = document.getElementById('ei-factory')?.value || '';
  if (!sku && !name) { showToast('款号和款名至少填一个', 'warn'); return; }
  s.sku = sku || '未命名';
  s.name = name || '(无款名)';
  s.description = description || '';
  s.client = client;
  s.owner = owner;
  s.specialNote = specialNote || '';
  s.sampleType = sampleType || '';
  s.clientGroup = clientGroup || '';
  s.buyerName = buyerName || '';
  s.factory = factory || '';
  // 同步更新最早 cycle 的 openDate(仅当用户**实际改了**日期才动)
  // 否则保留原 ISO timestamp 不变 — 编辑款式其他字段不该污染开版时间
  if (openDate && s.cycles && s.cycles.length > 0) {
    let earliestCycle = s.cycles[0];
    s.cycles.forEach(c => {
      if (c.openDate && (!earliestCycle.openDate || c.openDate < earliestCycle.openDate)) {
        earliestCycle = c;
      }
    });
    const oldDateOnly = (earliestCycle.openDate || '').slice(0, 10);
    if (openDate !== oldDateOnly) {
      // 用户真的改了日期 → 用 updateIsoDate 替换日期部分,保留原 ISO 的时分
      earliestCycle.openDate = updateIsoDate(earliestCycle.openDate, openDate);
    }
    // 否则:openDate === oldDateOnly,用户没动,保留原 ISO 不变
  }
  saveOneStyle(styleId); closeUpdateModal(); render(); openDrawer(styleId);
}

function toggleDetailCollapse() {
  const el = document.getElementById('detail-collapse');
  el?.classList.toggle('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  const sy = state._scrollY;
  state.selectedId = null; delete state._scrollY;
  if (sy != null) setTimeout(() => window.scrollTo(0, Math.min(sy, document.body.scrollHeight - window.innerHeight)), 20);
  // 如果之前从大货日期文件夹打开的抽屉，关抽屉后回到那个文件夹
  if (state.lastFolderDate && state.topTab === 'production') {
    const date = state.lastFolderDate;
    setTimeout(() => openProdDateFolder(date), 200);
  }
}

 弹窗：登记 cycle 步骤 / 反馈 / fit / 编辑日志 / PO 管理

function openCycleStepModal(styleId, cycleId, field) {
  if (!canEditStyleInfo()) { showToast('当前账号无权登记此步骤', 'warn'); return; }
  const s = state.styles.find(x => x.id === styleId);
  const cycle = s.cycles.find(c => c.id === cycleId);
  state.modalContext = { type: 'cycleStep', styleId, cycleId, field };
  state.pendingCyclePhotos = [];  // 重置上传暂存
  const meta = CYCLE_TYPES[cycle.type];
  let label;
  if (field === 'received') label = cycle.type === 'PHOTO' ? '收到拍照版' : '收到样板';
  else if (field === 'sent') label = cycle.type === 'PHOTO' ? '拍照发图审' : '寄出客户';

  document.getElementById('updateTitle').textContent = `登记 · ${meta.label} · ${label}`;

  // 根据 field 不同，加不同的额外字段
  let extraFields = '';
  if (field === 'received') {
    // 收板：加拍照/上传图片
    const existingPhotos = cycle.receivedPhotos || [];
    extraFields = `
      <div class="form-field">
        <label>留底照片</label>
        <div class="cycle-photo-zone" id="cyclePhotoZone">
          <input type="file" class="hidden-file" id="cyclePhotoFile" accept="image/*" multiple>
          <div class="cycle-photo-inner" id="cyclePhotoInner">
            ${existingPhotos.length > 0
              ? existingPhotos.map((src, i) => `<div class="cycle-photo-thumb-wrap"><img class="cycle-photo-preview" src="${escapeHtml(src)}" alt="照片${i+1}"><button type="button" class="cycle-photo-clear" onclick="removeCyclePhoto(${i}); event.stopPropagation();">×</button></div>`).join('')
              : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg><div class="cycle-photo-text">拍照后拖拽 / Ctrl+V 粘贴 / 点击上传<br><span style="font-size:10px;color:var(--ink-mute);">支持批量</span></div>`
            }
          </div>
        </div>
      </div>
    `;
  } else if (field === 'sent') {
    if (cycle.type === 'PHOTO') {
      extraFields = '';
    } else {
      const existingTracking = cycle.shipTrackingNo || '';
      const estArrival = cycle.shipEstimatedArrival || '';
      extraFields = `
        <div class="form-field"><label>快递单号</label>
          <div style="display:flex;gap:8px;align-items:center;"><input type="text" id="u-tracking" value="${escapeHtml(existingTracking)}" placeholder="FedEx 单号…" style="font-family:var(--font-mono);flex:1;"><button type="button" class="fedex-lookup-btn" onclick="openFedExTracking(); event.stopPropagation();" title="在 FedEx 官网查件">FedEx 查件 ↗</button></div></div>
        <div class="form-field"><label>预计到达</label><input type="text" id="u-arrival" value="${escapeHtml(estArrival)}" placeholder="YYYY-MM-DD" style="cursor:pointer;" onfocus="openDatePicker(this)" onclick="openDatePicker(this)"><p style="font-size:10.5px;color:var(--ink-mute);margin-top:4px;">寄出日期+5天自动填；查完FedEx后可手动校准。到期提醒。</p></div>
      `;
    }
  }

  document.getElementById('updateBody').innerHTML = `
    <div class="form-field">
      <label for="u-date">日期</label>
      <input type="date" id="u-date" value="${todayStr()}">
    </div>
    ${extraFields}
  `;
  document.getElementById('updateFooter').innerHTML = `
    <button class="cancel" onclick="closeUpdateModal()">取消</button>
    <button class="confirm" onclick="saveCycleStep()">确认</button>
  `;
  document.getElementById('updateBackdrop').classList.add('open');

  if (field === 'received') { setTimeout(() => bindCyclePhotoUploader(cycle), 50); }
  if (field === 'sent' && cycle.type !== 'PHOTO') {
    setTimeout(() => {
      const dateEl = document.getElementById('u-date');
      const arrivalEl = document.getElementById('u-arrival');
      if (!dateEl || !arrivalEl) return;
      const calc = () => {
        // dateEl.value 是 'YYYY-MM-DD',按本地零点构造避免 UTC 漂移
        const [y, m, d] = dateEl.value.split('-').map(Number);
        if (!y || !m || !d) return;
        const dt = new Date(y, m - 1, d);
        dt.setDate(dt.getDate() + 5);
        const yy = dt.getFullYear();
        const mm = String(dt.getMonth() + 1).padStart(2, '0');
        const dd = String(dt.getDate()).padStart(2, '0');
        arrivalEl.value = `${yy}-${mm}-${dd}`;
      };
      if (!arrivalEl.value) calc();
      dateEl.addEventListener('change', calc);
    }, 80);
  }
}

// 绑定 cycle 照片上传/粘贴/拖拽 — 支持批量多张
function bindCyclePhotoUploader(cycle) {
  const zone = document.getElementById('cyclePhotoZone');
  const fileInput = document.getElementById('cyclePhotoFile');
  if (!zone || !fileInput) return;
  if (cycle.receivedPhotos && cycle.receivedPhotos.length > 0) {
    state.pendingCyclePhotos = [...cycle.receivedPhotos];
  } else {
    state.pendingCyclePhotos = [];
  }
  const addFiles = (files) => {
    const imgs = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (imgs.length === 0) { showToast('只支持图片文件', 'error'); return; }
    let loaded = 0;
    showToast(`上传中 0/${imgs.length}...`, 'ok');
    imgs.forEach(file => {
      compressImage(file)
        .then(dataUrl => uploadPhotoToStorage(dataUrl, 'cycle'))
        .then(url => {
          state.pendingCyclePhotos.push(url);
          loaded++;
          if (loaded < imgs.length) showToast(`上传中 ${loaded}/${imgs.length}...`, 'ok');
          if (loaded === imgs.length) {
            refreshCyclePhotoPreview();
            showToast(`已上传 ${loaded} 张照片`, 'ok');
          }
        });
    });
  };
  const refreshCyclePhotoPreview = () => {
    const inner = document.getElementById('cyclePhotoInner');
    if (!inner) return;
    const photos = state.pendingCyclePhotos;
    if (photos.length === 0) {
      inner.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg><div class="cycle-photo-text">拍照后拖拽 / Ctrl+V 粘贴 / 点击上传<br><span style="font-size:10px;color:var(--ink-mute);">支持批量</span></div>`;
    } else {
      inner.innerHTML = photos.map((src, i) => `<div class="cycle-photo-thumb-wrap"><img class="cycle-photo-preview" src="${escapeHtml(src)}" alt="照片${i+1}"><button type="button" class="cycle-photo-clear" onclick="removeCyclePhoto(${i}); event.stopPropagation();">×</button></div>`).join('');
    }
  };
  zone.onclick = () => fileInput.click();
  fileInput.onchange = (e) => { if (e.target.files.length > 0) addFiles(e.target.files); fileInput.value = ''; };
  fileInput.setAttribute('multiple', '');
  zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragging'); };
  zone.ondragleave = () => zone.classList.remove('dragging');
  zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('dragging'); if (e.dataTransfer.files.length > 0) addFiles(e.dataTransfer.files); };
  // paste 事件需要在 document 上监听（div 不可获焦），用 modal 打开期间挂 / 关闭时摘
  const pasteHandler = (e) => {
    // 只在 update modal 还开着 + cyclePhotoZone 还存在时响应
    if (!document.getElementById('cyclePhotoZone')) return;
    if (!document.getElementById('updateBackdrop')?.classList.contains('open')) return;
    const items = Array.from(e.clipboardData?.items || []).filter(i => i.type.startsWith('image/'));
    if (items.length > 0) {
      e.preventDefault();
      addFiles(items.map(i => i.getAsFile()));
    }
  };
  // 先摘掉旧的（如果有）再挂新的
  if (state._cyclePhotoPasteHandler) document.removeEventListener('paste', state._cyclePhotoPasteHandler);
  state._cyclePhotoPasteHandler = pasteHandler;
  document.addEventListener('paste', pasteHandler);
}
function removeCyclePhoto(index) {
  state.pendingCyclePhotos.splice(index, 1);
  const inner = document.getElementById('cyclePhotoInner');
  const photos = state.pendingCyclePhotos;
  if (photos.length === 0) {
    inner.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg><div class="cycle-photo-text">拍照后拖拽 / Ctrl+V 粘贴 / 点击上传<br><span style="font-size:10px;color:var(--ink-mute);">支持批量</span></div>`;
  } else {
    inner.innerHTML = photos.map((src, i) => `<div class="cycle-photo-thumb-wrap"><img class="cycle-photo-preview" src="${escapeHtml(src)}" alt="照片${i+1}"><button type="button" class="cycle-photo-clear" onclick="removeCyclePhoto(${i}); event.stopPropagation();">×</button></div>`).join('');
  }
}
function clearCyclePhotos() {

}
function saveCycleStep() {
  const { styleId, cycleId, field } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  const cycle = s.cycles.find(c => c.id === cycleId);
  const date = document.getElementById('u-date').value;
  if (!date) { showToast('请选择日期', 'warn'); return; }

  // 记录撤销所需的"快照"——只快照即将被本次动作改写/写入的字段
  const undoSnapshot = {};
  if (field === 'received') {
    undoSnapshot.receivedDate = cycle.receivedDate || null;
    undoSnapshot.patternMakerDone = !!cycle.patternMakerDone;
    undoSnapshot.patternMakerDoneDate = cycle.patternMakerDoneDate || null;
    undoSnapshot.receivedPhotos = cycle.receivedPhotos ? [...cycle.receivedPhotos] : null;
  } else if (field === 'sent') {
    undoSnapshot.sentDate = cycle.sentDate || null;
    undoSnapshot.shipTrackingNo = cycle.shipTrackingNo || null;
    undoSnapshot.shipEstimatedArrival = cycle.shipEstimatedArrival || null;
  }

  if (field === 'received') {
    cycle.receivedDate = toIsoWithNowTime(date);
    // 不清 patternMakerDone — 保留它作为完整日志/流程线上永久的时间线事件
    if (state.pendingCyclePhotos && state.pendingCyclePhotos.length > 0) {
      cycle.receivedPhotos = [...state.pendingCyclePhotos];
    } else if (state.pendingCyclePhotos && state.pendingCyclePhotos.length === 0 && cycle.receivedPhotos) {
      delete cycle.receivedPhotos;
    }
  }
  else if (field === 'sent') {
    cycle.sentDate = toIsoWithNowTime(date);
    if (cycle.type !== 'PHOTO') {
      const trackInput = document.getElementById('u-tracking');
      const arrivalInput = document.getElementById('u-arrival');
      const tracking = trackInput ? trackInput.value.trim() : '';
      const arrival = arrivalInput ? arrivalInput.value : '';
      if (tracking) cycle.shipTrackingNo = tracking;
      else if (cycle.shipTrackingNo) delete cycle.shipTrackingNo;
      if (arrival) cycle.shipEstimatedArrival = arrival;
      else if (cycle.shipEstimatedArrival) delete cycle.shipEstimatedArrival;
    }
  }
  state.pendingCyclePhotos = [];
  // 同步到 Supabase（只保存当前修改的 style）
  saveToLocalCache(state.styles);
  saveStyleToSupabase(s);
  closeUpdateModal();
  
  // 登记完收样/寄出后:不强制切 sub-tab,直接 render 让款式在当前视图里自然更新。
  // 注意:今日 sub-nav 只有 5 个职能 sub-tab(pattern / fabric / workshop / followup / prod),
  //      旧代码尝试切到 'shipping' / 'feedback' / 'photo' 这些根本不存在的 sub-tab,
  //      admin 角色 canSee 返回 true 时会把 state.todaySub 设成无效值 → render 整体显示空。
  //      现在统一不切 — 款转到下一节点后会自动出现在对应 sub-tab 的对应 section。
  if (state.topTab !== 'today') {
    const todayNav = document.querySelector('.nav-item[data-toptab="today"]');
    if (todayNav) todayNav.click();
  }
  render();
  openDrawer(styleId);

  // 弹出可撤销 toast
  const msg = field === 'received'
    ? '✓ 已收到样板 · 进入待寄出'
    : (cycle.type === 'PHOTO' ? '✓ 已发图审 · 等客户回评' : '✓ 已寄出 · 等客户反馈');
  showUndoToast(msg, () => {
    const s2 = state.styles.find(x => x.id === styleId);
    const c2 = s2?.cycles?.find(c => c.id === cycleId);
    if (!c2) return;
    if (field === 'received') {
      c2.receivedDate = undoSnapshot.receivedDate;
      c2.patternMakerDone = undoSnapshot.patternMakerDone;
      c2.patternMakerDoneDate = undoSnapshot.patternMakerDoneDate;
      if (undoSnapshot.receivedPhotos) c2.receivedPhotos = undoSnapshot.receivedPhotos;
      else delete c2.receivedPhotos;
    } else if (field === 'sent') {
      c2.sentDate = undoSnapshot.sentDate;
      if (undoSnapshot.shipTrackingNo) c2.shipTrackingNo = undoSnapshot.shipTrackingNo;
      else delete c2.shipTrackingNo;
      if (undoSnapshot.shipEstimatedArrival) c2.shipEstimatedArrival = undoSnapshot.shipEstimatedArrival;
      else delete c2.shipEstimatedArrival;
    }
    saveOneStyle(styleId);
    render();
    openDrawer(styleId);
    showToast('已撤销·回到上一步', 'ok');
  });
}

function updateColorSwatch(input) {
  const card = input.closest('.po-color-card'); if (!card) return;
  const swatch = card.querySelector('[data-swatch]'); if (!swatch) return;
  const map = { '黑':'#1a1a1a','黑色':'#1a1a1a','白':'#f5f5f0','白色':'#f5f5f0','红':'#c0392b','红色':'#c0392b','蓝':'#2563eb','蓝色':'#2563eb','绿':'#166534','绿色':'#166534','米':'#d4c5a9','米色':'#d4c5a9','灰':'#78716c','灰色':'#78716c','粉':'#e8a0bf','粉色':'#e8a0bf','棕':'#8b5e3c','棕色':'#8b5e3c','紫':'#7c3aed','紫色':'#7c3aed','黄':'#ca8a04','黄色':'#ca8a04' };
  const v = input.value.trim(); const color = map[v] || null;
  swatch.style.background = color || 'transparent';
  swatch.style.borderColor = color || 'var(--line-strong)';
}

async function saveFeedback() {
  if (!canEditStyleInfo()) { showToast('当前账号无权登记反馈', 'warn'); return; }
  const { styleId, cycleId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  const cycle = s.cycles.find(c => c.id === cycleId);
  const date = document.getElementById('u-date').value;
  if (!date) { showToast('请选择日期', 'warn'); return; }
  const outcome = document.querySelector('input[name="u-outcome"]:checked')?.value;
  if (!outcome) { showToast('请选择结论', 'warn'); return; }

  // ── 验证 PO(在修改 cycle 之前!避免 race 污染数据) ──
  // 业务流程:客户先下 PO(跟单已拿到 PO 信息)→ 过几天才给 fit comment
  // 任何 PO_* outcome(PO_AWAIT_FIT / PO_REVISE / PO_PHOTO / PO_PROD)都意味着 PO 已存在,必须录入
  let pendingNewPos = null;
  if (cycle.type === 'DEV' && outcome !== FEEDBACK_OUTCOMES.ARCHIVED && (!s.pos || s.pos.length === 0)) {
    const rows = document.querySelectorAll('#po-rows-container .po-color-card');
    const newPos = [];
    rows.forEach(row => {
      const num = row.querySelector('.po-row-num').value.trim();
      const color = row.querySelector('.po-row-color').value.trim();
      const ef = row.querySelector('.po-row-ef').value;
      const qty = parseInt(row.querySelector('.po-row-qty').value) || null;
      const cliNo = row.querySelector('.po-row-client-no')?.value.trim() || '';
      const barcode = row.querySelector('.po-row-barcode')?.value.trim() || '';
      const desc = row.querySelector('.po-row-desc')?.value.trim() || '';
      const orderType = row.querySelector('.po-row-order-type')?.value || '';
      const shipMethod = row.querySelector('.po-row-ship-method')?.value || '';
      const factory = row.querySelector('.po-row-factory')?.value || '';
      if (num && ef) {
        const po = { id: uid('po'), poNumber: num, color, quantity: qty, exFactory: ef, addedAt: date };
        if (cliNo) po.clientStyleNo = cliNo;
        if (barcode) po.barcode = barcode;
        if (desc) po.description = desc;
        if (orderType) po.orderType = orderType;
        if (shipMethod) po.shipMethod = shipMethod;
        if (factory) po.factory = factory;
        newPos.push(po);
      }
    });
    if (newPos.length === 0) {
      showToast('选了"下 PO"类结果就必须填 PO(PO 号 + ex-factory 货期)', 'warn');
      return;  // cycle 未被修改,数据干净
    }
    pendingNewPos = newPos;
  }

  // 如果选了"未采用"（ARCHIVED），先让用户选归档原因
  let archiveResult = null;
  if (outcome === FEEDBACK_OUTCOMES.ARCHIVED) {
    archiveResult = await pickArchiveReasonDialog({
      title: '归档此款',
      message: `将"${s.sku}"归档到历史档案。请选择原因，方便日后回查。`
    });
    if (!archiveResult) return;  // 用户取消
  }

  // ── 全部验证通过,开始修改 cycle ──
  cycle.feedbackDate = toIsoWithNowTime(date);
  cycle.feedbackOutcome = outcome;
  const noteEl = document.getElementById('u-feedback-note');
  if (noteEl && noteEl.value.trim()) cycle.feedbackNote = noteEl.value.trim();

  if (pendingNewPos) s.pos = pendingNewPos;

  if (outcome === FEEDBACK_OUTCOMES.ARCHIVED) {
    s.archived = true;
    s.archivedDate = date;
    if (archiveResult) {
      s.archiveReason = archiveResult.reason;
      if (archiveResult.note) s.archiveNote = archiveResult.note;
    }
  }
  else if (outcome === FEEDBACK_OUTCOMES.PO_AWAIT_FIT) { s.awaitingFit = { since: date }; }
  else if (outcome === FEEDBACK_OUTCOMES.PO_REVISE) { s.cycles.push({ id: uid('c'), type: 'REVISE', openDate: toIsoWithNowTime(date) }); }
  else if (outcome === FEEDBACK_OUTCOMES.PO_PHOTO) { s.cycles.push({ id: uid('c'), type: 'PHOTO', openDate: toIsoWithNowTime(date) }); }
  else if (outcome === FEEDBACK_OUTCOMES.PO_PROD) {
    // approve · 可安排大货 → 进入「等版师放码」中间状态（不立刻 push PROD cycle）
    // 版师点「✓ 放完码」后才 push PROD cycle
    s.awaitingGrading = { since: date, fromCycleId: cycle.id, fromCycleType: cycle.type };
  }
  else if (outcome === FEEDBACK_OUTCOMES.APPROVED && cycle.type === 'PHOTO') {
    // 拍照版批准 → 同样进入「等版师放码」
    s.awaitingGrading = { since: date, fromCycleId: cycle.id, fromCycleType: cycle.type };
  }
  else if (outcome === FEEDBACK_OUTCOMES.REMAKE_PHOTO) { s.cycles.push({ id: uid('c'), type: 'PHOTO', openDate: toIsoWithNowTime(date) }); }
  else if (outcome === FEEDBACK_OUTCOMES.REMAKE_SAMPLE) { s.cycles.push({ id: uid('c'), type: 'REVISE', openDate: toIsoWithNowTime(date) }); }
  else if (outcome === FEEDBACK_OUTCOMES.REMAKE && cycle.type === 'PROD') { s.cycles.push({ id: uid('c'), type: 'PROD', openDate: toIsoWithNowTime(date) }); }

  saveOneStyle(styleId); closeUpdateModal(); render(); openDrawer(styleId);
}

function openProdReceivedModal(styleId) {
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  state.modalContext = { type: "prodReceived", styleId };
  state.pendingDefectPhotos = [];  // 临时存本次新上传的瑕疵照片

  const existing = (s.prodReceived?.batches) || [];
  const batchNum = existing.length + 1;

  // 多 PO 选择器
  const pos = s.pos || [];
  const isMultiPO = pos.length > 1;
  let poSelectorHtml = '';
  if (isMultiPO) {
    poSelectorHtml = `
      <div class="form-field">
        <label>选择 PO <span style="color:var(--danger);">*</span></label>
        <div class="prod-po-selector">
          ${pos.map((p, i) => {
            const recv = sumPOReceived(s, p.id);
            const total = p.quantity || 0;
            const remaining = Math.max(0, total - recv);
            const done = total > 0 && recv >= total;
            return `
              <label class="prod-po-option ${done ? 'po-done' : ''}">
                <input type="radio" name="prodPoId" value="${p.id}" ${done ? 'disabled' : (i === 0 ? 'checked' : '')}>
                <div class="prod-po-option-info">
                  <div class="prod-po-option-line1">
                    <span class="prod-po-option-no">${escapeHtml(p.poNumber || '(无 PO 号)')}</span>
                    ${p.color ? `<span class="prod-po-option-color">${escapeHtml(p.color)}</span>` : ''}
                  </div>
                  <div class="prod-po-option-line2">
                    ${total > 0 ? `已到 ${recv}/${total} 件` : '数量未填'}
                    ${done ? ' · ✓ 完成' : (remaining > 0 ? ` · 还差 ${remaining} 件` : '')}
                  </div>
                </div>
              </label>
            `;
          }).join('')}
        </div>
      </div>
    `;

    const p = pos[0];
    const recv = sumPOReceived(s, p.id);
    const total = p.quantity || 0;
    poSelectorHtml = `
      <div class="prod-po-info-banner">
        <span class="lbl">PO</span>
        <span class="val">${escapeHtml(p.poNumber || '(无 PO 号)')}</span>

  if (existing.length > 0) {
    const totalRecv = existing.reduce((sum, b) => sum + (b.received || 0), 0);
    const totalDef = existing.reduce((sum, b) => sum + sumDefects(b.defects), 0);

  document.getElementById("updateTitle").textContent = `📦 登记到货 · 第 ${batchNum} 批`;
  document.getElementById("updateBody").innerHTML = `
    ${existingSummary}
    ${poSelectorHtml}

    <div class="form-row" style="display:flex;gap:10px;">

// ─── 工具函数 ───

// 累计某 PO 的已到货数量(传 null 则统计全部)
function sumPOReceived(style, poId) {
  if (!style?.prodReceived?.batches) return 0;
  return style.prodReceived.batches
    .filter(b => !poId || b.poId === poId)
    .reduce((sum, b) => sum + (Number(b.received) || 0), 0);
}

// 计算瑕疵对象的总数
function sumDefects(defects) {
  if (!defects) return 0;
  return Object.values(defects).reduce((a, b) => a + (Number(b) || 0), 0);
}

// 实时更新瑕疵合计显示
function updateDefectTotal() {
  let total = 0;
  document.querySelectorAll('.defect-input').forEach(inp => {
    total += Number(inp.value) || 0;
  });
  const el = document.getElementById('defectTotal');
  if (el) el.textContent = `本批瑕疵合计:${total} 件`;
}

// 上传瑕疵照片
function handleDefectPhotoUpload(event) {
  const files = Array.from(event.target.files || []);
  if (files.length === 0) return;
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    compressImage(file)
      .then(dataUrl => uploadPhotoToStorage(dataUrl, 'defect'))
      .then(url => {
        if (!state.pendingDefectPhotos) state.pendingDefectPhotos = [];
        state.pendingDefectPhotos.push(url);
        renderDefectPhotoList();
      });
  });
  event.target.value = '';  // 允许重选同一张
}

function renderDefectPhotoList() {
  const list = document.getElementById('defectPhotoList');
  if (!list) return;
  const photos = state.pendingDefectPhotos || [];
  list.innerHTML = photos.map((src, i) => `
    <div class="defect-photo-item">
      <img src="${escapeHtml(src)}" alt="">
      <button type="button" class="defect-photo-remove" onclick="removeDefectPhoto(${i})" title="移除">×</button>
    </div>
  `).join('');
}

function removeDefectPhoto(idx) {
  if (!state.pendingDefectPhotos) return;
  state.pendingDefectPhotos.splice(idx, 1);
  renderDefectPhotoList();
}

// ─── 保存 ───
async function saveProdReceived() {
  if (!canDoActionForNode('PROD_SHIPPING')) { showToast('当前账号无权登记大货到货', 'warn'); return; }
  const { styleId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;

  const date = document.getElementById("u-prod-date")?.value;
  if (!date) { showToast("请选择到货日期", "warn"); return; }

  const time = document.getElementById("u-prod-time")?.value || '';
  const received = Number(document.getElementById("u-prod-received")?.value) || 0;
  if (received <= 0) { showToast("请填写到货数量", "warn"); return; }

  // 多 PO 时必须选 PO
  let poId = null;
  if ((s.pos || []).length > 1) {
    const sel = document.querySelector('input[name="prodPoId"]:checked');
    if (!sel) { showToast("多 PO 款必须选择 PO", "warn"); return; }
    poId = sel.value;
  } else if ((s.pos || []).length === 1) {
    poId = s.pos[0].id;
  }

  // 校验:本批 + 已收 不能超过 PO 总数量(多 PO 时按 poId 校验单 PO,无 poId 时按全款合计)
  const prevBatches = s.prodReceived?.batches || [];
  if (poId) {
    const targetPo = (s.pos || []).find(p => p.id === poId);
    const poQty = Number(targetPo?.quantity) || 0;
    const poRecvBefore = prevBatches.filter(b => b.poId === poId)
      .reduce((sum, b) => sum + (Number(b.received) || 0), 0);
    if (poQty > 0 && (poRecvBefore + received) > poQty) {
      const ok = await showDialog({
        title: '超出 PO 数量',
        message: `这个 PO 已到 ${poRecvBefore} 件 + 本批 ${received} 件 = ${poRecvBefore + received},超过 PO 总数 ${poQty}。确认继续吗?`,
        confirmText: '继续登记', danger: true
      });
      if (!ok) return;
    }
  } else {
    const totalQty = (s.pos || []).reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
    const totalRecvBefore = prevBatches.reduce((sum, b) => sum + (Number(b.received) || 0), 0);
    if (totalQty > 0 && (totalRecvBefore + received) > totalQty) {
      const ok = await showDialog({
        title: '超出总数量',
        message: `已到 ${totalRecvBefore} 件 + 本批 ${received} 件 = ${totalRecvBefore + received},超过 PO 总数 ${totalQty}。确认继续吗?`,
        confirmText: '继续登记', danger: true
      });
      if (!ok) return;
    }
  }

  // 收集瑕疵数据
  const defects = { size: 0, fabric: 0, trim: 0, decoration: 0, sewing: 0, appearance: 0 };
  document.querySelectorAll('.defect-input').forEach(inp => {
    const k = inp.dataset.defect;
    defects[k] = Number(inp.value) || 0;
  });

  const defectNote = document.getElementById("u-defect-note")?.value?.trim() || '';
  const batchNote = document.getElementById("u-batch-note")?.value?.trim() || '';
  const fullyReceived = !!document.getElementById("u-prod-fully")?.checked;
  const defectPhotos = (state.pendingDefectPhotos || []).slice();

  // 构造新批次
  const newBatch = {
    id: 'batch_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    poId,
    date,
    time: time || null,
    received,
    defects,
    defectNote: defectNote || null,
    defectPhotos: defectPhotos.length > 0 ? defectPhotos : null,
    note: batchNote || null,
    createdAt: new Date().toISOString(),
    createdBy: (typeof window.getCurrentUser === 'function' ? window.getCurrentUser()?.user : null) || 'unknown',
  };

  // 写入 prodReceived
  if (!s.prodReceived) {
    s.prodReceived = { date, note: '', batches: [] };
  }
  if (!s.prodReceived.batches) s.prodReceived.batches = [];
  s.prodReceived.batches.push(newBatch);
  // 老字段 date 保留为"第一次到货日期",兼容现有 status 判断
  if (!s.prodReceived.date) s.prodReceived.date = date;
  s.prodReceived.fullyReceived = fullyReceived;

  state.pendingDefectPhotos = [];

  saveToLocalCache(state.styles);
  await saveStyleToSupabase(s);
  closeUpdateModal();
  render();
  openDrawer(styleId);

  if (fullyReceived) {
    showToast(`已登记第 ${s.prodReceived.batches.length} 批 · 大货全部收齐,流程完结`, "ok");
  } else {
    showToast(`已登记第 ${s.prodReceived.batches.length} 批 · ${received} 件`, "ok");
  }
}

// 渲染抽屉内的"大货到货历史"模块
function renderProdReceiveHistory(s) {
  if (!s.prodReceived || !s.prodReceived.batches || s.prodReceived.batches.length === 0) return '';
  const batches = s.prodReceived.batches.slice().reverse();  // 最新的在前
  const totalRecv = s.prodReceived.batches.reduce((sum, b) => sum + (Number(b.received) || 0), 0);
  const totalQty = (s.pos || []).reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
  const totalDef = s.prodReceived.batches.reduce((sum, b) => sum + sumDefects(b.defects), 0);

  const fully = s.prodReceived.fullyReceived === true;
  const headerStatus = fully
    ? `<span style="color:var(--ok);font-weight:600;">✓ 全部收齐</span>`
    : (totalQty > 0 ? `<span style="color:var(--warn);">部分到仓 ${totalRecv}/${totalQty} 件</span>` : `<span>${totalRecv} 件</span>`);

  // 每个 PO 的统计(多 PO 时显示)
  let perPoSummary = '';
  if ((s.pos || []).length > 1) {
    perPoSummary = `<div class="prod-history-po-summary">${
      s.pos.map(p => {
        const recv = sumPOReceived(s, p.id);
        const qty = p.quantity || 0;
        const done = qty > 0 && recv >= qty;
        return `<div class="prod-po-row ${done ? 'done' : ''}">
          <span class="po-no">${escapeHtml(p.poNumber || '(无 PO 号)')}</span>
          ${p.color ? `<span class="po-color">${escapeHtml(p.color)}</span>` : ''}
          <span class="po-qty">${qty > 0 ? `${recv}/${qty}` : recv} 件</span>
          ${done ? '<span class="po-done-tag">✓</span>' : (qty > 0 ? `<span class="po-remaining">差 ${qty - recv}</span>` : '')}
        </div>`;
      }).join('')
    }</div>`;
  }

  const defectLabels = { size: '尺寸', fabric: '布料', trim: '辅料', decoration: '装饰', sewing: '车缝', appearance: '外观' };

  return `
    <div class="section-title" style="margin-top:18px;">📦 大货到货历史 · ${headerStatus} · 共 ${totalDef} 件瑕疵</div>
    ${perPoSummary}
    <div class="prod-batch-list">
      ${batches.map((b, idx) => {
        const realIdx = s.prodReceived.batches.length - idx;  // 顺序号(第几批)
        const defectTotal = sumDefects(b.defects);
        const po = (s.pos || []).find(p => p.id === b.poId);
        return `
          <div class="prod-batch-card">
            <div class="prod-batch-head">
              <span class="prod-batch-num">第 ${realIdx} 批</span>
              <span class="prod-batch-date">${escapeHtml(b.date)}${b.time ? ' ' + escapeHtml(b.time) : ''}</span>
              ${po ? `<span class="prod-batch-po">${escapeHtml(po.poNumber || '')}${po.color ? ' · ' + escapeHtml(po.color) : ''}</span>` : ''}
              <span class="prod-batch-qty">${b.received} 件</span>
            </div>
            ${defectTotal > 0 ? `
              <div class="prod-batch-defects">
                <span class="prod-batch-defects-total">瑕疵 ${defectTotal} 件</span>
                <span class="prod-batch-defects-detail">${
                  Object.entries(b.defects || {})
                    .filter(([_, v]) => Number(v) > 0)
                    .map(([k, v]) => `${defectLabels[k] || k} ${v}`)
                    .join(' · ')
                }</span>
              </div>
            ` : ''}
            ${b.defectNote ? `<div class="prod-batch-note"><span class="lbl">瑕疵描述</span> ${escapeHtml(b.defectNote)}</div>` : ''}
            ${b.defectPhotos && b.defectPhotos.length > 0 ? `
              <div class="prod-batch-photos">
                ${b.defectPhotos.map(src => `<img src="${escapeHtml(src)}" alt="瑕疵照片" onclick="openImageViewer('${escapeJsAttr(src)}')">`).join('')}
              </div>
            ` : ''}
            ${b.note ? `<div class="prod-batch-note"><span class="lbl">备注</span> ${escapeHtml(b.note)}</div>` : ''}
            <div class="prod-batch-meta">
              ${b.createdAt ? `录入于 ${escapeHtml(b.createdAt.slice(0, 16).replace('T', ' '))}` : ''}
              ${b.createdBy ? ` · ${escapeHtml(b.createdBy)}` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function saveFitReceived() {
  if (!canEditStyleInfo()) { showToast('当前账号无权登记 fit', 'warn'); return; }
  const { styleId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  const date = document.getElementById('u-date').value;
  if (!date) { showToast('请选择日期', 'warn'); return; }
  const action = document.querySelector('input[name="u-action"]:checked')?.value;
  if (!action) { showToast('请选择下一步', 'warn'); return; }
  const note = document.getElementById('u-fit-note').value.trim();

  s.awaitingFit = null;
  if (action === 'PROD') {
    // 客户直接 approve → 跟 saveFeedback 的 PO_PROD 流程一致:先进 GRADING,版师放完码再 push PROD cycle
    const lastCycle = s.cycles && s.cycles[s.cycles.length - 1];
    s.awaitingGrading = {
      since: date,
      fromCycleId: lastCycle ? lastCycle.id : null,
      fromCycleType: lastCycle ? lastCycle.type : null,
    };
  } else {
    const newCycle = { id: uid('c'), type: action, openDate: toIsoWithNowTime(date) };
    // note 内容已经追加到 s.notes 备注里(见下方),无需在 cycle 上重复存(也没云端列)
    s.cycles.push(newCycle);
  }

  // 也记到备注
  if (note) {
    const today = todayStr().slice(5).replace('-', '/');
    const newLine = `[${today}] 收到 fit: ${note}`;
    s.notes = s.notes ? (s.notes + '\n' + newLine) : newLine;
  }

  saveOneStyle(styleId); closeUpdateModal(); render(); openDrawer(styleId);
}

// cycle 字段的业务流程顺序 — cascading delete 用
// 删某个字段 = 撤回到该步骤之前 → 该字段 + 后续所有字段一起清
const CYCLE_FIELD_ORDER = [
  'openDate',
  'patternMakerDoneDate',
  'fabricSourcedDate',
  'receivedDate',
  'sentDate',
  'feedbackDate',
];

// cascading 清除 cycle 内 fromField 及之后的所有字段(含附属)
function cascadeDeleteCycleField(cycle, fromField) {
  const idx = CYCLE_FIELD_ORDER.indexOf(fromField);
  if (idx < 0) return;
  for (let i = idx; i < CYCLE_FIELD_ORDER.length; i++) {
    const f = CYCLE_FIELD_ORDER[i];
    delete cycle[f];
    // 附属字段一起清
    if (f === 'patternMakerDoneDate') delete cycle.patternMakerDone;
    if (f === 'receivedDate') delete cycle.receivedPhotos;
    if (f === 'sentDate') {
      delete cycle.shipTrackingNo;
      delete cycle.shipEstimatedArrival;
      delete cycle.shipActualArrival;
    }
    if (f === 'feedbackDate') {
      delete cycle.feedbackOutcome;
      delete cycle.feedbackNote;
    }
  }
}

// 计算 cascading 提示文案:列出会被一起清除的字段
function _describeCascadeFields(fromField) {
  const labels = {
    openDate: '开版',
    patternMakerDoneDate: '版师打完',
    fabricSourcedDate: '面料备齐',
    receivedDate: '收到样板',
    sentDate: '寄出客户',
    feedbackDate: '客户反馈',
  };
  const idx = CYCLE_FIELD_ORDER.indexOf(fromField);
  if (idx < 0) return '';
  const after = CYCLE_FIELD_ORDER.slice(idx + 1).map(f => labels[f]).filter(Boolean);
  return after.length > 0 ? after.join(' / ') : '';
}

async function deleteLogEntry() {
  const { styleId, cycleId, field } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;

  // 构造提示文案
  let confirmMsg = "确认删除此条记录？";
  if (field === 'openDate') {
    confirmMsg = '删除"开版"等于撤回整个 cycle 周期。是否继续？';
  } else if (CYCLE_FIELD_ORDER.includes(field)) {
    const after = _describeCascadeFields(field);
    confirmMsg = after
      ? `撤回此步骤会同时清除后续记录(${after})。继续？`
      : "确认删除此条记录？";
  }

  if (!await showDialog({ title: "删除这条日志?", message: confirmMsg, confirmText: "删除", danger: true })) return;

  if (field === "awaitingFit") {
    s.awaitingFit = null;
  } else if (field === "awaitingGrading") {
    s.awaitingGrading = null;
  } else if (field === "openDate") {
    // 删除整个 cycle
    s.cycles = s.cycles.filter(c => c.id !== cycleId);
    await db.deleteCycle?.(cycleId, styleId);
  } else {
    const cycle = s.cycles.find(c => c.id === cycleId);
    if (cycle) {
      cascadeDeleteCycleField(cycle, field);
      await db.upsertCycle(cycle, styleId);
    }
  }
  await saveStyleToSupabase(s);
  closeUpdateModal(); render(); openDrawer(styleId);
  showToast("已删除并同步", "ok");
}

function renderPOImageDropzone(existingImage) {
  const hasImg = !!existingImage;
  return `
    <div class="po-image-dropzone ${hasImg ? 'has-image' : ''}" id="poImageDropzone">
      <input type="file" id="poImageFileInput" accept="image/*" style="display:none;" onchange="handlePOImageSelect(event)">
      ${hasImg ? `
        <div class="po-image-preview">
          <img src="${escapeHtml(existingImage)}" alt="PO 图片" id="poImagePreview">
          <button type="button" class="po-image-remove" onclick="removePOImage(event)" title="移除">×</button>
        </div>
      ` : `
        <div class="po-image-placeholder">
          <div class="po-image-icon">📷</div>
          <div class="po-image-hint">
            <div><b>点击</b> 选择图片</div>
            <div>或 <b>拖拽</b> / <b>Ctrl+V</b> 粘贴</div>
          </div>
        </div>
      `}
    </div>
  `;
}

function bindPOImageDropzone() {
  const dz = document.getElementById('poImageDropzone');
  if (!dz) return;

  // 点击 → 触发文件选择
  dz.onclick = (e) => {
    if (e.target.classList.contains('po-image-remove')) return;  // 删除按钮单独处理
    document.getElementById('poImageFileInput')?.click();
  };

  // 拖拽进入/离开高亮
  dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('drag-over'); };
  dz.ondragleave = () => dz.classList.remove('drag-over');

  // 拖拽放下
  dz.ondrop = (e) => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const file = e.dataTransfer?.files?.[0];
    if (file && file.type.startsWith('image/')) readPOImageFile(file);
  };

  // 粘贴(在 modal 上监听)
  const modalBackdrop = document.getElementById('updateBackdrop');
  if (modalBackdrop && !modalBackdrop._pasteBound) {
    modalBackdrop._pasteHandler = (e) => {
      // 仅当 modal 打开 + 当前是 addPO/editPO 上下文时处理
      if (!modalBackdrop.classList.contains('open')) return;
      const ctx = state.modalContext?.type;
      if (ctx !== 'addPO' && ctx !== 'editPO') return;
      const items = e.clipboardData?.items || [];
      for (const item of items) {
        if (item.type?.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) {
            e.preventDefault();
            readPOImageFile(file);
            break;
          }
        }
      }
    };
    document.addEventListener('paste', modalBackdrop._pasteHandler);
    modalBackdrop._pasteBound = true;
  }
}

function handlePOImageSelect(event) {
  const file = event.target.files?.[0];
  if (file) readPOImageFile(file);
  event.target.value = '';
}

function readPOImageFile(file) {
  if (!file.type.startsWith('image/')) {
    showToast('请选择图片文件', 'warn');
    return;
  }
  compressImage(file)
    .then(dataUrl => uploadPhotoToStorage(dataUrl, 'po'))
    .then(url => {
      state.pendingPOImage = url;
      refreshPOImageDropzone();
    });
}

function removePOImage(event) {
  event?.stopPropagation();
  state.pendingPOImage = null;
  refreshPOImageDropzone();
}

function refreshPOImageDropzone() {
  const dz = document.getElementById('poImageDropzone');
  if (!dz) return;
  // 重新生成 dropzone 内容
  const wrapper = dz.parentElement;
  wrapper.innerHTML = renderPOImageDropzone(state.pendingPOImage);
  setTimeout(() => bindPOImageDropzone(), 10);
}

async function deletePO() {
  if (!canEditPO()) { showToast('当前账号无权删除 PO', 'warn'); return; }
  if (!await showDialog({title:'删除此 PO?', message:'删除后可在抽屉「已删 PO」区恢复。', confirmText:'删除', danger:true})) return;
  const { styleId, poId } = state.modalContext;
  const s = state.styles.find(x => x.id === styleId);
  const po = s.pos.find(p => p.id === poId);
  if (!po) { closeUpdateModal(); return; }
  // 软删：移到 _deletedPos，不真删
  if (!Array.isArray(s._deletedPos)) s._deletedPos = [];
  s._deletedPos.push({ ...po, _deletedAt: todayStr() });
  s.pos = s.pos.filter(p => p.id !== poId);
  saveOneStyle(styleId); closeUpdateModal(); render(); openDrawer(styleId);
  showToast('PO 已移入「已删 PO」·可恢复', 'ok');
}

// 从已删 PO 列表恢复
async function restoreDeletedPO(styleId, poId) {
  const s = state.styles.find(x => x.id === styleId);
  if (!s || !Array.isArray(s._deletedPos)) return;
  const po = s._deletedPos.find(p => p.id === poId);
  if (!po) return;
  if (!Array.isArray(s.pos)) s.pos = [];
  // 剥掉 _deletedAt 再放回
  const restored = { ...po };
  delete restored._deletedAt;
  s.pos.push(restored);
  s._deletedPos = s._deletedPos.filter(p => p.id !== poId);
  saveOneStyle(styleId); render(); openDrawer(styleId);
  showToast('PO 已恢复', 'ok');
}

// 永久删除已删 PO（从历史里彻底移除）
async function purgeDeletedPO(styleId, poId) {
  if (!await showDialog({title:'永久删除此 PO?', message:'此操作不可恢复。', confirmText:'永久删除', danger:true})) return;
  const s = state.styles.find(x => x.id === styleId);
  if (!s || !Array.isArray(s._deletedPos)) return;
  s._deletedPos = s._deletedPos.filter(p => p.id !== poId);
  saveOneStyle(styleId); render(); openDrawer(styleId);
  showToast('已永久删除', 'ok');
}

async function undoArchive(id) {
  if (!canArchiveStyle()) { showToast('当前账号无权取消归档', 'warn'); return; }
  if (!await showDialog({title:'取消归档', message:'是否取消该款式的归档状态？', confirmText:'取消归档'})) return;
  const s = state.styles.find(x => x.id === id);
  s.archived = false;
  delete s.archivedDate;
  const lastCycle = s.cycles[s.cycles.length - 1];
  if (lastCycle.feedbackOutcome === FEEDBACK_OUTCOMES.ARCHIVED) {
    delete lastCycle.feedbackDate;
    delete lastCycle.feedbackOutcome;
  }
  saveOneStyle(id); render(); openDrawer(id);
}

async function deleteStyle(id) {
  if (!canArchiveStyle()) { showToast('当前账号无权归档款式', 'warn'); return; }
  if (!await showDialog({title:"归档此款?", message:"款会移入历史档案,可日后恢复。", confirmText:"移入归档", danger:true})) return;
  const s = state.styles.find(x => x.id === id);
  if (!s) return;
  s.archived = true;
  s.archivedDate = todayStr();
  s.archiveReason = "deleted";
  state.styles = state.styles.map(x => x.id === id ? s : x);
  saveToLocalCache(state.styles);
  await saveStyleToSupabase(s);
  closeDrawer(); render();
  showToast("已移入历史档案", "ok");
}

function onStartStageChange() {

  }
  if (!hint) return;
  const hints = {
    'DEV': '默认从开发版开始，开版后等收到样板。',
    'REVISE': '历史款迁移：默认开发版已通过，进入修改循环。',

// 实时更新"第 X 版"提示
function onPriorReviseChange() {
  const n = parseInt(document.getElementById('f-prior-revise-count')?.value || '0', 10) || 0;
  const hint = document.getElementById('priorReviseHint');
  if (!hint) return;
  // 总版数 = 1 个开发版 + n 个之前的重做板 + 1 个本次重做板
  const versionNum = n + 2;
  const priorTxt = n === 0 ? '没有之前的重做板' : `之前 ${n} 次重做板`;
  hint.textContent = `这款将记录为：第 ${versionNum} 版（1 次开发版 + ${priorTxt} + 这次新打的重做板）`;
}

// 根据起始阶段构造 cycles 数组（用于历史款迁移）
// 前置 cycles 全部标记为已完成，使用合理的占位日期，让流程图和日志看起来连贯
// priorReviseCount: REVISE 阶段额外参数，表示"之前已经打过多少次重做板"（迁移历史用）
function buildCyclesForStartStage(startStage, openDate, priorReviseCount) {
  const od = openDate || todayStr();

  if (startStage === 'DEV') {
    return [{ id: uid('c'), type: 'DEV', openDate: toIsoWithNowTime(od) }];
  }

  if (startStage === 'REVISE') {
    const cycles = [];
    // 1 个虚拟开发版（在系统之前已完成）
    cycles.push({ id: uid('c'), type: 'DEV', openDate: toIsoWithNowTime(od), isVirtual: true });
    // 之前已打过的 N 次重做板（也是虚拟的迁移记录）
    const n = Math.max(0, parseInt(priorReviseCount, 10) || 0);
    for (let i = 0; i < n; i++) {
      cycles.push({ id: uid('c'), type: 'REVISE', openDate: toIsoWithNowTime(od), isVirtual: true });
    }
    // 当前要打的这次重做板（真实记录）
    cycles.push({ id: uid('c'), type: 'REVISE', openDate: toIsoWithNowTime(od) });
    return cycles;
  }

  if (startStage === 'PHOTO') {
    // 拍照版:直接创建一个 PHOTO cycle,不加虚拟开发版
    // renderSampleTypeBadge 自动显示"拍照板"(因 lastCycle.type === 'PHOTO')
    return [{ id: uid('c'), type: 'PHOTO', openDate: toIsoWithNowTime(od) }];
  }

  if (startStage === 'PROD') {
    // 只创建船版 cycle，不再自动加虚拟的开发版历史
    return [{ id: uid('c'), type: 'PROD', openDate: toIsoWithNowTime(od) }];
  }

  if (startStage === 'PROD_SHIPPING') {
    // 等大货阶段不创建任何 cycle，直接加 PO 即可
    return [];
  }

  // 兜底：默认开发版
  return [{ id: uid('c'), type: 'DEV', openDate: toIsoWithNowTime(od) }];
}
function closeNewStyleModal() {
  document.getElementById('newStyleBackdrop').classList.remove('open');
  resetNewStylePoSection();

function saveNewStyle() {
  if (!canEditStyleInfo()) { showToast('当前账号无权新建款式', 'warn'); return; }
  const sku = document.getElementById('f-sku').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const description = document.getElementById('f-desc').value.trim();
  const client = document.getElementById('f-client').value;
  const owner = document.getElementById('f-owner').value;
  const openDate = document.getElementById('f-open-date').value || todayStr();
  const sampleType = document.getElementById('f-sample-type')?.value || '';
  // 新增字段
  const clientGroup = document.getElementById('f-client-group')?.value || '';
  const buyerName = (document.getElementById('f-buyer-name')?.value || '').trim();
  const outsourced = !!document.getElementById('f-outsourced')?.checked;
  const devSize = document.getElementById('f-dev-size')?.value || '';
  if (!sku && !name) {
    showToast('款号和款名至少填一个', 'warn');
    return;
  }
  if (!devSize) {
    showToast('请选择开版码数', 'warn');
    return;
  }
  // 收集"一并添加"的 PO 行（折叠区展开 + 有内容的才算）
  const newPos = collectNewStylePoRows();
  // 如果用户展开了 PO 区但所有行都是空的，提示
  const section = document.getElementById('newStylePoSection');
  if (section && section.classList.contains('expanded')) {
    const rowEls = document.querySelectorAll('.new-style-po-row');
    if (rowEls.length > 0 && newPos === null) {
      // newPos === null 表示有行但 PO 号缺失（验证失败已经 toast 提示）
      return;
    }
  }

  // 检查是否有反单 PO
  const hasRepeatPo = newPos && newPos.some(p => p.orderType === 'repeat');
  // 反单优先逻辑：反单 PO 会覆盖"起始阶段"选择
  //   Boohoo 反单 → 直接等大货（不需要寄船版），自动走完 PROD cycle
  //   PLT 反单 → 需要船版流程（寄船版 → 确认 → 大货）
  // 没有反单时，按"起始阶段"下拉创建对应 cycles（适合历史款迁移）
  const startStage = document.getElementById('f-start-stage')?.value || 'DEV';
  // openDate 不能在未来,否则后续天数/紧迫度计算全错(反单分支内部已 clamp,这里负责非反单分支)
  const _today = todayStr();
  if (openDate && openDate > _today) openDate = _today;
  let cycles;
  if (hasRepeatPo) {
    // 反单:跳过版师 → 直接进采购备料
    cycles = [buildRepeatCycle(client, openDate)];
  } else {
    const priorReviseCount = parseInt(document.getElementById('f-prior-revise-count')?.value || '0', 10) || 0;
    cycles = buildCyclesForStartStage(startStage, openDate, priorReviseCount);
  }

  const newId = uid('st');
  state.styles.unshift({
    id: newId,
    sku: sku || '未命名',
    name: name || '(无款名)',
    description: description || '',
    client: client || 'OTHER',
    owner: owner || '',
    imageUrl: state.pendingImageData || '',
    sampleType: sampleType || '',
    clientGroup: clientGroup || '',
    buyerName: buyerName || '',
    outsourced: outsourced,
    devSize: devSize || '',
    createdAt: new Date().toISOString(),
    cycles: cycles,
    pos: newPos || []
  });
  saveOneStyle(newId);
  closeNewStyleModal();
  // 如果有 callback（来自加 PO 流程），且用户还没一并添加 PO，才调用它
  if (state.afterNewStyleCallback && (!newPos || newPos.length === 0)) {
    const cb = state.afterNewStyleCallback;
    state.afterNewStyleCallback = null;
    cb(newId);
  } else {
    state.afterNewStyleCallback = null;
    render();
    if (hasRepeatPo) {
      showToast(`反单已创建 · 通知采购备面料`, 'ok');
    } else if (startStage !== 'DEV') {
      const stageLabels = { 'REVISE': '修改循环', 'PHOTO': '拍照版', 'PROD': '船版', 'PROD_SHIPPING': '等大货' };
      showToast(`已创建款式 · 起始阶段：${stageLabels[startStage] || startStage}`, 'ok');
    } else if (newPos && newPos.length > 0) {
      showToast(`已创建款式并添加 ${newPos.length} 个 PO`, 'ok');
    }
  }
}

// 收集所有 PO 行 → 验证 → 返回数组（验证失败返回 null + 提示）
function collectNewStylePoRows() {
  const rowEls = document.querySelectorAll('.new-style-po-row');
  if (rowEls.length === 0) return [];
  const pos = [];
  for (let i = 0; i < rowEls.length; i++) {
    const r = rowEls[i];
    const num = r.querySelector('.po-num').value.trim();
    const cliNo = r.querySelector('.po-client-no').value.trim();
    const barcode = r.querySelector('.po-barcode')?.value.trim() || '';
    const color = r.querySelector('.po-color').value.trim();
    const qty = parseInt(r.querySelector('.po-qty').value) || null;
    const ef = r.querySelector('.po-ef').value;
    const orderType = r.querySelector('.po-order-type').value;
    const shipMethod = r.querySelector('.po-ship-method')?.value || '';
    const factory = r.querySelector('.po-factory')?.value || '';
    const desc = r.querySelector('.po-desc')?.value.trim() || '';

    // 整行都没填的，跳过（不当作错误，让用户加了行又不想填也无所谓）
    if (!num && !cliNo && !color && !qty && !ef && !orderType && !barcode && !desc && !shipMethod && !factory) continue;

    // 只要有任一字段填了,PO 号 + 条形号都必填
    if (!num) {
      showToast(`第 ${i + 1} 个 PO 缺少 PO 号`, 'warn');
      return null;
    }
    if (!barcode) {
      showToast(`第 ${i + 1} 个 PO 缺少条形号`, 'warn');
      return null;
    }

    const po = {
      id: uid('po'),
      poNumber: num,
      color,
      quantity: qty,
      exFactory: ef,
      orderType,
      addedAt: todayStr()
    };
    if (cliNo) po.clientStyleNo = cliNo;
    if (barcode) po.barcode = barcode;
    if (desc) po.description = desc;
    if (shipMethod) po.shipMethod = shipMethod;
    if (factory) po.factory = factory;
    pos.push(po);
  }
  return pos;
}
