function render() {
  const sy = window.scrollY;
  // 权限兜底：每次 render 前确保 state.topTab 和 state.todaySub 都在当前角色的允许范围内
  // （防止用户通过控制台或其他方式跳到不允许的视图）
  if (typeof window.canSeeTab === 'function' && window.getCurrentRole) {
    if (window.getCurrentRole() && !window.canSeeTab(state.topTab)) {
      // 切到第一个允许的 tab
      const tryTabs = ['today', 'dev', 'production', 'archive'];
      const firstAllowed = tryTabs.find(t => window.canSeeTab(t));
      if (firstAllowed) state.topTab = firstAllowed;
    }
    if (state.topTab === 'today' && !window.canSeeTodaySub(state.todaySub)) {
      const trySubs = ['pattern', 'fabric', 'workshop', 'shipping', 'feedback', 'fit', 'prod'];
      const firstAllowed = trySubs.find(s => window.canSeeTodaySub(s));
      if (firstAllowed) state.todaySub = firstAllowed;
    }
  }
  updateTabCounts();

  // 维护 body 上的 today-tab-active 标记（用于 CSS 调整顶部留白）
  document.body.classList.toggle('today-tab-active', state.topTab === 'today');

  if (state.topTab === 'today') {
    renderTodayTab();
    if (sy > 0) setTimeout(() => window.scrollTo(0, Math.min(sy, document.body.scrollHeight)), 10);
    return;
  }
  if (state.topTab === 'production') {
    renderProductionTab();
    return;
  }
  if (state.topTab === 'archive') {
    renderArchiveTab();
    return;
  }
  showDevControls();
  const main = document.getElementById('main');
  const view = state.view || 'list';
  if (view === 'list' || view === 'grid') {
    const filtered = filterStyles();
    if (filtered.length === 0) {
      let msg;
      if (state.filterDevDate) {
        const d = new Date(state.filterDevDate);
        const md = `${d.getMonth() + 1}/${d.getDate()}`;
        msg = `<div class="empty"><h3>${md} 没有开发的款</h3><p>没有开版日期为 ${escapeHtml(state.filterDevDate)} 的款。点击开版日期旁的 × 清除筛选。</p></div>`;
      } else {
        msg = `<div class="empty"><h3>没有符合条件的款式</h3><p>换个筛选条件，或点右上角新增一款开始追踪</p></div>`;
      }
      main.innerHTML = msg;
      return;
    }
    if (view === 'grid') {
      main.innerHTML = renderGrid(filtered);
    } else {
      main.innerHTML = renderList(filtered);
    }
  } else {
    // board
    const boardStyles = filterStylesForBoard();
    main.innerHTML = renderBoard(boardStyles);
  }
}

function updateTabCounts() {
  const devCount = state.styles.filter(s => !s.archived && !hasPO(s)).length;
  const prodCount = state.styles.filter(s => hasPO(s) && !s.archived).length;
  const archiveCount = state.styles.filter(s => {
    if (s.archived) return true;
    const status = getStyleStatus(s);
    return status.stage === 'DONE';
  }).length;

  const activeStyles = state.styles.filter(s => !s.archived);
  const todayItems = getTodayList(activeStyles);
  // 徽章按当前角色能看到的 sub-tab 加总(不是全局)
  const todayCount = getTodayCountForRole(todayItems);
  const hasDanger = todayItems.some(it =>
    it.efAlert?.level === 'danger' || it.status.level === 'danger'
  );
  const hasWarn = todayItems.some(it =>
    it.efAlert?.level === 'warn' || it.status.level === 'warn'
  );

  const devEl = document.getElementById('tab-count-dev');
  const prodEl = document.getElementById('tab-count-prod');
  const todayEl = document.getElementById('tab-count-today');
  const archiveEl = document.getElementById('tab-count-archive');
  if (devEl) devEl.textContent = devCount;
  if (prodEl) prodEl.textContent = prodCount;
  if (archiveEl) archiveEl.textContent = archiveCount;
  if (todayEl) {
    todayEl.textContent = todayCount;
    todayEl.classList.remove('has-danger', 'has-warn');
    if (todayCount > 0) {
      if (hasDanger) todayEl.classList.add('has-danger');
      else if (hasWarn) todayEl.classList.add('has-warn');
    }
  }
}

function searchRelevance(s, q) {
  if (!q) return 0;
  const sku = s.sku.toLowerCase();
  const name = s.name.toLowerCase();
  if (sku === q) return 1000;       // 款号完全等于
  if (sku.startsWith(q)) return 500; // 款号开头
  if (sku.includes(q)) return 300;   // 款号包含
  if (name.toLowerCase().includes(q)) return 100;  // 款名包含
  const inPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q));
  if (inPO) return 50;
  // 新字段命中较低权重
  if ((s.buyerName || '').toLowerCase().includes(q)) return 30;
  if ((s.clientGroup || '').toLowerCase().includes(q)) return 25;
  if ((s.factory || '').toLowerCase().includes(q)) return 20;
  return 0;
}

function filterStyles() {
  return state.styles.filter(s => {
    const status = getStyleStatus(s);
    // 已完成 / 未采用都进历史档案 tab，开发追踪里默认不显示
    if (status.stage === 'DONE' || status.isArchived) return false;

    if (state.filterPO === 'awaiting') {
      if (!status.awaitingClient) return false;
    } else if (state.filterPO === 'all') {
      if (!state.showPoInDev && hasPO(s)) return false;
    }
    if (state.filterUrgency === 'danger' && status.level !== 'danger') return false;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return false;
    if (state.filterSampleType !== 'all' && (s.sampleType || '') !== state.filterSampleType) return false;
    if (state.filterDevDate) {
      const earliest = getEarliestOpenDate(s);
      if (earliest !== state.filterDevDate) return false;
    }
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q) || (p.clientStyleNo && p.clientStyleNo.toLowerCase().includes(q)) || (p.color && p.color.toLowerCase().includes(q)));
      const matchesGroup = (s.clientGroup || "").toLowerCase().includes(q);
      const matchesBuyer = (s.buyerName || "").toLowerCase().includes(q);
      const matchesFactory = (s.factory || "").toLowerCase().includes(q) || (s.factory === "HUBEI" && "湖北".includes(q)) || (s.factory === "JIANGXI" && "江西".includes(q));
      if (!matchesBasic && !matchesPO && !matchesGroup && !matchesBuyer && !matchesFactory) return false;
    }
    return true;
  }).sort((a, b) => {
    // 搜索时按相关度排序
    if (state.search) {
      const q = state.search.toLowerCase();
      const rA = searchRelevance(a, q);
      const rB = searchRelevance(b, q);
      if (rA !== rB) return rB - rA;
    }
    return sortStyles(a, b);
  });
}

// 通用排序：按 state.sortBy 决定
function sortStyles(a, b) {
  const sortBy = state.sortBy;
  if (!sortBy) return 0;  // 无排序
  if (sortBy === 'createdAt_desc') {
    // 时间倒序（最新在最上）
    return (b.createdAt || '').localeCompare(a.createdAt || '');
  }
  if (sortBy === 'createdAt_asc') {
    return (a.createdAt || '').localeCompare(b.createdAt || '');
  }
  if (sortBy === 'sku_asc') {
    return (a.sku || '').localeCompare(b.sku || '');
  }
  if (sortBy === 'sku_desc') {
    return (b.sku || '').localeCompare(a.sku || '');
  }
  if (sortBy === 'urgency') {
    const sa = getStyleStatus(a), sb = getStyleStatus(b);
    const rank = { danger: 0, warn: 1, ok: 2, done: 3, archived: 4 };
    if (rank[sa.level] !== rank[sb.level]) return rank[sa.level] - rank[sb.level];
    return (sb.days || 0) - (sa.days || 0);
  }
  // 按当前节点等候天数排（这才是"当前进度"的字面含义）
  if (sortBy === 'days_desc') {
    const sa = getStyleStatus(a), sb = getStyleStatus(b);
    return (sb.days || 0) - (sa.days || 0);  // 等得最久的在最上
  }
  if (sortBy === 'days_asc') {
    const sa = getStyleStatus(a), sb = getStyleStatus(b);
    return (sa.days || 0) - (sb.days || 0);  // 最新（等得最少）的在最上
  }
  return 0;
}

// 切换排序

// 列头点击循环切换排序
function cycleSortBy(field) {
  const cur = state.sortBy || '';
  if (field === 'sku') {
    if (cur === 'sku_asc') state.sortBy = 'sku_desc';
    else state.sortBy = 'sku_asc';
  } else if (field === 'time') {
    // 循环：默认（紧急度） → 等最久 → 最新（等最少）→ 默认
    // "当前进度" 字面含义 = 当前节点等候天数
    if (cur === 'days_desc') {
      state.sortBy = 'days_asc';   // 等最少（最新）在最上
    } else if (cur === 'days_asc') {
      state.sortBy = '';            // 回到默认（紧急度）
    } else {
      state.sortBy = 'days_desc';  // 等最久在最上
    }
  }
  render();
}

function setSortBy(key) {
  state.sortBy = key;
  render();
}

function filterStylesForBoard() {
  return state.styles.filter(s => {
    if (s.archived) return false;
    const status = getStyleStatus(s);
    if (status.stage === 'DONE') return false;
    if (!state.showPoInDev && hasPO(s)) return false;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return false;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = (s.pos || []).some(p => p.poNumber.toLowerCase().includes(q) || (p.clientStyleNo && p.clientStyleNo.toLowerCase().includes(q)) || (p.color && p.color.toLowerCase().includes(q)));
      const matchesGroup = (s.clientGroup || "").toLowerCase().includes(q);
      const matchesBuyer = (s.buyerName || "").toLowerCase().includes(q);
      const matchesFactory = (s.factory || "").toLowerCase().includes(q) || (s.factory === "HUBEI" && "湖北".includes(q)) || (s.factory === "JIANGXI" && "江西".includes(q));
      if (!matchesBasic && !matchesPO && !matchesGroup && !matchesBuyer && !matchesFactory) return false;
    }
    return true;
  });
}

async function jumpToNextStage(styleId) {
  const s = state.styles.find(x => x.id === styleId);
  if (!s) return;
  const status = getStyleStatus(s);
  const today = todayStr();

  // 描述当前 → 目标
  const targetMap = {
    'DEV': { label: '船版', desc: '将开发版标记为通过，直接进入船版阶段。' },
    'AWAIT_FIT': { label: '船版', desc: '跳过 fit comment 等待，直接进入船版阶段。' },
    'REVISE': { label: '船版', desc: '将修改循环标记为通过，直接进入船版阶段。' },
    'PHOTO': { label: '船版', desc: '跳过拍照版，直接进入船版阶段。' },
    'PROD': { label: '等大货', desc: '将船版标记为已批，直接进入等大货阶段。' }
  };
  const target = targetMap[status.stage];
  if (!target) { showToast('当前阶段无法跳转', 'warn'); return; }

  const ok = await showDialog({
    title: `跳到${target.label}`,
    message: target.desc + ' 此操作会同步更新完整流程图和事件日志。继续？',
    confirmText: `跳到${target.label}`
  });
  if (!ok) return;

  // 关闭当前 cycle（标记为 APPROVED），如果还没结束
  if (s.cycles && s.cycles.length > 0) {
    const last = s.cycles[s.cycles.length - 1];
    if (!last.feedbackOutcome) {
      // 补齐缺失的中间字段
      if (!last.receivedDate) last.receivedDate = toIsoWithNowTime(today);
      if (!last.sentDate) last.sentDate = toIsoWithNowTime(today);
      last.feedbackDate = toIsoWithNowTime(today);
      last.feedbackOutcome = FEEDBACK_OUTCOMES.APPROVED;
    }
  }

  // 根据当前阶段决定要新增什么 cycle
  if (status.stage === 'DEV' || status.stage === 'AWAIT_FIT' ||
      status.stage === 'REVISE' || status.stage === 'PHOTO') {
    // 进入船版：新建一个 PROD cycle
    s.cycles.push({ id: uid('c'), type: 'PROD', openDate: toIsoWithNowTime(today) });
  } else if (status.stage === 'PROD') {
    // 进入等大货：把已有 PROD cycle 标记完成（上面已处理）
    // 不需要再加 cycle
  }

  saveOneStyle(styleId);
  render();
  // 刷新抽屉
  if (state.selectedId === styleId) openDrawer(styleId);
  showToast(`已跳到${target.label}`, 'ok');
}

function getStagePillClass(stage) {
  if (stage === 'DEV') return 'pill-dev';
  if (stage === 'AWAIT_FIT') return 'pill-await-fit';
  if (stage === 'REVISE' || stage === 'PHOTO') return 'pill-revise';
  if (stage === 'PROD') return 'pill-prod';
  if (stage === 'DONE') return 'pill-done';
  if (stage === 'ARCHIVED') return 'pill-archived';
  return 'pill-dev';
}



// 平铺/网格视图：开发追踪按阶段分组（每组里平铺卡片），其他场景不分组
function renderGrid(styles) {
  state._currentListStyles = styles;
  const isDevTab = state.topTab === 'dev';

  // 不是开发追踪 tab，直接平铺不分组
  if (!isDevTab) {
    return `<div class="style-grid">${styles.map((s, idx) => renderGridCard(s, idx)).join('')}</div>`;
  }

  // 开发追踪：按阶段分组，每组里平铺
  const groups = {
    DEV: { label: '开发版', items: [] },
    AWAIT_FIT: { label: '已下 PO·等回复', items: [] },
    REVISE: { label: '修改循环', items: [] },
    PROD: { label: '船版', items: [] }
  };
  styles.forEach(s => {
    const status = getStyleStatus(s);
    if (status.stage === 'DEV') groups.DEV.items.push(s);
    else if (status.stage === 'REVISE' || status.stage === 'PHOTO') groups.REVISE.items.push(s);
    else if (status.stage === 'AWAIT_FIT') groups.AWAIT_FIT.items.push(s);
    else if (status.stage === 'PROD') groups.PROD.items.push(s);
  });

  const stageColorCls = {
    DEV: 'dev', REVISE: 'revise', AWAIT_FIT: 'await-fit', PROD: 'prod'
  };

  // 每组内排序（沿用 sortStyles 全局排序）
  Object.values(groups).forEach(g => {
    g.items.sort(sortStyles);
  });

  let idx = 0;
  let html = '<div class="grid-wrapper">';

  ['DEV', 'AWAIT_FIT', 'REVISE', 'PROD'].forEach(stageKey => {
    const g = groups[stageKey];
    if (g.items.length === 0) return;

    const sectionKey = `dev_grid_${stageKey}`;
    const collapsed = state.collapsedSections[sectionKey];

    // 平均 / 最久 stuck 天数 — 让用户一眼看出这个 stage 卡得严不严重
    const daysArr = g.items.map(s => getStyleStatus(s).days || 0).filter(d => d > 0);
    const avgDays = daysArr.length > 0 ? Math.round(daysArr.reduce((a, b) => a + b, 0) / daysArr.length) : 0;
    const maxDays = daysArr.length > 0 ? Math.max(...daysArr) : 0;
    const avgStuckHtml = daysArr.length > 0
      ? `<span class="grid-stage-stuck">平均卡 <b>${avgDays} 天</b> · 最久 ${maxDays} 天</span>`
      : '';

    html += `
      <div class="grid-stage-section ${collapsed ? 'collapsed' : ''}">
        <div role="button" tabindex="0" class="grid-stage-header collapsible-header" onclick="toggleSection('${sectionKey}')">
          <span class="section-chevron">▼</span>
          <span class="stage-tag ${stageColorCls[stageKey]}">${escapeHtml(g.label)}</span>
          <span class="grid-stage-count">${g.items.length} 款</span>
          ${avgStuckHtml}
        </div>
        <div class="section-content">
          <div class="style-grid">
            ${g.items.map(s => { const i = idx++; return renderGridCard(s, i); }).join('')}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  return html;
}

          ${cardBadgeAllowed('group') ? renderClientGroupBadge(s) : ''}

        </div>

function renderListByStage(styles) {
  // ============================================================
  // 双层分组：月份 (开版日期) → clientGroup (4 组 + 未分组)
  // 顶层按月倒序；每月内按 4 个组拆子区块；组内按紧急度/用户排序
  // ============================================================

  // 使用模块顶部的共享 helper(CLIENT_GROUP_ORDER + normalizeClientGroup)
  const GROUP_ORDER = CLIENT_GROUP_ORDER;
  const normalizeGroup = normalizeClientGroup;

  // 把 openDate 转成 YYYY-MM
  const monthOf = (s) => {
    const d = getEarliestOpenDate(s);
    if (!d) return '__NO_DATE__';
    return d.slice(0, 7);  // YYYY-MM
  };

  // 月份 → { groups: { groupKey → styles[] }, total: N }
  const months = {};
  styles.forEach(s => {
    const ym = monthOf(s);
    if (!months[ym]) {
      months[ym] = { groups: {}, total: 0 };
      GROUP_ORDER.forEach(g => { months[ym].groups[g.key] = []; });
    }
    const gk = normalizeGroup(s);
    months[ym].groups[gk].push(s);
    months[ym].total++;
  });

  // 排序辅助
  const sortItems = (arr) => {
    if (state.sortBy) {
      arr.sort(sortStyles);
    } else {
      arr.sort((a, b) => {
        const sa = getStyleStatus(a), sb = getStyleStatus(b);
        const rank = { danger: 0, warn: 1, ok: 2, done: 3, archived: 4 };
        if (rank[sa.level] !== rank[sb.level]) return rank[sa.level] - rank[sb.level];
        return (sb.days || 0) - (sa.days || 0);
      });
    }
  };

  // 月份显示名
  const formatMonthLabel = (ym) => {
    if (ym === '__NO_DATE__') return '未填开版日期';
    const [y, m] = ym.split('-');
    return `${y} 年 ${parseInt(m, 10)} 月`;
  };

  // 月份排序：__NO_DATE__ 放最后，其他按时间倒序（最新月在前）
  const monthKeys = Object.keys(months).sort((a, b) => {
    if (a === '__NO_DATE__') return 1;
    if (b === '__NO_DATE__') return -1;
    return b.localeCompare(a);
  });

  // 简化:月份外层 + clientGroup chip filter(删双层折叠)
  const cgFilter = state.devClientGroupFilter || 'all';

  // 计算每个 group 的全局总数(用于 chip 计数)
  const cgCounts = { all: 0 };
  GROUP_ORDER.forEach(g => cgCounts[g.key] = 0);
  Object.values(months).forEach(m => {
    GROUP_ORDER.forEach(g => {
      cgCounts[g.key] += m.groups[g.key].length;
    });
    cgCounts.all += m.total;
  });

  let idx = 0;
  let html = '<div class="dev-list-grouped">';

  // 顶部 chip filter row
  const chipBtn = (key, label) => {
    const n = cgCounts[key] || 0;
    if (key !== 'all' && n === 0) return '';
    const active = cgFilter === key ? 'active' : '';
    return `<button type="button" class="filter-btn ${active}" data-cg="${key}" onclick="switchDevClientGroupFilter('${key.replace(/'/g, "\\'")}')" aria-pressed="${cgFilter === key}">${escapeHtml(label)} <span class="cg-chip-count">${n}</span></button>`;
  };
  html += `<div class="cg-chips-row" role="group" aria-label="客户组筛选"><div class="filter-group">`;
  html += chipBtn('all', '全部');
  GROUP_ORDER.forEach(g => { html += chipBtn(g.key, g.shortLabel === '其他' ? '未分组' : g.label); });
  html += `</div></div>`;

  // 月份外层 + 每月内 chip 过滤后的款
  monthKeys.forEach(ym => {
    const m = months[ym];
    const monthSectionKey = `dev_month_${ym}`;
    const monthCollapsed = state.collapsedSections[monthSectionKey];

    // 根据 cgFilter 收集这个月的款
    let items;
    if (cgFilter === 'all') {
      items = [];
      GROUP_ORDER.forEach(g => { items = items.concat(m.groups[g.key]); });
    } else {
      items = (m.groups[cgFilter] || []).slice();
    }
    if (items.length === 0) return;
    sortItems(items);

    html += `
      <div class="dev-month-section ${monthCollapsed ? 'collapsed' : ''}">
        <div role="button" tabindex="0" class="dev-month-header collapsible-header" onclick="toggleSection('${monthSectionKey}')">
          <span class="section-chevron">▼</span>
          <span class="dev-month-label">📅 ${formatMonthLabel(ym)}</span>
          <span class="dev-month-count">${items.length} 款</span>
        </div>
        <div class="section-content">
          <div class="style-list">
            <div class="list-header simplified">
              <div></div>
              <div role="button" tabindex="0" class="sortable ${state.sortBy && state.sortBy.startsWith('sku') ? 'active' : ''}" onclick="event.stopPropagation(); cycleSortBy('sku')">款号 <span class="sort-arrow">${state.sortBy === 'sku_asc' ? '↑' : state.sortBy === 'sku_desc' ? '↓' : '⇅'}</span></div>
              <div>客户</div>
              <div>款名</div>
              <div role="button" tabindex="0" class="sortable ${state.sortBy && (state.sortBy === 'days_desc' || state.sortBy === 'days_asc') ? 'active' : ''}" onclick="event.stopPropagation(); cycleSortBy('time')">当前进度 <span class="sort-arrow">${state.sortBy === 'days_desc' ? '↓ 久' : state.sortBy === 'days_asc' ? '↑ 新' : '⇅'}</span></div>
              <div></div>
            </div>
            ${items.map(s => {
              const rowIdx = idx++;
              return renderSingleStyleRow(s, rowIdx);
            }).join('')}
          </div>
        </div>
      </div>
    `;
  });

  html += '</div>';
  return html;
}

      <input type="checkbox" class="batch-checkbox row-batch-checkbox" ${checked} onclick="toggleBatchSelection('${s.id}', this.checked); event.stopPropagation();" title="批量选择">

    let nodeNameCls = '';
    if (status.level === 'danger') nodeNameCls = 'danger';
    else if (status.level === 'warn') nodeNameCls = 'warn';
    else if (status.stage === 'DONE') nodeNameCls = 'done';

    else if (status.stage === 'PROD' || status.stage === 'PROD_SHIPPING') stageTagCls = 'prod';
    else if (status.stage === 'DONE') stageTagCls = 'done';
    else if (status.stage === 'ARCHIVED') stageTagCls = 'archived';

    let timeInfo = '';
    if (status.isArchived) {
      timeInfo = `<span class="node-since">未采用</span>`;
    } else if (status.stage === 'DONE') {
      timeInfo = `<span class="node-since done">已完成</span>`;
    } else if (status.startDate) {
      timeInfo = `<span class="node-since ${status.level === 'danger' ? 'danger' : status.level === 'warn' ? 'warn' : ''}">${escapeHtml(formatDate(status.startDate))}${formatDaysText(status.days) ? " · " + formatDaysText(status.days) : ""}</span>`;
    }

    return `
      <div role="button" tabindex="0" class="style-row simplified stage-bg-${stageTagCls} ${urgentClass} ${recentClass} ${selectedClass}" data-idx="${idx}" data-style-id="${s.id}" onclick="handleRowClick(event, '${s.id}')">

        <div class="node-block">

            <span class="node-name ${nodeNameCls}">${escapeHtml(status.currentNodeLabel)}</span>
            ${status.packageArrived ? '<span class="pkg-arrived-badge">📦 已送达</span>' : ''}
          </div>
          <div class="node-block-row2">${timeInfo}</div>
        </div>
        <div class="arrow">›</div>
      </div>
    `;
  }).join('');

  return `
    <div class="style-list">
      <div class="list-header simplified">
        <div></div><div>款号</div><div>客户</div><div>款名</div>
        <div>当前进度</div><div></div>

    </div>
  `;
}

// 判断款式是否最近被更新过（24 小时内）
function isRecentlyUpdated(s) {
  // 找最近一个事件日期（cycle 的任何字段或 awaitingFit）
  let latestDate = null;
  s.cycles?.forEach(c => {
    [c.openDate, c.receivedDate, c.sentDate, c.feedbackDate].forEach(d => {
      if (d && (!latestDate || d > latestDate)) latestDate = d;
    });
  });
  if (s.awaitingFit?.since && (!latestDate || s.awaitingFit.since > latestDate)) {
    latestDate = s.awaitingFit.since;
  }
  if (!latestDate) return false;
  const days = daysSince(latestDate);
  return days !== null && days <= 1;  // 今天或昨天更新过
}

function renderProductionTab() {
  document.getElementById('controlsBar').style.display = 'flex';
  const _vt = document.getElementById('viewToggle'); if (_vt) _vt.style.display = '';
  document.getElementById('newStyleBtn').style.display = 'none';

  // 看板视图走专门的函数
  if (state.view === 'board') {
    renderProductionBoard();
    return;
  }
  // 平铺：方块网格视图
  if (state.view === 'grid') {
    renderProductionGrid();
    return;
  }

  // 一个款多 PO 时展开成多行
  const rows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      const matchesGroup = (s.clientGroup || "").toLowerCase().includes(q);
      const matchesBuyer = (s.buyerName || "").toLowerCase().includes(q);
      const matchesFactory = (s.factory || "").toLowerCase().includes(q) || (s.factory === "HUBEI" && "湖北".includes(q)) || (s.factory === "JIANGXI" && "江西".includes(q));
      if (!matchesBasic && !matchesPO && !matchesGroup && !matchesBuyer && !matchesFactory) return;
    }
    s.pos.forEach(po => {
      // EX 日期筛选
      if (state.filterEFDate && po.exFactory !== state.filterEFDate) return;
      rows.push({ style: s, po });
    });
  });

  const main = document.getElementById('main');
  if (rows.length === 0) {
    if (state.filterEFDate) {
      const d = new Date(state.filterEFDate);
      const md = `${d.getMonth() + 1}/${d.getDate()}`;
      main.innerHTML = `<div class="empty"><h3>${md} 没有 PO</h3><p>没有 ex-factory 日期为 ${escapeHtml(state.filterEFDate)} 的 PO。点击 EX 日期旁的 × 清除筛选。</p></div>`;
    } else {
      main.innerHTML = `<div class="empty"><h3>暂无下了 PO 的款式</h3><p>客户回复时勾选"下了 PO"并填写 ex-factory 日期，款式会自动出现在这里。</p></div>`;
    }
    return;
  }

  // 拆成 3 大组：已过货期 / 按日期归组的进行中 / 已批船版
  const overdueRows = [];
  const activeRows = [];
  const doneRows = [];

  rows.forEach(r => {
    const status = getStyleStatus(r.style);
    if (status.stage === 'DONE') {
      doneRows.push(r);
      return;
    }
    const daysToEF = daysUntil(r.po.exFactory);
    if (daysToEF !== null && daysToEF < 0) overdueRows.push(r);
    else activeRows.push(r);
  });

  // activeRows 按 ex-factory 日期归组
  const dateGroups = {};
  activeRows.forEach(r => {
    const ef = r.po.exFactory || '__no_date__';
    if (!dateGroups[ef]) dateGroups[ef] = [];
    dateGroups[ef].push(r);
  });
  const sortedDates = Object.keys(dateGroups).sort();

  const sortByEF = (a, b) => new Date(a.po.exFactory) - new Date(b.po.exFactory);
  overdueRows.sort(sortByEF);
  doneRows.sort(sortByEF);

  // 中文星期
  const weekdayCN = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

  const renderDateGroup = (date, groupRows) => {
    const daysToEF = daysUntil(date);

      let countdown;
      if (daysToEF === 0) countdown = '今天';
      else if (daysToEF === 1) countdown = '明天';
      else if (daysToEF > 0) countdown = `还剩 ${daysToEF} 天`;
      dateLabel = `${md} ${wd} · ${countdown}`;
      // 颜色
      if (daysToEF < 14) dateCls = 'date-danger';
      else if (daysToEF < 28) dateCls = 'date-warn';
      else dateCls = 'date-ok';
    }
    const sectionKey = `proddate_${date}`;
    const collapsed = state.collapsedSections[sectionKey];
    return `
      <div class="production-group date-group ${dateCls} ${collapsed ? 'collapsed' : ''}" data-group-date="${escapeHtml(date)}">
        <div role="button" tabindex="0" class="production-group-header date-group-header collapsible-header" onclick="toggleSection('${sectionKey}')">
          <span class="section-chevron">▼</span>
          <span class="date-main">${escapeHtml(dateLabel)}</span>
          <span class="count">${groupRows.length} 个 PO</span>
          <button class="group-batch-btn" onclick="event.stopPropagation(); toggleGroupBatch('${escapeHtml(date)}')" title="批量操作此日期">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            批量
          </button>
        </div>
        <div class="production-list section-content">
          <div class="production-list-header with-node">
            <div></div>
            <div></div>
            <div>PO</div>
            <div>客户·组·工厂</div>
            <div>颜色·数量</div>
            <div>EX货期·大货进度</div>
            <div></div>
          </div>
          ${groupRows.map(r => renderProductionRow(r.style, r.po)).join('')}
        </div>
      </div>
    `;
  };

  let html = '';

  if (overdueRows.length > 0) {
    const overdueCol = state.collapsedSections['prod_overdue'];
    html += `
      <div class="production-group date-group date-overdue ${overdueCol ? 'collapsed' : ''}">
        <div role="button" tabindex="0" class="production-group-header date-group-header collapsible-header" onclick="toggleSection('prod_overdue')">
          <span class="section-chevron">▼</span>
          <span class="date-main">🔴 已过货期 · 立刻处理</span>
          <span class="count">${overdueRows.length} 个 PO</span>
        </div>
        <div class="production-list section-content">
          <div class="production-list-header with-node">
            <div></div>
            <div></div>
            <div>PO</div>
            <div>客户·组·工厂</div>
            <div>颜色·数量</div>
            <div>EX货期·大货进度</div>
            <div></div>
          </div>
          ${overdueRows.map(r => renderProductionRow(r.style, r.po)).join('')}
        </div>
      </div>
    `;
  }

  sortedDates.forEach(date => {
    html += renderDateGroup(date, dateGroups[date]);
  });

  if (doneRows.length > 0) {
    const doneCol = state.collapsedSections['prod_done'];
    html += `
      <div class="production-group date-group date-done ${doneCol ? 'collapsed' : ''}">
        <div role="button" tabindex="0" class="production-group-header date-group-header collapsible-header" onclick="toggleSection('prod_done')">

            <div>客户·组·工厂</div>
            <div>颜色·数量</div>
            <div>EX货期·大货进度</div>
            <div></div>
          </div>
          ${doneRows.map(r => renderProductionRow(r.style, r.po)).join('')}
        </div>
      </div>
    `;
  }

  main.innerHTML = html;
}

function renderProductionGrid() {
  const main = document.getElementById('main');

  // 收集所有 PO 行
  const rows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      const matchesGroup = (s.clientGroup || "").toLowerCase().includes(q);
      const matchesBuyer = (s.buyerName || "").toLowerCase().includes(q);
      const matchesFactory = (s.factory || "").toLowerCase().includes(q) || (s.factory === "HUBEI" && "湖北".includes(q)) || (s.factory === "JIANGXI" && "江西".includes(q));
      if (!matchesBasic && !matchesPO && !matchesGroup && !matchesBuyer && !matchesFactory) return;
    }
    s.pos.forEach(po => {
      if (state.filterEFDate && po.exFactory !== state.filterEFDate) return;
      rows.push({ style: s, po });
    });
  });

  if (rows.length === 0) {
    main.innerHTML = '<div class="empty"><h3>暂无下了 PO 的款式</h3><p>右上角点 + 加 PO 来添加</p></div>';
    return;
  }

  // 按日期分组
  const dateGroups = {};
  rows.forEach(r => {
    const ef = r.po.exFactory || '__no_date__';
    if (!dateGroups[ef]) dateGroups[ef] = [];
    dateGroups[ef].push(r);
  });

  // 排序：未填写货期放最后；其他按日期升序
  const sortedDates = Object.keys(dateGroups).sort((a, b) => {
    if (a === '__no_date__') return 1;
    if (b === '__no_date__') return -1;
    return a.localeCompare(b);
  });

  const weekdayCN = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];

  // 先把每个日期对应的 tile HTML 生成好
  const tileHTML = {};
  sortedDates.forEach(date => {
    const groupRows = dateGroups[date];
    const daysToEF = daysUntil(date);
    let dateLabel, countdown, urgClass;

    if (date === '__no_date__') {
      dateLabel = '未填写货期'; countdown = ''; urgClass = 'urg-none';
    } else {
      const d = new Date(date);
      dateLabel = weekdayCN[d.getDay()];
      var dayNum = d.getDate();
      var monthNum = d.getMonth() + 1;
      if (daysToEF < 0) {
        const od = -daysToEF; countdown = `已过 ${od} 天`;
        if (od >= 8) urgClass = 'urg-overdue urg-overdue-severe';
        else if (od >= 4) urgClass = 'urg-overdue urg-overdue-heavy';
        else urgClass = 'urg-overdue urg-overdue-mild';
      } else if (daysToEF === 0) { countdown = '今天'; urgClass = 'urg-today'; }
      else if (daysToEF === 1) { countdown = '明天'; urgClass = 'urg-danger'; }
      else if (daysToEF < 14) { countdown = `还剩 ${daysToEF} 天`; urgClass = 'urg-danger'; }
      else if (daysToEF < 28) { countdown = `还剩 ${daysToEF} 天`; urgClass = 'urg-warn'; }
      else { countdown = `还剩 ${daysToEF} 天`; urgClass = 'urg-ok'; }
    }
    const allDone = groupRows.every(r => getStyleStatus(r.style).stage === 'DONE');
    if (allDone) urgClass = 'urg-done';

    const isNoDate = (date === '__no_date__');
    const headerText = isNoDate ? '— · —' : `${monthNum} 月`;
    const bigNumber = isNoDate ? '?' : String(dayNum);
    const weekday = isNoDate ? '未填货期' : dateLabel;

    tileHTML[date] = `
      <div class="prod-tile cal-tile ${urgClass}" data-date="${escapeHtml(date)}" tabindex="0" onclick="openProdDateFolder('${escapeHtml(date)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openProdDateFolder('${escapeHtml(date)}')}">
        <div class="cal-tile-header"><span class="cal-tile-month">${escapeHtml(headerText)}</span>${countdown ? `<span class="cal-tile-countdown">${escapeHtml(countdown)}</span>` : ''}</div>
        <div class="cal-tile-day">${escapeHtml(bigNumber)}</div>
        <div class="cal-tile-weekday">${escapeHtml(weekday)}</div>
        <div class="cal-tile-footer"><span class="cal-tile-po-count"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:3px;"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>${groupRows.length} 个 PO</span></div>
      </div>`;
  });

  // 按月分组
  const monthGroups = {}; // { '2026-05': [date, date, ...], '__no_date__': [...] }
  sortedDates.forEach(date => {
    if (date === '__no_date__') { monthGroups['__no_date__'] = monthGroups['__no_date__'] || []; monthGroups['__no_date__'].push(date); return; }
    const ym = date.slice(0, 7); monthGroups[ym] = monthGroups[ym] || []; monthGroups[ym].push(date);
  });
  const sortedMonths = Object.keys(monthGroups).sort((a, b) => {
    if (a === '__no_date__') return 1; if (b === '__no_date__') return -1;
    return a.localeCompare(b);
  });

  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  let html = '';
  sortedMonths.forEach(ym => {
    const dates = monthGroups[ym];
    const totalPO = dates.reduce((sum, d) => sum + dateGroups[d].length, 0);
    const isThisMonth = (ym === thisMonth);
    const ymLabel = ym === '__no_date__' ? '未填写货期' : `${ym.slice(0,4)}年${parseInt(ym.slice(5))}月`;

    html += `<div class="prod-month-panel ${isThisMonth ? 'open' : ''}">`;
    html += `<div role="button" tabindex="0" class="prod-month-header" onclick="this.parentElement.classList.toggle('open')">`;
    html += `<span class="prod-month-label">📅 ${escapeHtml(ymLabel)}</span>`;
    html += `<span class="prod-month-count">${totalPO} 个 PO</span>`;
    html += `<span class="prod-month-chevron">▼</span>`;
    html += `</div>`;
    html += `<div class="prod-month-body"><div class="prod-grid-wrapper">`;
    dates.forEach(d => { html += tileHTML[d]; });
    html += `</div></div></div>`;
  });

  main.innerHTML = html;
}

// 打开"日期文件夹"弹窗（图 2 那种）
function openProdDateFolder(date) {
  // 记住当前打开的日期（用于从抽屉返回时恢复）
  state.lastFolderDate = date;

  // 重新收集这一天的 PO（保持和当前筛选一致）
  const rows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      const matchesGroup = (s.clientGroup || "").toLowerCase().includes(q);
      const matchesBuyer = (s.buyerName || "").toLowerCase().includes(q);
      const matchesFactory = (s.factory || "").toLowerCase().includes(q) || (s.factory === "HUBEI" && "湖北".includes(q)) || (s.factory === "JIANGXI" && "江西".includes(q));
      if (!matchesBasic && !matchesPO && !matchesGroup && !matchesBuyer && !matchesFactory) return;
    }
    s.pos.forEach(po => {
      const ef = po.exFactory || '__no_date__';
      if (ef !== date) return;
      rows.push({ style: s, po });
    });
  });

  if (rows.length === 0) return;

  const weekdayCN = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  let dateLabel, countdown, dotClass;
  if (date === '__no_date__') {
    dateLabel = '未填写货期';
    countdown = '';
    dotClass = 'dot-none';
  } else {
    const d = new Date(date);
    const wd = weekdayCN[d.getDay()];
    const md = `${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    dateLabel = `${md}  ${wd}`;
    const daysToEF = daysUntil(date);
    if (daysToEF < 0) { countdown = `已过 ${-daysToEF} 天`; dotClass = 'dot-danger'; }
    else if (daysToEF === 0) { countdown = '今天'; dotClass = 'dot-today'; }
    else if (daysToEF === 1) { countdown = '明天'; dotClass = 'dot-danger'; }
    else if (daysToEF < 14) { countdown = `还剩 ${daysToEF} 天`; dotClass = 'dot-danger'; }
    else if (daysToEF < 28) { countdown = `还剩 ${daysToEF} 天`; dotClass = 'dot-warn'; }
    else { countdown = `还剩 ${daysToEF} 天`; dotClass = 'dot-ok'; }
  }

  // 创建弹窗
  let backdrop = document.getElementById('prodFolderBackdrop');
  if (backdrop) backdrop.remove();
  backdrop = document.createElement('div');
  backdrop.id = 'prodFolderBackdrop';
  backdrop.className = 'prod-folder-backdrop';
  backdrop.innerHTML = `
    <div class="prod-folder prod-folder-wide" role="dialog" aria-modal="true">
      <div class="prod-folder-header">
        <div class="prod-folder-title-row">
          <h2 class="prod-folder-date">${escapeHtml(dateLabel)}</h2>
          <button class="prod-folder-close" onclick="closeProdDateFolder()" aria-label="关闭">×</button>
        </div>
        <div class="prod-folder-meta">
          ${countdown ? `<span class="prod-folder-dot ${dotClass}"></span><span class="prod-folder-countdown">${escapeHtml(countdown)}</span><span class="prod-folder-sep">·</span>` : ''}
          <span class="prod-folder-count">${rows.length} 个 PO</span>
        </div>
      </div>
      <div class="prod-folder-grid custom-scroll">
        ${rows.map(r => renderProdFolderCard(r.style, r.po)).join('')}
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  requestAnimationFrame(() => backdrop.classList.add('open'));

  // 点背景关闭
  backdrop.onclick = (e) => {
    if (e.target === backdrop) closeProdDateFolder();
  };

  // ESC 关闭
  const escHandler = (e) => {
    if (e.key === 'Escape') {
      document.removeEventListener('keydown', escHandler);
      closeProdDateFolder();
    }
  };
  document.addEventListener('keydown', escHandler);
}

function closeProdDateFolder(keepMemory) {
  const backdrop = document.getElementById('prodFolderBackdrop');
  if (!backdrop) return;
  backdrop.classList.remove('open');
  setTimeout(() => backdrop.remove(), 280);
  // 默认清空"打开记忆"，但 keepMemory=true 时保留（用于打开抽屉前临时关闭）
  if (!keepMemory) state.lastFolderDate = null;
}

// 文件夹弹窗里每个 PO 的卡片（横向网格版，4 个一排）
function renderProdFolderCard(s, po) {
  const status = getStyleStatus(s);
  const thumb = s.imageUrl
    ? `<img class="prod-folder-card-thumb" src="${escapeHtml(s.imageUrl)}" alt="">`
    : `<div class="prod-folder-card-thumb prod-folder-card-thumb-empty">NO</div>`;

  let nodeCls = '';
  if (status.level === 'danger') nodeCls = 'danger';
  else if (status.level === 'warn') nodeCls = 'warn';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '船版已批';
  else nodeText = `${withDays(status.currentNodeLabel, status.days)}`;

  // PO 选中态（独立于款式选中）
  const poSel = state.poBatchSelected && state.poBatchSelected[po.id] ? 'checked' : '';
  const poSelCls = state.poBatchSelected && state.poBatchSelected[po.id] ? 'po-selected' : '';
  
  const sampleTypeBadgeHtml = renderSampleTypeBadge(s);

  return `
    <div class="prod-folder-card ${poSelCls}" tabindex="0" data-po-id="${po.id}" data-style-id="${s.id}" onclick="handleFolderCardClick(event, '${s.id}', '${po.id}')" onkeydown="if(event.key==='Enter'){event.preventDefault();this.click();}">
      <input type="checkbox" class="batch-checkbox folder-card-checkbox" ${poSel} onclick="togglePoBatchSelection('${po.id}', '${s.id}', this.checked); event.stopPropagation();" title="选择此 PO">
      ${thumb}
      <div class="prod-folder-card-info">
        <div class="prod-folder-card-line1">
          <span class="prod-folder-card-po">${escapeHtml(po.poNumber)}</span>
          ${po.orderType ? `<span class="order-type-pill ${po.orderType === 'repeat' ? 'badge-repeat' : 'badge-first'}">${po.orderType === 'repeat' ? '反单' : '首单'}</span>` : ''}
        </div>
        <div class="prod-folder-card-line2">
          <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
          <span class="prod-folder-card-color">${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity : ''}</span>
        </div>
        <div class="prod-folder-card-line3" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          <span>${renderStyleNameText(s)}</span>
          ${sampleTypeBadgeHtml}
        </div>
        <div class="prod-folder-card-node ${nodeCls}">${escapeHtml(nodeText)}</div>
        ${s.specialNote ? `<div class="prod-folder-card-special">${renderSpecialNoteTag(s)}</div>` : ''}
      </div>
    </div>
  `;
}

// 点击文件夹卡片：批量模式下切换选中，否则打开抽屉
function handleFolderCardClick(e, styleId, poId) {
  if (document.body.classList.contains('batch-mode-locked')) {
    const cur = state.poBatchSelected && state.poBatchSelected[poId];
    togglePoBatchSelection(poId, styleId, !cur);
    return;
  }
  // 打开抽屉前临时关闭弹窗（保留打开记忆，关抽屉后会自动恢复）
  closeProdDateFolder(true);
  openDrawer(styleId);
}

function renderProductionBoard() {
  const main = document.getElementById('main');

  // 收集所有 PO 行（用于月历）
  const allRows = [];
  state.styles.forEach(s => {
    if (!hasPO(s) || s.archived) return;
    if (state.filterClient !== 'all' && s.client !== state.filterClient) return;
    if (state.search) {
      const q = state.search.toLowerCase();
      const matchesBasic = s.sku.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
      const matchesPO = s.pos.some(p => p.poNumber.toLowerCase().includes(q));
      const matchesGroup = (s.clientGroup || "").toLowerCase().includes(q);
      const matchesBuyer = (s.buyerName || "").toLowerCase().includes(q);
      const matchesFactory = (s.factory || "").toLowerCase().includes(q) || (s.factory === "HUBEI" && "湖北".includes(q)) || (s.factory === "JIANGXI" && "江西".includes(q));
      if (!matchesBasic && !matchesPO && !matchesGroup && !matchesBuyer && !matchesFactory) return;
    }
    s.pos.forEach(po => {
      allRows.push({ style: s, po });
    });
  });

  // 按日期建索引：{ 'YYYY-MM-DD': [rows...] }
  const byDate = {};
  allRows.forEach(r => {
    if (!r.po.exFactory) return;
    if (!byDate[r.po.exFactory]) byDate[r.po.exFactory] = [];
    byDate[r.po.exFactory].push(r);
  });

  // 计算月历参数
  const year = state.calendarYear;
  const month = state.calendarMonth;
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = firstDay.getDay();  // 0=周日 1=周一 ... 6=周六

  // 生成日期网格（首格从周日开始的网格）
  // 但中国习惯：周一为第一天，所以转换：周日=6
  const startCol = startWeekday === 0 ? 6 : startWeekday - 1;

  // 总共需要的行数
  const totalCells = startCol + daysInMonth;
  const totalRows = Math.ceil(totalCells / 7);

  const today = todayStr();
  const monthName = `${year} 年 ${month + 1} 月`;

  // 该月统计
  const monthPOs = Object.keys(byDate)
    .filter(d => d.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`))
    .reduce((acc, d) => acc + byDate[d].length, 0);
  const monthDays = Object.keys(byDate)
    .filter(d => d.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`)).length;

  // 计算本月忙日（≥3 个 PO 的天）
  const busyDays = [];
  Object.keys(byDate).forEach(dateKey => {
    if (!dateKey.startsWith(`${year}-${String(month + 1).padStart(2, '0')}`)) return;
    const rows = byDate[dateKey];
    if (rows.length >= 3) {
      const daysToEF = daysUntil(dateKey);
      let urgCls = 'ok';
      if (daysToEF < 0) urgCls = 'overdue';
      else if (daysToEF < 14) urgCls = 'danger';
      else if (daysToEF < 28) urgCls = 'warn';
      busyDays.push({ dateKey, count: rows.length, daysToEF, urgCls, rows });
    }
  });
  busyDays.sort((a, b) => a.dateKey.localeCompare(b.dateKey));
  const totalBusyPOs = busyDays.reduce((sum, d) => sum + d.count, 0);

  // 渲染右侧忙日列表
  const renderBusyDayItem = (item) => {
    const d = new Date(item.dateKey);
    const wd = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
    const md = `${d.getMonth() + 1}/${d.getDate()}`;
    let countdown;
    if (item.daysToEF < 0) countdown = `已过 ${-item.daysToEF} 天`;
    else if (item.daysToEF === 0) countdown = '今天';
    else if (item.daysToEF === 1) countdown = '明天';
    else countdown = `还剩 ${item.daysToEF} 天`;

    const isSelected = state.selectedCalendarDate === item.dateKey;

    return `
      <div role="button" tabindex="0" class="busy-day-item urg-${item.urgCls} ${isSelected ? 'selected' : ''}" onclick="selectCalendarDate('${item.dateKey}')">
        <div class="busy-day-icon"></div>
        <div class="busy-day-info">
          <div class="busy-day-date">
            <span class="busy-day-md">${escapeHtml(md)}</span>
            <span class="busy-day-wd">${escapeHtml(wd)}</span>
          </div>
          <div class="busy-day-meta">
            <span class="busy-day-count">${item.count} 个 PO</span>
            <span class="busy-day-countdown">${escapeHtml(countdown)}</span>
          </div>
        </div>
      </div>
    `;
  };

  let html = `
    <div class="calendar-view">
      <div class="calendar-toolbar">
        <div class="calendar-nav">
          <button class="cal-nav-btn" onclick="prevMonth()" title="上个月">‹</button>
          <button class="cal-today-btn" onclick="goToday()">今天</button>
          <button class="cal-nav-btn" onclick="nextMonth()" title="下个月">›</button>
        </div>
        <h2 class="calendar-title">${escapeHtml(monthName)}</h2>
        <div class="calendar-stats">
          <span class="stat-item"><b>${monthDays}</b> 天有出货</span>
          <span class="stat-item"><b>${monthPOs}</b> 个 PO</span>
        </div>
      </div>

      <div class="calendar-layout">
        <div class="calendar-grid">
        <div class="cal-weekday">周一</div>
        <div class="cal-weekday">周二</div>
        <div class="cal-weekday">周三</div>
        <div class="cal-weekday">周四</div>
        <div class="cal-weekday">周五</div>
        <div class="cal-weekday">周六</div>
        <div class="cal-weekday">周日</div>
  `;

  // 生成日期格子
  for (let i = 0; i < totalRows * 7; i++) {
    const dayNum = i - startCol + 1;
    if (dayNum < 1 || dayNum > daysInMonth) {
      // 空格子
      html += '<div class="cal-cell cal-cell-empty"></div>';
      continue;
    }
    const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
    const rows = byDate[dateKey] || [];
    const isToday = dateKey === today;
    const isPast = dateKey < today;
    const isSelected = state.selectedCalendarDate === dateKey;

    let cellCls = 'cal-cell';
    if (isToday) cellCls += ' cal-cell-today';
    if (isPast) cellCls += ' cal-cell-past';
    if (isSelected) cellCls += ' cal-cell-selected';
    if (rows.length > 0) cellCls += ' cal-cell-has-po';

    // 紧迫度（基于离今天天数）
    if (rows.length > 0) {
      const daysToEF = daysUntil(dateKey);
      if (daysToEF < 0) cellCls += ' cal-cell-overdue';
      else if (daysToEF < 14) cellCls += ' cal-cell-danger';
      else if (daysToEF < 28) cellCls += ' cal-cell-warn';
      else cellCls += ' cal-cell-ok';
    }

    // 显示该日的 PO 概览（最多 3 个）
    let poPreview = '';
    if (rows.length > 0) {
      const visibleRows = rows.slice(0, 3);
      poPreview = visibleRows.map(r => {
        const status = getStyleStatus(r.style);
        let stageColor = 'dev';
        if (status.stage === 'AWAIT_FIT') stageColor = 'await-fit';
        else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageColor = 'revise';
        else if (status.stage === 'PROD') stageColor = 'prod';
        else if (status.stage === 'DONE') stageColor = 'done';
        return `<div class="cal-po-chip stage-bg-${stageColor}">
          <span class="cal-po-num">${escapeHtml(r.po.poNumber)}</span>
          ${r.po.color ? `<span class="cal-po-color">${escapeHtml(r.po.color)}</span>` : ''}
        </div>`;
      }).join('');
      if (rows.length > 3) {
        poPreview += `<div class="cal-po-more">+ ${rows.length - 3} 个</div>`;
      }
    }

    html += `
      <div role="button" tabindex="0" class="${cellCls}" onclick="selectCalendarDate('${dateKey}')">
        <div class="cal-cell-header">
          <span class="cal-day-num">${dayNum}</span>
          ${rows.length > 0 ? `<span class="cal-day-count">${rows.length}</span>` : ''}
        </div>
        ${poPreview ? `<div class="cal-po-list">${poPreview}</div>` : ''}
      </div>
    `;
  }

  html += '</div>';  // 关闭 calendar-grid

  // 右侧栏：选中日期时显示当天详情，否则显示忙日列表
  if (state.selectedCalendarDate && byDate[state.selectedCalendarDate]) {
    const rows = byDate[state.selectedCalendarDate];
    const d = new Date(state.selectedCalendarDate);
    const wd = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
    const md = `${d.getMonth() + 1} 月 ${d.getDate()} 日`;
    const daysToEF = daysUntil(state.selectedCalendarDate);
    let countdownText;
    if (daysToEF === 0) countdownText = '今天';
    else if (daysToEF < 0) countdownText = `已过 ${-daysToEF} 天`;
    else countdownText = `还剩 ${daysToEF} 天`;

    html += `
      <aside class="busy-days-panel cal-detail-aside">
        <div class="cal-detail-aside-header">
          <div class="cal-detail-aside-date">
            <span class="cal-detail-md">${escapeHtml(md)}</span>
            <span class="cal-detail-wd">${escapeHtml(wd)}</span>
          </div>
          <button class="cal-detail-close" onclick="closeCalendarDate()" title="关闭">×</button>
        </div>
        <div class="cal-detail-aside-meta">${escapeHtml(countdownText)} · ${rows.length} 个 PO</div>
        <div class="cal-detail-aside-list">
          ${rows.map(r => renderCalendarDetailItem(r.style, r.po)).join('')}
        </div>
      </aside>
    `;
  } else {
    html += `
      <aside class="busy-days-panel">
        <div class="busy-days-header">
          <h3 class="busy-days-title">本月忙日</h3>
          <span class="busy-days-sub">≥ 3 个 PO 的日子</span>
        </div>
        <div class="busy-days-list">
          ${busyDays.length > 0
            ? busyDays.map(renderBusyDayItem).join('')
            : '<div class="busy-days-empty">本月没有特别忙的日子<br><span>所有日子 PO 都在 3 个以下</span></div>'
          }
        </div>
        <div class="busy-days-footer">
          <div class="footer-stat">
            <span class="footer-label">忙日总计</span>
            <span class="footer-value">${busyDays.length} 天</span>
          </div>
          <div class="footer-stat">
            <span class="footer-label">忙日 PO 数</span>
            <span class="footer-value">${totalBusyPOs}</span>
          </div>
        </div>
      </aside>
    `;
  }

  html += '</div>';  // 关闭 calendar-layout

  // 选中日期：详情已经显示在右侧栏里（替换忙日列表）

  // 已批船版（折叠）+ 已过货期警告（如果有）
  const overdueRows = allRows.filter(r => {
    if (!r.po.exFactory) return false;
    const status = getStyleStatus(r.style);
    if (status.stage === 'DONE') return false;
    return r.po.exFactory < today;
  });
  const doneRows = allRows.filter(r => getStyleStatus(r.style).stage === 'DONE');

  if (overdueRows.length > 0) {
    const overdueCol = state.collapsedSections['cal_overdue'];
    html += `
      <div class="special-section overdue ${overdueCol ? 'collapsed' : ''}" style="margin-top:24px;">
        <div role="button" tabindex="0" class="month-header collapsible-header" onclick="toggleSection('cal_overdue')">
          <span class="section-chevron">▼</span>
          <div class="month-header-left">
            <div class="month-title">🔴 已过货期 · 立刻处理</div>
            <div class="month-meta">${overdueRows.length} 个 PO</div>
          </div>
        </div>
        <div class="month-content section-content">
          <div class="compact-po-table">
            ${overdueRows.map(r => renderCompactPORow(r.style, r.po)).join('')}
          </div>
        </div>
      </div>
    `;
  }

  if (doneRows.length > 0) {
    const doneCol = state.collapsedSections['cal_done'];
    html += `
      <div class="special-section done ${doneCol ? 'collapsed' : ''}" style="margin-top:14px;">
        <div role="button" tabindex="0" class="month-header collapsible-header" onclick="toggleSection('cal_done')">
          <span class="section-chevron">▼</span>
          <div class="month-header-left">
            <div class="month-title">✅ 已批船版 · 等大货完成</div>
            <div class="month-meta">${doneRows.length} 个 PO</div>
          </div>
        </div>
        <div class="month-content section-content">
          <div class="compact-po-table">
            ${doneRows.map(r => renderCompactPORow(r.style, r.po)).join('')}
          </div>
        </div>
      </div>
    `;
  }

  html += '</div>';
  main.innerHTML = html;
}

// 月历导航
function prevMonth() {
  state.calendarMonth--;
  if (state.calendarMonth < 0) {
    state.calendarMonth = 11;
    state.calendarYear--;
  }
  state.selectedCalendarDate = null;
  render();
}

function nextMonth() {
  state.calendarMonth++;
  if (state.calendarMonth > 11) {
    state.calendarMonth = 0;
    state.calendarYear++;
  }
  state.selectedCalendarDate = null;
  render();
}

function goToday() {
  const now = new Date();
  state.calendarYear = now.getFullYear();
  state.calendarMonth = now.getMonth();
  state.selectedCalendarDate = null;
  render();
}

function selectCalendarDate(dateKey) {
  // 切换选中状态
  if (state.selectedCalendarDate === dateKey) {
    state.selectedCalendarDate = null;
  } else {
    state.selectedCalendarDate = dateKey;
  }
  render();
  // 滚动到详情面板
  setTimeout(() => {
    const panel = document.querySelector('.cal-detail-panel');
    if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function closeCalendarDate() {
  state.selectedCalendarDate = null;
  render();
}

// 月历右侧栏的 PO 详情卡片
function renderCalendarDetailItem(s, po) {
  const status = getStyleStatus(s);

  const thumb = s.imageUrl
    ? `<img class="cal-detail-thumb thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeJsAttr(s.imageUrl)}')" onerror="this.outerHTML='<div class=&quot;cal-detail-thumb-placeholder&quot;>NO</div>'">`
    : `<div class="cal-detail-thumb-placeholder">NO</div>`;

  let nodeCls = '';
  if (status.level === 'danger') nodeCls = 'danger';
  else if (status.level === 'warn') nodeCls = 'warn';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '✓ 大货已到仓';
  else nodeText = `${withDays(status.currentNodeLabel, status.days)}`;

  const doneTag = (s.prodReceived && s.prodReceived.date) ? '<span class="cal-detail-done-tag">✓ 大货已到仓</span>' : '';

  return `
    <div role="button" tabindex="0" class="cal-detail-item" onclick="openDrawer('${s.id}')">
      ${thumb}
      <div class="cal-detail-item-info">
        <div class="cal-detail-item-row1">
          <span class="cal-detail-item-po-num">${escapeHtml(po.poNumber)}</span>
          <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
          ${doneTag}
        </div>
        <div class="cal-detail-item-sub">
          <span class="cal-detail-item-sku">${escapeHtml(s.sku)}</span>
          <span class="cal-detail-item-color">${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity : ''}</span>
        </div>
        <div class="cal-detail-item-name">${escapeHtml(s.name)}</div>
        <div class="cal-detail-item-node ${nodeCls}">${escapeHtml(nodeText)}</div>
      </div>
    </div>
  `;
}




// 紧凑 PO 表格行（月历详情面板/已过货期/已批船版区都用这个）
function renderCompactPORow(s, po) {
  const status = getStyleStatus(s);

  const thumb = s.imageUrl
    ? `<img class="thumb-tiny thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeJsAttr(s.imageUrl)}')" onerror="this.outerHTML='<div class=&quot;thumb-tiny-placeholder&quot;>NO</div>'">`
    : `<div class="thumb-tiny-placeholder">NO</div>`;

  let nodeCls = '';
  if (status.level === 'danger') nodeCls = 'danger';
  else if (status.level === 'warn') nodeCls = 'warn';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '✓ 大货已到仓';
  else nodeText = `${withDays(status.currentNodeLabel, status.days)}`;

  const doneTag = (s.prodReceived && s.prodReceived.date) ? ' <span style="color:var(--ok);font-weight:600;">✓ 到仓</span>' : '';

  return `
    <div role="button" tabindex="0" class="compact-po-row" onclick="openDrawer('${s.id}')">
      ${thumb}
      <div class="compact-sku">${escapeHtml(s.sku)}</div>
      <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
      <div class="compact-po-num">${escapeHtml(po.poNumber)}${doneTag}</div>
      <div class="compact-po-color">${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity : ''}</div>
      <div class="compact-node ${nodeCls}">${escapeHtml(nodeText)}</div>
      <div class="compact-arrow">›</div>
    </div>
  `;
}

function renderProductionBoardCard(s, po) {
  const status = getStyleStatus(s);

  // 阶段着色
  let stageTagCls = 'dev';
  if (status.stage === 'AWAIT_FIT') stageTagCls = 'await-fit';
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageTagCls = 'revise';
  else if (status.stage === 'PROD' || status.stage === 'PROD_SHIPPING') stageTagCls = 'prod';
  else if (status.stage === 'DONE') stageTagCls = 'done';

  const thumb = s.imageUrl
    ? `<img class="thumb thumb-zoomable" src="${escapeHtml(s.imageUrl)}" alt="" ondblclick="event.stopPropagation(); openImageViewer('${escapeJsAttr(s.imageUrl)}')" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  let nodeInfoCls = '';
  if (status.level === 'danger') nodeInfoCls = 'danger';
  else if (status.level === 'warn') nodeInfoCls = 'warn';

  let nodeText;
  if (status.stage === 'DONE') nodeText = '✓ 大货已到仓';
  else nodeText = `${withDays(status.currentNodeLabel, status.days)}`;

  const doneTag = (s.prodReceived && s.prodReceived.date) ? '<div style="font-family:var(--font-mono);font-size:10px;color:var(--ok);font-weight:600;margin-top:4px;">✓ 大货已到仓</div>' : '';

  const stageLabelText = status.stage === 'AWAIT_FIT' ? '等 fit'
                       : status.stage === 'REVISE' ? '修改版'
                       : status.stage === 'PHOTO' ? '拍照版'
                       : status.stage === 'PROD' ? '船版'
                       : status.stage === 'DEV' ? '开发版'
                       : status.stageLabel;

  return `
    <div role="button" tabindex="0" class="prod-board-card stage-bg-${stageTagCls}" onclick="openDrawer('${s.id}')">
      <span class="prod-board-card-stage-pill stage-tag ${stageTagCls}">${escapeHtml(stageLabelText)}</span>
      <div class="prod-board-card-top">
        ${thumb}
        <div class="prod-board-card-info">
          <div class="prod-board-card-sku">${escapeHtml(s.sku)} · ${s.client}</div>
          <div class="prod-board-card-name" style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
            <span>${renderStyleNameText(s)}</span>
            ${renderSampleTypeBadge(s)}
          </div>
        </div>
      </div>
      <div class="prod-board-card-po">
        <span>${escapeHtml(po.poNumber)}</span>
        <span class="po-color"> · ${escapeHtml(po.color || '—')}${po.quantity ? ' · ' + po.quantity + ' 件' : ''}</span>
      </div>
      <div class="prod-board-card-bottom">
        <span class="node-info ${nodeInfoCls}">${escapeHtml(nodeText)}</span>
        ${doneTag}
      </div>
    </div>
  `;
}

function renderProductionRow(s, po) {
  const status = getStyleStatus(s);
  const daysToEF = daysUntil(po.exFactory);

  const prodCycle = s.cycles.find(c => c.type === 'PROD');
  const hasProdSent = prodCycle && prodCycle.sentDate;
  const hasProdApproved = prodCycle && prodCycle.feedbackOutcome === FEEDBACK_OUTCOMES.APPROVED;

  let alertLevel = 'ok';
  if (daysToEF < 0) alertLevel = 'danger';
  else if (!hasProdSent && daysToEF < 14) alertLevel = 'danger';
  else if (!hasProdApproved && daysToEF < 28) alertLevel = 'warn';

  const urgentClass = alertLevel === 'danger' ? 'urgent-danger' : alertLevel === 'warn' ? 'urgent-warn' : '';

  let countdownCls, countdownText;
  if (daysToEF < 0) { countdownCls = 'urgent-overdue'; countdownText = `已过期 ${-daysToEF} 天`; }
  else if (daysToEF < 14) { countdownCls = 'urgent-danger'; countdownText = `还剩 ${daysToEF} 天`; }
  else if (daysToEF < 28) { countdownCls = 'urgent-warn'; countdownText = `还剩 ${daysToEF} 天`; }
  else { countdownCls = 'urgent-ok'; countdownText = `还剩 ${daysToEF} 天`; }

  let nodeNameCls = '';
  if (status.level === 'danger') nodeNameCls = 'danger';
  else if (status.level === 'warn') nodeNameCls = 'warn';

  // 阶段着色 class(也用作内联标签的 class)
  let stageTagCls = 'dev';
  if (status.stage === 'AWAIT_FIT') stageTagCls = 'await-fit';
  else if (status.stage === 'REVISE' || status.stage === 'PHOTO') stageTagCls = 'revise';
  else if (status.stage === 'PROD' || status.stage === 'PROD_SHIPPING') stageTagCls = 'prod';
  else if (status.stage === 'DONE') stageTagCls = 'done';

  let nodeDisplay;
  if (status.stage === 'DONE') {
    nodeDisplay = `<div class="prod-node-line"><span class="node-name done">✓ 大货已到仓</span></div>`;
  } else if (status.stage === 'PROD_SHIPPING') {
    const dLeft = daysToEF;
    const efCls = dLeft <= 0 ? 'danger' : dLeft <= 7 ? 'danger' : dLeft <= 14 ? 'warn' : '';
    nodeDisplay = `<div class="prod-node-line"><span class="node-name ${efCls}">船版已批 · 等大货</span></div>`;
  } else {
    // 节点名 + 阶段标签做成 inline,不再换行
    const stageInline = status.stageLabel
      ? `<span class="prod-stage-inline stage-${stageTagCls}">${escapeHtml(status.stageLabel)}</span>`
      : '';
    nodeDisplay = `
      <div class="prod-node-line">
        <span class="node-name ${nodeNameCls}">${escapeHtml(withDays(status.currentNodeLabel, status.days))}</span>
        ${stageInline}
      </div>
    `;
  }

  const poSel = state.poBatchSelected && state.poBatchSelected[po.id] ? 'checked' : '';
  const poSelCls = state.poBatchSelected && state.poBatchSelected[po.id] ? 'po-selected' : '';

  // 缩略图:优先用 PO 图,退回款式图
  const imgSrc = po.image || s.imageUrl || '';
  const thumbHtml = imgSrc
    ? `<img class="prod-row-thumb" src="${escapeHtml(imgSrc)}" alt="" onclick="event.stopPropagation(); openImageViewer('${escapeJsAttr(imgSrc)}')" title="点击放大" onerror="this.outerHTML='<div class=&quot;thumb-placeholder&quot;>NO IMG</div>'">`
    : `<div class="thumb-placeholder">NO IMG</div>`;

  // 新单/反单徽章
  const orderTypeHtml = po.orderType === 'new'
    ? `<span class="order-type-pill order-type-new">新单</span>`
    : po.orderType === 'repeat'
    ? `<span class="order-type-pill order-type-repeat">反单</span>`
    : `<span style="color:var(--ink-mute);font-family:var(--font-mono);font-size:11px;">—</span>`;

  // PO 号:只显示纯 PO 号,其他信息(大货款号/描述)进抽屉里看
  const poNumCell = `<div class="po-num">${escapeHtml(po.poNumber || '—')}</div>`;

  // 大货进度:已到 X / Y 件
  const totalQty = (s.pos || []).reduce((sum, p) => sum + (Number(p.quantity) || 0), 0);
  const totalRecv = (s.prodReceived?.batches || []).reduce((sum, b) => sum + (Number(b.received) || 0), 0);
  const fullyReceived = s.prodReceived?.fullyReceived === true || (s.prodReceived?.date && !s.prodReceived?.batches?.length);
  const pctRecv = totalQty > 0 ? Math.min(100, Math.round(totalRecv / totalQty * 100)) : 0;

  let progressHtml = '';
  if (status.stage === 'PROD_SHIPPING' || status.stage === 'DONE') {
    if (fullyReceived) {
      progressHtml = `
        <div class="prod-progress-bar"><div class="prod-progress-fill done" style="width:100%;"></div></div>
        <span class="prod-progress-text done">✓ 已到仓${totalQty > 0 ? ` ${totalQty}/${totalQty} 件` : ''}</span>
      `;
    } else if (totalRecv > 0) {
      const barCls = daysToEF < 0 ? 'danger' : '';
      progressHtml = `
        <div class="prod-progress-bar"><div class="prod-progress-fill ${barCls}" style="width:${pctRecv}%;"></div></div>
        <span class="prod-progress-text">大货 ${totalRecv}/${totalQty} 件 · ${pctRecv}%</span>
      `;
    } else {
      progressHtml = `
        <div class="prod-progress-bar"><div class="prod-progress-fill" style="width:0%;"></div></div>
        <span class="prod-progress-text">大货未到</span>
      `;
    }
  } else {
    // 还没到大货阶段,显示当前样板节点
    progressHtml = `<span class="prod-progress-text" style="color:var(--ink-soft);font-family:var(--font-sans);font-size:11.5px;">${escapeHtml(withDays(status.currentNodeLabel || '', status.days))}</span>`;
  }

  // 颜色 · 数量(可能多 PO 但这里只展示当前 PO 的颜色;style 多 PO 用 sub 说明)
  const otherPoCount = ((s.pos || []).length - 1);
  const multiPoHint = otherPoCount > 0 ? `<div style="color:var(--ink-mute);font-size:10px;font-family:var(--font-mono);">+${otherPoCount} 其他颜色</div>` : '';

  return `
    <div role="button" tabindex="0" class="production-row with-node ${urgentClass} ${poSelCls}" data-po-id="${po.id}" data-style-id="${s.id}" onclick="handleProdRowClick(event, '${s.id}', '${po.id}')">
      <input type="checkbox" class="batch-checkbox prod-row-checkbox" ${poSel} onclick="togglePoBatchSelection('${po.id}', '${s.id}', this.checked); event.stopPropagation();" title="选择此 PO">
      ${thumbHtml}
      <div class="prod-cell-main">
        <span class="po-num-main">${escapeHtml(po.poNumber || '—')}${po.barcode ? `<span class="po-barcode-inline">/${escapeHtml(po.barcode)}</span>` : ''}</span>
        <div class="po-sub">
          ${po.clientStyleNo ? `<span class="po-style-no">${escapeHtml(po.clientStyleNo)}</span>` : ''}
          ${s.owner ? `<span class="po-owner">${escapeHtml(s.owner)}</span>` : ''}
        </div>
      </div>
      <div class="prod-cell-meta">
        <div class="prod-cell-meta-row">
          <span class="client-badge client-${s.client.toLowerCase()}">${s.client}</span>
          ${renderClientGroupBadge(s) || ''}
        </div>
        <div class="prod-cell-meta-row">
          ${renderFactoryBadge(s) || ''}
          ${orderTypeHtml}
        </div>
      </div>
      <div class="prod-cell-colors">
        <div class="color-line">
          <span class="color-name">${escapeHtml(po.color || '—')}</span>
          ${po.quantity ? `<span class="color-qty">${po.quantity} 件</span>` : ''}
        </div>
        ${multiPoHint}
      </div>
      <div class="prod-cell-progress">
        <div class="ef-row">
          <span class="ef-date">EX ${escapeHtml(formatDate(po.exFactory))}</span>
          <span class="ef-countdown ${countdownCls.replace('urgent-', '')}">${countdownText}</span>
        </div>
        ${progressHtml}
      </div>
      <div class="arrow">›</div>
    </div>
  `;
}

 详情抽屉

function openDrawer(id) {
  state.selectedId = id;
  state._scrollY = window.scrollY;  // 记住滚动位置
  const s = state.styles.find(x => x.id === id);
  if (!s) return;
  const status = getStyleStatus(s);
  const lastCycle = s.cycles?.[s.cycles.length - 1];

  // 主操作按钮
  let actions = '';
  // 是否给 admin 多显示一个"📦 已收到样品"快捷跳跃按钮
  // production 角色按正常流程走（打版完成 → 面料到 → 收样），不显示跳跃按钮
  const showJumpReceive = (typeof window.getCurrentRole === 'function' && window.getCurrentRole() === 'admin');
  if (s.archived) {
    actions = canArchiveStyle() ? `<button onclick="undoArchive('${s.id}')">取消归档</button>` : '';
  } else if (status.currentNode === 'GRADING') {
    // 等版师放码 — approve 后等放码，版师放完码后进入工厂打船版
    actions = `<button class="primary" onclick="markGradingDone('${s.id}')">🧮 标记放码完成</button>`;
  } else if (status.currentNode === 'PATTERN_MAKING') {
    // 版师打版中
    actions = `<button class="primary" onclick="markPatternMakerDone('${s.id}', '${lastCycle.id}')">✂️ 标记版师已打完</button>`;
    if (showJumpReceive) {
      actions += ` <button class="btn-receive-jump" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'received')" title="跟单专用：跳过中间步骤直接登记收到样品">📦 已收到样品</button>`;
    }
  } else if (status.currentNode === 'AWAIT_FABRIC') {
    // 等面料备齐
    actions = `<button class="primary" onclick="markFabricSourced('${s.id}', '${lastCycle.id}')">🧵 登记面料已备齐</button>`;
    if (showJumpReceive) {
      actions += ` <button class="btn-receive-jump" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'received')" title="跟单专用：跳过中间步骤直接登记收到样品">📦 已收到样品</button>`;
    }
    actions += ` <button class="btn-revert-step" onclick="revertOneStep('${s.id}', '${lastCycle.id}')" title="退回到版师阶段">↶ 退回上一步</button>`;
  } else if (status.currentNode === 'AWAIT_DELIVERY') {
    // 等版房送样
    actions = `<button class="primary" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'received')">📦 登记收到样板</button>`;
    actions += ` <button class="btn-revert-step" onclick="revertOneStep('${s.id}', '${lastCycle.id}')" title="退回到面料阶段">↶ 退回上一步</button>`;
  } else if (status.currentNode === 'AWAIT_SEND') {
    // 检查是否处于返修中
    const activeRev = getActiveRevision(lastCycle);
    if (activeRev) {
      // 返修中：主操作变成"返修件已收回"
      const returnLbl = getReworkReturnLabel(activeRev.returnTo);
      const reworkDays = getReworkDays(activeRev);
      actions = `<button class="primary btn-rework-receive" onclick="markReworkReceived('${s.id}', '${lastCycle.id}', '${activeRev.id}')" title="样板从${returnLbl}返修后再次到手">✓ 返修件已收回${reworkDays > 0 ? '（已退回 ' + reworkDays + ' 天）' : ''}</button>`;
      // 取消返修标记 — 误操作或返修不再需要时使用，款会回到"待寄出"状态
      actions += ` <button class="btn-revert-step" onclick="cancelRework('${s.id}', '${lastCycle.id}', '${activeRev.id}')" title="取消返修标记，款回到待寄出">↶ 取消返修</button>`;
    } else {
      // 反单 + PROD cycle:反单确认色样品已收到,根据客户决定下一步推荐
      // 反单确认色样品默认动作 — 由 REPEAT_ORDER_RULES[client].confirmSample 决定:
      //   false → 不需要寄客户(BOOHOO),默认推荐直接 approve(副选寄客户)
      //   true  → 需要寄客户确认(PLT 等),默认推荐寄客户(副选直接 approve)
      const isAllRepeat = s.pos && s.pos.length > 0 && s.pos.every(p => p.orderType === 'repeat');
      if (isAllRepeat && lastCycle.type === 'PROD') {
        const skipClientConfirm = !getRepeatRule(s.client).confirmSample;
        if (skipClientConfirm) {
          actions = `<button class="primary" onclick="approveRepeatSample('${s.id}', '${lastCycle.id}')">✓ approve · 进大货</button>`;
          actions += ` <button onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'sent')">📦 改寄客户(可选)</button>`;
        } else {
          actions = `<button class="primary" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'sent')">📦 寄出客户</button>`;
          actions += ` <button onclick="approveRepeatSample('${s.id}', '${lastCycle.id}')">✓ 改直接 approve</button>`;
        }
        actions += ` <button class="btn-revert-step" onclick="revertOneStep('${s.id}', '${lastCycle.id}')" title="退回到等版房送样">↶ 退回上一步</button>`;
      } else {
        // 正常 DEV/REVISE/PHOTO 流程
        const lbl = lastCycle.type === 'PHOTO' ? '拍照发图审' : '寄出客户';
        actions = `<button class="primary" onclick="openCycleStepModal('${s.id}', '${lastCycle.id}', 'sent')">登记 · ${lbl}</button>`;
        // 只有在 DEV/REVISE 类型 cycle 上才提供返修入口（PHOTO/PROD 一般不会让版房返修）
        if (lastCycle.type === 'DEV' || lastCycle.type === 'REVISE') {
          actions += ` <button class="btn-rework" onclick="openReworkModal('${s.id}', '${lastCycle.id}')" title="样板有问题，退回版房/版师返修">🔧 需要返修</button>`;
        }
        actions += ` <button class="btn-revert-step" onclick="revertOneStep('${s.id}', '${lastCycle.id}')" title="退回到等版房送样">↶ 退回上一步</button>`;
      }
    }
  } else if (status.currentNode === 'AWAIT_FB') {
    if (lastCycle.type === 'PHOTO') actions = `<button class="primary" onclick="openFeedbackModal('${s.id}', '${lastCycle.id}')">登记 · 图审结果</button>`;
    else if (lastCycle.type === 'PROD') actions = `<button class="primary" onclick="openFeedbackModal('${s.id}', '${lastCycle.id}')">登记 · 船版审批</button>`;
    else actions = `<button class="primary" onclick="openFeedbackModal('${s.id}', '${lastCycle.id}')">登记 · 客户评语</button>`;
    actions += ` <button class="btn-revert-step" onclick="revertOneStep('${s.id}', '${lastCycle.id}')" title="退回到待寄出">↶ 退回上一步</button>`;
  } else if (status.currentNode === 'AWAIT_FIT') {
    actions = `<button class="primary" onclick="openFitReceivedModal('${s.id}')">登记 · 收到 fit comment</button>`;
  } else if (status.currentNode === 'PROD_SHIPPING') {
    if (status.partialReceived) {
      actions = `<button class="primary" onclick="openProdReceivedModal('${s.id}')">📦 登记下一批到货</button>`;
    } else {
      actions = `<button class="primary" onclick="openProdReceivedModal('${s.id}')">📦 登记到货</button>`;
    }
  } else if (status.currentNode === 'DONE') {
    actions = `<span style="font-family:var(--font-mono);font-size:12px;color:var(--ok);padding:9px 14px;">✓ 大货已到仓 · 流程完结</span>`;
  }

  // 按角色过滤动作:当前节点不在角色权限内,显示"等 XX 处理"hint(只看不操作)
  // 例外:archived 已通过 canArchiveStyle 单独处理,DONE 是状态提示不是动作
  if (!s.archived && status.currentNode !== 'DONE' && !canDoActionForNode(status.currentNode)) {
    const _who = whoToFollowUp(status.currentNode, status.cycleType);
    actions = _who
      ? `<div class="role-readonly-hint"><span class="hint-dot"></span>等 ${escapeHtml(_who)} 处理 · 当前账号只能查看</div>`
      : '';
  }

  // 删除款式按钮（独立，永远在最右）— 只 admin 可见
  if (canDeleteStyle()) {
    actions += ` <button class="danger" onclick="deleteStyle('${s.id}')">删除款式</button>`;
  }

  // 该催谁提示
  const followUpWho = whoToFollowUp(status.currentNode, status.cycleType);
  let followUpHint = '';
  if (followUpWho && !s.archived && status.stage !== 'DONE') {
    followUpHint = `
      <div class="follow-up-hint lvl-${status.level}">
        <span class="lbl">该催谁</span>
        <span class="val">${escapeHtml(followUpWho)}</span>
      </div>
    `;
  }

  // 已催标记（不再隐藏款式，仅在抽屉/卡片上显示标签）
  let snoozeHint = '';

  // PO 列表卡片
  let poCard = '';
  if (hasPO(s)) {
    const earliestEF = s.pos.reduce((min, p) => {
      if (!p.exFactory) return min;
      if (!min) return p.exFactory;
      return new Date(p.exFactory) < new Date(min) ? p.exFactory : min;
    }, null);
    const daysToEF = daysUntil(earliestEF);
    let countdownColor = 'var(--ok)';
    if (daysToEF < 14 || daysToEF < 0) countdownColor = 'var(--danger)';
    else if (daysToEF < 28) countdownColor = 'var(--warn)';

    // ─── Lane C 重设计:主行 + 点击展开详情 ───
    // 默认所有 PO 收起,但过期 / 有延期历史 / 有详情字段 的 PO 默认展开,让紧迫信息直接可见
    // 平时一眼扫一行,需要时点击展开看延期历史 / 大货款号 / 条形号 / 描述
    poCard = `
      <div class="po-card">
        <div class="po-card-header">
          <span class="lbl-section">PO 信息 · ${s.pos.length} 个颜色</span>
          ${canEditPO() ? `<button class="po-add-btn" onclick="openAddPOModal('${s.id}')" aria-label="加 PO">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
            加 PO
          </button>` : ''}
        </div>
        <div class="po-list po-list-v2">
          ${s.pos.map(po => {
            const efDays = po.exFactory ? daysUntil(po.exFactory) : null;

/* 渲染当前 cycle 的返修历史时间线（drawer 内展示）*/
function renderReworkHistory(style) {
  if (!style.cycles || style.cycles.length === 0) return '';
  // 收集所有有返修的 cycle（一般只看最后一个 cycle，但保险起见全列）
  const allRevs = [];
  style.cycles.forEach(cycle => {
    if (cycle.revisions && cycle.revisions.length > 0) {
      cycle.revisions.forEach(rev => {
        allRevs.push({ cycle, rev });
      });
    }
  });
  if (allRevs.length === 0) return '';

  const items = allRevs.map(({ cycle, rev }, idx) => {
    const cycleLabel = CYCLE_TYPES[cycle.type]?.label || cycle.type;
    const returnLbl = getReworkReturnLabel(rev.returnTo);
    const sentBack = rev.sentBackAt || '?';
    const recvAgain = rev.receivedAgainAt
      ? `<span style="color:var(--ok);">→ ${rev.receivedAgainAt} 已收回</span>`
      : `<span style="color:var(--stage-revise);">→ 进行中（已 ${getReworkDays(rev)} 天）</span>`;
    const noteHtml = rev.note ? `<br>备注：${escapeHtml(rev.note)}` : '';
    return `
      <div class="rework-history-item">
        <strong>第 ${idx + 1} 次</strong> · ${escapeHtml(cycleLabel)} · ${escapeHtml(sentBack)} 退回${escapeHtml(returnLbl)} · <span class="reason">${escapeHtml(rev.reason)}</span> ${recvAgain}${noteHtml}
      </div>
    `;
  }).join('');

  return `
    <div class="rework-history">
      <div class="rework-history-title">🔧 返修历史（${allRevs.length} 次）</div>
      ${items}
    </div>
  `;
}

// 获取当前打开的 style 的 SKU
function getCurrentSku() {
  const s = state.styles.find(x => x.id === state.selectedId);
  return s ? s.sku.replace(/[\/\\:*?"<>|]/g, '_') : 'photo';
}

// 阶段名称映射
function getCycleLabel(key) {
  const map = {
    'DEV': '开发版', 'REVISE': '修改版', 'PHOTO': '拍照版',
    'PROD': '大货版', 'FIT': 'FIT版'
  };
  // key 格式可能是 "DEV_0" 或 "REVISE_1"
  const type = key.split('_')[0];
  return map[type] || key;
}

// 把 base64 转成 Blob
function base64ToBlob(base64) {
  const parts = base64.split(';base64,');
  const type = parts[0].split(':')[1] || 'image/jpeg';
  const binary = atob(parts[1]);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type });
}

// 打包下载（用 JSZip）
async function downloadPhotosAsZip(urls, cycleKey) {
  if (urls.length === 0) { showToast('没有选中的照片', 'warn'); return; }

  const sku = getCurrentSku();
  const label = getCycleLabel(cycleKey);
  const folderName = `${sku}_${label}`;

  showToast(`正在打包 ${urls.length} 张图片…`, 'ok');

  // 动态加载 JSZip
  if (!window.JSZip) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  const zip = new JSZip();
  const folder = zip.folder(folderName);

  urls.forEach((url, i) => {
    const ext = url.startsWith('data:image/png') ? 'png' : 'jpg';
    const filename = `${sku}_${label}_${String(i+1).padStart(2,'0')}.${ext}`;
    // 去掉 base64 头，只存数据部分
    const base64Data = url.split(';base64,')[1];
    if (base64Data) folder.file(filename, base64Data, { base64: true });
  });

  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${folderName}.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
  showToast(`已下载：${folderName}.zip`, 'ok');
}

// 删除单张图片（gallery中）
function deleteOnePhoto(cycleType, globalIdx) {
  const s = state.styles.find(x => x.id === state.selectedId);
  if (!s) return;
  
  // 通过 globalIdx 找到具体的 cycle 和局部 index
  let gIdx = 0;
  let targetCycle = null;
  let targetLocalIdx = -1;
  
  for (const c of (s.cycles || [])) {
    if (c.type !== cycleType) {
      gIdx += (c.receivedPhotos || []).length;
      continue;
    }
    const photos = c.receivedPhotos || [];
    if (globalIdx < gIdx + photos.length) {
      targetCycle = c;
      targetLocalIdx = globalIdx - gIdx;
      break;
    }
    gIdx += photos.length;
  }
  
  if (!targetCycle || targetLocalIdx === -1) {
    showToast('找不到要删除的图片', 'warn');
    return;
  }

  // 计算这张照片在云端的 ID(跟 upsertStyle 的命名规则一致:cycleId + '_photo_' + 索引)
  const photoIdToDelete = targetCycle.id + '_photo_' + targetLocalIdx;

  // 本地删除
  targetCycle.receivedPhotos.splice(targetLocalIdx, 1);

  // 显式删除云端那一行(upsertStyle 不再 bulk-delete)
  if (typeof db !== 'undefined' && typeof db.deletePhoto === 'function') {
    db.deletePhoto(photoIdToDelete).catch(e => console.warn('删除照片云端记录失败', e));
  }

  // 保存(upsert 剩余照片;由于索引 shift,后续照片的 id 会变,upsert 自动覆盖)
  saveOneStyle(s.id);

  // 重新渲染
  openDrawer(s.id);
  showToast('已删除图片', 'ok');
}

// 批量删除选中图片
function deleteSelectedPhotos(cycleType) {
  const s = state.styles.find(x => x.id === state.selectedId);
  if (!s) return;
  const selected = getSelectedInGroup(cycleType);
  if (selected.length === 0) { showToast('没有选中的图片', 'warn'); return; }
  
  // 在所有相同类型的 cycle 里删除
  let totalDeleted = 0;
  (s.cycles || []).forEach(c => {
    if (c.type !== cycleType) return;
    const before = (c.receivedPhotos || []).length;
    c.receivedPhotos = (c.receivedPhotos || []).filter(src => !selected.includes(src));
    const after = c.receivedPhotos.length;
    totalDeleted += (before - after);
  });
  
  // 保存（saveStyleToSupabase 会自动同步删除云端的 photo 记录）
  saveOneStyle(s.id);
  openDrawer(s.id);
  showToast(`已删除 ${totalDeleted} 张图片`, 'ok');
}
